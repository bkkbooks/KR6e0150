body:
  text: 唐蘭山雲巖慈恩寺護法國師一行沙門慧覺依經録宋蒼山載光寺沙門普瑞補注明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閲天台習教觀沙門正止治定第三十三晌次十地位中第四妙德夜神會一切恭敬敬禮無盡三寶是諸衆等人各胡跪嚴持香華如法供養願此供海雲遍滿十方界施諸燈明所謂酥燈油燈寶燈摩尼燈漆燈火燈沉水燈旃檀燈一切香燈無量色光燈施如是等以諸寶燈常作供養帝網重重諸佛菩薩賢聖海衆受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯呪寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次運心供養印呪以二手金剛合掌置於頂上應誦此呪唵薩㗚末二合㗚達二合眉鳴𠹌遏二合矴切身悉癹囉兮慢引遏遏捺竿莎引訶梵音讚佛佛身無有量能示有量身隨其所應覩導師如是現佛身無處所充滿一切處如空無邊際如是難思議悲心所行處心不於中起諸佛境界中畢竟無生滅直言讚佛如來應正等覺大智慧海於中有四大智寶珠具足無量福智功德由此能生一切衆生聲聞獨覺有學無學位及諸菩薩智慧之寶所謂無染著巧方便大智慧寶善分別有為無為法大智慧寶分別説無量法而不壞法性大智慧寶知時非時未曾誤失大智慧寶若諸如來大智慧海中無此四寶有一衆生得入大乘終無是處此四智寶薄福衆生所不能見何以故於如來深密藏故此四智寶平均正直端潔妙好普能利益諸菩薩衆令其悉得智慧光明是為如來心第四相南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住𦦨魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十回向菩薩十地菩薩等覺菩薩遍法界剎海微塵數菩薩一切海衆南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海衆南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中第四普救衆生妙德主夜神知菩薩普現一切世間調伏衆生解脫法門經云爾時善財童子至殷勤瞻仰辭退而去願共諸衆生往生華藏海極樂淨土中次普救衆生妙德夜神發心處佛會初圓滿清淨劫中毗盧遮那大威德世界內諸佛南無普智寶𦦨妙德幢王佛等須彌山微塵數諸佛道場一切海衆南無普光明法雲音幢佛南無虗空寶蓋衆菩提樹下毗盧遮那如來不可説佛剎微塵數道場一切海衆南無於此前過十大劫日輪光摩尼世界因陀羅幢妙相佛道場一切海衆南無妙德幢佛南無於念念中見須彌山微塵數佛道場一切海衆次寶輪妙莊嚴世界大光劫中諸佛南無五百諸佛道場一切海衆南無大悲幢佛南無金剛那羅延幢佛南無金剛無礙德佛南無火𦦨山妙莊嚴佛南無一切法海高勝王佛南無海嶽法光明佛南無寶𦦨山燈佛南無功德海光明輪佛南無毗盧遮那功德藏佛南無充滿虗空法界妙德燈佛南無如是等一切諸佛次圓滿清淨劫中遍照燈世界中諸佛南無須彌山微塵數一切諸佛南無智𦦨佛南無法幢佛南無法須彌佛南無德師子佛南無寂靜王佛南無滅諸見佛南無高名稱佛南無大功德佛南無勝日佛南無月面佛南無虗空處佛南無普光佛南無住諸方佛南無正念海佛南無高勝光佛南無須彌雲佛南無法𦦨佛南無山勝佛南無大悲華佛南無法界華佛南無光幢佛南無智慧佛南無心義佛南無德主佛南無天慧佛南無慧王佛南無勝智佛南無光王佛南無勇猛佛南無蓮華佛南無寶𦦨山佛南無功德海佛南無法光明佛南無蓮華藏佛南無衆生眼佛南無香光寶佛南無須彌功德佛南無乾闥婆王佛南無摩尼藏佛南無寂靜色佛南無廣大智佛南無寶光明佛南無虗空雲佛南無殊勝相佛南無圓滿戒佛南無那羅延佛南無須彌德佛南無功德輪佛南無無勝幢佛南無大樹山佛南無娑羅藏佛南無世主身佛南無高顯光佛南無金剛照佛南無地威力佛南無甚深法佛南無法慧音佛南無須彌幢佛南無勝光明佛南無妙寶光佛南無梵光明佛南無虗空音佛南無法界身佛南無光明輪佛南無智慧幢佛南無虗空燈佛南無微妙德佛南無遍照光佛南無勝福光佛南無大悲雲佛南無力光慧佛南無普現前佛南無高顯光佛南無光明身佛南無法起佛南無寶相佛南無速疾風佛南無勇猛幢佛南無妙寶蓋佛南無照三世佛南無願海光佛南無金剛身佛南無須彌德佛南無金幢王佛南無功德慧佛南無智慧燈佛南無光明幢佛南無廣大智佛南無法界智佛南無法海智佛南無布施法佛南無功德輪佛南無勝妙雲佛南無忍智燈佛南無寂靜音佛南無寂靜幢佛南無世間燈佛南無深大願佛南無無勝幢佛南無智𦦨海佛南無法自在佛南無無礙慧佛南無意海慧佛南無衆妙音佛南無自在施佛南無普現前佛南無隨樂身佛南無住勝德佛南無本性佛南無賢德佛南無如是等須彌山微塵數劫中諸佛道場一切海衆次妙德主夜神南無此衆會中得菩薩普現一切世間調伏衆生解脫門普救衆生妙德主夜神南無妙德夜神身中一一毛孔中放等衆生數大光明一一光明內寶蓮華上令滅衆生苦一切化身南無得菩薩普現一切世間普救衆生主夜神一切種種化身十方盡歸命滅罪增淨信願生華藏海極樂淨土中次娑竭羅龍王懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖衆世出世神慈悲本願放大光明照於法會證盟護念哀愍攝受願我及一切衆生海自從無始直至今時業海無盡帝網重重普為龍趣一切罪報發露懺悔夫經及本續中説法若滅時諸惡龍等壞滅佛法損害衆生鬬諍不和風雨非時損壞苗稼作種種災其龍類者或有主五方龍或有主八方大力龍或有天地人三種龍天龍地龍人龍或有五種龍蝦蟆類蛇類魚類象類馬類或依相有五角龍觜龍鱗甲龍斑駁龍翅龍或依宮住有四山龍海龍泉龍池龍又有四王種臣僚種婆羅門種雜類種除八大龍及無熱惱池龍王外餘皆有種種熱怖金翅鳥怖熱水怖熱沙怖熱風怖王役怖相食怖惡香怖蛆蟲怖或有地祇豬頭怖又龍王中有三苦一者雖是百味珍饈入口皆成蝦蟆二者雖龍女端正行染時如同蛇染三者鱗甲中生沙石受於苦痛龍有五種苦生時睡時淫時嗔時死時龍半日三番皮肉墮地熱沙炙身罪報懺悔大方等大集經云爾時娑竭羅龍王白佛言世尊何因緣故我等一切在龍中生佛言龍王諦聽諦聽我今為王分別廣説有十種業來生龍中何等為十有諸衆生行六波羅蜜欲得阿耨多羅三藐三菩提覺亦願欲得無惡障礙或復欲得多修布施以時捨施願因緣故來生龍中復次龍王或有衆生於大乘中修行捨施福報因緣故願生龍中復次龍王或有衆生為阿耨多羅三藐三菩提故行於布施福報雖多不能清淨怖畏地獄餓鬼畜生中因緣故願生龍中復次龍王有諸衆生欲行阿耨多羅三藐三菩提時生高心大慢力因緣故願生龍中復次龍王有諸衆生發菩提願行阿耨多羅三藐三菩提時多生嗔恚恨他衆生以嗔忿心向彼地獄餓鬼畜生生因緣故長起嗔忿如是死已願生龍中復次龍王有諸衆生求於小乘欲得福田覓聖人中捨布施報福德供養如是因緣自願力故來生龍中復次龍王有諸衆生嫉妒慢故彼業因緣來生龍中復次龍王有諸衆生多起憍慢饒於語言以彼自業來生龍中復次龍王有諸衆生不信佛法僧寶又不供給和尚阿闍黎及餘大德又不供養父母二親於中種種嗔忿毒心愛憎憍慢癡因緣故於福田中邪錯行故以是業緣來生龍中復次龍王有諸衆生種種癡慢惡業力多福德力少心怖畏故願生龍中復次龍王有諸衆生妄語兩舌惡口無慈此三業緣故而生龍中佛言龍王以此十種業因緣故來生龍中復次龍王復有三業因緣而生龍中何等為三有諸衆生堅固惡業造身口意彼業熟故生地獄中經無量劫受大極苦難得解脫雖免大業小業未盡生於龍中或畜生中或餓鬼中以此三惡業因緣故來生龍中時娑竭羅龍王復白佛言如是世尊而此龍中或有諸龍所受樂報猶如諸天或有餘龍受樂如人有如餓鬼如畜生者或有餘龍如地獄中受大辛苦説是語已時娑竭羅大龍王子名青蓮華面前白佛言世尊我何惡業罪因緣故來生龍中身大端正所有色觸或服衣裳及坐臥處於一切時我身受用猶如火燒常無衣服赤體而行如我父王樂受最勝如轉輪王果報不異佛言華面諦聽諦聽善思念之今當為汝説於本事乃往過去三十一劫有佛世尊名曰尸棄多陀阿伽度阿羅訶三藐三佛陀時彼世中有王名曰裴多富沙彼富沙王於三月中供養彼佛并及無量百千須陀洹斯陀含阿那含阿羅漢及大菩薩摩訶薩衆以種種衣服飯食湯藥而供養之至心聽法既聞法已即發阿耨多羅三藐三菩提心如是三月設供養已彼富沙王為尸棄佛及餘衆僧造立寺舍施種種衣服飲食湯藥床臥被褥具足豐饒彼富沙王第一太子名裴多娑樹帝彼娑樹帝見佛聞法於流轉中生大怖畏從父王邊禮拜咨請欲就佛願求出家王報子言欲往隨意任汝出家已又白父言我欲父王寺上停止富沙王言亦隨汝意往彼寺中時尸棄佛衆僧弟子在彼寺中坐臥受用噉飲食彼富沙子裴多娑樹帝嫉妒生心忿彼舊住佛弟子衆恆嗔罵之時彼衆僧被嗔罵已悉皆離寺彼娑樹帝見僧去已生歡喜心即自念言彼去者好我大安隱衆僧去已時娑樹帝恣用寺內衣服飲食有餘人來即不聽住彼娑樹帝具造如是諸惡業已命終之後生大地獄中經無量千萬那由他歲受諸火燒地獄得脫生餓鬼中復經無量百千萬歲而受辛苦餓鬼中死還墮地獄脫地獄已生餓鬼中如是經由三十一劫汝等諸龍諦聽諦聽其娑樹帝於流轉中具足如是受諸辛苦佛言華面彼娑樹帝者豈異人乎即汝身是也乃往過去惡業因緣故生大地獄餓鬼畜生輪轉受苦經是三十一大劫中備受衆苦曾未暫捨餘殘業故來生龍中受是惡報時華面龍聞是語已大聲啼哭舉身自投四肢布地禮拜白佛作如是言我今至心從佛懺悔我大癡惑大慢愚不解方便差別好惡造是罪業低頭合掌至心發露不敢覆藏如來世尊我今至誠入於骨髓歸佛歸法歸比丘僧從今發意乃至壽盡於是時中作優婆塞佛言善哉善哉善男子汝今憂於地獄餓鬼惡道業報如是至心歸依我者得盡彼業罪報懺悔又經律異相云龍王白佛言我從劫初止住大海從拘樓秦佛時大海之中妻子甚少今者海龍眷屬甚多佛告龍王於其佛法出家違戒犯行不捨破戒者多生龍中直見多墮地獄如斯之類壽終已後皆生龍中佛告龍王拘樓秦佛時九十八億居家出家違其禁戒皆生龍中拘那含牟尼佛時八十億居家出家毀戒恣心壽終之後皆生龍中迦葉佛時六十四億居家出家犯戒皆生龍中於我世中九百九十億居家出家鬬諍誹謗犯戒死墮龍中今已有生者以是之故在大海中諸龍妻子眷屬不可稱計我泥洹後多有惡優婆塞違失禁戒當生龍中或墮地獄罪報懺悔我等為無明所覆不識龍趣罪因今遇道場方始覺知歸命毗盧遮那如來及一切賢聖海衆燒香散華諸龍王趣一切業報發露懺悔不敢覆藏由此因緣我及法界衆生海龍趣一切重罪願皆清淨次懺悔滅罪印呪唵薩㗚末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三遍百劫積集罪一念盡蕩除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪嗔癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白衆等聽説經中無常偈閻王使卒可怖畏獄卒羅剎來擒時起大怖疾失便利受其如此極畏苦如是極惡怖畏中誰能為我而救護怖相現時翻惡眼於其四方求依處若不見於依托處後起至極大憂惱彼既無有救護者我當爾時奈之何
