body:
  text: 唐蘭山雲巖慈恩寺護法國師行沙門慧覺依經錄宋蒼山載光寺沙門普瑞補註明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閱天台習教觀沙門正止治定第十六晌一切恭敬禮無盡三寶是諸眾等人各胡跪嚴持香華如法供養願此供海雲徧滿十方界阿僧祇華阿僧祇香阿僧祇鬘阿僧祇塗香末香衣服珍寶幢幡玅葢諸莊嚴具各阿僧祇以用供養以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海眾受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次不空摩尼印呪唵啞麼遏布麻禰巴能麻末𠷌呤怛達遏怛眉浪雞矴薩慢怛不囉薩囉吽梵音讚佛佛身一切相悉現無量佛普入十方界一一微塵中佛剎微塵數如是諸國土能令一念中一一塵中現一切諸國土及以神通事悉現一剎中菩薩力如是直言讚佛世尊坐道場清淨大光明譬如千日出普照虗空界無量億千劫導師時乃現佛今出世間一切所瞻奉汝觀佛光明化佛難思議一切宮殿中寂然而正受汝觀佛神道毛孔出燄雲炤曜於世間光明無有盡汝應觀佛身光網極清淨現形等一切徧滿於十方妙音徧世間聞者皆欣樂隨諸眾生語讚嘆佛功德世尊光所照眾生悉安樂有苦皆滅除心生大歡喜觀諸菩薩眾十方來萃止悉放摩尼雲現前稱讚佛道場出妙音其音極深遠能滅眾生苦以是佛神力一切咸恭敬心生大歡喜共在世尊前瞻仰於法王南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十迴向菩薩十地菩薩等覺菩薩徧法界剎海微塵數菩薩一切海眾南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海眾南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛南無大月光太子觀見佛光明證得佛法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中毗盧遮那品第六第一逢一切功德山須彌勝雲佛經云爾時普賢菩薩至莊嚴佛剎海法界普周徧願共諸眾生往生華藏海極樂淨土中第二逢波羅蜜善眼莊嚴王佛經云諸佛子汝等應知至當如法王得自在願共諸眾生往生華藏海極樂淨土中經云諸佛子大威光童子至汝當成佛大功德願共諸眾生往生華藏海極樂淨土中第三逢最勝功德海佛經云諸佛子波羅蜜善眼莊嚴至普賢菩薩一切行願共諸眾生往生華藏海極樂淨土中第四逢名稱普聞蓮華眼幢佛經云諸佛子彼摩尼華枝輪至從道場出還歸本處願共諸眾生往生華藏海極樂淨土中南無普門淨光明世界海勝音世界最初劫中一切功德山須彌勝雲佛道場一切海眾南無普門淨光明世界海勝音世界最初劫中波羅蜜善眼莊嚴王佛道場一切海眾南無普門淨光明世界海勝音世界最初劫中最勝功德海佛道場一切海眾南無普門淨光明世界海勝音世界最初劫中名稱普聞蓮華眼幢佛道場一切海眾南無勝音世界最初劫中如是等十須彌山微塵數一切如來南無三世一切如來普集自在法修多羅等世界海彼微塵數一切眷屬修多羅南無法界體性清淨莊嚴修多羅等世界微塵數一切眷屬修多羅南無菩薩普眼光明行修多羅等世界海微塵數一切眷屬修多羅南無廣大方便普門徧炤修多羅等世界海微塵數一切眷屬修多羅南無普門淨光明世界海勝音世界最初劫中圓器上根一生圓多劫果大威光菩薩摩訶薩南無勝音世界最初劫中燄光明城中夫人婇女三萬七千前後圍繞喜見善慧王南無此摩尼華枝輪大林中喜見王及一萬五千五百王子與其父母并諸眷屬無量百千那由他前後圍繞眾至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中次四聖諦懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖眾世出世神慈悲本願放大光明炤於法會證盟護念哀愍攝受願我及一切眾生海自從無始直至今時一切迷四諦罪發露懺悔夫四聖諦者藏通別圓四教但以四聖諦為本乃至同教別教皆說四聖諦今標依圓教明四聖諦亦攝於餘教經云菩薩此是苦聖諦此是苦集聖諦此是苦滅聖諦此是苦滅道聖諦善知俗諦善知第一義諦善知相諦善知成立諦善知事諦善知生諦善知盡無生智諦善知入道智諦善知一切菩薩地次第成就諦乃至善知如來智成就諦此菩薩隨眾生心樂令歡喜故知俗諦通達一切實相故知第一義諦覺法自相共相故知相諦了諸法分位差別故知差別諦善分別蘊界處故知成立諦覺身心苦惱故知事諦覺諸趣生相續故知生諦一切熱惱畢竟滅故知盡無生智諦出生無二故知入道智諦正覺一切行相故善知一切菩薩地次第相續成就乃至如來智成就諦以信解智力知非以究竟智力知如是諦諦知已如實知一切有為法虗妄詐偽誑惑愚夫菩薩爾時於諸眾生轉增大悲生大慈光明得如是智力不捨一切眾生常求佛智如實觀一切有為行前後際知從前際無明有愛故生生死流轉於諸蘊宅不能動出增長苦聚無我無壽者無養育者無更數取後趣身者離我我所知前際後際亦如是皆無所有虗妄貪著斷盡出離若有若無皆如實知我等凡夫愚癡無智甚可哀愍有無數身已滅現滅當滅如是盡滅不能於身而生厭想轉更增長機關苦事隨生死流不能還返於諸蘊宅不求出離不知憂畏四大毒虵不能拔出諸慢見箭不能息滅貪恚癡火不能破壞無明黑暗不能乾竭愛欲大海不求十力大聖導師不出魔意稠林於生死海為覺觀波濤之所漂溺我等眾生受如是苦孤窮困逼無救無依無洲無舍無導無目無明覆瞖黑暗纏褁我等為無明所覆聖諦玄義不能證知今遇道場方始覺知歸命毗盧遮那如來及一切賢聖海眾燒香散華不解聖諦無量罪業發露懺悔不敢覆藏由此因緣我及法界眾生海一切罪業願皆清淨次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷捺末日羅也莎曷應誦三徧百劫積集罪一念悉盪除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白眾等聽說經中無常偈縱使此身滿百歲終歸要有死當頭況復卒亡無定准如何兀兀不驚愁如鳥被繩常繫脚似魚食餌鎮吞鉤鬼使忽來追捉去親朋悲泣豈能留
