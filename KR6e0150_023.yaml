body:
  text: 唐蘭山雲巖慈恩寺護法國師一行沙門慧覺依經録宋蒼山載光寺沙門普瑞補注明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閲天台習教觀沙門正止治定第二十三晌第六他化自在天宮會修因契果生解分一切恭敬敬禮無盡三寶是諸衆等人各胡跪嚴持香華如法供養願此供海雲遍滿十方界阿僧祇寶音如來妙音普示世間阿僧祇寶形其一一形皆放無量妙法光明阿僧祇寶相其一一相悉超衆相阿僧祇寶威儀見者皆生菩薩喜樂阿僧祇寶聚見者皆生智慧寶聚阿僧祇寶安住見者皆生善住寶心阿僧祇寶衣服其有著者生諸菩薩無比三昧阿僧祇寶袈裟其有著者才始發心則得具見陀羅尼門阿僧祇寶修習其有見者知一切寶皆是業果決定清淨阿僧祗寶無礙智見其有見者得了一切清淨法眼阿僧祇寶光藏其有見者則得成就大智慧藏以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海衆受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶持經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次運心供養印呪以二手金剛合掌置于頂上應誦此呪唵薩㗚末二合㗚達二合眉嗚能遏二合矴切身悉發囉兮慢引遏遏捺竿莎引訶梵音讚佛已證如來智等照於法界普入佛毛孔一切諸剎海身住一切處一切皆平等智能如是行入佛之境界一切佛國土皆見神通力示現種種身及種種名號直言讚佛真如離妄恆寂靜無生無滅普周遍諸佛境界亦復然體性平等不增減導師境界亦如是遍於三世亦非普譬如實際而非際普在三世皆無礙法性無作無變易猶如虗空本清淨諸佛性淨亦如是本性非性離有無法性不在於言論無說離說恆寂滅十方境界性亦然一切文辭莫能辨了知諸法性寂滅如鳥飛空無有跡以本願力現色身令見如來大神變若有欲知佛境界當淨其意如虗空遠離妄想及諸取令心所向皆無礙南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十回向菩薩十地菩薩等覺菩薩遍法界剎海微塵數菩薩一切海衆南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海衆南無大願摜甲求生淨土末濁夏國護持正法護國法師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛南無十身無礙毗盧遮那如來道場一切海衆南無大方廣佛華嚴經中十地品法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中十地品第二十六經云爾時世尊至金剛藏菩薩而為上首願共諸衆生往生華藏海極樂淨土中次說十地法者金剛藏為主一切菩薩海衆南無金剛藏菩薩南無寶藏菩薩南無蓮華藏菩薩南無德藏菩薩南無蓮華德藏菩薩南無日藏菩薩南無蘇利耶藏菩薩南無無垢月藏菩薩南無於一切國土普現莊嚴藏菩薩南無毗盧遮那智藏菩薩南無妙德藏菩薩南無旃檀德藏菩薩南無華德藏菩薩南無俱蘇摩德藏菩薩南無優鉢羅德藏菩薩南無天德藏菩薩南無福德藏菩薩南無無礙清淨智德藏菩薩南無功德藏菩薩南無那羅延德藏菩薩南無無垢藏菩薩南無離垢藏菩薩南無種種辨才莊嚴藏菩薩南無大光明網藏菩薩南無淨威德光明王藏菩薩南無金莊嚴大功德光明王藏菩薩南無一切相莊嚴淨德藏菩薩南無金剛𦦨德相莊嚴藏菩薩南無光明𦦨藏菩薩南無星宿王光照藏菩薩南無虗空無礙智藏菩薩南無妙音無礙藏菩薩南無陀羅尼功德持一切衆生願藏菩薩南無海莊嚴藏菩薩南無須彌德藏菩薩南無淨一切功德藏菩薩南無如來藏菩薩南無福德藏菩薩南無解脫月菩薩南無如是等無數無量無邊無等不可數不可稱不可思不可量不可說一切菩薩道場海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云爾時金剛藏菩薩承佛至法界智印善印故次加助佛南無十方各過十億佛剎微塵數世界外各有十億微塵數世界加助一切金剛藏佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中次該攝果海十地法門經云爾時十方諸佛各申右手至諸菩薩隨證智願共諸衆生往生華藏海極樂淨土中南無歡喜地法門南無離垢地法門南無發光地法門南無𦦨慧地法門南無難勝地法門南無現前地法門南無遠行地法門南無不動地法門南無善慧地法門南無法雲地法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中次請分分二一說已默然經云爾時金剛藏菩薩說此菩薩十地名已默然而住不復分別二三處五請分三一解脫月請分五一知默處疑請經云是時一切菩薩衆至如蜂念好蜜如渴思甘露願共諸衆生往生華藏海極樂淨土中二法深難止受經云爾時大智無所畏金剛藏菩薩至默然而不說願共諸衆生往生華藏海極樂淨土中三衆歎堪問請經云爾時解脫月菩薩至承事無量佛能知此地義願共諸衆生往生華藏海極樂淨土中四不堪有損止經云爾時金剛藏菩薩言佛子至我愍是等故不說願共諸衆生往生華藏海極樂淨土中五雙歎人法請經云爾時解脫月菩薩至如是佛法依於地願共諸衆生往生華藏海極樂淨土中二大衆同請經云爾時諸大菩薩衆至成十力無礙善逝一切行願共諸衆生往生華藏海極樂淨土中三如來加請經云爾時世尊從眉間至我依其義已解釋願共諸衆生往生華藏海極樂淨土中十地品之餘佛子聞此廣大行至我為佛子已宣說願共諸衆生往生華藏海極樂淨土中十地品之餘淨居天衆那由他至億劫說此不可盡次法界他化天宮證法諸佛南無十方各十億佛剎微塵數世界外有十億佛剎微塵數同名金剛藏佛道場一切海衆次法界金剛藏本界佛南無十方各十億佛剎微塵數世界外有十億佛剎微塵數金剛德世界金剛幢佛道場一切海衆次法界他化天宮證法菩薩南無十方各十億佛剎微塵數世界外有十億佛剎微塵數金剛德世界中作證明者金剛藏菩薩一切海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中次法界十地菩薩南無十方三世盡虗空界微塵剎土中歡喜地菩薩一切海衆南無十方三世盡虗空界微塵剎土中離垢地菩薩一切海衆南無十方三世盡虗空界微塵剎土中發光地菩薩一切海衆南無十方三世盡虗空界微塵剎土中焰慧地菩薩一切海衆南無十方三世盡虗空界微塵剎土中難勝地菩薩一切海衆南無十方三世盡虗空界微塵剎土中現前地菩薩一切海衆南無十方三世盡虗空界微塵剎土中遠行地菩薩一切海衆南無十方三世盡虗空界微塵剎土中不動地菩薩一切海衆南無十方三世盡虗空界微塵剎土中善慧地菩薩一切海衆南無十方三世盡虗空界微塵剎土中法雲地菩薩一切海衆至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中次邪魔外道違法懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖衆世出世神慈悲本願放大光明照於法會證明護念哀憫攝受願我及一切衆生海自從無始直至今時業海無盡帝網重重怨魔外道墮邪類中如是罪業發露懺悔大方等日藏經云爾時世尊降諸魔故在欲色二界中間大寶坊中與大菩薩其數無量為諸大衆說虗空界出息入息甘露門已默然而住爾時欲界魔王波旬悉見一切娑婆國土所有衆生及諸天宮合家眷屬在佛身中時魔波旬見已悲泣涕淚交流心大懊惱遍身汗出啼哭失聲稱怨大喚或起或立或坐或行入出家居東西狂走頻伸缺呿怖懼慞惶憤歎長噓喘息粗促合眼張口吐舌䑛身露背現胸伸臂縮腳搖頭動項索手揩摩種種施為受大苦惱乃至一切魔之眷屬心內愁憂亦復如是時魔波旬有一軍主名戒依止見王身心如是煎逼說偈問曰何故愁惱獨行住唱喚馳走似顛狂出入居家心不安如是因緣願王說魔波旬答言我今身體汗遍流心中分裂如刀割啼哭眼中淚如血為覩瞿曇現變通其形廣大無有邊剎土悉皆居腹內我失臣民及眷屬云何令我心不愁爾時戒依止大魔軍主即自念言世間難摧謂三種毒一者天魔二者惡龍三者得定五通仙人我今魔宮已被摧壞唯龍境界牢固今當為王約敕到彼龍宮如是切勒早與瞿曇共相鬬戰時諸惡龍將欲飛空而不能去時魔波旬及戒依止化龍宮內作諸蚊虻蠅蛆毒蟲死尸人糞臭處狼籍充滿其中諸龍見已悉生嗔忿即出宮殿至須彌下佉羅坻山大聖人處請求救濟彼龍奮身如須彌山既到彼已其身皆小猶如銅箸各各自說我等欲往而不能動即大憂愁瞋忿停坐時魔波旬見於諸龍皆來入此牟尼處所悉失勢力無復自在不能毀壞沙門瞿曇是時佛神力故此娑婆界及十方佛土一切衆生入佛身內乃至時戒依止大魔軍主將領眷屬於閻浮提地上遊行爾時如來在衆中坐示現常身安然不動大魔軍主見已念言沙門瞿曇示現大身今復本形或能見我大魔軍衆怖畏失力無復神通我今先當到瞿曇所看彼道術方便因緣試共談論觀其詐僞對如來立而說偈言未能度脫於自身生死海中得出離何以誑他衆生類云何安汝置涅槃爾時如來答戒依止大魔軍主而說偈言我久越度流轉海更不生於諸有中慈悲愍念諸群生是故說於出要道汝於往昔無數劫已發最勝菩提心值遇然燈佛世尊修行布施及持戒如是過去億千佛悉已恭敬曾供養當得於此清淨乘我今決定受汝記未來成佛還如我云何乃說誑衆生我今施汝智慧眼可念前生行本末時戒依止魔軍主即得宿命識往生頭陀苦節習於禪業果福德皆明了時戒依止大魔軍主聞此偈已眼中淚出如來世尊我大懊惱我大慚愧如大癡人如迷如醉如著鬼顛我念過去經一阿僧祇劫大精進力發阿耨多羅三藐三菩提心乃至迦葉如來法中有一比丘說聲聞法有大乘人說菩薩法我於爾時心錯口惡謗此說人言是魔語或魔眷屬大乘人邊說小乘過如是惡口罪業因緣我於彼死魔界中生受是身來已經五十七億千歲世尊我寧更歷六百千年受地獄苦終不一念失阿耨多羅三藐三菩提心何況退於四梵行爾時戒依止菩薩念宿命力故得順法忍由是我及一切衆生如是罪業今皆懺悔爾時魔王自觀察已見諸欲界一切宮殿皆悉空寂欲界之中所有諸天人非人等皆悉集在於瞿曇所而坐聽法惟有阿修羅未到於彼時魔波旬即以魔之神通境界念四阿修羅王及其軍衆一切眷屬速來集在須彌山頂然後相將共下詣彼瞿曇沙門所詐說美言謙下讚歎示作歸依求覔因緣當以方便令諸大衆悉生怖畏斷其正信又不令彼於瞿曇所生其尊敬以是令彼沙門瞿曇厭患於世速入涅槃如是魔王數數希望阿修羅衆然諸阿修羅為佛神力之所加故茫然不知魔之希望其魔即時惡意於佛及一切阿修羅便作是言觀瞿曇一人於我境界已得解脫不可追回我於欲界悉得自在此凡賤畜生阿修羅不受我教我當為其作大衰惱令彼速捨所治宮殿時魔波旬即將九百六十萬類婆羅眷屬男夫婦女童男童女大臣左右以魔境界神通加持作第一最勝五音妓樂歌舞調戲一切所有令人多喜生著染者悉具備之爾時佛告大衆汝等一切守攝諸根繫心專念莫令馳散時魔波旬即自念言沙門瞿曇知我虗訛詐現威儀羞愧默然魔諸婦女諸根形貌容狀光色皆悉枯悴變成惡色背僂跛躄醜陋斃惡所有男夫都不復能歌舞調戲五音作樂皆悉閉塞不能出聲却坐一面聽法而住時魔波旬欲禮佛故而往散華所散之華於四天下皆作華雨當雨之時於四阿修羅城邑宮殿遍一切處皆悉變作最極臭穢及惡煙塵灰土塳𡋯處處盈滿蚊虻蛇蝎諸惡毒蛇亦復悉滿憂愁惱亂不可愛樂爾時羅睺羅毗摩質多羅波羅陀跋稚毗盧遮那四阿修羅王及男夫婦女童男童女所有一切阿修羅衆皆悉雲集有以燒香供養禮佛而求請者爾時魔王波旬而作是言此諸阿修羅蒙佛恩福我今亦令諸阿修羅得具足饒益安樂佛告波旬汝今不須作如是言我今令其充足安樂我諸阿修羅城邑宮殿轉勝微妙樂具悉有還復如故何以故彼等四大阿修羅王是我親舊如是其餘所有一切阿修羅等於我得信敬仰尊重心生希有爾時彌勒菩薩即從座起合掌向佛而作是言世尊既是釋迦貴種剎利大姓迦毗盧城淨飯王子此四阿修羅畜生種類極成卑下世尊何故言與我親爾時佛告彌勒菩薩摩訶薩言於過去時第三十一劫有佛出興號毗舍浮彼佛常為四種說法爾時有一大婆羅門名弗沙邪若已於過去無量佛所種諸善根於阿耨多羅三藐三菩提而不退轉深信具足歸依三寶受持五戒離諸放逸時弗沙邪若有弟八人一名弗沙金剛二名弗沙那毗三名弗沙闍梨四名弗沙跋摩五名弗沙車帝六名弗沙樹遮七名弗沙毗離八名弗沙那提時弗沙邪若婆羅門勸諸弟言汝等賢首今可歸依佛法僧寶受持五戒離諸放逸發阿耨多羅三藐三菩提心時彼諸弟皆悉不肯歸依三寶乃至不肯發菩提心時弗沙邪若數勸諸弟經於多年復問諸弟汝等何故皆悉不肯歸依三寶乃至不肯發菩提心竟有何意何所願求時彼八弟即作是言兄能千年修二威儀唯行唯住不坐不臥經七日夜限食一摶修此難行足滿千年然後我當歸依三寶受持五戒離諸放逸發無上菩提之心彌勒時弗沙邪若聞是語已一心喜悅即為八弟而立誓言汝等若能歸依三寶乃至能發阿耨多羅三藐三菩提心不退轉者我今必當千年之中不坐不臥經七日夜限食一摶時毗舍浮佛以弗沙邪若頭陀功德故讚言善哉善哉汝今以此苦行威儀行檀波羅蜜乃至般若波羅蜜故於未來世過第三十一大劫已有一大劫名曰賢劫賢劫中人壽命百歲於彼成佛號釋迦牟尼如來應正遍知聲震於世汝當爾時與此八弟授阿耨多羅三藐三菩提記善男子是弗沙邪若化其八弟及餘無量百千萬億那由他等諸婆羅門長者居士男子女人童男童女皆成熟已即於毗舍浮如來法中出家學道彌勒彼弗沙邪若婆羅門者豈異人乎莫作異觀我身是也我於爾時為欲成熟彼諸弟故乃至於閒林中住第一義諦經五萬年成熟無量百千萬億那由他阿僧祇天龍夜叉乃至人非人等向阿耨多羅三藐三菩提得不退轉爾時弗沙金剛者今羅睺羅阿修羅王是弗沙那毗者今毗摩質多羅阿修羅王是弗沙闍黎者今波羅陀阿修羅王是弗沙跋摩者今婆稚毗盧遮那阿修羅王是弗沙車帝者今魔王波旬是弗沙樹遮者今汝彌勒是弗沙毗離者今毗摩羅詰是弗沙難提者今提婆達多是也我昔為求菩提為欲成熟魔波旬故作如是等無量苦惱毛豎驚怖難行之事是故今此魔王波旬以福德智慧二種莊嚴故有如是神通威力今於我所起殺害心於正法幢起摧折心於僧寶所起破壞心於八聖道起斷除心於正法燈起毀滅心於諸衆生一切善法起隱沒心致留難心作恐怖心不憐憫心違失之心令諸衆生退捨善道墮惡趣心於龍衆起驚怖心於阿修羅宮起破壞心復欲起壞大衆集心興此惡意顧視而坐若有衆生為障礙故嬈亂他故降伏他故欺陵他故求稱譽故求名聞故依於五欲戲笑樂故求富貴故修行施戒忍辱精進禪定智慧不為解脫不為信敬不為離欲寂靜唯為自身五欲樂故修行施戒忍辱精進禪定智慧為如是等諸結所縛雜於愚癡於欲界中果報成熟為魔波旬提婆達多亦復如是此四阿修羅及餘阿修羅等亦於毗舍浮如來法中憍逸自舉不勤修息復懷疑惑雜諸煩惱修行世戒以是因緣今生下類苦惱畜生阿修羅道是故彼等尚不能發世俗正見何況能發無上善根由此我及一切衆生有如是罪今皆懺悔又梵王大自在遍入等趣於邪道彼三昔緣者大自在因地經云於過去世八萬四千劫前彼時有佛成等正覺出現世間名功德海有一大城亦名功德海有婆羅門名曰寂靜有其二子一名商迦二名魯支漸次成長聰明多智俱厭生死作禮父母而白父言我欲入山於彼修道父母不從汝不得去復白父言須去修道如是三白即離父母入於山谷於其山間草庵而住去庵一十步外有老婆羅門修仙人之法復有一人亦相鄰近而自修行忽因節日四人聚會而復相問各自愛樂所求之事魯支問老婆羅門曰汝修何行求何果報老婆羅門曰我所修者求梵天身天上千歲問鄰近修行者汝修何行求何果報彼自答云我求三界之主天上千歲商迦大仙而自告言我求天上千歲世間愛敬魯支仙人具大智慧而白彼言汝等所求成就得世間果報我今所求為彼世間有色無色二足四足多足無足上中下等輪回衆生皆令解脫如是後時彼前四人修行之人來詣佛所時老婆羅門以白吉祥草華供養於佛作禮旋繞而發願言以我此善為梵世主五面端嚴與無數衆生施願圓滿次一仙人以一鐵片用供養佛復用香油塗佛足上而發願言以我此善得那羅延天身為三界主宰次商迦仙人然燈三盞施三條針至心供養而發願言獻此三燈三針願具三眼得三股叉於生生中恆行施願為世間主宰得八自在成就欲樂心識聰利爾時魯支頭髻殊妙髮長赤色遂解頭髻布於道路告世尊言願佛慈悲踏我髮過佛之兩足於三界中得未曾有千輻網縵有幢印幡印金剛杵印如是印相紋同綺畫妙善莊嚴佛遂踏過而發願言以我此善當得成佛救諸輪回一切衆生如是四人各發願後其後老婆羅門所修衆善獲梵王身具五頭面為三界主用吉祥華布施感手持天拂若次修行者所修善根得無邊福獲那羅延天身施鐵供養感手持輪寶名曰妙現能破一切修羅第三商迦仙人由施三燈感面生三目施於三針感得三鈷叉右旋繞世尊得世間愛敬八種自在為其主宰能生滅世間第四魯支者布髮供養以願方故當得離欲出過三界成一切智智號天中天今皆懺悔又釋論云作障礙者雖有無量而不出四一者魔二者外道三者鬼四者神是名為四所言魔者四種大魔三萬二千眷屬魔衆所言外道者九十六種諸大外道九萬三千外道眷屬所言鬼者十種大鬼五萬一千三百二種諸眷屬鬼所言神者十五大神五萬一千三百二種諸眷屬神又涅槃經云有八十神與世間為依賴恭敬之處乃至有三界諸天四王八部雜類諸神地水火風空神山樹河海飲食空澤草木等神與諸人作祭祀供事歸投之處如是邪魔外道一切鬼神皆障礙正法令向非道佛未出時此等教化迷惑有情不知不覺今皆懺悔上來大自在淨梵遍入大波旬等多劫已來遇逢諸佛發菩提心多作供養昔已曾修六度施戒等無量行門惟忘本願及雖修行與煩惱雜亂故不得解脫今皆懺悔圓覺經云一切衆生皆由妄想執著我人衆生壽命不了四相雖經多劫勤苦修道但名有為終不能成一切聖衆今皆懺悔又佛頂經云由妄想執著色受想行識五蘊彼迷蘊者墮五十種舍那偏邪見中不作聖心故是善境界若起聖解受衆邪也迷惑不覺故墮無間地獄中今皆懺悔又般若經中不解所知三智四種加行所斷百八種妄想發起四十六種魔行所纏等今皆懺悔又唯心訣云不悟根本一心雖則修行執相偏見如畫無膠亦如壞器墮百二十種錯謬中今皆懺悔我等為無明所覆不識冤魔外道鬼神邪見謬解罪因今遇道場乃能覺知歸命毗盧遮那如來及一切賢聖海衆燒香散華發露懺悔不敢覆藏由此因緣我及法界衆生海等與正法相違偏執邪宗一切罪業悉願清淨次懺悔滅罪印呪唵薩㗚末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三遍百劫積集罪一念盡蕩除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白衆等聽說經中無常偈愛迷諸衆生令歷億萬劫愚者不能捨為愛欲所纏衆生以愛迷又復住愛中衆生負重擔如渴飲鹽水飲已更增渴暫時無休息愚人不能思疲勞忘受苦
