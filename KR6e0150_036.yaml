body:
  text: 唐蘭山雲巖慈恩寺護法國師行沙門慧覺依經錄宋蒼山載光寺沙門普瑞補註明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閱天台習教觀沙門正止治定第三十六晌次等覺位中摩耶夫人及諸百佛會一切恭敬敬禮無盡三寶是諸眾等人各胡跪嚴持香華如法供養願此供海雲徧滿十方界阿僧祇寶座佛坐其上大師子吼阿僧祗寶燈常放清淨智慧光明阿僧祇寶多羅樹次第行列繚以寶繩莊嚴清淨其樹復有阿僧祇寶𠏉從身聳擢端直圓潔阿僧祇寶枝種種眾寶莊嚴稠密不思議鳥翔集其中常吐妙音宣揚正法阿僧祇寶葉放大智光徧一切處阿僧祗寶華一一華上無量菩薩結跏趺坐徧遊法界阿僧祗寶果見者常得一切智智不退轉果阿僧祗寶聚落見者捨離世聚落法阿僧祗寶都邑無礙眾生於中盈滿阿僧祗寶宮殿王處其中具足菩薩那羅延身勇猛堅固被法甲冑心無退轉阿僧祗寶舍入者能除戀舍宅心阿僧祗寶衣著者能令解了無著阿僧祗寶宮殿出家菩薩充滿其中阿僧祇寶珍玩見者咸生無量歡喜阿僧祇寶輪放不思議智慧光明轉不退輪阿僧祗寶䟦陀樹因陀羅網莊嚴清淨阿僧祇寶地不思議寶間錯莊嚴阿僧祇寶吹其音清亮充滿法界阿僧祇寶鼓妙音克諧窮劫不絕以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海眾受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次結廣大不空摩尼印呪結印同前唵啞麼遏布麻禰巴能麻末𠷌呤怛達遏怛眉浪雞矴薩慢怛不囉薩囉吽梵音讚佛如來光明中常出深妙音讚佛功德海及菩薩所行佛轉正法輪無量無有邊所說法無等淺智不能測一切世界中現身成正覺各各起神變法界悉充滿直言讚佛正覺了知一切法無二離二悉平等自性清淨如虗空我與非我不分別如海印現眾生身以此說為其大海菩薩普印諸心行是故說為名正覺譬如世間有成敗而為虗空不增減一切諸佛出世間菩提一相恒無相如人化心化作佛化與不化恒無異一切眾生成菩提成與不成無增減佛有三昧名善覺菩提樹下入此定放眾生等無量光開悟羣品如蓮敷如三世劫剎眾生所有心念及根欲如是數等身皆現是故正覺名無量南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十迴向菩薩十地菩薩等覺菩薩徧法界剎海微塵數菩薩一切海眾南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海眾南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛南無十身無礙本尊毗盧遮那如來道場一切海眾十方盡歸命滅罪增淨信願生華藏海極樂淨土中第二會緣入實相解脫法門初依教趣求善財童子將詣觀成經云爾時善財童子至思其語言受其教誨願共諸眾生往生華藏海極樂淨土中南無圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩十方盡歸命滅罪增淨信願生華藏海極樂淨土中次勝緣引導主城神願修心城經云作是念已有主城神至乃至究竟必當成佛願共諸眾生往生華藏海極樂淨土中南無種種粧飾手持無量眾色寶華眷屬圍繞空中現身寶眼主城神十方盡歸命滅罪增淨信願生華藏海極樂淨土中次勝緣化導身眾神密加傳法經云爾時有身眾神至覩一切剎諸佛出興故願共諸眾生往生華藏海極樂淨土中南無從道場出以妙音讚摩耶妙華光明無量諸神前後圍繞住虗空中蓮華法德身眾神十方盡歸命滅罪增淨信願生華藏海極樂淨土中次勝緣化導法堂羅剎求友教化經云時有守護菩薩至如夢如影求善知識願共諸眾生往生華藏海極樂淨土中南無善財童子求友教化守護菩薩法堂中一萬羅剎眷屬圍繞住虗空中善眼羅剎王南無善財童子發菩提心參詣善知識所同入為等覺因文殊師利菩薩摩訶薩十方盡歸命滅罪增淨信願生華藏海極樂淨土中次摩耶夫人知菩薩大願智幻解脫法門經云爾時善財受行其教至戀慕瞻仰却行而退願共諸眾生往生華藏海極樂淨土中南無賢劫千佛南無拘留孫佛南無拘那含牟尼佛南無迦葉佛南無釋迦牟尼佛南無彌勒佛南無師子佛南無法幢佛南無善眼佛南無淨華佛南無華德佛南無提舍佛南無弗沙佛南無善意佛南無金剛佛南無離垢佛南無月光佛南無持明佛南無名稱佛南無金剛楯佛南無清淨義佛南無紺身佛南無到彼岸佛南無寶𦦨山佛南無持炬佛南無蓮華德佛南無名稱佛南無無量功德佛南無最勝燈佛南無莊嚴身佛南無善威儀佛南無慈德佛南無無住佛南無大威光佛南無無邊音佛南無勝怨敵佛南無離疑惑佛南無清淨佛南無大光佛南無淨心佛南無雲德佛南無莊嚴頂髻佛南無樹王佛南無寶璫佛南無海慧佛南無妙寶佛南無華冠佛南無滿願佛南無大自在佛南無妙德王佛南無最尊勝佛南無旃檀雲佛南無紺眼佛南無勝慧佛南無觀察慧佛南無熾盛王佛南無堅固慧佛南無自在名佛南無師子王佛南無自在佛南無最勝頂佛南無金剛智山佛南無妙德藏佛南無寶網嚴身佛南無善慧佛南無自在天佛南無大天王佛南無無依德佛南無善施佛南無𦦨慧佛南無水天佛南無得上味佛南無出生無上功德佛南無仙人侍衛佛南無隨世語言佛南無功德自在幢佛南無光幢佛南無觀身佛南無妙身佛南無香𦦨佛南無金剛寶嚴佛南無喜眼佛南無離欲佛南無高大身佛南無財天佛南無無上天佛南無順寂滅佛南無智覺佛南無滅貪佛南無大𦦨王佛南無寂諸有佛南無毗舍佉天佛南無金剛山佛南無智𦦨德佛南無安隱佛南無師子出現佛南無圓滿清淨佛南無清淨賢佛南無第一義佛南無百光明佛南無最增上佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中次不敬三寶罪懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖眾世出世神慈悲本願放大光明炤於法會證盟護念哀愍攝受願我及一切眾生海自從無始直至今時不信佛法僧寶不解三寶是所歸趣帝網重重一切罪業發露懺悔夫三寶者有現有像以像表真若於像處供養得獲現佛之福今末法之時僧寶上首若歸於僧即成總歸三寶之福乃至破戒僧亦應歸敬何況持戒之僧智度論云佛法中出家法第一難修如閻浮呿提梵志問舍利弗於佛法中何者最難舍利弗答曰出家為難又問出家何等難答曰出家樂法為難既得樂法復何者為難修諸善法難以是故應出家復次若人出家時魔王驚疑言此人諸結使欲薄必得涅槃墮僧寶數中復次佛法中出家人雖破戒墮罪罪畢得解脫如鉢羅華比丘尼本生經中說佛在世時此比丘尼得六神通阿羅漢入貴人舍常讚出家法語諸貴人婦女言姉妹可出家諸貴婦女言我等少壯容色盛美持戒為難或當破戒比丘尼言但出家破戒便破問言破戒當墮地獄云何可破答言墮地獄便墮諸貴婦女皆笑之言地獄受罪云何可墮比丘尼言我自憶念本宿命時作戲女著種種衣服而說舊語或時著比丘尼衣以為戲笑以是因緣故迦葉佛時作比丘尼自恃貴姓端正心生憍慢而破禁戒破戒罪故墮地獄受種種罪受罪畢竟值釋迦牟尼佛出家得六神通阿羅漢道以是故知出家受戒雖復破戒以戒因緣故得阿羅漢道若但作惡無戒因緣不得道也我乃昔時世世墮地獄地獄出為惡人惡人死還入地獄都無所得今以此證知出家受戒雖復破戒以是因緣可得道果復次如佛在祇桓有一醉婆羅門來到佛所求作比丘佛敕阿難與剃頭著法衣醉酒既醒驚怪己身忽為比丘即便走去諸比丘問佛何以聽此醉婆羅門作比丘佛言此婆羅門無量劫中初無出家心今因醉故暫發微心以是因緣故當出家得道如是種種因緣出家之利功德無量以是故白衣雖有五戒不如出家又大悲經云阿難後當來世法滅之時諸比丘等於我法中得出家已手牽兒臂而共遊行從酒家至酒家於我法中作非梵行彼等雖為以酒因緣於此賢劫一切皆當得般涅槃由此不應觸犯大集經云爾時一切諸天等神而白佛言世尊若佛住世或不住世我等棄捨己事擁護此法若佛弟子四部之眾若能勇猛精進受持如是等經設復養育妻妾積聚金銀琉璃頗黎田產城邑童僕所使等八種不淨之物我為此法故擁護於彼諸惡鬼神不令觸惱又言剃髮著袈裟不持禁戒國王大臣等觸惱毀謗鞭撻時得幾許罪佛言若人於萬億佛身出血罪亦過彼若有眾生為我出家剃除鬚髮披服袈裟設不持戒彼等悉已為涅槃印之所印也若復出家不持戒者有以非法而作惱亂罵辱毀訾以手刀杖打縛所截若奪衣鉢及奪種種資生具者是人則壞三世諸佛真實報身則挑一切人天眼目是人為欲影沒諸佛所有正法三寶種故令諸人天不得利益墮地獄故為三惡道增長盈滿故罪報懺悔地藏十輪經云大梵若有依我而出家者犯戒惡行內懷腐敗如穢蝸螺實非沙門自稱沙門實非梵行自稱梵行恒為種種煩惱所勝敗壞傾覆如是苾蒭雖破禁戒造諸惡行而為一切天龍藥叉徤達縛阿素洛揭路茶緊捺洛莫呼洛伽人非人等作善知識示導無量功德伏藏如是苾蒭雖非法器而剃鬚髮披服袈裟進止威儀同諸賢聖因見彼故無量有情種種善根皆得生長又能開示無量有情善趣生天涅槃正路是故依我而出家者若持戒若破戒若無戒我尚不許轉輪聖王及餘國王諸大臣等依俗正法以鞭杖等捶拷其身或閉牢獄或復呵罵或解肢節或斷其命況依非法大梵如是破戒惡行苾蒭雖於我法毗奈耶中名為死屍而有出家戒德餘勢譬如牛麝身命𣧩後雖是無識旁生死屍而牛有黃而麝有香能為無量無邊有情作大饒益破戒苾蒭亦復如是雖於我法毗奈耶中名為死屍而有出家戒德餘勢能為無量無邊有情作大饒益大梵譬如賈客入於大海殺彼一類無量眾生挑取其目與末達那果和合擣簁成眼寶藥若諸有情盲冥無目乃至胞胎而生盲者持此寶藥塗彼眼中所患皆除得明淨目破戒苾蒭亦復如是雖於我法毗奈耶中名為死屍而有出家威儀形相能令無量無邊有情暫得見者尚獲清淨智慧法眼況能為他宣說正法大梵譬如燒香其質雖壞而氣芬馥熏他令香破戒苾蒭亦復如是由破戒故非良福田雖恒晝夜信施所燒身壞命𣧩墮三惡趣而為無量無邊有情作大饒益謂令皆得聞於生天涅槃香氣是故大梵如是破戒惡行苾蒭一切白衣皆應守護恭敬供養我終不許諸在家者以鞭杖等捶拷其身或閉牢獄或復呵罵或解肢節或斷集命我唯許彼清淨僧眾於布薩時或自恣時驅擯令出一切給施四方僧物飲食資具不聽受用一切沙門毗奈耶事皆令驅出不得在眾而我不許加其鞭杖繫縛斷命若毀犯禁戒於毀犯者毀謗乃至鞭打奪取藏物如是諸罪無量無邊今者末濁鬪諍之時應自悔責罪報懺悔我等為無明所覆不識毀謗三寶罪因今遇道場乃能覺知歸命毗盧遮那如來及一切賢聖海眾燒香散華毀謗三寶罪障發露懺悔不敢覆藏由此因緣我及法界眾生海毀謗三寶一切重罪願皆清淨次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷捺末日嚩也莎曷應誦三徧百劫積其罪一念悉盪除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白眾等聽說經中無常偈自於微小嶮峻上亦不放逸而安住何況而於千由旬長時嶮崖墮落處定起今日不死想依安樂住不應理若我滅盡歸無時決定來至不應疑
