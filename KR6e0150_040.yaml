body:
  text: 唐蘭山雲嚴慈恩寺護法國師行沙門慧覺依經録宋蒼山載光寺沙門普瑞補注明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閲天台習教觀沙門正止治定第四十晌次顯因廣大攝末歸本普賢菩薩會一切恭敬敬禮無盡三寶是諸衆等人各胡跪嚴持香華如法供養願此供海雲遍滿十方界阿僧祇寶衣列阿僧祇寶帳設阿僧祇寶座阿僧祇寶繒以敷座上阿僧祇閻浮檀金童女像阿僧祇雜寶諸形像阿僧祇妙寶菩菩像處處充遍阿僧祇衆鳥出和雅音阿僧祇寶優鉢羅華阿僧祗寶波頭摩華阿僧祇寶拘物頭華阿僧祇寶芬陀利華以為莊嚴阿僧祇寶樹次第行列阿僧祇摩尼寶放大光明如是等無量阿僧祇諸莊嚴具以為莊嚴如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海衆受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯呪寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次大慧施呪唵捺麻緊薩㗚末二合怛達引遏怛啞斡浪雞矴三末重囉三末重囉吽梵音讚佛佛身放光明遍滿於十方隨應而示現色相非一種一一微塵內光明悉充滿普見十方土種種各差別法界諸剎土周行無所礙一切衆會中常轉妙法輪直言讚佛佛身普放大光明身相無邊極清淨如雲充滿一切土處處稱揚佛功德一微塵中多剎海處所各別悉嚴淨如是無量入一中一一區分無雜越佛剎極微塵數等如是微塵諸國土皆亦能令一念中一一微塵中悉現如來一一毛孔中一切剎塵諸佛座菩薩衆會共圍繞演說普賢之勝行一毛孔中悉明見不思議數無量佛一切毛孔皆如是普禮一切世間燈於一微塵毛孔中不可說剎次第入毛孔能受彼諸剎諸剎不能遍毛孔如來安坐菩提座一毛示現多剎海一一毛現悉亦然如是普周於法界如於此會見物座一切座中悉如是佛身無去亦無來所有國土皆明現一切剎土微塵數常見身雲悉充滿普為衆生放大光各雨法雨稱其心一一塵中無量身佛現種種莊嚴剎一念沒生普令見獲無礙意莊嚴者一微塵中能悉有不可說言蓮華界一一蓮華世界中賢首如來不可說一毛孔內難思剎等為塵數種種處一一皆有遍照尊在衆會中宣妙法一切剎土入我身所住諸佛亦復然汝應觀我諸毛孔我今示汝佛境界南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十回向菩薩十地菩薩等覺菩薩遍法界剎海微塵數菩薩一切海衆南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海衆南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中第五會顯因廣大相解脫法門經云爾時善財童子至一切如來遊戲神通願共諸衆生往生華藏海極樂淨土中南無此金剛藏菩提場內毗盧遮那如來師子座前一切坐寶蓮華座普賢菩薩摩訶薩南無如於此毗盧遮那如來所南西北方四維上下一切世界諸如來所一切普賢菩薩摩訶薩南無如十方一切世界一切佛剎一一塵中皆有法界諸佛衆會一一佛所一切普賢菩薩摩訶薩南無普賢一一毛孔念念中出一切佛剎微塵數清淨佛剎雲南無普賢一一毛孔念念中出一切佛剎微塵數一切正覺身雲南無普賢一一毛孔念念中出一切佛剎微塵數一切菩薩身雲南無重觀普賢一一身分一一毛孔中悉有三千界諸佛出世道場一切海衆南無如是普賢一一毛孔中有如是等世界皆亦如是諸佛出世道場一切海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云善財童子見普賢菩薩至解脫自在悉皆同等願共諸衆生願生華藏海極樂淨土中南無此金剛藏菩提場中毗盧遮那如來師子座前坐一切寶蓮華座普賢菩薩摩訶薩南無如此娑婆十方所有世界一一座中一切世界一切佛所一切普賢菩薩摩訶薩南無普賢如實思惟一切法力智慧眼力故得此究竟三世平等清淨法身南無普賢助道法力諸善根力大志樂力修功德力故得此清淨無上法身南無普賢菩薩身相好肢節一一毛孔中皆有不可說不可說佛剎海一一剎海皆有諸佛出興於世大菩薩衆一切所共圍繞南無普賢於一一世界中出一切佛剎海微塵數一切佛化身雲南無圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無今此娑婆三千世界外毗盧遮那佛處普賢面前一切善財菩薩摩訶薩南無如是等不可說佛剎微塵數剎海中一切世界一切佛所普賢面前一切善財菩薩摩訶薩十方盡歸命滅罪增淨信願生華藏海極樂淨土中次不悟一實境界懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖衆世出世神慈悲本願放大光明照於法會證盟護念哀愍攝受願我及一切衆生海自從無始直至今時無明蓋覆不悟一實境界發露懺悔占察善惡業報經云爾時會中有菩薩名堅淨信從座而起整衣服偏袒右肩合掌白佛言我今於此衆中欲有所問咨請世尊願垂聽許佛言善男子隨汝所問便可說之堅淨信菩薩言如佛先說若我去世正法滅後像法向盡及入末世如是之時衆生福薄多諸衰惱國土數亂災害頻起種種厄難怖懼逼嬈我諸弟子失其善念唯長貪嗔嫉妒我慢說有相似行善法者但求世間利養名稱以之為主不能專心修出要法爾時衆生覩世災亂心常怯弱憂畏己身及諸親屬不得衣服充養軀命以如是等衆多障礙因緣故於佛法中鈍根少信得道者極少乃至漸漸於三乘中信心成就者亦復甚鮮所有修學世間禪定發諸通業自知宿命者次轉無有如是於後入末法中經久得道獲信禪定通業等一切全無我今為此未來惡世像法向盡及末法中有微少善根者請問如來設何方便開化示導令生信心得除衰惱以彼衆生遭值惡時多障礙故退其善心於世間出世間因果法中數起疑惑不能堅心專求善法如是衆生可愍可救世尊大慈一切種智願興方便而曉諭之令離疑網除諸障礙信得增長隨於何乘速獲不退佛告堅淨信言善哉善哉快問斯事深適我意今此衆中有菩薩摩訶薩名曰地藏汝應以此事而請問之彼當為汝建立方便開示演說誠汝所願時堅淨信菩薩復白佛言如來世尊無上大智何意不說乃欲令彼地藏菩薩而演說之佛告堅淨信汝莫生高下想此善男子發心已來過無量無邊不可思議阿僧祇劫久已能度薩婆若海功德滿足但依本願自在力故權巧化現影應十方雖復普遊一切剎士常起功業而於五濁惡世化益偏厚亦依本願力所熏習故及因衆生應受化業故也彼從十一劫來莊嚴此世界成熟衆生是故在斯會中身相端嚴威德殊勝唯除如來無能過者又於此世界所有化業惟除遍吉觀世音等諸大菩薩皆不能及以是菩薩本誓願力速滿衆生一切所求能滅衆生一切重罪除諸障礙現得安隱又是菩薩名為善安慰說者所謂巧演深法能善開導初學發意求大乘者令不怯弱以如是等因緣於此世界衆生渴仰受化得度是故我今令彼說之爾時堅淨信菩薩既解佛意已尋即勸請地藏菩薩摩訶薩言善哉救世真士善哉大智開士如我所問惡世衆生以何方便而化導之使離諸障得堅固信如來今者為欲令汝說是方便宜當知時哀愍為說爾時地藏菩薩摩訶薩語堅淨信菩薩摩訶薩言善男子諦聽當為汝說若佛滅後惡世之中有諸比丘比丘尼優婆塞優婆夷於世間出世間因果法未得決定信不能修學無常想苦想無我想不淨想成就現前不能勤觀四聖諦法及十二因緣法亦不勤觀真如實際無生無滅等法以不勤觀如是法故不能畢竟不作十惡根本過罪於三寶功德種種境界不能專信於三乘中皆無定向如是等人若有種種諸障礙事增長憂慮或疑或悔於一切處心不明了多求多惱衆事牽纏所作不定思想繞亂廢修道業不悟此法今皆懺悔善男子若未來世諸衆生等欲求度脫生老病死始學發心修習禪定無相智慧者應當先觀宿世所作惡業多少及以輕重若惡業多厚者不得即學禪定智慧應當先修懺悔之法所以者何此人宿習惡心猛利故於今現在必多造惡毀犯重禁以犯重禁故若不懺悔令其清淨而修禪定智慧者則多有障礙不能尅獲或失心錯亂或外邪所惱或納受邪法增長惡見是故當先修懺悔法一切衆生六根之聚皆從如來藏自性清淨心一實境界而起依一實境界以之為本所謂依一實境界故有彼無明不了一法界謬念思惟現妄境界分別取著集業因緣生眼耳鼻舌身意等六根以依內六根故對外色聲香味觸法等六塵起眼耳鼻舌身意等六識以依六識故色聲香味觸法中起違想順想非違非順等想生十八種受不悟此法今皆懺悔爾時堅淨信菩薩摩訶薩問地藏菩薩摩訶薩言云何開示求向大乘者進趣方便地藏菩薩摩訶薩言善男子若有衆生欲向大乘者應當先知最初所行根本之業其最初所行根本業者所謂依止一實境界以修信解因修信解力增長故速疾得入菩薩種性所言一實境界者謂衆生心體從本以來不生不滅自性清淨無障無礙猶如虗空離分別故平等普遍無所不至圓滿十方究竟一相無二無別不變不異無增無減不悟此法今皆懺悔以一切衆生心一切聲聞辟支佛心一切菩薩心一切諸佛心皆同不生不滅無染寂靜真如相故所以者何一切有心起分別者猶如幻化無有真實所謂識受想行憶念緣慮覺知等法種種心數非青非黃非赤非白亦非雜色無有長短方圓大小乃至盡於十方虗空一切世界求心形狀無一區分而可得者但以衆生無明癡暗熏習因緣現妄境界令生念著所謂此心不能自知妄自謂有起覺知想計我我所而實無有覺知之想以此妄心畢竟無體不可見故不悟此法今皆懺悔若無覺知能分別者則無十方三世一切境界差別之相以一切法皆不能自有但依妄心分別故有所謂一切境界各各不自念為有知此為自知彼為他是故一切法不能自有則無別異惟依妄心不知不了內自無故謂有前外所知境界妄生種種法想謂有謂無謂彼謂此謂是謂非謂好謂惡乃至妄生無量無邊法想當如是知一切諸法皆從妄想生依妄心為本不悟此法今皆懺悔然此妄心無自相故亦依境界而有所謂緣念覺知前境界故說名為心又此妄心與前境界雖俱相依起無先後而此妄心能為一切境界源主所以者何謂依妄心不了法界一相故說心有無明依無明力因故現妄境界亦依無明滅故一切境界滅非依一切境界自不了故說境界有無明亦非依境界故生於無明以一切諸佛於一切境界不生無明故又復不依境界滅故無明心滅以一切境界從本以來體性自滅未曾有故因如此義是故但說一切諸法依心為本當知一切諸法悉名為心以義體不異為心所攝故不悟此法今皆懺悔又一切諸法從心所起與心作相和合而有共生共滅同無有住以一切境界但隨心所緣念念相續故而得住持暫時為有不悟此法今皆懺悔如是所說心義者有二種相何等為二一者心內相二者心外相心內相者復有二種云何為二一者真二者妄所言真者謂心體本相如如不異清淨圓滿無障無礙微密難見以遍一切處常恆不壞建立生長一切法故所言妄者謂起念分別覺知緣慮憶想等事雖復相續能生一切種種境界而內虗僞無有真實不可見故所言心外相者謂一切諸法種種境界等隨有所念境界現前故知有內心及內心差別如是當知內妄相者為因為體外妄相者為果為用依如此等義是故我說一切諸法悉名為心不悟此法今皆懺悔又復當知心外相者如夢所見種種境界惟心想作無實外事一切境界悉亦如是以皆依無明夢識所見妄想作故復次應知內心念念不住故所見所緣一切境界亦隨心念念不住所謂心生故種種法生心滅故種種法滅是生滅相但有名字實不可得不悟此法今皆懺悔以心不往至於境界境界亦不來至於心如鏡中像無來無去是故一切法求生滅定相了不可得所謂一切法畢竟無體本來常空實不生滅故如是一切法實不生滅者則無一切境界差別之相寂靜一味名為真如第一義諦自性清淨心彼自性清淨心湛然圓滿以無分別相故無分別相者於一切處無所不在無所不在者以能依持建立一切法故不悟此法今皆懺悔復次彼心名如來藏所謂具足無量無邊不可思議無漏清淨功德之業以諸佛法身從無始本際來無障無礙自在不滅一切化現種種功業恆常熾然未曾休息所謂遍一切世界皆示作業種種化益故以一佛身即是一切諸佛身一切諸佛身即是一佛身所有作業亦皆共一所謂無分別相不念彼此平等無二以依一法性而有作業同自然化體無別異故如是諸佛法身遍一切處圓滿不動故隨諸衆生死此生彼恆為作依譬如虗空悉能容受一切色像種種形類以一切色像種種形類皆依虗空而有建立生長住虗空中為虗空處所攝以虗空為體無有能出虗空界分者當知色像之中虗空之界不可毀滅色像壞時還歸虗空而虗空本界無增無減不動不變諸佛法身亦復如是悉能容受一切衆生種種果報以一切衆生種種果報皆依諸佛法身而有建立生長住法身中為法身處所攝以法身為體無有能出法身界分者當知一切衆生身中諸佛法身亦不可毀滅若煩惱斷壞時還歸法身而法身本界無增無減不動不變但從無始世來與無明心俱癡暗因緣熏習力故現妄境界以依妄境界熏習因緣故起妄相應心計我我所造集諸業受生死苦說彼法身名為衆生不悟此法今皆懺悔若如是衆生中法身熏習而有力者煩惱漸薄能厭世間求涅槃道信歸一實修六波羅蜜等一切菩提分法名為菩薩若如是菩薩中修行一切善法滿足究竟得離無明睡者轉名為佛當知如是衆生菩薩佛等但依世間假名言說故而有差別而法身之體畢竟平等無有異相善男子是名略說一實境界義若欲依一實境界修信解者應當學習二種觀道何等為二一者唯心識觀二者真如實觀學唯心識觀者所謂於一切時一切處隨身口意所有作業悉當觀察知惟是心乃至一切境界若心住念皆當察知勿令使心無記攀緣不自覺知於念念間悉應觀察隨心有所緣念還當使心隨逐彼念令心自知知己內心自生想念非一切境界有念有分別也所謂內心自生長短好惡是非得失衰利有無等見無量諸想而一切境界未曾有想起於分別當知一切境界自無分別想故即自非長非短非好非惡乃至非有非無離一切相如是觀察一切法唯心想生若使離心則無一法一相而能自見有差別也嘗應如是守記內心知唯妄念無實境界勿令休廢是名修學唯心識觀若心無記不知自心念者即謂有前境界不名唯心識觀不悟此法今皆懺悔又守記內心者則知貪想瞋想及愚癡邪見想知善知不善知無記知心勞慮種種諸苦若於坐時隨心所緣念念觀知唯心生滅譬如水流燈𦦨無暫時住從是當得色寂三昧得此三昧已次應學習信奢摩他觀心及信毗婆舍那觀心習信奢摩他觀心者思惟內心不可見相圓滿不動無來無去本性不生不滅離分別故習信毗婆舍那觀心者想見內外色隨心生隨心滅乃至習想見佛色身亦復如是隨心生隨心滅如幻如化如水中月如鏡中像非心不離心非來非不來非去非不去非生非不生非作非不作善男子若能習信此二觀心者速得趣會一乘之道當知如是唯心識觀名為最上智慧之門所謂能令其心猛利長信解力疾入空義得發無上大菩提心故不悟此法今皆懺悔若學習真如實觀者思惟心性無生無滅不住見聞覺知永離一切分別之想漸漸能過空處識處無少處非想非非想處等定境界相得相似空三昧得相似空三昧時識想受行粗分別相不現在前從此修學為善知識大慈悲者守護長養是故離諸障礙勤修不廢展轉能入心寂三昧得是三昧已即復能入一行三昧入是一行三昧已見佛無數發深廣行心住堅信位所謂於奢摩他毗婆舍那二種觀道決定信解能決定向隨所修學世間諸禪三昧之業無所怯畏不樂二乘以依能習向二觀心最妙巧便衆智所依行根本故復次修學如上信解者人有二種何等為二一者利根二者鈍根其利根者先已能知一切外諸境界唯心所作虗誑不實如夢如幻等決定無有疑慮陰蓋輕微散亂心少如是等人即應學習真如實觀其鈍根者先未能知一切外諸境界悉唯是心虗誑不實故染著情厚蓋障數起心難調伏應當先學唯心識觀若人雖學如是信解而善根業薄未能進趣諸惡煩惱不得漸伏其心疑怯畏墮三惡道生八難處畏不常值佛菩薩等不得供養聽受正法畏菩提行難可成就有如此疑怖及種種障礙等者應於一切時一切處常勤誦念我之名字若得一心善根增長其意猛利當觀我法身及一切諸佛法身與己自身體性平等無二無別不生不滅常樂我淨功德圓滿是可歸依又復觀察己身心相無常苦無我不淨如幻如化是可厭離若能修學如是觀者速得增長淨信之心所有諸障漸漸損減不悟此法今皆懺悔復次若人欲生他方現在淨國者應當隨彼世界佛之名字專意誦念一心不亂如上觀察者決定得生彼佛淨國善根增長速獲不退當知如上一心繫念思惟諸佛平等法身一切善根中其業最勝所謂勤修習者漸漸能向一行三昧若到一行三昧者則成廣大微妙行心名得相似無生法忍不悟此法今皆懺悔我等為無明所覆不悟一實境界今遇道場方始覺知歸命毗盧遮那如來及一切賢聖海衆燒香散華一心不悟種種業報發露懺悔不敢覆藏由此因緣我及法界衆生海不悟一實境界一切業報願皆清淨次懺悔滅罪印呪唵薩㗚末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三遍百劫積集罪一念悉蕩除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪嗔癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白衆等聽說經中無常偈莫道年年相保守功德各自早修持此會衆徒分散後豈知誰死復誰生一朝入土成塵聚家中寂寂不聞聲縱使靈牀安哭處何由可得見真形
