body:
  text: 唐蘭山雲巖慈恩寺護法國師一行沙門慧覺依經録宋蒼山載光寺沙門普瑞補注明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閲天台習教觀沙門正止治定第六晌次法界菩提道場中主水神等雜類諸神會一切恭敬敬禮無盡三寶是諸衆等人各胡跪嚴持香華如法供養願此供海雲遍滿十方界百萬億摩尼身殊妙嚴飾百萬億因陀羅妙色寶百萬億黑旃檀香百萬億不可思議境界香百萬億十方妙香百萬億最勝香百萬億甚可愛樂香咸發香氣普熏十方百萬億頻婆羅香普散十方百萬億清淨光香普熏衆生百萬億無邊際種種色香普熏一切諸佛國土永不竭滅百萬億塗香百萬億熏香百萬億燒香香氣發越普熏一切百萬億蓮華藏沈水香出大音聲百萬億遊戲香能轉衆心百萬億阿樓那香香氣普熏其味甘美百萬億能開悟香普遍一切令其聞者諸根寂靜復有百萬億無比香王香種種莊嚴以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海衆受此供海雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次不空摩尼印呪結印如前唵啞麼遏布麻禰巴能麻末唧呤怛達遏怛眉浪雞矴薩慢怛不囉薩囉吽梵音讚佛三世一切佛法身悉清淨隨其所應化普見妙色身法界無差別亦無所依止而於世界中示現無量身佛身非變化示復非非化於無化法中示有變化形直言讚佛如來應正等覺無上醫王於無量百千億那由他劫鍊治法藥已得成就修學一切方便善巧大明呪力皆到彼岸善能除滅一切衆生諸煩惱病及住壽命經無量劫其身清淨無有思慮無有動用一切佛事未嘗休息衆生見者諸煩惱病悉得消滅是為如來正等覺身第八相南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十回向菩薩十地菩薩等覺菩薩遍法界剎海微塵數菩薩一切海衆南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海衆南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次普興雲幢主水神至吼聲遍海斯能入願共諸衆生往生華藏海極樂淨土中次法界菩提道場中主水神衆南無得平等利益一切衆生慈解脫門普興雲幢主水神南無得無邊法莊嚴解脫門海潮雲音主水神南無得觀所應化方便普攝解脫門妙色輪髻主水神南無得普演諸佛甚深境界解脫門善巧漩澓主水神南無得普現清淨大光明解脫門離垢香積主水神南無得清淨法界無相無性解脫門福橋光音主水神南無得無盡大悲海解脫門知足自在主水神南無得於菩薩衆會道場中為大歡喜藏解脫門淨喜善門主水神南無得以無礙廣大福德力普出現解脫門普現威光主水神南無得觀察一切衆生發起如虗空調伏方便解脫門吼聲遍海主水神南無如是等而為上首其數無量一切主水神十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次出現寶光主海神至海潮音神所行處願共諸衆生往生華藏海極樂淨土中次法界菩提道場中主海神衆南無得以等心施一切衆生福德海衆寶莊嚴身解脫門出現寶光主海神南無得巧方便守護一切衆生善根解脫門不可壞金剛幢主海神南無得能竭一切衆生煩惱海解脫門不雜塵垢主海神南無得令一切衆生離惡道解脫門恆住波浪主海神南無得普滅大癡暗解脫門吉祥寶月主海神南無得滅一切諸趣苦與安樂解脫門妙華龍髻主海神南無得淨治一切衆生諸見愚癡性解脫門普持光味主海神南無得出生一切寶種性菩提心解脫門寶𦦨華光主海神南無得不動心功德海解脫門金剛妙髻主海神南無得普入法界三昧門解脫門海潮雷音主海神南無如是等而為上首其數無量一切主海神十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次普發迅流主河神至此海光神之解脫願共諸衆生往生華藏海極樂淨土中次法界菩提道場中主河神衆南無得普雨無邊法雨解脫門普發迅流主河神南無得普現一切衆生前令永離煩惱解脫門普潔泉澗主河神南無得以大悲方便普滌一切衆生諸惑塵垢解脫門離塵淨眼主河神南無得恆出饒益衆生音解脫門十方遍吼主河神南無得於一切含識中恆起無惱害慈解脫門普救護衆生主河神南無得普示一切衆生清涼善根解脫門無熱淨光主河神南無得修行具足施令一切衆生永離慳著解脫門普生歡喜主河神南無得作一切歡喜福田解脫門廣德勝幢主河神南無得能令一切衆生雜染者清淨嗔毒者歡喜解脫門光照普世主河神南無得能令一切衆生入解脫海恆受具足樂解脫門海德光明主河神南無如是等而為上首其數無量一切主河神十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次柔軟勝味主稼神至此淨光神解脫門願共諸衆生往生華藏海極樂淨土中次法界菩提道場中主稼神衆南無得與一切衆生法滋味令成就佛身解脫門柔軟勝味主稼神南無得能令一切衆生受廣大喜樂解脫門時華淨光主稼神南無得以一切圓滿法門淨諸境界解脫門色力勇健主稼神南無得見佛大悲無量神通變化力解脫門增益精氣主稼神南無得普現佛福田令下種無失壞解脫門普生根果主稼神南無得普發衆生淨信華解脫門妙嚴環髻主稼神南無得大慈愍濟諸衆生令增長福德海解脫門潤澤淨華主稼神南無得廣開示一切行法解脫門成就妙香主稼神南無得能令法界一切衆生捨離懈怠憂惱等諸惡普清淨解脫門見者樂愛主稼神南無得觀察一切衆生善根隨應説法令衆會歡喜滿足解脫門離垢光明主稼神南無如是等而為上首其數無量一切主稼神十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次吉祥主藥神至此發威光解脫門願共諸衆生往生華藏海極樂淨土中次法界菩提道場中主藥神衆南無得普觀一切衆生心而勤攝取解脫門吉祥主藥神南無得以光明攝取衆生俾見者無空過解脫門旃檀林主藥神南無得能以淨方便滅一切衆生煩惱解脫門離塵光明主藥神南無得能以大名稱增長無邊善根海解脫門名稱普聞主藥神南無得大悲幢速赴一切病境界解脫門毛孔現光主藥神南無得療治一切盲冥衆生令智眼清淨解脫門破暗清淨主藥神南無得能演佛音説諸法差別義解脫門普發吼聲主藥神南無得能作一切衆生善知識令見者咸生善根解脫門蔽日光幢主藥神南無得清淨大悲藏能以方便令生信解解脫門明見十方主藥神南無得方便令念佛滅一切衆生病解脫門普發威光主藥神南無如是等而為上首其數無量一切主藥神十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次布華如雲主林神至此味光神所觀察願共諸衆生往生華藏海極樂淨土中次法界菩提道場中主林神衆南無得廣大無邊智海藏解脫門布華如雲主林神南無得廣大修治普清淨解脫門擢𠏉舒光主林神南無得增長種種淨信芽解脫門生芽發耀主林神南無得一切清淨功德莊嚴聚解脫門吉祥淨業主林神南無得普門清淨慧恆周覽法界解脫門垂布焰藏主林神南無得普知一切衆生行海而興布法雲解脫門妙莊嚴光主林神南無得忍受一切不可意聲演清淨音解脫門可意雷聲主林神南無得十方普現昔所修治廣大行境界解脫門香光普遍主林神南無得以一切功德法饒益世間解脫門妙光逈耀主林神南無得能令一切見佛出興常敬念不忘莊嚴功德藏解脫門華果光味主林神南無如是等而為上首其數無量一切主林神十方盡歸命滅罪增淨信願生華藏海極樂淨土中次邪淫罪懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖衆世出世神慈悲本願放大光明照於法會證盟護念哀愍攝受願我及一切衆生海自從無始直至今時業海無盡帝網重重一切邪淫罪業發露懺悔某等從無量劫來至於今日耽著女色不擇親疏淫欲熾盛豈論好醜染於欲境如繩繫縛戀逐情色如顛狂醉菩薩呵色欲經云女色者世間之枷鎖凡夫戀著不能自拔女色者世間之重患凡夫因之至死不免女色者世間之衰禍凡夫遭之無厄不生行者既得捨之若復顧念是為從獄得出還復思入從狂得正而復樂之從病得瘥復思得病智者愍之知其狂而顛蹶死無日矣凡夫重色甘為之僕終身馳驟為之辛苦雖復鈇質寸斬鋒鏑交至甘心受之不以為患狂人樂狂不知是過行者若能棄之不顧是則破枷脫鎖惡狂厭病離諸衰禍既安且吉得出牢獄永無患難女人之相其言如蜜其心如毒譬如渟澄水鏡而毒龍居之金山寶窟而惡獸居之當知此害不可親近室家不和婦女之由毀宅敗族婦人之罪實是陰賊滅人慧明亦似獵圍鮮得出者譬如高羅羣鳥落之不能奮飛又如密網衆魚投之刳腸剖腹亦如暗坑無目投之如蛾赴火是以智者知而遠之不受其害惡而穢之不為所惑不悟此法今皆懺悔又智度論云邪淫者若女人為父母兄弟姊妹夫主兒子世間法王法守護若犯者是名邪淫若有雖不守護以法為守云何法守一切出家女人在家受一日戒是名法守若以力若以財若誘誑若自有妻受戒有娠乳兒非道乃至以華鬘與淫女為要如是犯者名為邪淫如是種種不作名為不邪淫問曰人守人瞋法守破法應名邪淫人自有妻何以為邪答曰既聽受一日戒墮於法中本雖是婦今不自在過受戒時則非法守有娠婦人以其身重厭本所習又為傷娠乳兒時淫其母乳則竭又以心著淫欲不復護兒非道之處則非女根女心不樂強以非理故名邪淫是事不作名為不邪淫問曰若夫主不知不見不惱他有何罪答曰以其邪故既名為邪是為不正是故有罪復次此有種種罪過夫妻之情異身同體奪他所愛破其本心是名為賊復有重罪惡名醜聲為人所憎少樂多畏或畏刑戮又畏夫主傍人所知多懷妄語聖人所訶罪中之罪復次淫泆之人當自思惟我婦他妻同為女人骨肉情態彼此無異而我何為橫生惑心隨逐邪意邪淫之人破失今世後世之樂復次回己易處以自制心若彼侵我妻我則忿毒若我侵彼彼亦何異恕己自制故應不作復次如佛説邪淫之人後墮劒樹地獄衆苦備受得出為人家道不穆常值淫婦邪僻殘賊邪淫為患譬如蝮蛇亦如大火不急避之禍害將及如佛所説邪淫有十罪一者常為所淫夫主欲危害之二者夫婦不睦常共鬪諍三者諸不善法日日增長於諸善法日日損減四者不守護身妻子孤寡五者財産日耗六者有諸惡事常為人所疑七者親屬知識所不愛喜八者種怨家業因緣九者身壞命終死入地獄十者若出為女人多人共夫若為男子婦不貞潔如是等種種因緣不作是名不邪淫我等為無明所覆不識邪淫罪因今遇道場方能覺知歸命毗盧遮那如來及一切賢聖海衆燒香散華邪淫罪業發露懺悔不敢覆藏由此因緣我及法界衆生海邪淫重罪願皆清淨次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三遍百劫積集罪一念悉蕩除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白衆等聽説經中無常偈衆苦無邊際貪愛為根本愛使諸衆生衆生不能脫愛心難棄捨粘著如黐膠由此應斷愛勤求無上道此間辦身最難得丈夫能求利益時此時若或不求利後復何能具足此若我罪業未滅除慮恐於前死來至有何方計而免脫惟願疾速救拔我
