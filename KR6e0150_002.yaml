body:
  text: 唐蘭山雲巖慈恩寺護法國師行沙門慧覺依經録宋蒼山載光寺沙門普瑞補注明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閲天台習教觀沙門正止治定第二晌第一菩提道場中會舉果勸樂生信分次法界七處九會別列十支法行一切恭敬敬禮無盡三寶第一廣修供養是諸衆等人各胡跪嚴持香華如法供養願此供海雲遍滿盡法界虗空界供養十方三世一切佛剎極微塵中一一各有一切世界極微塵數佛一一佛所種種菩薩海會圍繞我以普賢行願力故起深信解現前知見悉以上妙諸供養具而為供養所謂華雲鬘雲天音樂雲天傘蓋雲天衣服雲天種種香塗香燒香末香如是等雲一一量如須彌山王燃種種燈酥燈油燈諸香油燈一一燈炷如須彌山一一燈油如大海水以如是等諸供養具常為供養乃至此廣大最勝供養虗空界盡衆生界盡衆生業盡衆生煩惱盡我供乃盡而虗空界乃至煩惱不可盡故我此供養亦無有盡念念相續無有間斷身語意業無有疲厭以如是等諸供養具常為供養帝網重重諸佛菩薩賢聖海衆受此香華雲以為光明臺廣於無邊界無量無盡願作佛事次奉施寶錯呪寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶銷經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次結廣大不空摩尼印呪印法同第一晌唵啞麼遏布麻禰巴能麻末𠷌呤怛達遏怛眉浪雞矴薩慢怛不囉薩囉吽次供養總持捺麼囉得捺二合得囉二合也引也捺麼末重遏斡矴末日囉二合薩囉不囉二合麻㗚怛二合禰怛達遏怛也啞㗚曷二合矴薩滅屹三二合莫捺重引也怛涅達唵末𠷌囉二合末𠷌囉麻曷引末𠷌囉二合麻曷引矴桚末𠷌呤麻曷引眉也二合末𠷌囉二合麻曷磨溺重即舌腭怛末𠷌哩二合磨曷磨溺大伸當巴珊葛囉麻捺也末𠷌哩二合薩㗚末二合葛麻二合啞斡囉捺舌腭眉商𭊁捺末𠷌囉二合莎引曷引若復有人思惟此總持一遍者即成禮拜供養住十方界殑伽沙數一切諸佛一一佛所種種妙華種種妙網種種燒香種種末香種種妙燈種種妙塗種種衣服種種飲食種種瓔珞種種妙座種種臥具種種音樂種種幢幡旗傘等一切供養皆得成就一切業障悉得清淨一切善根皆悉具足得見一切諸佛菩薩之面安慰其心天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽又祕密主金剛手四大天王等常隨衛助隱身覆護命終即得往生極樂世界令此總持縱不求修思憶一遍則得此等功德皆悉成就供養已至心歸命禮本尊毗盧遮那佛第二稱讚如來一梵音讚佛如來大智慧希有無等倫一切諸世間思惟莫能及凡夫妄觀察取相不如理佛離一切相非彼所能見心意常寂滅清淨如虗空悉莊嚴世界現一切衆生二直言讚佛所有盡法界虗空界十方三世一切剎土所有極微一一塵中皆有一切世界極微塵數佛一一佛所皆有菩薩海會圍繞我當悉以甚深勝解現前知見各以出過辨才天女微妙舌根一一舌根出無盡音聲海一一音聲出一切言詞海稱揚讚歎一切如來諸功德海窮未來際相續不斷盡於法界無不周遍如是虗空界盡衆生界盡衆生業盡衆生煩惱盡我讚乃盡而虗空界乃至煩惱無有盡故我此讚歎無有窮盡念念相續無有間斷身語意業無有疲厭稱讚已至心歸命禮本尊毗盧遮那佛第三禮敬諸佛所有盡法界虗空界十方三世一切佛剎極微塵數諸佛世尊我以普賢行願力故深心信解如對目前悉以清淨身語意業常修禮敬一一佛所皆現不可說不可說佛剎極微塵數身一一身遍禮不可說不可說佛剎極微塵數佛虗空界盡我禮乃盡以虗空界不可盡故我此禮敬無有窮盡如是乃至衆生界盡衆生業盡衆生煩惱盡我禮乃盡而衆生界乃至煩惱無有盡故我此禮敬無有窮盡念念相續無有間斷身語意業無有疲厭南無大方廣佛華嚴經中毗盧遮那菩提身十方盡歸命滅罪增淨信願生華藏海極樂淨土中南無大方廣佛華嚴經中毗盧遮那願身偈同上南無大方廣佛華嚴經中毗盧遮那化身偈同上南無大方廣佛華嚴經中毗盧遮那力持身偈同上南無大方廣佛華嚴經中毗盧遮那相好莊嚴身偈同上南無大方廣佛華嚴經中毗盧遮那威勢身偈同上南無大方廣佛華嚴經中毗盧遮那意生身偈同上南無大方廣佛華嚴經中毗盧遮那福德身偈同上南無大方廣佛華嚴經中毗盧遮那法身偈同上南無大方廣佛華嚴經中毗盧遮那智身偈同上至心歸命禮大方廣佛華嚴經中華藏世界海本尊毗盧遮那佛南無十身無礙毗盧遮那如來一切道場海衆南無大方廣佛華嚴經中世主妙嚴品法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中世主妙莊嚴品第一經云如是我聞一時佛在至一切莊嚴於中影現願共諸衆生往生華藏海極樂淨土中次法界菩提道場內菩提樹中海會衆經云其菩提樹高顯殊特至說種種法無有盡極衆和願共諸衆生往生華藏海極樂淨土中南無華藏世界海摩竭提國阿蘭若法菩提道場覺智樹中衆多如雲同時出現一切菩薩海衆衆和十方盡歸命滅罪增淨信願生華藏海極樂淨土中次法界菩提道場中宮殿內所出海會衆經云如來所處宮殿樓閣至一念之間悉包法界衆和願共諸衆生往生華藏海極樂淨土中南無華藏世界海摩竭提國阿蘭若法菩提道場如來宮殿樓閣中無邊菩薩一切海衆衆和十方盡歸命滅罪增淨信往生華藏海極樂淨土中次法界菩提道場中同生海會衆經云其師子座高廣妙好至察無相之法所行平等願共諸衆生往生華藏海極樂淨土中南無華藏世界海法界覺場法門之主入不思議解脫門方便海普賢菩薩等十佛剎微塵數一切菩薩海衆衆和十方盡歸命滅罪增淨信願生華藏海極樂淨土中南無得遍往十方菩薩衆會莊嚴道場解脫門淨德妙光菩薩摩訶薩南無得一念中現無盡成正覺門教化成熟不思議衆生界解脫門普德最勝燈光照菩薩摩訶薩南無得修習菩薩福莊嚴出生一切佛國土解脫門普光師子幢菩薩摩訶薩南無得觀察佛神通境界無迷惑解脫門普寶焰妙光菩薩摩訶薩南無得於一衆會道場中示現一切佛土莊嚴解脫門普音功德海幢菩薩摩訶薩南無得隨逐如來觀察甚深廣大法界藏解脫門普智光照如來境菩薩摩訶薩南無得普入一切世間行出生菩薩無邊行解脫門普寶髻華幢菩薩摩訶薩南無得親近承事一切諸佛供養藏解脫門普覺悅意聲菩薩摩訶薩南無得出生一切神變廣大加持解脫門普清淨無盡福光菩薩摩訶薩南無得能於無相法界中出現一切諸佛境界解脫門普光明相菩薩摩訶薩南無得出生菩薩諸地諸波羅蜜教化衆生及嚴淨一切佛國土方便解脫門海月光大明菩薩摩訶薩南無得念念中普入法界種種差別處解脫門雲音海光無垢藏菩薩摩訶薩南無得不可思議劫於一切衆生前現清淨大功德解脫門功德寶髻智生菩薩摩訶薩南無得普見十方一切菩薩初詣道場時種種莊嚴解脫門功德自在王大光菩薩摩訶薩南無得隨諸衆生根解脫海普為示現一切佛法解脫門善勇猛蓮華髻菩薩摩訶薩南無得成就如來智永住無量劫解脫門普智雲日幢菩薩摩訶薩南無得普入一切無邊法印力解脫門大精進金剛菩薩摩訶薩南無得顯示現在一切佛始修菩薩行乃至成就智慧聚解脫門香𦦨光幢菩薩摩訶薩南無得安住毗盧遮那一切大願海解脫門大明德深美音菩薩摩訶薩南無得顯示如來遍法界甚深境界解脫門大福光智生菩薩摩訶薩南無如是等而為上首有十佛世界微塵數菩薩摩訶薩衆和十方盡歸命滅罪增淨信願生華藏海極樂淨土中普禮真言唵莎哩巴怛達葛答遏帝遏帝當曩末捺難葛辣彌功德山陀羅尼捺麼莫𭊁也捺麼𭊁㗚麻也捺麼珊遏也唵席寧呼魯魯席𭔦嚕屹呤巴屹令巴席𭊁呤布嚕呤薩曷禮敬已至心歸命禮本尊毗盧遮那佛第四懺悔業障我今自念我於過去無始劫中由貪瞋癡發身口意作諸惡業無量無邊若此惡業有體相者盡虗空界不能容受我今悉以清淨三業遍於法界極微塵剎一切諸佛菩薩衆前誠心懺悔後不復造恆住淨戒一切功德如是虗空界盡衆生界盡衆生業盡衆生煩惱盡我懺乃盡而虗空界乃至衆生煩惱不可盡故我此懺悔無有窮盡念念相續無有間斷身語意業無有疲厭懺悔已至心歸命禮本尊毗盧遮那佛第五隨喜功德所有盡法界虗空界十方三世一切佛剎極微塵數諸佛如來從初發心為一切智勤修福聚不惜身命經不可說不可說佛剎極微塵數劫一一劫中捨不可說不可說佛剎極微塵數頭目手足如是一切難行苦行圓滿種種波羅蜜門證入種種菩薩智地成就諸佛無上菩提及般涅槃分布舍利所有善根我皆隨喜及彼十方一切世界六趣四生一切種類所有功德乃至一塵我皆隨喜十方三世一切聲聞及辟支佛有學無學所有功德我皆隨喜一切菩薩所修無量難行苦行志求無上正等菩提廣大功德我皆隨喜如是虗空界盡衆生界盡衆生業盡衆生煩惱盡我此隨喜無有窮盡念念相續無有間斷身語意業無有疲厭隨喜已至心歸命禮本尊毗盧遮那佛第六請轉法輪所有盡法界虗空界十方三世一切佛剎極微塵中一一各有不可說不可說佛剎極微塵數廣大佛剎一一剎中念念有不可說不可說佛剎極微塵數一切諸佛成等正覺一切菩薩海會圍繞而我悉以身口意業種種方便殷勤勸請轉妙法輪如是虗空界盡衆生界盡衆生業盡衆生煩惱盡我常勸請一切諸佛轉正法輪無有窮盡念念相續無有間斷身語意業無有疲厭請轉已至心歸命禮本尊毗盧遮那佛第七請佛住世所有盡法界虗空界十方三世一切佛剎極微塵數諸佛如來將欲示現般涅槃者及諸菩薩聲聞緣覺有學無學乃至一切諸善知識我悉勸請莫入涅槃經於一切佛剎極微塵數劫為欲利樂一切衆生如是虗空界盡衆生界盡衆生業盡衆生煩惱盡我此勸請無有窮盡念念相續無有間斷身語意業無有疲厭勸請已至心歸命禮本尊毗盧遮那佛第八常隨佛學如此娑婆世界毗盧遮那如來從初發心精進不退以不可說不可說身命而為布施剝皮為紙析骨為筆刺血為墨書寫經典積如須彌為重法故不惜身命何況王位城邑聚落宮殿園林一切所有及餘種種難行苦行乃至樹下成大菩提示種種神通起種種變化現種種佛身處種種衆會乃至處於如是種種衆會以圓滿音如大雷震隨其樂欲成熟衆生乃至示現入於涅槃如是一切我皆隨學如今世尊毗盧遮那如是盡法界虗空界十方三世一切佛剎所有塵中一切如來皆亦如是於念念中我皆隨學如是虗空界盡衆生界盡衆生業盡衆生煩惱盡我此隨學無有窮盡念念相續無有間斷身語意業無有疲厭隨學已至心歸命禮本尊毗盧遮那佛第九恆順衆生謂盡法界虗空界十方剎海所有衆生種種差別所謂卵生胎生溼生化生或有依於地水火風而生住者或有依空及諸卉木而生住者種種生類乃至一切天龍八部人非人等如是等類我皆於彼隨順而轉種種承事種種供養如敬父母如奉師長及阿羅漢乃至如來等無有異於諸病苦為作良醫於失道者示其正路於暗夜中為作光明於貧窮者令得伏藏菩薩如是平等饒益一切衆生何以故菩薩若能隨順衆生則為隨順供養諸佛若於衆生尊重承事則為尊重承事如來若令衆生生歡喜者則令一切如來歡喜何以故諸佛如來以大悲心而為體故因於衆生而起大悲因於大悲生菩提心因菩提心成等正覺乃至虗空界盡衆生界盡衆生業盡衆生煩惱盡我此隨順無有窮盡念念相續無有間斷身語意業無有疲厭恆順已至心歸命禮本尊毗盧遮那佛第十普皆回向我等從初供養讚歎禮佛懺悔乃至隨順衆生所有功德皆悉回向盡法界虗空界一切衆生願令衆生常得安樂無諸病苦欲行惡法皆悉不成所修善業皆速成就關閉一切諸惡趣門開示人天涅槃正路若諸衆生因其積集諸惡業故所感一切極重苦果我皆代受令彼衆生悉得解脫究竟成就無上菩提菩薩如是所修回向虗空界盡衆生界盡衆生業盡衆生煩惱盡我此回向無有窮盡念念相續無有間斷身語意業無有疲厭回向已至心歸命禮本尊毗盧遮那佛至心發願惟願我等由修習彼普賢十種願行無盡功德故速能除滅五無間業所有世間身心等病種種苦惱乃至佛剎極微塵數一切惡業皆得消除一切魔軍夜叉羅剎若鳩槃茶若毗舍闍若部多等飲血噉肉諸惡鬼神皆悉遠離或時發心親近守護是故若人誦此願者行於世間無有障礙如空中月出於雲翳諸佛菩薩之所稱讚一切人天皆應禮敬一切衆生悉應供養此善男子善得人身圓滿普賢所有功德不久當如普賢菩薩速得成就微妙色身三十二大丈夫相若生人天所在之處常居勝族悉能破壞一切惡趣悉能遠離一切惡友悉能制伏一切外道悉能解脫一切煩惱如師子王摧伏群獸堪受一切衆生供養又復是人臨命終時最後剎那一切諸根悉皆散壞一切親屬悉皆捨離一切威勢悉皆退失輔相大臣宮城內外象馬車乘珍寶伏藏如是一切無復相隨惟此願王不相捨離於一切時引導其前一剎那中即得往生極樂世界到已即見阿彌陀佛文殊師利菩薩普賢菩薩觀自在菩薩彌勒菩薩等此諸菩薩色相端嚴功德具足所共圍繞其人自見生蓮華中蒙佛授記得授記已經於無數百千萬億那由他劫普於十方不可說不可說世界以智慧力隨衆生心而為利益不久當坐菩提道場降伏魔軍成等正覺轉妙法輪能令佛剎極微塵數世界衆生發菩提心隨其根性教化成熟乃至盡於未來劫海廣能利益一切衆生如是虗空界盡衆生界盡衆生業盡衆生煩惱盡我此發願無有窮盡念念相續無有間斷身語意業無有疲厭發願已至心歸命禮本尊毗盧遮那佛次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三遍百劫積集罪一念悉蕩除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔白衆等聽說經中無常偈一切諸世間生者皆歸死壽命雖無量要必當有盡夫盛必有衰合會有離別壯年不久停無有法常者如是悟無常謹慎勿放逸不放逸不死放逸是死因不放逸最勝當為諸天王放逸生死本謹慎是勝道是故捨放逸常得受快樂教白賢聖仰白十身遍照佛華藏世界諸如來娑婆本師釋迦尊普賢文殊諸上首剎海聖衆并徒衆華藏會上諸上人釋梵諸天衆類神獲得他心道眼者竝願不捨慈悲力證明我等二衆人為修行願總持門某時至心同禮懺所生功德總用莊嚴法界剎海衆生當願天仙不墜悟著樂而非常國土清平識真乘而是勝群僚常居祿位皆欣圓頓教門人民永保安寧咸修覺照之道師僧父母福慶汪洋信施檀那萬行圓滿三途俱時離苦八難竝悉消除鑊湯變為清涼池鐵牀變作蓮華座息悲痛之響同念佛之音人人有返本之心各各悉還源之照常發今願當願俱不退心觀行令成同證華嚴海會為上良緣清淨法身毗盧遮那佛圓滿報身盧舍那佛千百億化身釋迦牟尼佛十二上願藥師琉璃光佛四十八願阿彌陀佛大聖普賢菩薩摩訶薩大聖文殊菩薩摩訶薩大聖觀世音菩薩摩訶薩大聖地藏菩薩摩訶薩大聖遍法界菩薩摩訶薩摩訶般若波羅蜜大方廣佛華嚴經呪捺麻緊薩慢引怛莫𭊁重也難啞不囉二合帝曷怛折引難禰唵雞禰雞禰恆達引遏當能末二合重斡山舌腭引矴不囉二合帝鳴怛麻怛摩怛麻怛達引遏當𠹌末二合斡吽癹怛莎引曷引毗盧遮那灌頂光呪唵啞麼遏重妹重𠺘拶捺麼曷引摩𠹌𫬘二合引麻禰舌腭巴𠹌麻二合𪢚辣不囉二合斡㗚怛二合也吽處世界如虗空如蓮華不著水心清淨超於彼稽首禮無上尊旋繞念誦南無法界十方佛南無法界十方法南無法界十方僧南無毗盧遮那佛南無釋迦牟尼佛南無大方廣佛華嚴經南無普賢菩薩南無文殊師利菩薩南無法會大菩薩南無功德林菩薩南無金剛幢菩薩南無金剛藏菩薩南無文殊等五十五聖者南無善財菩薩南無法界剎海塵數菩薩衆自歸依佛當願衆生體解大道發無上心自歸依法當願衆生深入經藏智慧如海自歸依僧當願衆生統理大衆一切無礙和南聖衆
