body:
  text: 唐蘭山雲巖慈恩寺護法國師行沙門慧覺依經錄宋蒼山載光寺沙門普瑞補註明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閱天台習教觀沙門正止治定第十二晌次右旋十海中初五海會一切恭敬敬禮無盡三寶是諸眾等人各胡跪嚴持香華如法供養願此供海雲徧滿十方界阿僧祇寶河流出一切清淨善法阿僧祇寶海法水盈滿阿僧祇寶芬陀利華常出妙法芬陀利聲阿僧祇寶須彌山智慧山王秀出清淨阿僧祇八楞嚴妙寶寶線貫穿嚴淨無比阿僧祇淨光寶常放無礙大智光明普照法界阿僧祇寶鈴鐸更相扣擊出妙音聲阿僧祇清淨寶現諸菩薩具足充滿阿僧祇寶繒綵處處垂下色相光潔阿僧祇妙寶幢眾寶半月而為嚴飾阿僧祇寶幢悉能普雨無量寶幡阿僧祇寶帶垂布空中莊嚴殊妙阿僧祇寶敷具能生種種微妙細觸阿僧祇妙寶旋示現菩薩一切智眼阿僧祇寶瓔珞一一瓔珞百千菩薩上妙莊嚴阿僧祇寶宮殿超過一切妙絕無比阿僧祇寶莊嚴具金剛摩尼以為嚴飾阿僧祇種種妙寶莊嚴具常現一切清淨妙色阿僧祇清淨妙寶殊形異彩光鑑映徹阿僧祇寶山以為垣墻周匝圍繞清淨無礙阿僧祇寶香其香普熏一切世界阿僧祇寶化事一一化事周徧法界以如是等種種供養具常作供養帝網重重諸佛菩薩賢聖海眾受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令幹吽次運心供養印呪以二手金剛合掌置于頂上應誦此呪唵引薩㗚末二合㗚達二合眉烏𠹌遏二合矴悉癹囉兮慢引遏遏捺竿莎二合訶誦呪結印時以心運想水陸諸華無主所攝徧滿十方盡虗空界及與人天妙塗香雲燒香燈明幢幡寶蓋種種鼓樂歌舞妓唱真珠羅網懸寶鈴華鬘白拂微玅磬鐸矜羯尼網如意寶珠衣服之雲天諸厨食上玅香美種種樓閣寶柱莊嚴諸天嚴身頭冠瓔珞如是等雲行者運心徧滿虗空以至誠心如是供養最為勝上是發行者以決定心而行此法運心供養諸佛菩薩般若海會金剛天等及諸業道無量賢聖惟願慈悲降臨此會受我微供梵音讚佛如來普現身徧入於世間隨眾生樂欲顯示神通力無住亦無去處處皆見佛光明靡不周名稱悉遠聞無體無住處亦無生可得無相亦無形所現皆如影直言讚佛如日舒光照法界器壞水漏影隨滅最勝智日亦如是眾生無信見涅槃如人世間作火事於一城邑或時息人中最勝徧法界化事訖處亦終盡幻時現身一切剎能事畢處則便謝如來化訖亦復然於諸國土常見佛佛有三昧名不動化眾生訖入此定一念身放無量光光出蓮華華有佛佛身無數等法界有福眾生所能見如是無數一一身壽終莊嚴皆具足如無生性佛出興如無滅性佛涅槃言辭譬喻悉皆斷一切義成無與等南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十迴向菩薩十地菩薩等覺菩薩遍法界剎海微塵數菩薩一切海眾南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海眾南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中次東離垢𦦨藏香水海經云爾時普賢菩薩至佛號普照虗空燈願共諸眾生往生華藏海極樂淨土中初能持剎種南無次有不可說佛剎微塵數世界有離垢𦦨藏香水海出一切香摩尼王妙莊嚴大蓮華徧照剎旋世界種中諸佛道場一切海眾十方盡歸命滅罪增淨信願生華藏海極樂淨土中次所持世界南無此中最下方宮殿莊嚴幢世界眉間光徧照佛道場一切海眾南無一佛剎微塵世界周匝圍繞諸佛道場一切海眾南無此上過佛剎微塵數世界德華藏世界一切無邊法海慧佛道場一切海眾南無二佛剎微塵數世界周匝圍繞諸佛道場一切海眾南無此上過佛剎微塵數世界善變化妙香輪世界功德相光普照佛道場一切海眾南無三佛剎微塵數世界周匝圍繞諸佛道場一切海眾南無此上過佛剎微塵數世界妙色光明世界善眷屬出興徧照佛道場一切海眾南無四佛剎微塵數世界周匝圍繞諸佛道場一切海眾南無此上過佛剎微塵數世界善蓋覆世界法喜無盡慧佛道場一切海眾南無五佛剎微塵數世界周匝圍繞諸佛道場一切海眾南無此上過佛剎微塵數世界尸利華光輪世界清淨普光明佛道場一切海眾南無六佛剎微塵數世界周匝圍繞諸佛道場一切海眾南無此上過佛剎微塵數世界寶蓮華莊嚴世界功德華清淨眼佛道場一切海眾南無七佛剎微塵數世界周匝圍繞諸佛