起無明妄情情積不休能生愛水是故眾生心憶珍羞口中水出心憶前人或憐或恨目中淚盈貪求財寶心發愛涎舉體光潤心著行婬男女二根自然流液阿難諸愛雖別流結是同潤溼不昇自然從墜此名內分阿難外分即是眾生分外因諸渴仰發明虗想想積不休能生勝氣是故眾生心持禁戒舉身輕清心持呪印顧盻雄毅心欲生天夢想飛舉心存佛國聖境冥現事善知識自輕身命阿難諸想雖別輕舉是同飛動不沈自然超越此名外分阿難一切世間生死相續生從順習死從變流臨命終時未捨煖觸一生善惡俱時頓現死逆生順二習相交純想即飛必生天上若飛心中兼福兼慧及與淨願自然心開見十方佛一切淨土隨願往生情少想多輕舉非遠即為飛仙大力鬼王飛行夜叉地行羅剎遊於四天所去無礙其中若有善願善心護持我法或護禁戒隨持戒人或護神呪隨持呪者或護禪定保綏法忍是等親住如來座下情想均等不飛不墜生於人間想明斯聰情幽斯鈍罪報懺悔情多想少流入橫生重為毛群輕為羽族罪報懺悔七情三想沈下水輪生於火際受氣猛火身為餓鬼常被火燒水能害己無食無飲經百千劫罪報懺悔九情一想下洞火輪身入風火二交過地輕生有間重生無間二種地獄罪報懺悔純情即沈入阿鼻獄若沈心中有謗大乘毀佛禁戒誑妄說法虗食信施濫膺恭敬五逆十重更生十方阿鼻地獄循造罪業雖則自招眾同分中兼有元地罪報懺悔阿難此等皆是彼諸眾生自業所感造十習因受六交報云何十因阿難一者婬習交接發於相磨研磨不休如是故有大猛火光於中發動如人以手自相摩觸煖相現前二習相然故有鐵牀銅柱諸事是故十方一切如來色目行婬同名欲火菩薩見欲如避火坑罪報懺悔二者貪習交計發於相吸吸攬不止如是故有積寒堅氷於中凍裂如人以口吸縮風氣有冷觸生二習相陵故有吒吒波波羅羅青赤白蓮寒氷等事是故十方一切如來色目多求同名貪水菩薩見貪如避瘴海罪報懺悔三者慢習交凌發於相恃馳流不息如是故有騰逸犇波積波為水如人口舌自相綿味因而水發二習相鼓故有血河灰河熱沙毒海鎔銅灌吞諸事是故十方一切如來色目我慢名飲癡水菩薩見慢如避巨溺罪報懺悔四者瞋習交衝發於相忤忤結不息心熱發火鑄氣為金如是故有刀山鐵梱劒樹劒輪斧鉞鎗鋸如人銜冤殺氣飛動二習相擊故有宮割斬斫剉㓨搥擊諸事是故十方一切如來色目瞋恚名利刀劒菩薩見瞋如避誅戮罪報懺悔五者詐習交誘發於相調引起不住如是故有純木絞校如水浸田草木生長二習相延故有杻械枷鎖鞭杖檛棒諸事是故十方一切如來色目姦偽同名讒賊菩薩見詐如畏豺狼罪報懺悔六者誑習交欺發於相罔誣罔不止飛心造奸如是故有塵土屎尿穢污不淨如塵隨風各無所見二習相加故有沒溺騰擲飛墜漂淪諸事是故十方一切如來色目欺誑同名劫殺菩薩見誑如踐虵虺罪報懺悔七者怨習交嫌發於銜恨如是故有飛石投礰匣貯車檻甕盛囊撲如陰毒人懷抱畜惡二習相吞故有投擲擒捉擊射拋撮諸事是故十方一切如來色目冤家同名害鬼菩薩見怨如飲鴆酒罪報懺悔八者見習交明如薩迦耶見戒禁取邪悟諸業發於違拒出生相反如是故有王使王吏證執文籍如行路人來往相見二習相交故有勘問權詐拷訊推鞠察訪披究照明善惡童子手執文簿辭辯諸事是故十方一切如來色目惡見同名見坑菩薩見諸虗妄徧執如臨毒壑罪報懺悔九者枉習交加發於誣謗如是故有合山合石碾磑耕磨如讒賊人逼枉良善二習相排故有壓捺搥按蹙漉衡度諸事是故十方一切如來色目怨謗同名讒虎菩薩見枉如遭霹𮦷罪報懺悔十者訟習交諠發於藏覆如是故有鑒見炤燭如於日中不能藏隱二習相陳故有惡友業鏡火珠披露宿業對驗諸事是故十方一切如來色目藏覆同名陰賊菩薩見覆如戴高山履於巨海罪報懺悔云何六報阿難一切眾生六識造業所招惡報從六根出云何惡報從六根出一者見報招引惡果此見業交則臨終時先見猛火滿十方界亡者神識飛墜乘烟入無間獄發明二相一者明見則能徧見種種惡物生無量畏二者暗見寂然不見生無量恐如是見火燒見能為熱砂熱灰燒聽能為鑊湯洋銅燒息能為黑煙紫燄燒味能為焦丸鐵糜燒觸能為熱灰爐炭燒心能生星火迸洒煽鼓空界罪報懺悔二者聞報招引惡果此聞業交則臨終時先見波濤沒溺天地亡者神識降注乘流入無間獄發明二相一者開聽聽種種閙精神愗亂二者閉聽寂無所聞幽魄沈沒如是聞波注聞則能為責為詰注見則能為雷為吼為惡毒氣注息則能為雨為霧洒諸毒蟲周滿身體注味則能為膿為血種種雜穢注觸則能為畜為鬼為糞為尿注意則能為電為雹摧碎心魄罪報懺悔三者齅報招引惡果此齅業交則臨終時先見毒氣充塞遠近亡者神識從地湧出入無間獄發明二相一者通聞被諸惡氣熏極心擾二者塞聞氣掩不通悶絕於地如是齅氣衝息則能為質為履衝見則能為火為炬衝聞則能為沒為溺為洋為沸衝味則能為餒為爽衝觸則能為綻為爛為大肉山有百千眼無量唼食衝思則能為灰為瘴為飛砂礰擊碎身體罪報懺悔四者味報招引惡果此味業交則臨終時先見鐵網猛𦦨熾裂周覆世界亡者神識下透挂網倒懸其頭入無間獄發明二相一者吸氣結成寒氷凍裂身肉二者吐氣飛為猛火焦爛骨隨如是甞味歷甞則能為承為忍歷見則能為然金石歷聽則能為利兵刃歷息則能為大鐵籠彌覆國土歷觸則能為弓為箭為弩為射歷思則能為飛熱鐵從空雨下罪報懺悔五者觸報招引惡果此觸業交則臨終時先見大山四面來合無復出路亡者神識見大鐵城火蛇火狗虎狼師子牛頭獄卒馬頭羅剎手持鎗矟驅入城門向無間獄發明二相一者合觸合山逼體骨肉血潰二者離觸刀劒觸身心肝屠裂如是合觸歷觸則能為道為觀為聽為案歷見則能為燒為熱歷聽則能為撞為擊為剚為射歷息則能為括為袋為拷為縛歷甞則能為耕為鉗為斬為截歷思則能為墜為飛為煎為炙罪報懺悔六者思報招引惡果此思業交則臨終時先見惡風吹壞國土亡者神識被吹上空旋落乘風墮無間獄發明二相一者不覺迷極則荒犇走不息二者不迷覺知則苦無量煎燒痛深難忍如是邪思結思則能為方為所結見則能為鑒為證結聽則能為大合石為氷為霜為土為霧結息則能為大火車火船火檻結甞則能為大叫喚為悔為泣結觸則能為大為小為一日中萬死萬生為偃為仰罪報懺悔阿難是名地獄十因六果皆是眾生迷妄所造若諸眾生惡業圓造入阿鼻獄受無量苦經無量劫六根各造及被所作兼境兼根是人則入八無間獄身口意三作殺盜婬是人則入十八地獄三業不兼中間或為一殺一盜是人則入三十六地獄見見一根單犯一業是人則入一百八地獄由是眾生別作別造於世界中入同分地妄想發生非本來有罪報懺悔復次阿難是諸眾生非破律儀犯菩薩戒毀佛涅槃諸餘雜業歷劫燒然後還罪畢受諸鬼形若於本因貪物為罪是人罪畢遇物成形名無怪鬼罪報懺悔貪色為罪是人罪畢遇風成形名為魃鬼罪報懺悔貪惑為罪是人罪畢遇畜成形名為魅鬼罪報懺悔貪恨為罪是人罪畢遇蟲成形名為蠱毒鬼罪報懺悔貪憶為罪是人罪畢遇衰成形名為厲鬼罪報懺悔貪傲為罪是人罪畢遇氣成形名為餓鬼罪報懺悔貪罔為罪是人罪畢遇幽成形名為魘鬼罪報懺悔貪明為罪是人罪畢遇精成形名為魍魎鬼罪報懺悔貪成為罪是人罪畢遇明成形名為役使鬼罪報懺悔貪黨為罪是人罪畢遇人成形名傳送鬼罪報懺悔阿難是人皆以純情墜落業火燒乾上出為鬼此等皆是自妄想業之所招引若悟菩提則妙圓明本無所有罪報懺悔復次阿難鬼業既盡則情與想二俱成空方於世間與元負人怨對相值身為畜生酬其宿債物怪之鬼物銷報盡生於世間多為裊類罪報懺悔風魃之鬼風銷報盡生於世間多為咎徵一切異類罪報懺悔畜魅之鬼畜死報盡生於世間多為狐類罪報懺悔蟲蠱之鬼蠱滅報盡生於世間多為毒類罪報懺悔衰癘之鬼衰窮報盡生於世間多為蛔類罪報懺悔受氣之鬼氣消報盡生於世間多為食類罪報懺悔綿幽之鬼幽消報盡生於世間多為服類罪報懺悔和精之鬼和消報盡生於世間多為應類罪報懺悔明靈之鬼明滅報盡生於世間多為休徵一切諸類罪報懺悔依人之鬼人亡報盡生於世間多為循類罪報懺悔阿難是等皆以業火乾枯酧其宿債旁為畜生此等亦皆自虗妄業之所招引若悟菩提則此妄緣本無所有如汝所言寶蓮香等及琉璃王善星比丘如是惡業本自發明非從天降亦非地出亦非人與自妄所招還自來受菩提心中皆為虗浮妄想凝結罪報懺悔復告阿難從是畜生酬還先債若彼酧者分越所酧此等眾生還復為人反徵其剩如彼有力兼有福德則於人中不捨人身酧還彼力若無福者還為畜生償彼餘值阿難當知若用錢物或役其力償足自停如其中間殺彼身命或食其肉如是乃至經微塵劫相食相誅猶如轉輪互為高下無有休息除奢摩他及佛出世不可停寢汝今應知彼梟倫者酧足復形生人道中參合頑類罪報懺悔彼咎徵者酧足復形生人道中參合愚類罪報懺悔彼狐倫者酧足復形生人道中參於庸類罪報懺悔彼毒倫者酧足復形生人道中參合很類罪報懺悔彼蛔倫者酧足復形生人道中參合微類罪報懺悔彼食倫者酧足復形生人道中參合柔類罪報懺悔彼服倫者酧足復形生人道中參合勞類罪報懺悔彼應倫者酧足復形生人道中參合文類罪報懺悔彼休徵者酧足復形生人道中參合明類罪報懺悔彼諸循倫酧足復形生人道中參合達類罪報懺悔阿難是等皆以宿債畢酬復形人道皆無始來業計顛倒相生相殺不遇如來不聞正法於塵勞中法爾輪轉此輩名為可憐愍者罪報懺悔我等為無明所覆不識惡報罪因今遇道場方能覺知歸命毗盧遮那如來及一切賢聖海眾燒香散華重惡罪報發露懺悔不敢覆藏由此因緣我及法界眾生海惡業重罪願皆清淨次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三徧百劫積集罪一念悉盪除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白眾等聽說經中無常偈若人行放逸如毒及如火作放逸眾生命終受苦惱若人不放逸所至應敬禮能至寂滅處永離諸放逸
