body:
  text: 唐蘭山雲巖慈恩寺護法國師一行沙門慧覺依經録宋蒼山載光寺沙門普瑞補注明欽忠義忠藎四川布政佛弟子本增訂正雞山寂光寺沙門讀徹參閲天台習教觀沙門正止治定第十七晌第二普光明殿會修因契果生解分一切恭敬敬禮無盡三寶是諸衆等人各胡跪嚴持香華如法供養願此供海雲遍滿十方界百萬億毗盧遮那摩尼寶百萬億因陀羅摩尼寶光明照曜百萬億清淨功德摩尼寶妙色分明百萬億清淨妙藏寶以為門闥百萬億世界最勝明半月寶百萬億離垢藏摩尼寶百萬億師子面摩尼寶間錯莊嚴百萬億心王摩尼寶所求如意百萬億閻浮檀摩尼寶百萬億清淨藏摩尼寶百萬億帝幢摩尼寶咸放大光彌覆其上百萬億白銀藏摩尼寶百萬億須彌幢摩尼寶莊嚴其藏百萬億真珠瓔珞百萬億琉璃瓔珞百萬億赤色寶瓔珞百萬億摩尼瓔珞百萬億寶光明瓔珞百萬億種種藏摩尼瓔珞百萬億甚可樂見赤真珠瓔珞百萬億無邊色相藏摩尼寶瓔珞百萬億極清淨無比寶瓔珞百萬億勝光明摩尼寶瓔珞周匝垂布以為莊嚴以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海衆受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽運心供養印呪以二手金剛合掌置于頂上應誦此呪唵薩㗚末二合㗚達二合眉鳴能遏二合矴切身悉發囉兮慢引遏遏捺竿莎引訶梵音讚佛如來大威力普賢願所成一切國土中妙音無不至無數諸億劫一切塵剎中往昔所行事妙音咸具演十方塵國土光網悉周遍光中悉有佛普化諸羣生直言讚佛如心境界無有量諸佛境界亦復然如心境界從意生佛境如是應觀察如龍不離於本處以心威力澍大雨雨水雖無來去處隨龍心故悉充洽十力牟尼亦如是無所從來無所去若有淨心則見身量等法界入毛孔如海珍奇無有量衆生大地亦復然水性一味等無別於衆生者各蒙益如來智海亦如是一切所有皆無量有學無學住地人悉在其中得饒益南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十回向菩薩十地菩薩等覺菩薩遍法界剎海微塵數菩薩一切海衆南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海衆南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中南無大方廣佛華嚴經中佛名號品法門如來名號品第七經云爾時世尊抂摩竭提國至師子之座結跏趺坐衆和彼佛菩薩處十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云南方過十佛剎微塵數至師子之座結跏趺坐衆和彼佛菩薩處十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云西方過十佛剎微塵數至師子之座結跏趺坐衆和彼佛菩薩處十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云北方過十佛剎微塵數至師子之座結跏趺坐衆和彼佛菩薩處十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云東北方過十佛剎微塵至師子之座結跏趺坐衆和彼佛菩薩處十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云東南方過十佛剎微塵至師子之座結跏趺坐衆和彼佛菩薩處十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云西南方過十佛剎微塵至師子之座結跏趺坐衆和彼佛菩薩處十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云西北方過十佛剎微塵至師子之座結跏趺坐衆和彼佛菩薩處十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云下方過十佛剎微塵至師子之座結跏趺坐衆和彼佛菩薩處十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云上方過十佛剎微塵數至師子之座結跏趺坐衆和彼佛菩薩處十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云爾時文殊師利菩薩至令諸衆生各別知見願共諸衆生往生華藏海極樂淨土中經云諸佛子如來於此四天下中至衆生各別知見願共諸衆生往生華藏海極樂淨土中次娑婆百億世界中初四洲內諸佛南無一切義成如來南無圓滿月如來南無師子吼如來南無釋迦牟尼如來南無第七仙如來南無毗盧遮那如來南無瞿曇氏如來南無大沙門如來南無曼勝如來南無導師如來南無如是等其數十千令諸衆生各別知見十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云諸佛子此四天下東至令諸衆生各別知見願共諸衆生往生華藏海極樂淨土中次四洲不遠東方善護世界內諸佛南無金剛如來南無自在如來南無有智慧如來南無難勝如來南無雲王如來南無無諍如來南無能為主如來南無心歡喜如來南無無與等如來南無斷言論如來南無如是等其數十千令諸衆生各別知見十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云諸佛子此四天下南至令諸衆生各別知見願共諸衆生往生華藏海極樂淨土中次南方難忍世界內諸佛南無帝釋如來南無寶稱如來南無離垢如來南無實語如來南無能調伏如來南無具足喜如來南無大名稱如來南無能利益如來南無無邊如來南無最勝如來南無如是等其數十千令諸衆生各別知見十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云諸佛子此四天下西至令諸衆生各別知見願共諸衆生往生華藏海極樂淨土中次西方親慧世界內諸佛南無水天如來南無喜見如來南無最勝王如來南無調伏天如來南無真實慧如來南無到究竟如來南無歡喜如來南無法慧如來南無所作已辦如來南無善住如來南無如是等其數十千令諸衆生各別知見十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云諸佛子此四天下北至令諸衆生各別知見願共諸衆生往生華藏海極樂淨土中次北方有師子世界內諸佛南無大牟尼如來南無苦行如來南無世所尊如來南無最勝田如來南無一切智如來南無善意如來南無清淨如來南無醫羅跋那如來南無最上施如來南無苦行得如來南無如是等其數十千令諸衆生各別知見十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云諸佛子此四天下東北方至諸衆生各別知見願共諸衆生往生華藏海極樂淨土中次東北方妙觀察世界內諸佛南無調伏魔如來南無成就如來南無息寂如來南無賢天如來南無離貪如來南無勝慧如來南無心平等如來南無無能勝如來南無智慧音如來南無難出現如來南無如是等其數十千令諸衆生各別知見十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云諸佛子此四天下東南方至諸衆生各別知見願共諸衆生往生華藏海極樂淨土中次東南方喜樂世界內諸佛南無極威嚴如來南無光𦦨聚如來南無遍知如來南無祕密如來南無解脫如來南無性安住如來南無如法行如來南無淨眼王如來南無大勇健如來南無精進力如來南無如是等其數十千令諸衆生各別知見十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云諸佛子此四天下西南方至諸衆生各別知見願共諸衆生往生華藏海極樂淨土中次西南方甚堅牢世界內諸佛南無安住如來南無智王如來南無圓滿如來南無不動如來南無妙眼如來南無頂王如來南無自在音如來南無一切施如來南無持衆仙如來南無勝須彌如來南無如是等其數十千令諸衆生各別知見十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云諸佛子此四天下西北方至諸衆生各別知見願共諸衆生往生華藏海極樂淨土中次西北方妙地世界內諸佛南無普遍如來南無光𦦨如來南無摩尼髻如來南無可憶念如來南無無上義如來南無常喜樂如來南無性清淨如來南無圓滿光如來南無修臂如來南無住本如來南無如是等其數十千令諸衆生各別知見十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云諸佛子此四天下次下方至諸衆生各別知見願共諸衆生往生華藏海極樂淨土中次下方𦦨慧世界內諸佛南無集善根如來南無師子相如來南無猛利慧如來南無金色𦦨如來南無一切知識如來南無究竟音如來南無作利益如來南無到究竟如來南無真實天如來南無普遍勝如來南無如是等其數十千令諸衆生各別知見十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云諸佛子此四天下次上方至諸衆生各別知見願共諸衆生往生華藏海極樂淨土中次上方持地世界內諸佛南無有智慧如來南無清淨面如來南無覺慧如來南無上首如來南無行莊嚴如來南無發歡喜如來南無意成滿如來南無如盛火如來南無持戒如來南無一道如來南無如是等其數十千令諸衆生各別知見十方盡歸命滅罪增淨信願生華藏海極樂淨土中次僧俗通懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖衆世出世神慈悲本願放大光明照於法會證盟護念哀愍攝受願我及一切衆生海自從無始直至今時僧俗一切罪業發露懺悔大集經云若未來世有善男子善女人信心清淨為欲供養如法修行諸比丘故或捨家宅園林田地奴婢乃至資生種種所須爾時若有破戒比丘受他所捨乃至一華一果是惡比丘以愚癡故受他淨心所施諸物獲大惡報於現在世得四惡報何等為四一者惡名遠聞流布十方二者父母師長兄弟眷屬奴婢親戚悉皆離散三者獲大重病臥糞穢中惡報相現痛苦而死四者衣鉢坐具所有資財悉為五家之所分散是名四種惡報於未來世復獲四種大惡果報何等為四一者身壞命終墮大地獄二者於地獄中久受勤苦地獄終已復生畜生餓鬼道中得無手足報居在曠野無水之處經百千萬歲具受辛苦三者從彼命終生毒蛇中得無眼報經無量歲唯食於土四者於彼命終得生人中墮五濁世不值諸佛於彼世中雖得人身常無眼目亦無手足住在曠野唯食人間所棄穢食恆不充足不得與人同其所止從彼命終復墮地獄於三惡道難得免出何以故彼善男子善女人淨心捨施田宅園林衣服湯藥種種諸物唯欲供養如法比丘然破戒者受他所施唯欲供身不與如法持戒比丘以是因緣獲如是罪又破戒者久處生死具受諸苦雖得人身不值佛世所以者何諸佛如來不可思議難可值遇彼破戒者斷滅法母不樂精進不用見聞佛法僧故以是因緣不值佛世彼惡比丘於當來世得如是等大惡果報今皆懺悔若有剎帝利婆羅門毗舍首陀以不信故奪他所施而彼愚人於現身中得二十種大惡果報何者二十一者諸天善神皆悉遠離二者有大惡名流布十方三者眷屬知識違背乖離四者怨憎惡人同共聚會五者所有資財悉皆散失六者心狂癡亂恆多躁擾七者諸根不具八者睡眠不安九者恆常飢渴十者所食之物猶如毒藥十一者所愛之人悉皆離別十二者共事之人常多鬬諍十三者父母兄弟妻子奴婢不信其言十四者所有隱密覆匿之事知識親友共相顯露十五者所有財物五家分散十六者常遇重病無人瞻視十七者資生所須常不稱意十八者形體枯悴十九者久受勤苦難得免離二十者常處糞穢乃至命終是愚癡人於現身中得如是等二十種諸惡果報命終之後墮阿鼻地獄一劫受苦飢食鐵丸渴飲鎔銅用熱鐵鍱以為衣服行住坐臥所受之物皆是火聚六方熾𦦨更相通徹彼諸罪人於阿鼻獄具受如是種種等苦從彼命終生末伽車䭾餓鬼中居在曠野無水之處生便無眼又無手足四方熱風來觸其身形體楚毒猶如刀劒宛轉在地受大苦惱脂髓膏流猶居熱熬魂神逃亂出大惡聲具受如是百千種苦經無量歲然後命終生大海中受肉團身其形長大滿百由旬然彼罪人所居之處於身外面一由旬滿中熱水狀若鎔銅經無量百千歲受如是等種種苦惱如地獄中等無差別從彼命終於閻浮提曠野澤中忽然化身形如肉團猶若大山四方熱風來燒其身飛禽走獸競來食之經無量歲爾乃命終還墮地獄復經無量百千萬歲備受衆苦然後命終生餓鬼中乃至肉團等身經無量百千歲往返輪回具受衆苦其罪漸薄得出為人生無佛國五濁劫中從生而盲諸根不具身形醜惡人不喜見今皆懺悔佛告頻婆娑羅王言大王如是罪人於當來世獲如是等大惡果報所以者何持法比丘如法行故有信心者種種資財具足施與彼惡比丘愚癡人等奪自用故獲如是諸惡果報今皆懺悔我等為無明所覆不識罪因今遇道場方能覺知歸命毗盧遮那如來及一切賢聖海衆燒香散華僧俗所犯罪業發露懺悔不敢覆藏由此因緣我及法界衆生海違法重罪悉願清淨次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三遍百劫積集罪一念悉蕩除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命體本尊毗盧遮那佛白衆等聽說經中無常偈若世間欲樂若愛所生樂不及一內樂十六分之一禪樂為第一白法離生死愛盡第一樂畢竟不退樂不怖畏知足以修者不求如是禪定樂更無樂可比若不為愛縛疑所不懷者彼則渡有海常受一切樂
