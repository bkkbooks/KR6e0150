body:
  text: 唐蘭山雲巖慈恩寺護法國師一行沙門慧覺依經録宋蒼山載光寺沙門普瑞補注明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閲天台習教觀沙門正止治定第十晌一切恭敬敬禮無盡三寶是諸衆等人各胡跪嚴持香華如法供養願此供海雲遍滿十方界願此阿僧祇世界妙寶充滿阿僧祗世界衣服充滿阿僧祇世界妙香充滿阿僧祗世界莊嚴具充滿阿僧祇世界無量摩尼寶充滿阿僧祇世界妙華充滿阿僧祇世界上味充滿阿僧祇世界財貨充滿阿僧祇世界牀座充滿蓋以寶帳敷以妙衣阿僧祇世界種種莊嚴寶冠充滿以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海衆受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布拶銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次大慧施印呪唵捺麻緊薩㗚末二合怛達引遏怛啞斡浪雞矴三末重囉三末重囉吽梵音讚佛佛身無差別充滿於法界能令見色身隨機善調伏此會諸佛子善修衆智慧斯人已能入如是方便門一一國土中普演廣大音說佛所行處周聞十方剎直言讚佛世尊往昔於諸有微塵佛所修淨業故獲種種寶光明華藏莊嚴世界海廣大悲雲遍一切捨身無量等剎塵以昔劫海修行力今此世界無諸垢放大光明遍住空風力所持無動搖佛藏摩尼普嚴飾如來願力令清淨普散摩尼妙藏華以昔願力空中住種種堅固莊嚴海光明雲布滿十方諸摩尼中菩薩雲普詣十方光熾然光焰成輪妙華飾法界周流靡不遍一切寶中放淨光其光普照衆生海十方國土皆周遍咸令出苦向菩提寶中佛數等衆生從其毛孔出化形梵王帝釋輪王等一切衆生及諸佛化現光明等法界光中演說諸佛名種種方便示調伏普應群生無不盡華藏世界所有塵一一塵中見法界寶光現佛如雲集此是如來剎自在廣大願雲周法界於一切劫化群生普賢智地行悉成所有莊嚴從此出南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十回向菩薩十地菩薩等覺菩薩遍法界剎海微塵數菩薩一切海衆南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海衆南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛南無十身無礙毗盧遮那如來道場一切海衆南無華藏莊嚴世界海毗盧遮那因果法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中華藏世界品第五初明華藏因果自體經云爾時普賢菩薩至塵數大願之所嚴淨願共諸衆生往生華藏海極樂淨土中次所依風輪經云諸佛子此華藏莊嚴世界至所有莊嚴從此出願共諸衆生往生華藏海極樂淨土中南無此閻浮提七處九會周遍法界毗盧遮那道場一切海衆南無百億娑婆同類一界周遍法界毗盧遮那道場一切海衆南無異類數樹形等二十剎周遍法界毗盧遮那道場一切海衆南無無邊妙華光香水海普照十方熾然寶光明世界種中周遍法界毗盧遮那道場一切海衆南無華藏世界有十不可說佛剎微塵數世界種中周遍法界毗盧遮那道場一切海衆南無華藏世界外盡十方法界剎海猶如華藏周遍法界毗盧遮那道場一切海衆南無其前諸剎皆以塵成一一塵中皆有佛剎同異類剎周遍法界毗盧遮那道場一切海衆南無遍虗空界有剎無剎有塵無塵置一塵處有無邊同類異類剎周遍法界毗盧遮那道場一切海衆南無其一一微塵各攝多剎海又此剎等復有微塵彼諸塵內復有剎海塵塵無盡剎剎不斷如天帝網重重重重不可稱量周遍法界毗盧遮那道場一切海衆南無遍虗空法界十方三世一切剎海皆亦如是諸佛道場一切海衆南無華藏世界香水海中種種光明蘂香幢大蓮華上等衆生數一切諸佛南無華藏世界所有微塵一一塵中見四法界寶光明中如雲聚現一切諸佛南無如是等華藏世界微塵數香水海如雲靉靆滿十方界諸摩尼中如雲一切菩薩海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中二華藏海布列莊嚴分六一金剛輪山經云爾時普賢菩薩至佛自在力咸令遍願共諸衆生往生華藏海極樂淨土中二臺面寶地了悟心性願相應也經云爾時普賢菩薩至如是一切諸神變願共諸衆生往生華藏海極樂淨土中地面三香水經云爾時普賢菩薩至悉是如來自在力願共諸衆生往生華藏海極樂淨土中四海間香河經云爾時普賢菩薩至炳然顯現諸佛影願共諸衆生往生華藏海極樂淨土中五河間華林經云爾時普賢菩薩至隨其意樂悉清淨願共諸衆生往生華藏海極樂淨土中六總結莊嚴經云爾時普賢菩薩至本願力故住其中願共諸衆生往生華藏海極樂淨土中南無華藏世界金剛輪圍山摩尼樹中現大光明一一光中一切毗盧遮那如來南無華藏世界金剛輪圍山諸莊嚴中無邊色相現無邊一切諸佛南無華藏世界諸寶地中如帝釋網重重無盡行布現影一切諸佛南無華藏世界一一香水海各有四天下極微塵數香水海寶雲蓋中一切毗盧遮那如來南無華藏世界一一香水海各有四天下微塵數香河寶雲蓋中一切諸佛南無華藏世界香河漩澓各有所修因行種種形相悉寶中出一切諸佛南無華藏世界大香水河清淨珠玉如雲靉靆香河悉蓋彼珠網中顯現晃耀一切諸佛南無華藏世界諸香水河兩間地上諸寶樹林中現廣大身一切諸佛南無華藏世界諸香水河兩間地上衆寶莊嚴大光明中一切諸佛南無華藏世界諸香水河兩間地上一一極微塵數海中一切諸佛南無華藏世界金剛輪圍山中執蓋燒香遍滿法界無邊菩薩一切海衆南無華藏世界諸寶地中遍遊十方宣說大願諸大菩薩一切海衆南無華藏世界十不可說微塵數海中持種種蓋現神通力無邊菩薩一切海衆南無華藏世界香水漩澓妙音聲中常出如雲遍滿法界一切菩薩南無如是等華藏世界不可說香水海微塵中佛子道場一切海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中次毀犯禁戒呵責懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖衆世出世神慈悲本願放大光明照於法會證明護念哀愍攝受願我及一切衆生海自從無始直至今時業海無盡帝網重重毀戒罪𠎝發露懺悔智度論云罪不罪不可得故應具足尸羅波羅蜜尸羅秦言性善好行善道不自放逸是名尸羅或受戒行善或不受戒行善皆名尸羅尸羅者略說身口律儀有八種不惱害不劫盜不邪淫不妄語不兩舌不惡口不綺語不飲酒及淨命是名戒若不護放捨是名破戒破此戒者墮三惡道中若下持戒生人中中持戒者生六欲天中上持戒又行四禪四空定生色無色界清淨天中上持戒有三種下清淨持戒得阿羅漢中清淨持戒得辟支佛上清淨持戒得佛道不著不猗不破不缺聖所讚愛如是名為上清淨持戒若慈愍衆生故為度衆生故亦知戒實相故心不猗著如此持戒將來至佛道如此名為得無上佛道戒若人求大善利常堅持戒如惜重寶如護身命何以故譬如大地一切萬物有形之類皆依地而住戒亦如是戒為一切善法住處復次譬如無足欲行無翅欲飛無船欲渡是不可得若無戒欲求好果亦復如是若人棄捨此戒雖山居苦行食果服藥與禽獸無異若有人但服水為戒或服乳或服氣或剃髮或長𩬊或頂留少許髮或著袈裟或著白衣或著草衣或木皮衣或冬入水或夏火炙若自墜高嵓若於恆河中洗若日三浴再供養火種種祠祀種種呪願受行苦行以無此戒空無所得若有人雖處高堂大殿好衣美食而能行此戒者得生好處及得道果若貴若賤若小若大能行此淨戒皆得大利若破此戒無貴無賤無大無小皆不得隨意生善處復次破戒之人譬如清涼池而有毒蛇不中澡浴亦如好華果樹而多逆㓨若人雖在貴家生身體端正廣學多聞而不樂持戒無慈愍心亦復如是如偈說貴而無智則為衰智而憍慢亦為衰持戒之人而毀戒今世後世一切衰人雖貧賤而能持戒勝於富貴而破戒者華香木香不能遠聞持戒之香周遍十方持戒之人具足安樂名能遠聞天人敬愛現世常得種種快樂若欲天上人中富貴長壽取之不難持戒清淨所願皆得復次持戒之人見破戒人刑獄拷掠種種苦惱自知永離此事以為欣慶若持戒之人見善人得譽名聞快樂心自念言如彼得譽我亦有分破戒之人壽終之時風刀解身筋脉斷絶自知持戒清淨之人心不怖畏如偈中說大惡病中戒為良藥大恐怖中戒為守護死暗冥中戒為明燈於惡道中戒為橋梁死海水中戒為大船復次持戒之人常得今世人所敬養心樂不悔衣食無乏死得生天後得佛道持戒之人無事不得破戒之人一切皆失譬如有人常供養天其人貧窮一心供養滿十二歲求索富貴天愍此人自現其身而問之曰汝求何等答曰我求富貴欲令心之所願一切皆得天與一器名曰得瓶而語之言所須之物皆從瓶出其人得已應意所欲無所不得得如意已具作好舍象馬車乘七寶具足供給賓客事事無乏客問之言汝先貧窮今日何由得如此富答言我得天瓶瓶能出此種種衆物故富如是客言出瓶見示并所出物即為出瓶瓶中引出種種衆物其人憍佚立瓶上舞瓶即破壞一切衆物亦一時滅持戒之人亦復如是種種妙樂無願不得若人破戒憍佚自恣亦如彼人破瓶失利復次持戒之人名稱之香今世後世周滿天上及在人中復次持戒之人人所樂施不惜財物不修世利而無所乏得生天上十方佛前入三乘道而得解脫唯種種邪見持戒後無所得復次若人雖不出家但能修行戒法亦得生天若人持戒清淨行禪智慧欲求度脫老病死苦此願必得持戒之人雖無兵仗衆惡不加持戒之財無能奪者持戒親親雖死不離持戒莊嚴勝於七寶以是之故當護於戒如護身命如愛寶物破戒之人受苦萬端如向貧人破瓶失物復次持戒之人觀破戒人罪應自勉勵一心持戒云何名為破戒人罪破戒之人人所不敬其家如冢人所不到破戒之人失諸功德譬如枯樹人不愛樂破戒之人如霜蓮華人不喜見破戒之人惡心可畏譬如羅剎破戒之人人不歸向譬如渴人不向枯井破戒之人心常疑悔譬如犯事之人常畏罪至破戒之人如田被雹不可依仰破戒之人譬如苦瓜雖形似甘種而不可食破戒之人如賊聚落不可依止破戒之人譬如大病人不欲近破戒之人不得免苦譬如惡道難可得過破戒之人不可共止譬如惡賊難可親近破戒之人譬如火坑行者避之破戒之人難可共住譬如毒蛇破戒之人不可近觸譬如大火破戒之人譬如破船不可乘渡破戒之人譬如吐食不可更噉破戒之人在好衆中譬如惡馬在善馬群中破戒之人與善人異如驢在牛群破戒之人在精進衆譬如𤻝兒在健人中破戒之人雖似比丘譬如死尸在眠人中破戒之人譬如僞珠在真珠中破戒之人譬如伊蘭在栴檀林中破戒之人雖形似善人內無善法雖復剃頭染衣次第捉籌名為比丘實非比丘破戒之人若著法衣則是熱銅鐵鍱以纏其身若持鉢盂則是盛洋銅器若所噉食則是吞燒鐵丸飲熱洋銅若受人供養供給則是地獄獄卒守人若入精舍則是入大地獄若坐衆僧床榻是為坐熱鐵牀上復次破戒之人常懷怖懼如重病人常畏死至亦如五逆罪人心常自念我為佛賊藏覆避畏如賊畏人歲月日過常不安隱破戒之人雖得供養利樂是樂不淨譬如愚人供養莊嚴死尸智者聞之惡不欲見如是種種無量破戒之罪不可稱說行者應當一心持戒我等為無明所覆不識毀戒罪因今遇道場方乃覺知歸命毗盧遮那如來及一切賢聖海衆燒香散華毀戒罪業發露懺悔不敢覆藏由此因緣我及法界衆生海一切業報願皆清淨次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三遍百劫積集罪一念悉蕩除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白衆等聽說經中無常偈如是知諸法一切皆生滅莫行放逸心放逸遇毒害謹慎不放逸是處名甘露若行放逸心是名為死狗見此危脆苦離欲早修禪禪定方為樂如經中偈曰若有如癡心於愛欲愛樂後得衰惱已其心即生悔欲火所燒者為境界所誑不得寂靜道一切上樂處
