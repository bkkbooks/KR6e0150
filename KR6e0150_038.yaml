body:
  text: 唐蘭山雲巖慈恩寺護法國師一行沙門慧覺依經錄宋蒼山載光寺沙門普瑞補註明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閱天台習教觀沙門正止治定第三十八晌次等覺位中攝德成因彌勒菩薩會一切恭敬敬禮無盡三寶是諸眾等人各胡跪嚴持香華如法供養願此供海雲徧滿十方界竪百萬億寶幢懸百萬億寶幡垂百萬億寶繒帶然百萬億寶香爐布百萬億寶鬘持百萬億寶扇執百萬億寶拂懸百萬億寶鈴網微風吹動出妙音聲百萬億寶欄楯周帀圍繞百萬億寶多羅樹次第行列百萬億妙寶窻牗綺麗莊嚴百萬億寶樹周帀垂蔭百萬億寶樓閣延袤綺飾百萬億寶門垂布瓔珞百萬億金鈴出妙音聲百萬億吉祥相瓔珞嚴淨垂下以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海眾受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯呪寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次運心供養呪以二手金剛合掌置于頂上應誦此呪唵薩㗚末二合㗚達二合眉嗚能遏二合矴切聲悉癹囉兮慢引遏遏捺竿莎引訶梵音讚佛法身同虗空無礙無差別色形如影像種種眾相現影像無方所如空無體性智慧廣大人了達其平等能於諸佛身安住智所行速入如來地普攝於法界直言讚佛雪山有藥王名為無盡根能生一切樹根莖葉華實佛智亦如是如來種中生既得菩提已復生菩薩行如人把乾草置之於劫燒金剛猶洞然此無不燒理三世劫與剎及其中眾生彼草容不燒此佛無不知有風名散壞能壞於大千若無別風止壞及無量界大智風亦爾滅諸菩薩惑別有善巧風令住如來地如有大經卷量等三千界在於一塵內一切塵悉然有一聰慧人淨眼悉明見破塵出經卷普饒益眾生佛智亦如是徧在眾生心妄想之所纏不覺亦不知諸佛大慈悲令其除妄想如是乃出現饒益諸菩薩南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎士中十信菩薩十住菩薩十行菩薩十迴向菩薩十地菩薩等覺菩薩徧法界剎海微塵數菩薩一切海眾南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶墖寺宇一切佛事又於法藏及講法處菩薩賢聖一切海眾南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中第三會攝德成因解脫法門經云爾時善財童子至彼大功德尊願速還瞻覲攝德成因之餘經云爾時善財童子至學已成就無量功德願共諸眾生往生華藏海極樂淨土中攝德成因之餘經云爾時善財童子至殷勤瞻仰辭退而去願共諸眾生往生華藏海極樂淨土中南無南方海岸國大莊嚴園毗盧遮那莊嚴藏廣大樓閣中得入三世一切境界內不忘念智莊嚴藏解脫門彌勒菩薩摩訶薩南無般若中生具甚深智見真實法為諸佛母善巧智圓通達解脫普賢行滿作菩薩師因位究竟照了本心文殊師利菩薩摩訶薩南無圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩十方盡歸命滅罪增淨信願生華藏海極樂淨土中次六根罪懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖眾世出世神慈悲本願放大光明炤於法會證盟護念哀愍攝受願我及一切眾生海自從無始直至今時業海無盡帝網重重六根罪業發露懺悔觀普賢行法經云汝今應當於諸佛前發露先罪至誠懺悔於無量世眼根因緣貪著諸色以著色故貪愛諸塵以愛塵故受女人身世世生處惑著諸色色壞汝眼為恩愛奴故色使汝經歷三界為此弊使盲無所見復作是言我今所懺眼根重罪障蔽穢濁盲無所見願佛大慈哀愍覆護普賢菩薩乘大法船普度一切十方無量諸菩薩伴惟願慈哀聽我悔過眼根不善惡業障法發露懺悔普賢復言汝於多劫耳根因緣隨逐外聲聞妙音時心生惑著聞惡聲時起百八種煩惱賊害如此惡耳報得惡事恒聞惡聲生諸攀緣顛倒聽故多墮惡道邊地邪見不聞法處汝應自當說己過惡懺悔諸罪我從多劫乃至今身耳根因緣聞聲惑著如膠著草聞惡聲時起煩惱毒處處惑著無暫停時坐此竅聲勞我神識墜墮三塗今始覺知向諸世尊發露懺悔普賢菩薩復更為說懺悔之法汝於前世無量劫中以貪香故分別諸識處處貪著墮落生死汝今應當觀大乘因大乘因者諸法實相既懺悔已而作是言我於先世無量劫時貪香味觸造作眾惡以是因緣無量世來恒受地獄餓鬼畜生邊地邪見諸不善身如此惡業今日發露歸向諸佛正法之王說罪懺悔又汝當自說舌根所作不善惡業此舌根者動惡業相妄言綺語惡口兩舌誹謗佛語讚歎邪見說無益語如是眾多諸雜惡業搆鬬壞亂法說非法如是眾罪今悉懺悔此舌過患無量無邊諸惡業㓨從舌根出斷正法輪從此舌起如此惡舌斷功德種於非義中多端強說讚歎邪見如火益薪猶如猛火傷害眾生如飲毒者無瘡疣死如此罪報惡邪不善當墮惡道百劫千劫以妄語故墮大地獄我今歸向南無諸佛發露黑惡誠心懺悔又汝今應當身心懺悔身者殺盜淫心者念諸不善造十惡業及五無間猶如猿猴亦如黐膠處處貪著徧至一切六情根中此六根業枝條華葉悉滿三界二十五有一切生處亦能增長無明老死十二苦事八邪八難無不經歷我今應當懺悔如是惡不善業十方諸佛說懺悔法菩薩所行不斷結使不住使海觀心無心從顛倒想起如此想心從妄想起如空中風無依止處如是法相不生不沒何者是罪何者是福我心自空罪福無主一切諸法皆亦如是無住無壞如是懺悔觀心無心法不住法中諸法解脫滅諦寂靜如是想者名大懺悔一切業障海皆從妄想生若欲懺悔者端坐念實相眾罪如霜露慧日能消除是故應至心勤懺六根罪又古德頌云障蔽普眼功德者皆由無始眼界故以於色處起憎愛今三寶處誠懺悔不聞如來正法者皆由無始耳界故以於音聲而迷執今三寶處誠懺悔不熏戒定慧香者皆由無始鼻界故以於諸香而執著今三寶處誠懺悔不能流傳正法者皆由無始舌界故以愛樂嘗諸惡味今三寶處誠懺悔不證法身功德者皆由無始身界故以造種種諸罪𠎝今三寶處誠懺悔不了正見心眼者皆由無始意界故以起貪嗔邪見罪今三寶處誠懺悔次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷捺末日羅也莎曷應誦三徧百劫積集罪一念悉盪除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白眾等聽說經中無常偈若人不觀心常受行欲樂長夜久時睡苦惱不曾減癡故樂受樂不覺知苦惱後得衰惱時乃知得何果欲初似賢善不覺甚為惡此為地獄使專行不饒益盲者信此欲智眼者則離如險岸相似如是墮地獄謹慎第一友常能作利益放逸第一怨故應近善友欲徧一切身如第一嚴毒惡道第一道所謂放逸是
