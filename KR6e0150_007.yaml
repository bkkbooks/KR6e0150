body:
  text: 唐蘭山雲巖慈恩寺護法國師一行沙門慧覺依經録宋蒼山載光寺沙門普瑞補注明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閲天台習教觀沙門正止治定第七晌次法界菩提道場中主山神等雜類諸神會一切恭敬敬禮無盡三寶是諸衆等人各胡跪嚴持香華如法供養願此供海雲遍滿十方界一切香莊嚴一切華莊嚴一切衣莊嚴一切功德藏莊嚴一切諸佛力莊嚴一切佛國土莊嚴王所處座若蓋若傘幢幡寶物諸莊嚴具頂上寶冠髻中明珠乃至眼耳鼻舌及以牙齒頭頂手足肉血骨髓心腎肝肺大腸小腸厚皮薄皮手足諸指連肉爪甲如是等以身命常作供養帝網重重諸佛菩薩賢聖海衆受此香華雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次供養總持捺麼囉得捺二合得囉二合也引也捺麼末重遏斡矴末日囉二合薩囉不囉二合麻㗚怛二合禰怛達遏怛也啞㗚曷二合矴薩滅屹三二合莫捺重引也怛涅達唵末唧囉二合末唧囉麻曷引末唧囉二合麻曷引矴桚末唧呤麻曷引眉㗚也二合末唧囉二合麻曷磨溺重即舌腭怛末唧哩二合磨曷磨溺慢伸當巴珊葛囉麻捺也末唧哩二合薩㗚末二合葛㗚麻二合啞斡囉捺舌腭眉商𭊁捺末唧囉二合莎引曷引梵音讚佛如來離分別非世超諸數三界諸導師出現皆如是辟如淨日輪不與昏夜合而説某日夜諸佛法如是三世一切劫不與如來合而説三世佛導師法如是直言讚佛如來應正等覺以無量法而得出現非以一緣非以一事如來出現而得成就總相標也此者興大法雲雨大法雨能滅一切衆生煩惱一也能起一切衆生善根二也能止一切衆生見惑三也能成一切智慧法寶四也分別一切衆生心樂五也雨於大悲一味法水隨宜説法無量差別六也先起菩薩諸行智慧次起聲聞善根諸行智慧次起其餘衆生有為善根諸行智慧一味法雨隨器差別七也南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微剎塵土中十信菩薩十住菩薩十行菩薩十回向菩薩十地菩薩等覺菩薩遍法界剎海微塵數菩薩一切海衆南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海衆南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次寶峯開華主山神至入此方便金剛目願共諸衆生往生華藏海極樂淨土中次法界菩提道場中主山神衆南無得入大寂定光明解脫門寶峰開華主山神南無得修習慈善根成熟不可思議數衆生解脫門華林妙髻主山神南無得觀察一切衆生心所樂嚴淨諸根解脫門高幢普照主山神南無得無邊劫海勤精進無厭怠解脫門離塵寶髻主山神南無得以無邊功德光普覺悟解脫門光照十方主山神南無得能自成熟復令衆生捨離愚迷行解脫門大力光明主山神南無得拔一切苦使無有餘解脫門威光普勝主山神南無得演教法光明顯示一切如來功德解脫門微密光輪主山神南無得令一切衆生乃至於夢中增長善根解脫門普眼現見主山神南無得出現無邊大義海解脫門金剛堅固眼主山神南無如是等而為上首其數無量一切主山神十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次普德淨華主地神至普持得見生歡喜願共諸衆生往生華藏海極樂淨土中次法界菩提道場中主地神衆南無得以慈悲心念念普觀一切衆生解脫門普德淨華主地神南無得普現一切衆生福德力解脫門堅福莊嚴主地神南無得普入諸法出生一切佛剎莊嚴解脫門妙華嚴樹主地神南無得修習種種諸三昧令衆生除障垢解脫門普散衆寶主地神南無得令一切衆生常遊戲快樂解脫門淨目觀時主地神南無得示現一切清淨身調伏衆生解脫門金色妙眼主地神南無得了知一切佛功德海天威力解脫門香毛發光主地神南無得普攝持一切衆生言音海解脫門寂音悅意主地神南無得充滿佛剎離垢性解脫門妙華旋髻主地神南無得一切佛法輪所攝持普出現解脫門金剛普持主地神南無如是等而為上首其數無量一切主地神十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次寶峯光耀主城神至如是寶峰之所入願共諸衆生往生華藏海極樂淨土中次法界菩提道場中主城神衆南無得方便利益衆生解脫門寶峰光耀主城神南無得知衆生根教化成熟解脫門妙嚴宮殿主城神南無得常歡喜令一切衆生受諸福德解脫門清淨喜寶主城神南無得救諸怖畏大悲藏解脫門離憂清淨主城神南無得普明了大智慧解脫門華鐙焰眼主城神南無得普方便示現解脫門𦦨幢明現主城神南無得普觀察一切衆生令修廣大福德海解脫門盛福威光主城神南無得開悟一切愚暗衆生解脫門淨光明身主城神南無得觀如來自在力普遍世間調伏衆生解脫門香髻莊嚴主城神南無得能以大光明破一切衆生障礙山解脫門寶峰光目主城神南無如是等而為上首其數無量一切主城神十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次淨莊嚴幢道場神至此妙光神能聽受願共諸衆生往生華藏海極樂淨土中次法界菩提道場中主道場神衆南無得出現供養佛廣大莊嚴具誓願力解脫門淨莊嚴幢道場神南無得現一切衆生前成就廣大菩提行解脫門須彌寶光道場神南無得隨一切衆生心所樂令見佛於夢中為説法解脫門雷音幢相道場神南無得能雨一切難捨衆寶莊嚴具解脫門雨華妙眼道場神南無得能現妙莊嚴道場廣化衆生令成熟解脫門清淨𦦨形道場神南無得隨根説法令生正念解脫門華纓垂髻道場神南無得能以辨才普雨無邊歡喜法解脫門雨寶莊嚴道場神南無得廣稱讚諸佛功德解脫門勇猛香眼道場神南無得示現無邊色相樹莊嚴道場解脫門金剛彩雲道場神南無得菩提樹下寂然不動而充遍十方解脫門蓮華光明道場神南無得顯示如來種種力解脫門妙光照耀道場神南無如是等而為上首其數無量一切道場神十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次寶印手足行神至見已心生大歡喜願共諸衆生往生華藏海極樂淨土中次法界菩提道場中足行神衆南無得普雨衆寶生廣大歡喜解脫門寶印手足行神南無得示現佛身坐一切光色蓮華座令見者歡喜解脫門蓮華光足行神南無得一一心念中建立一切如來衆會道場解脫門最勝華髻足行神南無得舉足發步悉調伏無邊衆生解脫門攝諸善見足行神南無得念念中化現種種蓮華網光明普雨衆寶出妙音聲解脫門妙寶星幢足行神南無得出生無邊歡喜海解脫門樂吐妙音足行神南無得以香風普覺一切道場衆會解脫門旃檀樹光足行神南無得一切毛孔放光明演微妙法音解脫門蓮華光明足行神南無得其身遍出種種光明網普照耀解脫門微妙光明足行神南無得開悟一切衆生令生善根海解脫門積集妙華足行神南無如是等而為上首其數無量一切足行神十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次淨喜境界身衆神至不動光神所觀見願共諸衆生往生華藏海極樂淨土中次法界菩提道場中身衆神衆南無得憶佛往昔誓願海解脫門淨喜境界身衆神南無得光明普照無邊世界解脫門光照十方身衆神南無得大音普覺一切衆生令歡喜調伏解脫門海音調伏身衆神南無得身如虗空周遍住解脫門淨華嚴髻身衆神南無得示一切衆生諸佛境界解脫門無量威儀身衆神南無得令一切飢乏衆生色力滿足解脫門最勝光嚴身衆神南無得除一切衆生煩惱垢解脫門淨光香雲身衆神南無得轉一切衆生愚癡魔業解脫門守護攝持身衆神南無得普於一切世主宮殿中顯示莊嚴相解脫門溥現攝化身衆神南無得普攝一切衆生皆令生清淨善根解脫門不動光明身衆神南無如是等而為上首其數無量一切身衆神十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次妙色那羅延執金剛神至示佛所行處願共諸衆生往生華藏海極樂淨土中次法界菩提道場中執金剛神衆南無得見如來示現無邊色相身解脫門妙色那羅延執金剛神南無得佛身一一毛如日輪現種種光明雲解脫門日輪速疾幢執金剛神南無得化現無量身大神變解脫門須彌華光執金剛神南無得無邊隨類音解脫門清淨雲音執金剛神南無得現為一切世間主開悟衆生解脫門妙臂天主執金剛神南無得普開示一切佛法差別門咸盡無遺解脫門可愛樂光明執金剛神南無得以可愛樂莊嚴具攝一切樹神解脫門大樹雷音執金剛神南無得如來廣大福莊嚴聚皆具足明了解脫門師子王光明執金剛神南無得普觀察險惡衆生心為現威嚴身解脫門密𦦨吉祥目執金剛神南無得普雨一切菩薩莊嚴具摩尼髻解脫門蓮華摩尼髻執金剛神南無如是等而為上首其數無量一切執金剛神十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次普賢菩薩至盡與如來平等法願共諸衆生往生華藏海極樂淨土中南無入不思議境界種種解脫門普賢菩薩摩訶薩十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次淨德妙光菩薩至一切苦難皆消滅願共諸衆生往生華藏海極樂淨土中次法界菩提道場中如來師子之座一切菩薩海衆南無得遍往十方菩薩衆會莊嚴道場解脫門淨德妙光菩薩摩訶薩南無得一念中現無盡成正覺門教化成熟不思議衆生界解脫門普得最勝鐙光照菩薩摩訶薩南無得修習菩薩福德莊嚴出生一切佛國土解脫門普光師子幢菩薩摩訶薩南無得觀察佛神通境界無迷惑解脫門普寶𦦨妙光菩薩摩訶薩南無得於一衆會道場中示現一切佛土莊嚴解脫門普音功德海幢菩薩摩訶薩南無得隨逐如來觀察甚深廣大法界藏解脫門普智光照如來境菩薩摩訶薩南無得親近承事一切諸佛供養藏解脫門普覺悅意聲菩薩摩訶薩南無得出生一切神變廣大加持解脫門普清淨無盡福威光菩薩摩訶薩南無得普入一切世間行出生菩薩無邊行門解脫門普寶髻華幢菩薩摩訶薩南無得能於無相法界中出現一切諸佛境界解脫門普相最勝光菩薩摩訶薩南無如是等而為上首其數無量一切菩薩十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次海月光大明菩薩至一切