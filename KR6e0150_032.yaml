body:
  text: 唐蘭山雲巖慈恩寺護法國師行沙門慧覺依經録宋蒼山載光寺沙門普瑞補注明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閲天台習教觀沙門正止治定第三十二晌次十地位初三善知識會一切恭敬敬禮無盡三寶是諸衆等人各胡跪嚴持香華如法供養願此供海雲遍滿十方界無數閻浮檀金樓閣毗琉璃摩尼綱無數銀樓閣赤真珠摩尼網無數毗琉璃樓閣妙藏摩尼王網無數頗梨樓閣無垢藏摩尼王綱無數光照世間摩尼寶樓閣日藏摩尼王綱無數帝青摩尼寶樓閣妙光摩尼王網無數衆生海摩尼王樓閣𦦨光明摩尼王網無數金剛寶樓閣無能勝幢摩尼王網無數黑旃檀樓閣天曼陀羅華網無數無等香王樓閣種種華網無數摩尼網無數寶鈴網無數天香網無數天華網無數寶形象網無數寶衣帳無數寶蓋帳無數寶樓閣帳無數寶華鬘帳之所彌覆處處建立寶蓋幢幡以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海衆受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次供養總持捺麼囉得捺二合得囉二合也引也捺麼末重遏斡矴末日囉二合薩囉不囉二合麻㗚怛二合禰怛達遏怛也啞㗚曷二合矴薩滅屹三二合莫捺重引也怛涅達唵末𠷌囉二合末𠷌囉麻曷引末𠷌囉二合麻曷引矴桚末𠷌呤麻曷引眉㗚也二合末𠷌囉二合麻曷磨溺重即舌腭怛末𠷌哩二合磨曷磨溺慢伸當巴珊葛囉麻捺也末𠷌哩二合薩㗚末二合葛㗚麻二合啞斡囉捺舌腭眉商𭊁末末𠷌囉二合莎引曷引梵音讚佛佛演一妙音周聞十方界衆音悉具足法雨皆充滿一一言詞海一切隨類音一一佛剎中轉於淨法輪法界諸國土一一微塵中如來解脫力於彼普現身直言讚佛諸佛圓滿常遍滿普照一切微塵剎互相明現色無邊一一圓滿遍法界如來毛孔出光雲廣大難思無盡極遍照一切衆生心一切煩惱悉除滅如來毛孔出華雲一一神通無分限於諸衆生悉調伏一一衆苦悉除滅如來廣大圓滿音光音出於語言海雨大法雨遍羣生彼等令悟菩提法佛昔無邊劫海中為攝受我修衆行我今得見於佛面十方剎海皆現影如來出現諸世間數等一切諸衆生境界甚深難趣入非我智慧之所知南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住𦦨魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十回向菩薩十地菩薩等覺菩薩遍法界剎海微塵數菩薩一切海衆南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海衆南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中第一婆珊婆眼底主夜神破癡暗解脫法門經云爾時善財童子至殷勤瞻仰辭退而去願共諸衆生往生華藏海極樂淨土中次婆珊婆演底夜神得法處佛南無自在光劫出生妙寶世界一切法雷音王佛等五億佛次婆珊婆演底主夜神得解脫處佛南無無憂遍照劫離垢光明世界須彌幢寂靜妙眼佛等五百佛次婆珊婆演底主夜神南無此閻浮提摩竭提國迦毗羅城中得菩薩破一切衆生癡暗法光明解脫門婆珊婆演底主夜神十方淨歸命滅罪增淨信願生華藏海極樂淨土中第二普德淨光主夜神得寂靜禪定樂普游步解脫法門經云爾時善財童子至殷勤瞻仰辭退而去願共諸衆生往生華藏海極樂淨土中南無此摩竭提國菩提場內得菩薩寂靜禪定樂普遊步解脫門普德淨光主夜神十方盡歸命滅罪增淨信願生華藏海極樂淨土中第三喜目觀察衆生夜神得大勢力普喜幢解脫法門經云爾時善財童子至殷勤瞻仰辭退而去願共諸衆生往生華藏海極樂淨土中次喜目觀察衆生主夜神發心處佛初寂靜音劫中摩尼光殺內諸佛南無功德海佛南無功德燈佛南無妙寶幢佛南無虗空智佛南無蓮華藏佛南無無礙慧佛南無法月王佛南無智燈輪佛南無寶焰山燈王佛南無三世華光音佛南無如是等一切諸佛次天勝劫中寶光剎內諸佛南無月光輪佛南無日燈佛南無光幢佛南無寶須彌佛南無華焰佛南無燈海佛南無熾然佛南無天藏佛南無光明王幢佛南無普智光王佛南無如是等一切諸佛次梵光明劫中蓮華燈世界內諸佛南無寶須彌佛南無功德海佛南無法界音佛南無法震雷佛南無法幢佛南無地光佛南無法力光佛南無虗空覺佛南無須彌光佛南無功德雲佛南無如是等一切諸佛次功德月劫中功德幢世界內諸佛南無乾闥婆王佛南無大樹王佛南無功德須彌佛南無寶眼佛南無盧舍那佛南無光莊嚴佛南無法海佛南無光勝佛南無賢勝佛南無法王佛南無如是等一切諸佛次寂靜慧劫中金剛寶剎內諸佛南無金剛臍佛南無無礙力佛南無法界影佛南無十方燈佛南無悲光佛南無戒海佛南無忍燈輪佛南無法輪光佛南無光莊嚴佛南無寂靜光佛南無如是等一切諸佛次善出現劫中香燈雲剎內諸佛南無廣稱佛南無法海佛南無自在王佛南無功德雲佛南無法勝佛南無天冠佛南無智焰佛南無虗空音佛南無普生殊勝佛南無眉間勝光明佛南無如是等一切諸佛次集堅固王劫中寶幢王剎內諸佛南無功德輪佛南無寂靜音佛南無功德海佛南無日光王佛南無功德王佛南無須彌相佛南無法自在佛南無功德王佛南無福須彌佛南無光明王佛南無如是等一切諸佛次妙勝主劫中寂靜音剎內諸佛南無華聚佛南無海藏佛南無功德生佛南無天王髻佛南無摩尼藏佛南無真金山佛南無寶聚尊佛南無法幢佛南無勝財佛南無智慧佛南無如是等一切諸佛次千功德劫中善化幢燈世界內諸佛南無寂靜幢佛南無奢摩他佛南無百燈王佛南無寂靜光佛南無雲密陰佛南無日大明佛南無法燈光佛南無殊勝焰佛南無天勝藏佛南無大吼音佛南無如是等一切諸佛次無著莊嚴劫中無邊光世界內諸佛南無功德須彌佛南無虗空心佛南無具莊嚴佛南無法雷音佛南無法界聲佛南無妙音雲佛南無照十方佛南無法海音佛南無功德海佛南無功德幢佛南無妙燈功德幢佛南無如是等一切諸佛次喜目觀察衆生主夜神南無此菩提場得大勢力普喜幢解脫門喜目觀察衆生主夜神南無喜目觀察其身一一毛孔中出等衆生數無量變化往十方界隨衆生心說十度行一切身雲南無喜目觀察一一毛孔中出無量相似欲色四王諸天八部雜類諸神周遍十方滿法界中現衆生身說本行身一切身雲十方盡歸命滅罪增淨信願生華藏海極樂淨土中次百萬障門懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖衆世出世神慈悲本願放大光明照於法會證盟護念哀憫攝受願我及一切衆生海自從無始直至今時業海無盡帝網重重百萬障門惑業發露懺悔普賢行品云諸佛世尊為諸衆生無智作惡計我我所執著於身顛倒疑惑邪見分別與諸結縛恆共相應隨生死流遠如來道故出興於世佛子我不見一法為大過失如諸菩薩於他菩薩起嗔心者何以故佛子若諸菩薩於餘菩薩起嗔恚心即成就百萬障門故何等為百萬障所謂不見菩提障不聞正法障生不淨世界障生諸惡趣障生諸難處障多諸疾病障多被謗毀障生頑鈍諸趣障壞失正念障缺少智慧障眼障耳障鼻障舌障身障意障惡知識障惡伴黨障樂習小乘障樂近凡庸障不信樂大威德人障樂與離正見人同住障生外道家障住魔境界障離佛正教障不見善友障善根留難障增不善法障得下劣處障生邊地障生惡人家障生惡神中障生惡龍惡夜叉惡乾闥婆惡阿修羅惡迦樓羅惡緊那羅惡摩睺羅伽惡羅剎中障是十信障今皆懺悔不樂佛法障習童蒙法障樂著小乘障不樂大乘障性多驚怖障心常憂惱障愛著生死障不專佛法障不喜見聞佛自在神通障是十住障今皆懺悔不得菩薩諸根障不行菩薩淨行障退怯菩薩深心障不生菩薩大願障不發一切智心障於菩薩行懈怠障不能淨治諸業障不能攝取大福障智力不能明利障斷於廣大智慧障不獲持菩薩諸行障是十行障今皆懺悔樂誹謗一切智語障遠離諸佛菩提障樂住衆魔境障界不專修佛境界障不決定發菩薩弘誓障是十回向障今皆懺悔不樂與菩薩同住障不求菩薩善根障性多見疑障心常愚暗障不能行菩薩平等施故起不捨障不能持如來戒故起破戒障不能入堪忍門故起愚癡惱害嗔恚障不能行菩薩大精進故起懈怠垢障不能得諸三昧故起散亂障不修治般若波羅蜜故起惡慧障於處非處中無善巧障於度衆生中無方便障於菩薩智慧中不能觀察障於菩薩出離法中不能了知障不成就菩薩十種廣大眼故眼如生盲障耳不聞無礙法故口如啞羊障不具相好故鼻根破壞障不能辨了衆生語言故成就舌根障輕賤衆生故成就身根障心多狂亂故成就意根障不持三種律儀故成就身業障恆起四種過失故成就語業障多生貪瞋邪見故成就意業障賊心求法障斷絶菩薩境界障於菩薩勇猛法中心生退怯障於菩薩出離道中心生懶惰障於菩薩智慧光明門中心生止息障於菩薩念力中心生劣弱障於如來教法中不能住持障於菩薩離生道不能親近障於菩薩無失壞道不能修習障隨順二乘正位障遠離三世諸佛菩薩種性障是十地障今皆懺悔佛子若菩薩於諸菩薩起一嗔心則成就如是等百萬障門何以故佛子我不見有一法為大過惡如諸菩薩於餘菩薩起瞋心者今皆懺悔我等為無明所覆不識瞋恚罪因今遇道場方始覺知歸命毗盧遮那如來及一切賢聖海衆燒香散華種種惑障發露懺悔不敢覆藏由此因緣我及一切衆生海一切煩惱願皆清淨次懺悔滅罪印呪唵薩㗚末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三遍百劫積集罪一念盡蕩除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪嗔癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白衆等聽說經中無常偈晝夜暫時不可停此身壽命常減滅更無餘人增壽命我今如何不歸死若我病臥床褥時雖諸親族共圍繞將捨壽時極衆苦惟我一人獨自受爾時惟要其善法我今於彼未曾修彼既無有救護者我當爾時奈之何
