水陸飛行皆被殺害設自不食為貪價值而作是事大慧世復有人心無慈愍專行慘曓猶如羅剎若見眾生其身充盛便生肉想言此可貪大慧世無有肉非是自殺亦非他殺心不疑殺而可食者以是義故我許聲聞食如是肉大慧未來之世有愚癡人於我法中而為出家妄說毗尼壞亂正法誹謗於我言聽食肉亦自曾食大慧我若聽許聲聞食肉我則非是住慈心者修觀行者行頭陀者趣大乘者云何而勸諸善男子及善女人於諸眾生生一子想斷一切肉大慧我於諸處設遮十種許三種者是漸禁斷令其修學今此經中自死他殺凡是肉者一切悉斷大慧我不曾許弟子食肉亦不現許亦不當許大慧凡是肉食於出家人悉是不淨大慧若有癡人謗言如來聽許食肉亦自食者當知是人惡業所纏必當永墮不饒益處大慧我之所有諸聖弟子尚不食於凡夫段食況食血肉不淨之食大慧聲聞緣覺及諸菩薩尚惟法食豈況如來大慧如來法身非雜食身大慧我已斷除一切煩惱我已浣滌一切習氣我已善擇諸心智慧大悲平等普觀眾生猶如一子云何而許聲聞弟子食於子肉何況自食作是說者無有是處爾時世尊重說頌曰悉曾為親屬眾穢所成長恐怖諸含生是故不應食一切肉與𦵇韮蒜及諸酒如是不淨物修行者遠離亦常離麻油及諸穿孔牀以彼諸細蟲於中大驚怖飲食生放逸放逸生邪覺從覺生於貪是故不應食邪覺生貪故心為貪所醉心醉長愛欲生死不解脫為利殺眾生以財取諸肉二俱是惡業死墮呌喚獄不想不教求此三種名淨世無如是肉食者我呵責更互相食噉死墮惡獸中臭穢而癲狂是故不應食獵師旃荼羅屠兒羅剎娑此等種中生斯皆食肉報象脇與大雲涅槃央掘摩及此楞伽經我皆制斷肉食已無愧慚生生常癲狂諸佛及菩薩聲聞所嫌惡先說見聞疑已斷一切肉以其惡習故愚者妄分別如貪障解脫肉等亦復然若有食之者不能入聖道未來世眾生於肉愚癡說言此淨無罪佛聽我等食淨肉尚如藥猶如子肉想是故修行者知量而行乞安住慈心者我說常厭離師子及虎狼應共同遊止食肉背解脫及違聖表相令眾生生怖是故不應食若於酒肉等一切皆不食必生賢聖中豐財具智慧又不食肉經云寧可自燒及挑眼不取斷命而食肉諸佛演說慈悲法彼法中說行慈者出腦敲骨皆許可不應食彼眾生肉若違佛法食肉者彼人修慈不圓滿常受短壽及多病沈生死中不成佛又大涅槃經云迦葉菩薩復白佛言世尊云何如來不聽食肉佛言夫食肉者斷大慈種迦葉又言如來何故先聽比丘食三種淨肉佛言是三種淨肉隨事漸制又何因緣故不聽食十種不淨肉耶言十種者人蛇象馬驢犬師子猪狐猴猻是也又何以故十種不淨乃至九種清淨而復不聽佛言彼亦是因事漸次而制如來所制一切禁戒各有異意異意故聽食三種淨肉異想故斷十種肉異想故一切悉斷及自死者我從今日制諸弟子不得復食一切肉也善男子如是菩薩清淨之食猶尚不食況當食肉罪報懺悔又首楞嚴經云我滅度後末法之中多此鬼神熾盛世間自言食肉得菩提路阿難我令比丘食五淨肉此肉皆我神力化生本無命根汝婆羅門地多蒸溼加以砂石草萊不生我以大悲神力所加因大慈悲假名為肉汝得其味奈何如來滅度後食眾生肉名為釋子廣行貪染噉肉作善知識令諸眾生墮愛見坑失菩提道罪報懺悔我等為無明所覆不識食肉罪因今遇道場方乃覺知歸命毗盧遮那如來及一切賢聖海眾燒香散華食肉罪業發露懺悔不敢覆藏由此因緣我及法界眾生海食肉重罪悉皆清淨次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三徧百劫積集罪一念悉盪除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白眾等聽說經中無常偈無上諸世尊緣覺聲聞眾常捨無常身何況諸凡夫父母及妻子兄弟并眷屬因觀生死隔云何不愁歎
