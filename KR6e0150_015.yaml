body:
  text: 唐蘭山雲巖慈恩寺護法國師行沙門慧覺依經錄宋蒼山載光寺沙門普瑞補註明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閱天台習教觀沙門正止治定第十五晌次百海中後五十海佛會一切恭敬敬禮無盡三寶是諸眾等人各胡跪嚴持香華如法供養願此供海雲徧滿十方界或施寶車或施金車悉妙莊嚴鈴網覆上寶帶垂下或施上妙琉璃之車無量珍奇以為嚴飾或復施與白銀之車覆以金網駕以駿馬或復施與無量雜寶所莊嚴車覆以寶網駕以香象或復施與旃檀之車妙寶為輪雜寶為蓋建寶師子座如是等諸妙寶車及以種種供物常作供養帝網重重諸佛菩薩賢聖海眾受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次大慧施印呪唵捺麻緊薩㗚末二合怛達引遏怛啞斡浪雞矴三末重囉三末重囉吽梵音讚佛如來普現前令眾生信喜佛體不可得彼亦無所見若能於世間遠離一切著無礙心歡喜於法得開悟若能如是知心意及諸法一切悉知見疾得成如來直言讚佛如來淨妙色身者徧一切處徧一切眾生徧一切法徧一切國土非至非不至如來身無身故為眾生故示現其身以智光明普照明故令一切眾生世出世間諸善根業皆得成就以無量事普益眾生滅惡生善破愚為智常放無礙智慧光明先照菩薩摩訶薩等諸大山王次照圓覺次照聲聞次照決定善根眾生乃至邪定亦皆普及為作未來利益因緣令成熟故南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十迴向菩薩十地菩薩等覺菩薩徧法界剎海微塵數菩薩一切海眾南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶墖寺宇一切佛事又於法藏及講法處菩薩賢聖一切海眾南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中第六銀蓮華妙莊嚴香水海等十海經云諸佛子彼蓮華因陀羅網至道場眾會音為體願共諸眾生往生華藏海極樂淨土中初能持剎種南無彼華藏因陀羅網香水海外次銀蓮華妙莊嚴香水海普徧行世界種中諸佛道場一切海眾南無次毗琉璃竹密𦦨雲香水海普出十方音世界種中諸佛道場一切海眾南無次十方光𦦨聚香水海恒出變化分布十方世界種中諸佛道場一切海眾南無次出現真金摩尼幢香水海金剛幢相世界種中諸佛道場一切海眾南無次平等大莊嚴香水海法界勇猛旋世界種中諸佛道場一切海眾南無次寶華藂無盡光香水海無邊淨光明世界種中諸佛道場一切海眾南無次妙金幢香水海演說微密處世界種中諸佛道場一切海眾南無次光影徧照香水海普莊嚴世界種中諸佛道場一切海眾南無次寂音香水海現前垂布世界種中諸佛道場一切海眾南無有如是等不可說佛剎微塵數香水海世界種中諸佛道場一切海眾十方盡歸命滅罪增淨信願生華藏海極樂淨土中南無其最近輪圍山密𦦨雲幢香水海一切光莊嚴世界種中諸佛道場一切海眾十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云於此最下方有世界至號威德絕倫無能制伏願共諸眾生往生華藏海極樂淨土中次所持世界南無於此最下方淨眼莊嚴世界金剛月徧照十方佛道場一切海眾南無佛剎微塵數世界周匝圍繞諸佛道場一切海眾南無此上過十佛剎微塵數世界與金剛幢世界齊等蓮華德世界大精進善覺慧佛道場一切海眾南無此上過三佛剎微塵數世界外與娑婆世界齊等金剛密莊嚴世界娑羅王幢佛道場一切海眾南無此上過七佛剎微塵數世界外淨海莊嚴世界威德絕倫無能制伏佛道場一切海眾南無如是等不可說佛剎微塵數世界諸佛道場一切海眾十方盡歸命滅罪增淨信願生華藏海極樂淨土中第七一切寶光明徧照香水海等十海經云諸佛子彼積集寶香至入一切智門音聲為體願共諸眾生往生華藏海極樂淨土中初能持剎種南無彼積集寶香藏香水海外次一切寶光明徧照香水海無垢稱莊嚴世界種中諸佛道場一切海眾南無次眾寶華開敷香水海虗空相世界種中諸佛道場一切海眾南無次吉祥幄徧照香水海無礙光普莊嚴世界種中諸佛道場一切海眾南無次旃檀樹華香水海普現十方旋世界種中諸佛道場一切海眾南無次出生妙色寶香水海勝幢周徧行世界種中諸佛道場一切海眾南無次普生金剛華香水海現不思議莊嚴世界種中諸佛道場一切海眾南無次心王摩尼輪嚴飾香水海示現無礙佛光明世界種中諸佛道場一切海眾