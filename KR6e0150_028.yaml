body:
  text: 唐蘭山雲巖慈恩寺護法國師行沙門慧覺依經録宋蒼山載光寺沙門普瑞補注明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閲天台習教觀沙門正止治定第二十八晌次十住位中初五善知識會一切恭敬敬禮無盡三寶是諸衆等人各胡跪嚴持香華如法供養願此供海雲遍滿十方界十千金剛網十千種帳十千種蓋十千繒綺十千珠瓔珞周遍交絡十千衣服十千光明而為照曜天妙華天末香天華鬘天雜香天寶衣天寶雲天莊嚴具雲天諸音樂不鼓自鳴放大光明又出妙音聲以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海衆受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次運心供養以二手金剛合掌置于頂上應誦此呪唵薩㗚末二合㗚達二合眉嗚𠹌遏二合矴切身悉癹囉兮慢引遏遏捺竿莎引訶梵音讚佛若佛菩薩等不出於世間無有一衆生而能得安樂如來等正覺及諸賢聖衆出現於世間能與衆生樂若見如來者為得大善利聞佛名生信則是世間塔直言讚佛若有見正覺解脫離諸漏不著一切世彼非正道眼若有知如來體相無所有修習得明了此人疾作佛能見此世界其心不動搖於佛身亦然當成聖智者若於諸佛法其心了平等二念不現前當踐難思位若見佛及身平等而安住無住無所入當成難遇者色受無有數想行識亦然若能如是智當作大牟尼世及出世見一切皆超越而能善知法當成大光耀若於一切知發生回向心見心無所生當獲大名稱衆生無有心亦復無有壞若得如是知當成無上道一中解無量無量中解一了彼互生起當成無所畏南無大方廣佛華嚴經中華藏世界海本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十回向菩薩十地菩薩等覺菩薩遍法界剎海微塵數菩薩一切海衆南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海衆南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中第一德雲比丘憶念一切諸佛境界智慧光明普見解脫法門經云爾時善財童子向勝樂至右繞觀察辭退而去願共諸衆生往生華藏海極樂淨土中次德雲比丘所見佛南無東方一佛南無東方二佛南無東方十佛南無東方百佛南無東方千佛南無東方百千佛南無東方億佛南無東方百億佛南無東方千億佛南無百千億佛南無那由他億佛南無百那由他億佛南無千那由他億佛南無無數佛南無無量佛南無無邊佛南無無等佛南無不可數佛南無不可稱佛南無不可思佛南無不可量佛南無不可説佛南無不可説不可説佛南無閻浮提微塵數佛南無四天下微塵數佛南無千世界微塵數佛南無二千世界微塵數佛南無三千世界微塵數佛南無十佛剎微塵數佛南無百佛剎微塵數佛南無千佛剎微塵數佛南無百億佛剎微塵數佛南無千億佛剎微塵數佛南無百千億佛剎微塵數佛南無那由他億佛剎微塵數佛南無乃至不可説不可説佛剎微塵數佛南無如東方南西北方四維上下亦復如是多佛次德雲比丘南無勝樂國妙峰山所解普見諸佛無量法門德雲比丘十方盡歸命滅罪增淨信願生華藏海極樂淨土中第二海雲比丘普眼解脫法門經云爾時善財童子至右繞瞻仰辭退而去願共諸衆生往生華藏海極樂淨土中次海雲比丘聞法處佛南無此大蓮華上結跏趺坐其身至有頂者如來次海雲比丘南無海門國得普眼解脫法門海雲比丘十方盡歸命滅罪增淨信願生華藏海極樂淨土中第三善住比丘無礙解脫法門經云爾時善財童子至右繞瞻仰辭退而行願共諸衆生往生華藏海極樂淨土中南無南方六千由旬楞伽道邊海岸聚落得無礙解脫門無量無數天龍八部恭敬供養善住比丘十方盡歸命滅罪增淨信願生華藏海極樂淨土中第四彌伽大士妙音陀羅尼光明解脫法門經云爾時善財童子至戀慕瞻仰辭退而行願共諸衆生往生華藏海極樂淨土中南無南方自在城中參得無量菩薩妙音陀羅尼光明法門彼十千人前後圍繞彌伽善醫王十方盡歸命滅罪增淨信願生華藏海極樂淨土中第五解脫長者如來無礙莊嚴解脫法門經云爾時善財童子至諸善法故辭退而行願共諸衆生往生華藏海極樂淨土中次解脫長者所見佛南無東方閻浮檀金光明世界中龍自在王如來毗盧遮那藏菩薩等道場一切海衆南無南方速疾力世界中普香如來心王菩薩等道場一切海衆南無西方香光世界中須彌燈王如來無礙心菩薩等道場一切海衆南無北方袈裟幢世界中不可壞金剛如來金剛步勇猛菩薩等道場一切海衆南無東北方一切上妙寶世界中無所得境界眼如來無所得善變化菩薩等道場一切海衆南無東南方香焰光音世界中香燈如來金剛焰慧菩薩等道場一切海衆南無西南方智慧日普光明世界中法界輪幢如來現一切變化幢菩薩等道場一切海衆南無西北方普清淨世界中一切佛寶高勝幢如來法幢王菩薩等道場一切海衆南無上方佛次第出現無盡世界中無邊智慧光圓滿幢如來法界門幢王菩薩等道場一切海衆南無下方佛光明世界中無礙智幢如來一切世間剎幢王菩薩等道場一切海衆南無如是等十方各十佛剎微塵數一切如來南無安樂世界中阿彌陀如來南無旃檀世界中金剛光明如來南無妙香世界中寶光明如來南無蓮華世界中寶蓮華光明如來南無妙金世界中寂靜光如來南無妙喜世界中不動如來南無善住世界中師子如來南無鏡光明世界中月覺如來南無寶師子莊嚴世界中毗盧遮那如來次解脫長者南無南方住林聚落中得如來無礙莊嚴解脫門解脫長者十方盡歸命滅罪增淨信願生華藏海極樂淨土中次十二類生業報懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖衆世出世神慈悲本願放大光明照於法會證明護念哀愍攝受願我及一切衆生海自從無始直至今時業海無盡帝網重重十二業報類生一切罪業發露懺悔大涅槃經云菩薩摩訶薩滅除有餘有餘有三一者煩惱餘報二者餘業三者餘有善男子云何名為煩惱餘報若有衆生習近貪欲是報熟故墮於地獄從地獄出受畜生身所謂鴿鴛鴦鸚鵡耆婆耆婆舍利伽鳥青魚鱉獼猴麞鹿若得人身受黃門形女人二根無根淫女若得出家犯初重戒是名餘報罪報懺悔復次善男子若有衆生以殷重心習近嗔恚是報熟故墮於地獄從地獄出受畜生身所謂毒蛇具四種毒見毒觸毒齧毒歔毒師子虎狼熊羆貓狸鷹之屬若得人身具足十六諸惡律儀若得出家犯第二重戒是名餘報罪報懺悔復次善男子若有修行愚癡之人是報熟時墮於地獄從地獄出受畜生身所謂象豬牛羊水牛蚤虱蚊虻蟻子等形若得人身聾盲喑啞癃殘背瘻諸根不具不能受法若得出家諸根暗鈍喜犯重戒乃至五殘是名餘報罪報懺悔復次善男子若有修習憍慢之人是報熟時墮於地獄從地獄出受畜生身所謂糞蟲駝驢犬馬若生人中受奴婢身貧窮乞丐或時出家常為衆生之所輕賤破第四戒是名餘報如是等名煩惱餘報如是餘報菩薩摩訶薩以能修習大涅槃故悉得除滅罪報懺悔云何餘業謂一切凡夫業一切聲聞業須陀洹人受七有業斯陀含人受二有業阿那含人受色有業是名餘業如是餘業菩薩摩訶薩以能修習大涅槃故悉得斷除罪報懺悔云何餘有阿羅漢得阿羅漢果辟支佛得辟支佛果無業無結而轉二果是名餘有罪報懺悔如是三種有餘之法菩薩修習大乘大涅槃經故得除滅是名菩薩摩訶薩滅除餘有罪報懺悔楞嚴經云佛告阿難當知妙性圓明離諸名相本來無有世界衆生因妄有生因生有滅生滅名妄滅妄名真是稱如來無上菩提及大涅槃二轉依號阿難汝今欲修真三摩地直詣如來大涅槃者先當識此衆生世界二顛倒因顛倒不生斯則如來真三摩地阿難云何名為衆生顛倒阿難由性明心性明圓故因明發性性妄見生從畢竟無成究竟有此有所有非因所因住所住相了無根本依此無住建立世界及諸衆生迷本圓明是生虗妄妄性無體非有所依將欲復真欲真已非真真如性非真求復宛成非相非生非住非心非法展轉發生生力發明熏以成業同業相感因有感業相滅相生由是故有衆生顛倒罪報懺悔阿難云何名為世界顛倒是有所有分段妄生因此界立非因所因無住所住遷流不住因此世成三世四方和合相涉變化衆生成十二類是故世界因動有聲因聲有色因色有香因香有觸因觸有味因味知法六亂妄想成業性故十二區分由此輪轉是故世間聲香味觸窮十二變為一旋復乘此輪轉顛倒相故是有世界卵生胎生溼生化生有色無色有想無想若非有色若非無色若非有想若非無想罪報懺悔阿難由因世界虗妄輪回動顛倒故和合氣成八萬四千飛沈亂想如是故有卵羯邏藍流轉國土魚鳥龜蛇其類充塞罪報懺悔由因世界雜染輪回欲顛倒故和合滋成八萬四千橫竪亂想如是故有胎遏蒲曇流轉國土人畜龍仙其類充塞罪報懺悔由因世界執著輪回趣顛倒故和合暖成八萬四千翻覆亂想如是故有溼相蔽尸流轉國土含蠢蠕動其類充塞罪報懺悔由因世界變易輪回假顛倒故和合觸成八萬四千新故亂想如是故有化相羯南流轉國土轉蛻飛行其類充塞罪報懺悔由因世界留礙輪回障顛倒故和合著成八萬四千精耀亂想如是故有色相羯南流轉國土休咎精明其類充塞罪報懺悔由因世界銷散輪回惑顛倒故和合暗成八萬四千陰隱亂想如是故有無色羯南流轉國土空散銷沈其類充塞罪報懺悔由因世界罔象輪回影顛倒故和合憶成八萬四千潛結亂想如是故有想相羯南流轉國土神鬼精靈其類充塞罪報懺悔由因世界愚鈍輪回癡顛倒故和合頑成八萬四千枯稿亂想如是故有無想羯南流轉國土精神化為土木金石其類充塞罪報懺悔由因世界相待輪回偽顛倒故和合染成八萬四千因依亂想如是故有非有色相成色羯南流轉國土諸水母等以蝦為目其類充塞罪報懺悔由因世界相引輪回性顛倒故和合呪成八萬四千呼召亂想如是故有非無色相無色羯南流轉國土呪詛魘生其類充塞罪報懺悔由因世界合妄輪回罔顛倒故和合異成八萬四千回護亂想如是故有非有想相成相羯南流轉國土彼蒲盧等異質相成其類充塞罪報懺悔由因世界怨害輪回殺顛倒故和合怪成八萬四千食父母想如是故有非無想相無想羯南流轉國土如土梟等附塊為兒及破鏡鳥以毒樹果抱為其子子成父母皆遭其食其類充塞罪報懺悔是名衆生十二種類阿難如是衆生一一類中亦各各具十二顛倒猶如捏目亂華發生顛倒妙圓真淨明心具足如斯虗妄亂想罪報懺悔汝今修證佛三摩地於是本因元所亂想立三漸次方得除滅如淨器中除去毒蜜以諸湯水并雜灰香洗滌其器後貯甘露云何名為三種漸次一者修習除其助因二者真修刳其正性三者增進違其現業云何助因阿難如是世界十二類生不能自全依四食住所謂段食觸食思食識食是故佛説一切衆生皆依食住阿難一切衆生食甘故生食毒故死是諸衆生求三摩地當斷世間五種辛菜是五種辛熟食發淫生啖增恚如是世界食辛之人縱能宣説十二部經十方天仙嫌其臭穢咸皆遠離諸餓鬼等因彼食次舐其唇吻常與鬼住福德日銷長無利益是食辛人修三摩地菩薩天仙十方善神不來守護大力魔王得其方便現作佛身來為説法非毀禁戒讚淫怒癡命終自為魔王眷屬受魔福盡墮無間獄阿難修菩提者永斷五辛是則名為第一增進修行漸次云何正性阿難如是衆生入三摩地要先嚴持清淨戒律永斷淫心不餐酒肉以火淨食無啖生氣阿難是修行人若不斷淫及與殺生出三界者無有是處當觀淫欲猶如毒蛇如見怨賊先持聲聞四棄八棄執身不動後行菩薩清淨律儀執心不起禁戒成就則於世界永無相生相殺之業偷劫不行無相負纍亦於世間不還宿債是清淨人修三摩地父母肉身不須天眼自然觀見十方世界覩佛聞法親奉聖旨得大神通遊十方界宿命清淨得無艱險是則名為第二增進修行漸次云何現業阿難如是清淨持禁戒人心無貪淫於外六塵不多流逸因不流逸旋元自歸塵既不緣根無所偶反流全一六用不行十方國土皎然清淨譬如琉璃內懸明月身心快然妙圓平等獲大安隱一切如來密圓淨妙皆現其中是人即獲無生法忍從是漸修隨所發行安立聖位是則名為第三增進修行漸次我等為無明所覆不識業報十二類生罪因今遇道場乃能覺知歸命毗盧遮那如來及一切賢聖海衆燒香散華十二類生一切業報發露懺悔不敢覆藏由此因緣我及法界衆生海一切業報願皆清淨次懺悔滅罪印唵薩㗚末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三遍百劫積集罪一念盡蕩除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪嗔癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白衆等聽説經中無常偈如睡眠中所覺受及與僧作諸佛事以此為其所緣境諸過去事無所見我今於此現身上無量怨親已經過為於彼等所造業堪可怖畏向前待是知此身不堅久我今不解此事故皆因愚癡及貪嗔造作無量諸罪業
