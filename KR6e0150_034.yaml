body:
  text: 唐蘭山雲巖慈恩寺護法國師行沙門慧覺依經録宋蒼山載光寺沙門普瑞補注明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閲天台習教觀沙門正止治定第三十四晌次十地位中第五第六善知識會一切恭敬敬禮無盡三寶是諸衆等人各胡跪嚴持香華如法供養願此供海雲遍滿十方界微妙香華種種色華無量奇妙華喜見華可喜樂華一切時華天華人華世所珍愛華甚芬馥悅意華以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海衆受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次不空摩尼印呪唵啞麼遏布麻禰巳能麻末𠷌呤怛達遏怛眉浪雞矴薩慢怛不囉薩囉吽梵音讚佛毗盧遮那佛能轉正法輪法界諸國土如雲悉周遍十方衆所有諸大世界海佛神通願力處處轉法輪一切諸剎士廣大衆會中名號各不同隨緣演妙法直言讚佛正覺功德大智山普達境界到彼岸等於三世諸如來是故我今恭敬禮已升無相境界岸而現妙相莊嚴身放於離垢千光明破魔軍衆咸令盡十方所有諸世界悉皆震動無有餘未曾恐怖一衆生善逝威神力如是虗空法界性平等已能如是而安住一切舍生無所量成就最上菩提道於諸境界智無礙與一切佛同其性南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住𦦨魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十回向菩薩十地菩薩等覺菩薩遍法界剎海微塵數菩薩一切海衆南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海衆南無大願摜甲求生淨土未濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中第五寂靜音海主夜神知念念出生廣大喜莊嚴解脫法門經云爾時善財童子至殷勤瞻仰辭退而去願共諸衆生往生華藏海極樂淨土中次寂靜音海夜神得法處佛初普光幢劫中普滿妙藏剎中諸佛南無不退轉法界音如來南無法樹威德山如來南無一切法海音聲王如來南無寶光明燈幢王如來南無功德須彌光如來南無法雲音聲王如來南無智燈照曜王如來南無法勇妙德幢如來南無師子勇猛法智燈如來南無智力山王如來南無清淨光金莊嚴世界普光明幢劫中有如是等佛剎微塵數一切如來次華藏莊嚴世界海堪忍世界中佛南無迦羅鳩孫䭾如來南無拘那含牟尼如來南無迦葉如來南無毗盧遮那如來南無十不可說不可說佛剎微塵數法界安立海見彼一切法界安立海一切佛剎所有微塵一一塵中有十不可說不可說佛剎微塵數佛國土一一佛土皆有毗盧遮那如來南無如是等不可說佛剎微塵數諸佛道場一切海衆次寂靜音海主夜神南無華藏莊嚴世界中得念念出生廣大喜莊嚴解脫門寂靜音海主夜神十方盡歸命滅罪增淨信願生華藏海極樂淨土中第六守護一切城主夜神知甚深自在妙音解脫法門經云爾時善財童子至殷勤瞻仰辭退而願共諸衆生往生華藏海極樂淨土中次護一切城主夜神得法處佛初離垢光明劫中法界功德雲世界中諸佛南無法須彌山微塵數一切如來南無法海雷音光明王佛南無離垢法光明佛南無法輪光明髻佛南無法日功德雲佛南無法海妙音王佛南無法日智慧燈佛南無法華幢雲佛南無法𦦨山幢王佛南無甚深法功德月佛南無法智普光藏佛南無開示普智藏佛南無功德藏山王佛南無普門須彌賢佛南無一切法精進幢佛南無法寶華功德雲佛南無寂靜光明髻佛南無法光明慈悲月佛南無功德𦦨海佛南無智日普光明佛南無普賢圓滿智佛南無神通智光王佛南無福德華光燈佛南無智師子幢王佛南無日光普照王佛南無須彌寶莊嚴相佛南無日光普照佛南無法王功德月佛南無開敷蓮華妙音雲佛南無日光明相佛南無普光明妙法音佛南無師子金剛那羅延無畏佛南無普智勇猛幢佛南無普開法蓮華身佛南無功德妙蓮華海佛南無道場功德月佛南無法炬熾然月佛南無普光明髻佛南無法幢燈佛南無金剛海幢雲佛南無名稱山功德雲佛南無栴檀妙月佛南無普妙光明華佛南無照一切衆生光明王佛南無功德蓮華藏佛南無香𦦨光明王佛南無波頭摩華因佛南無衆相山普光明佛南無普名稱幢佛南無須彌普門光佛南無功德法城光佛南無大樹山光明佛南無普德光明幢佛南無功德吉祥相佛南無勇猛法力幢佛南無法輪光明音佛南無功德山智慧光佛南無無上妙法月佛南無法蓮華淨光幢佛南無寶蓮華光明藏佛南無光𦦨雲山燈佛南無普覺華佛南無種種功德𦦨須彌藏佛南無圓滿光山王佛南無福德雲莊嚴佛南無法山雲幢佛南無功德山光明佛南無法日雲燈王佛南無法雲名稱王佛南無法輪雲佛南無開悟菩提智光幢佛南無普照法輪月佛南無寶山威德賢佛南無賢德廣大光佛南無普智雲佛南無法力功德山佛南無功德香𦦨王佛南無金色摩尼山妙音聲佛南無頂髻出一切法光明雲佛南無法輪熾盛光佛南無無上功德山佛南無精進炬光明雲佛南無三昧印廣大光明冠佛南無寶光明功德王佛南無法炬寶蓋音佛南無普照虗空界無畏法光明佛南無月相莊嚴幢佛南無光明𦦨山雲佛南無照無障礙法虗空佛南無開顯智光身佛南無世主德光明音佛南無一切法三昧光明音佛南無法音功德藏佛南無熾然𦦨法海雲佛南無普照三世相大光明佛南無普照法輪山佛南無法界師子光佛南無須彌華光明南無一切三昧海師子𦦨佛南無普智光明燈佛南無法界城智慧燈佛南無如是等須彌山微塵數一切如來南無如是等無量諸佛道場一切海衆次守護一切城主夜神南無此菩提場中如來會中得菩薩甚深自在妙音解脫門守護一切城威力增勢主夜神十方盡歸命滅罪增淨信願生華藏海極樂淨土中次盲龍餓龍懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖衆世出世神慈悲本願放大光明照於法會證盟護念哀愍攝受願我及一切衆生海自從無始直至今時業海無盡帝網重重龍趣一功罪報發露懺悔大集經云爾時佛會衆中有一盲龍名曰頗羅機黎奢舉聲大哭作如是言大聖世尊願救濟我願救濟我諸佛慈悲憐愍一切我今身中受大苦惱日夜常為種種諸蟲小蛇蝦蟆之所唼食居熱水中無暫時樂佛言黎奢汝過去世於佛法中曾為比丘毀破禁戒內懷欺詐外現種種善相威儀廣貪眷屬弟子衆多名聲四遠莫不聞知彼諸弟子如是說言我和尚得阿羅漢果以是因緣多得供養得供養已獨受用之見持戒人反加惡說彼人懊惱如是念言世世生中願我所在食汝身肉如是惡業死生龍中是汝前身衆生願故食噉汝身惡業因緣得盲龍報住熱水中又於過去無量劫中在融赤銅地獄之中常為諸蟲之所食噉爾時龍衆聞此語已憂愁啼哭作如是言我等今者皆悉至心咸共懺悔願令此苦速得解脫若有一切諸衆生雖復能得於人身備造種種罪惡業不能供養於三寶死後衆苦皆聚集地獄餓鬼具受之設復得為龍王身所有眷屬并妻子貧窮飢餓諸熱惱頂上無有如意寶居住空澤多毒蟲枯涸常乾無有水如是皆由過去世曾於佛法作比丘或見蘭若苦行人嫉妬慳心惜飲食遠客比丘來寄止瞋忿懷怒心不喜檀越平等施飲食於中遮止便罵言設有清淨好流水屎尿糞穢滿其中所有居住行坐處一切臭穢皆不淨或有清淨持戒者如是見已皆遠離若有餘處好人聞無心欲來於此者彼人惡業因緣故死墮地獄無量世灰河沸屎燒赤銅無量億年受楚毒如是餓鬼中飢渴生曾不聞漿水名餘報復生龍道中具足多年受辛苦雖得龍身常飢餓在所生處空無水或在枯澤惡蕉山絶水常乾無飲食死已數入地獄中大火熱惱充遍身在彼經於無量歲如是循環餓鬼中自非修禪能救濟禮拜供養佛如來持戒智慧學多聞精進捨於慳慢想嫉妒毒心最為惡此業因緣須斷除憶念死時受是殃決定無疑早懺悔爾時如來說是偈已彼龍衆中二十六億諸餓龍等念過去身皆悉雨淚作如是言惟願哀愍救濟於我大悲世尊我等憶念過去世時於佛法中雖得出家備造如是種種惡業以惡業故經無量身在三惡道亦以餘報故生在龍中受極大苦如青色龍我亦如是爾時世尊語諸龍言汝可持水洗如來足令汝殃罪漸得除滅時一切龍以手探水水皆成火變作大石滿於手中生大猛𦦨棄已復生如是至七一切龍衆見如是已驚怖懊惱啼哭雨淚佛告諸龍汝造罪業得是惡報修善業人受於好果我今教汝說真實誓若佛導師憐愍一切於諸衆生平生無二此言不虗願我諸龍火𦦨時滅作是誓已火𦦨皆滅時餓龍等乃至八過以手捧水洗如來足至心懺悔我從今日更不造惡如是懺已各白佛言如來大慈願救濟我佛言諸龍汝此惡業有餘未盡彌勒佛世當得人身值佛出家精進持戒得阿羅漢果時諸龍等得宿命心自念過業啼泣雨面各如是言我憶往昔於佛法中或為俗人親屬因緣或復聽法來去因緣所有信心捨施種種華果飲食共諸比丘依此而食或有說云我曾噉四方衆生華果飲食或有說云我往寺舍布施衆生或復禮拜如是噉或復說言我毗婆尸如來法中曾作俗人或復有說我毗葉婆如來法中曾作俗人或復有說我迦羅拘孫䭾佛法之中曾作俗人或復有說我迦那迦牟尼佛法之中曾作俗人或復有說我迦葉佛如來法中曾作俗人或復有說我釋迦牟尼佛法之中曾作俗人或以親舊問訊因緣或復來去聽法因緣往還寺舍有信心人供養僧故捨施華果種種飲食比丘得已同施於我我得便食彼業因緣於地獄中經無量劫大猛火中或燒或煮或飲洋銅成吞鐵丸從地獄出墮畜生中捨畜生身生餓鬼中如是種種備受辛苦惡業未盡生此龍中常受苦惱熱水爛身熱風吹體熱沙熱土熱糞熱灰食入口中變成銅針或作鐵丸於一切時所食之物入口口焦入咽咽爛入腹腹然直過墮地遍體穿穴受如是苦不可堪忍惟願如來慈哀救濟佛告諸龍此之惡業與盜佛物等無差別比丘造業其罪如半然此罪報受未盡故難可得脫汝等今當盡受三歸一心修善以此緣故於賢劫中值最後佛名曰樓至於彼佛世罪得除滅時諸龍等聞是語已皆悉至心盡其形壽各受三歸罪報懺悔時彼衆中有盲龍女口中䏺爛滿諸雜蟲狀如屎尿乃至穢惡猶如婦人根中不淨臊臭難堪種種噬食膿血流出一切身分常為蚊虻諸惡毒蠅之所唼食身體臰處難可見聞爾時世尊以大悲心見彼龍婦眼盲因苦如是問言妹何緣故得此惡身於過去世曾為何業龍婦答言世尊我今此身衆苦逼迫無暫時停設復欲言而不能說我念過去三十六億於百千年生惡龍中受如是苦乃至日夜剎那不停為我往昔九十一劫於毗婆尸佛法之中作比丘尼思念欲事過於醉人雖復出家不能如法於伽藍內敷施牀褥數數犯於非梵行事以快欲心生大樂受或貪求他物多受信施以如是故於九十一劫常不得受天人之身恆三惡道受諸燒煮佛又問言若如是者此中劫盡妹何處生龍婦答言我以過去業力因緣生餘世中彼處劫盡惡業風吹還來生此時彼龍婦說此語已作如是言大悲世尊願救濟我願救濟我爾時世尊以手掬水告龍女言此水名為瞋陀留脂藥和我今誠實發言語汝我於往昔為救鴿故棄捨身命終不疑念起慳惜心此言若實令汝惡患悉皆除差時佛世尊以口含水灑彼盲龍婦女之身一切惡患臭處皆差既得差已作如是言我今於佛乞受三歸是時世尊即為龍女授三歸依罪報懺悔時彼衆中復有一龍種種臭惡一切諸蟲滿其口中及咽喉內膿血流出有見聞者皆悉捨去時佛見已即便問言善男子汝於過去作何惡業受如是報彼龍張口於其口中出種種蟲膿血流溢猶如熱火雖復張口竟不能言即還閉口爾時世尊即為彼龍而說偈言汝以過去盜因緣輕戲聖人受是報至誠聽我此實言即得清涼滅諸苦爾時世尊說實語已即以少水瀉龍口中火及蟲膿悉皆滅盡能口清涼作如是言大聖如來我憶過去迦葉佛時曾作俗人在田犁地有一比丘來從我乞求五十錢我時報言聽待穀熟當與汝食比丘復言若當五十不可得者願乞十文我於爾時瞋彼比丘而語之言乃至十錢亦不相與時彼比丘心生懊惱又於餘時往寺舍中入樹林下輒便盜取現在僧物十菴羅果而私食之彼業因緣地獄受苦惡業未盡生野澤中作餓龍身常為種種諸蟲食噉膿血流溢飢渴苦惱又彼比丘以瞋忿心惡業緣故死便即作小毒龍身生我腋下𠲿於我血熱氣觸身不可堪忍是故我身熱膿血滿龍白佛言大悲世尊惟願慈哀救濟於我令我脫彼冤家毒龍爾時世尊以手抄水發誠實語作如是言我曾往昔於饑饉世爾時願作大身衆生長廣無量以神通力於虗空中唱如是言彼野澤中有大身蟲名曰不瞋汝等可往取其身肉以為飲食可得不飢時彼世中人非人等聞此聲已一切悉往競取食之說是真實諦信語時彼龍腋下小龍即出時此二龍俱白佛言世尊我等久近離此龍身解脫殃罪佛告龍言此業大重次五無間何以故若有四方常住僧物或現前僧物篤信檀越重心施物或華或果或樹或園飲食資生床褥敷具疾病湯藥一切所需私自費用或持出外乞與知識親里白衣此罪重於阿鼻地獄所受果報是故汝等可受三歸歸三寶已乃可得住於冷水中如是三稱三受身即安隱得入水中罪報懺悔爾時世尊即為諸龍而說偈言寧以利刀自割身肢節身分肌膚肉所有信心捨施物俗人食者實為難寧吞大赤熱鐵丸而使口中火𦦨出所有衆生飲食具不應於外私自用寧以大火若須彌以手捉持而自食其有在家諸俗人不應轉食施僧食寧以利刀自屠膾身體皮膜而自噉其有在家諸俗人不應受取僧雜食寧以自身投於彼滿室大火猛𦦨中其有在家俗人輩不應坐臥僧牀席寧以火熱炎鐵錐拳手握持使焦爛其有在家俗人等不應私用於僧物寧以勝利好刀砧而自臠切其身肉勿於出家清淨人發起一念瞋恚心寧以兩手挑兩眼捐棄投之擲於地其有習行善法者不應懷忿瞋心視寧以熱鐵鍱其身東西起動行坐臥不應瞋忿心嫉妒而著衆生淨施衣寧飲灰汁鹹鹵水熱沸爍口猶如火不應懷貪毒惡心服施衆僧淨施藥爾時世尊說此偈已一萬四千諸龍衆等悉受三歸所有過去現在業報諸苦惱中而得解脫深信三寶其心不退復有八十億諸龍衆等亦於三寶起歸敬心爾時世尊告憍陳如汝觀此等諸惡衆生自誑其心或以怖畏貧窮因緣或於惡道生於恐畏修行善法或作比丘所得種種資生之具皆是信心檀越所施而是衆生或自食噉或與他人或共衆人盜竊隱藏私家自用如是業故墮三惡道久受勤苦復有衆生貧窮下賤不得自在是故出家望得富饒解脫安樂既出家已懈怠懶惰不讀誦經定慧精勤捨而不習樂知僧事復有比丘晝夜精勤樂修善法讀誦經典坐禪習慧不捨須臾以是因緣感諸四輩種種供養時知事人見得利養已或自私食或復盜與親舊俗人以是等緣久處惡道出已還入如是愚瞑不見當來果報輕重我今戒敕沙門弟子念法住持不得自稱我是沙門真法行人倚衆僧故他信施物或餅或菜或果或華但是衆僧所食之物不得輒與一切俗人亦不得云此是我物別衆而食又亦不得以衆僧物貯積興生種種販賣云有利益招世譏嫌又亦不得出貴收賤與世爭利使諸衆生墮三惡道罪報懺悔我等為無明所覆不識龍趣罪因今遇道場方始覺知歸命毗盧遮那如來及一切賢聖海衆燒香散華龍趣罪報發露懺悔不敢覆藏由此因緣我及法界衆生海帝網重重龍趣罪業願皆清淨次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三遍百劫積集罪一念悉蕩除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白衆等聽說經中無常偈即此現世及親友如是盡皆棄捨時然惟獨自去一方親與非親何所用由造不善生苦惱云何於彼得解脫我今恆常於晝夜只惟專念此一事
