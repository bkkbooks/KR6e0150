body:
  text: 唐蘭山雲巖慈恩寺護法國師一行沙門慧覺依經録宋蒼山載光寺沙門普瑞補注明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閲天台習教觀沙門正止治定第三十一晌次十回向位中十善知識會一切恭敬敬禮無盡三寶是諸衆等人各胡跪嚴持香華如法供養願此香華雲遍滿十方界百萬億衆寶垣墻周匝圍繞一切寶樹行列莊嚴一切寶華樹雨衆妙華布散其地一切寶香樹香氣氤氳普熏十方一切寶華鬘樹雨大寶鬘處處垂下一切摩尼寶王樹雨大摩尼遍布充滿一切寶衣樹雨處處色衣隨其所應周匝敷布一切音樂樹風動成音其音美妙過於天樂一切莊嚴具樹各雨珍玩奇妙之物處處分布百萬樓閣閻浮檀金以覆其上百萬宮殿毗盧遮那摩尼寶間錯莊嚴其宮殿中復有無量寶蓮華座周回布列以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海衆受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次結不空摩尼印呪唵啞麼遏布麻禰巴能麻末𠷌呤怛達遏怛眉浪雞矴薩慢怛不囉薩囉吽梵音讚佛佛身不思議國土悉在中於其一切處導世宣真法佛於圓滿音闡明真實性隨其解差別現無盡法門一切剎土中見佛坐道場佛身如影現生滅不可得直言讚佛三世諸如來聲聞大弟子悉不能知佛舉足下足事去來現在世一切諸緣覺亦不知如來舉足下足事況復諸凡夫結使所纏縛無明覆心識而能知導師正覺無礙智超過語言道其量不可測孰有能知見譬如明月光無能測邊際佛神通亦爾莫見其終盡一一諸方便念念所變化盡於無量劫思惟不能了思惟一切智不可思議法一一方便門邊際不可得若有於此法而興廣大願彼於此境界知見不為難勇猛勤習念思惟大海法其心無障礙入此方便門心意已調伏志願亦寬廣當獲大菩提最勝之境界南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十回向菩薩十地菩薩等覺菩薩遍法界剎海微塵數菩薩一切海衆南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海衆南無大願摜甲求生淨土末濁夏國護持正法護法國師至心皈命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中第一鬻香長者了知一切香解脫法門經云爾時善財童子至殷勤瞻仰辭退而去願共諸衆生往生華藏海極樂淨土中南無南方廣大國土中得善別知一切諸香亦得調和香法解脫門鬻香優婆羅華長者十方盡歸命滅罪增淨信願生華藏海極樂淨土中第二婆施羅船師大悲幢行解脫法門經云爾時善財童子至心無厭足辭退而去願共諸衆生往生華藏海極樂淨土中南無南方樓閣大城之中得大悲幢行解脫門婆施羅船師十方盡歸命滅罪增淨信願生華藏海極樂淨土中第三無上勝長者至一切處解脫法門經云爾時善財童子至殷勤瞻仰辭退而去願共諸衆生往生華藏海極樂淨土中南無南方可樂城中得至一切處修菩薩行解脫門無上勝長者十方盡歸命滅罪增淨信願生華藏海極樂淨土中第四師子頻申比丘尼成就一切智解脫法門經云爾時善財童子至殷勤瞻仰辭退而去願共諸衆生往生華藏海極樂淨土中南無南方輸那國迦陵迦林城中得一切智解脫門師子頻申比丘尼十方盡歸命滅罪增淨信願生華藏海極樂淨土中第五婆須蜜女離貪欲際解脫法門經云爾時善財童子至殷勤瞻仰辭退而去願共諸衆生往生華藏海極樂淨土中次婆須蜜女發心處佛南無過去世妙門王城高行如來次婆須蜜女南無南方至險難國土寶莊嚴城中得離貪欲際解脫門婆須蜜女十方盡歸命滅罪增淨信願生華藏海極樂淨土中第六瑟胝羅居士得不般涅槃際解脫法門經云爾時善財童子至殷勤瞻仰辭退而去願共諸衆生往生華藏海極樂淨土中次瑟胝羅居士定中所見佛南無迦葉佛南無拘那含牟尼佛南無拘留孫佛南無尸棄佛南無毗婆尸佛南無提舍佛南無弗沙佛南無無上勝佛南無無上蓮華佛南無如是等一切諸佛南無百佛南無千佛南無百千佛南無億佛南無百億佛南無千億佛南無百千億佛南無阿庾多億佛南無那由他億佛南無乃至不可說不可說世界微塵數諸佛南無彌勒佛南無毗盧遮那佛南無如是等十方三世一切諸佛聲聞緣覺諸菩薩一切海衆次瑟胝羅居士南無南方善度城中得菩薩不般涅槃際解脫門瑟胝羅居士十方盡歸命滅罪增淨信願生華藏海極樂淨土中第七觀自在菩薩大悲行解脫法門經云爾時善財童子至能知能說彼功德行願共諸衆生往生華藏海極樂淨土中南無南方補怛洛迦山得菩薩大悲行解脫法門觀自在菩薩十方盡歸命滅罪增淨信願生華藏海極樂淨土中第八正趣菩薩普門速疾行解脫法門經云爾時東方有一菩薩至殷勤瞻仰辭退而去願共諸衆生往生華藏海極樂淨土中次正趣菩薩得法門處佛南無東方妙藏世界內普勝生佛南無不可說不可說佛剎微塵數一切諸佛南無如是等諸佛道場一切海衆次正趣菩薩南無東方妙藏世界輪圍山頂從空中來以足按地得菩薩普門速疾行解脫門正趣菩薩十方盡歸命滅罪增淨信願生華藏海極樂淨土中第九大天神雲網解脫法門經云爾時善財童子至繞無數匝辭退而去願共諸衆生往生華藏海極樂淨土中南無南方墮羅鉢底城中得雲網解脫法門大天神十方盡歸命滅罪增淨信願生華藏海極樂淨土中第十安住地神不可壞知慧藏解脫法門經云爾時善財童子至殷勤瞻仰辭退而去願共諸衆生往生華藏海極樂淨土中次安住地神得法門處佛南無過去莊嚴劫月幢世界妙眼佛南無至賢劫中不可說一切諸佛次安住地神南無此閻浮提摩竭提國菩提場中得菩薩不可壞智慧藏解脫門安住地神南無圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩十方盡歸命滅罪增淨信願生華藏海極樂淨土中次壞菩薩心懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖衆世出世神慈悲本願放大光明照於法會證盟護念哀愍攝受願我及一切衆生海自從無始直至今時帝網重重破壞菩薩心一切罪業發露懺悔華手經云若復有人為欲破壞菩薩心故而作障礙當說是人得幾許罪何以故若已壞亂當壞亂者聞是事已便自改悔佛告舍利弗若人障礙壞菩薩心得無量罪如人欲壞無價寶珠是人則失無量財利如是舍利弗若人壞亂菩薩心者則為毀滅無量法寶舍利弗如種藥樹有人翦伐不令增長是人則壞無量衆生療治病事令多衆生為病所困如是舍利弗若人欲壞是菩薩心大安樂心滅除無量衆生苦患大智樂心當知是人則令無量無數衆生為諸貪欲恚癡憍慢慳嫉諂曲無慚無愧諸煩惱病之所侵害亦令無量阿僧祇衆失於涅槃安隱住處舍利弗若人毀壞阿耨達池殺大龍王當知是人則為壞失二足四足渴乏衆生八功德水如是舍利弗若人壞亂菩薩心者則為破壞能除無量衆生渴愛八聖道水舍利弗譬如有人壞日宮殿是人則為滅四天下衆生光明如是舍利弗若人壞亂菩薩心者當知是人則為毀滅十方世界一切衆生大法光明舍利弗如人破壞一切寶性當知是人則壞無量衆生珍寶如是舍利弗若人壞亂菩薩心者當知是人則壞無量阿僧祇衆法寶之分亦為毀滅如是等經令不聞見舍利弗如是寶性出無量寶給足衆生如是舍利弗諸菩薩心是法寶性從此法寶生諸佛法不可思議神通智力是故舍利弗當知破壞菩薩心者則得無量無邊深罪舍利弗如人惡心出佛身血若復有人破戒不信毀壞捨離是菩薩心其罪正等舍利弗置是惡心出佛身血我說具足五無間罪若人毀壞菩薩心者其罪過此所以者何起五逆罪尚不能壞一佛之法若人毀壞菩薩心者則為斷滅一切佛法舍利弗譬如殺牛則為已壞乳酪酥等如是舍利弗若人破壞菩薩心者則為斷滅一切佛慧是故舍利弗若人破戒不信呵罵毀呰壞菩薩心當知此罪過於五逆舍利弗置五逆罪令四天下滿中阿羅漢若有一人皆奪其命汝意云何是人得罪寧為多不舍利弗言甚多世尊佛言我今告汝若人毀呰壞亂菩薩令其信受捨離是心失佛智慧比前罪者百分千分百千萬分尚不及一乃至譬喻亦不能及所以者何雖奪爾所阿羅漢命不能障礙諸佛十力四無所畏四無礙智十八不共法大慈大悲佛不虗行不障如來象王回觀師子奮迅無見頂相不障如來吹百千種具足法唄亦不妨轉無上法輪不障聖主自在神力亦不障礙能知衆生諸根利鈍種種欲樂差別智慧舍利弗若菩薩發阿耨多羅三藐三菩提心得成大乘堅誓莊嚴若有人來壞亂此心令其退捨是人則障佛十種力乃至衆生種種欲智舍利弗置四天下若滿三千大千世界諸阿羅漢譬如竹葦稻麻藂林若有一人皆奪其命汝意云何是人得罪寧為多不甚多世尊舍利弗若復有人懷恚輕慢破戒不信毀壞散亂是菩薩心此人得罪唯佛能知所以者何此人壞亂菩薩深心則為毀滅一切佛法斷諸佛種所以者何若無菩薩最初心者云何當有如是佛慧佛自在力出於世間是故舍利弗此無上心大心深心諸菩薩心若在比丘比丘尼優婆塞優婆夷天龍夜叉揵闥婆阿修羅迦留羅緊陀羅摩睺羅伽人非人所一切世間皆應禮敬所以者何有此心者當知即是未來世尊罪報懺悔又經云舍利弗若人毀發大乘心者當知是人不能自利亦不利他斯則不名修行道者舍利弗是愚癡人行於邪道為失自利亦失利他以此因緣故是人當得八衰惱法何謂為八失所愛重親友家屬國土喪亂財産日耗災火焚燒縣官所侵諸根毀壞死入地獄獄卒拷掠是名為八復次有八大不安法何謂為八謂生地獄餓鬼畜生是大不安若得人身常生邊地不識善惡無佛無法無聖衆處是大不安設得人身生於中國聾盲瘖啞癃殘百疾是亦名為大不安法雖生中國具足人身常為衰弊心懷諂曲虗僞姦詭是亦名為大不安法若生中國具足人身受外道教好於邪論邪見惡行成就不淨身口意業諸佛賢聖尚不能救是亦名為大不安法若生中國具足人身佛得道夜即便命終不值佛法是亦名為大不安法是為輕毀求佛道者八不安法舍利弗當知是人若生地獄必墮阿鼻大地獄中得大身形多受衆苦續起重罪若墮畜生為惡蟲獸恆苦飢渴侵奪他命殘食肌肉以自濟活隨所生處續增罪業若為水性作摩伽魚蟄民伽羅失收摩羅及陀羅等人所網釣生被刀割備受衆苦求死不得若復陸生或為駝驢牛羊猪犬若作駝牛為人穿鼻身常負重加諸杖痛呻嘷大呼無有救者中路疲乏不能前進命未盡間生被割剝殘食其肉猶竝罵言多食喜臥大折損我舍利弗汝且觀是罪業因緣如我所知若廣說者從劫至劫猶不能盡舍利弗取要言之若人毀壞菩薩心者若離八難無有是處所以者何是人續起衆罪業故當知汝等得脫此難為自救濟我等為無明所覆不識壞菩薩心罪因今遇道場方能覺悟歸命毗盧遮那如來及一切賢聖海衆燒香散華發露懺悔不敢覆藏由此因緣我及法界衆生海壞菩薩心一切罪業悉皆清淨次懺悔滅罪印呪唵薩㗚末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三遍百劫積集罪一念盡蕩除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白衆等聽說經中無常偈自從無始劫生死數恆沙聚骨富羅山積血如大海譬如路傍樹暫息非久停車馬及妻兒不久皆如是譬如羣宿鳥夜聚旦還飛死去別親知乖離亦如是惟有佛菩薩是真歸仗處依經我略說知者應諦思
