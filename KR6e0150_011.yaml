body:
  text: 唐蘭山雲巖慈恩寺護法國師一行沙門慧覺依經録宋蒼山載光寺沙門普瑞補注明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閲天台習教觀沙門正止治定第十一晌第三華藏剎網莊嚴會一切恭敬敬禮無盡三寶是諸衆等人各胡跪嚴持香華如法供養願此供海雲遍滿十方界依所處師子之座其座高廣殊特妙好琉璃為足金縷所成柔軟衣服以敷座上建以寶幢熏諸妙香無量雜寶莊嚴之具以為莊校金網覆上寶鐸風搖出妙音聲奇珍為計周匝填飾以如是等諸寶藏及種種供物常作供養帝網重重諸佛菩薩賢聖海衆受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布拶銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次不空摩尼印呪唵啞麼遏布麻禰巴能麻末𠷌呤怛達遏怛眉浪雞矴薩慢怛不囉薩囉吽梵音讚佛佛身不在內亦復不在外神力故顯現導師法如是隨諸衆生類生世所集業如是種種神示現各不同諸佛身如是無量不可數惟除大覺尊無有能思議直言讚佛如來成正覺時以一相方便入善覺智三昧入已於一成正覺廣大身現一切衆生數等身住於身中如一成正覺廣大身一切成正覺廣大身悉亦如是菩薩摩訶薩應如是知佛子如來有如是等無量成正覺門是故應知如來所現身有無量以無量故說如來身於無量界等衆生界佛子菩薩摩訶薩應知如來身一毛孔中有一切衆生數等諸佛身何以故如來成正覺身究竟無生滅故如一毛孔遍法界一切毛孔悉亦如是當知無有少許處空無佛身何以故如來成正覺無處不至故隨其所能隨其勢力於道場菩提樹下師子座上以種種身成等正覺佛子菩薩摩訶薩應知此心念念常有佛成正覺何以故諸佛如來不離此心成正覺故如自心一切衆生心亦復如是悉有如來成等正覺廣大周遍無處不有不離不斷無有休息南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十回向菩薩十地菩薩等覺菩薩遍法界剎海微塵數菩薩一切海衆南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海衆南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云爾時普賢菩薩至普化一切諸含識願共諸衆生往生華藏海極樂淨土中經云爾時普賢菩薩至微塵數世界於中布列願共諸衆生往生華藏海極樂淨土中初總顯剎種不同南無此十不可說佛剎微塵數香水海中有十不可說佛剎微塵數世界種安住一切世界種復有十不可說佛剎微塵數世界諸佛道場一切海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中次別顯剎種香水海分二初諸海所依南無此十不可說佛剎微塵數諸香水海在華藏莊嚴世界海中如天帝網分布而住諸佛道場一切海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中二諸海剎種分三初總辨中間一海能持剎種南無如是等不可說不可說佛剎微塵數香摩尼王莊嚴大蓮華上普照十方熾然寶光明世界種種諸佛道場一切海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中所持世界又二初總舉大數南無不可說佛剎微塵數一切香水海行列諸佛道場一切海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云其最下方有世界至各各力加持周匝圍繞願共諸衆生往生華藏海極樂淨土中二別辨二十層大剎南無其最下方最勝光遍照世界淨眼離垢燈佛道場一切海衆南無一佛剎微塵數世界周匝圍繞諸佛道場一切海衆南無此上過佛剎微塵數世界種種香蓮華妙莊嚴世界師子光勝照佛道場一切海衆南無二佛剎微塵數世界周匝圍繞諸佛道場一切海衆南無此上過佛剎微塵數世界一切寶莊嚴普照光世界淨光智勝幢佛道場一切海衆南無三佛剎微塵數世界周匝圍繞諸佛道場一切海衆南無此上過佛剎微塵數世界種種光明華莊嚴世界金剛光明無量精進力善出現佛道場一切海衆南無四佛剎微塵數世界周匝圍繞諸佛道場一切海衆南無此上過佛剎微塵數世界普放妙華光世界香光喜力海佛道場一切海衆南無五佛剎微塵數世界周匝圍繞諸佛道場一切海衆南無此上過佛剎微塵數世界淨妙光明世界普光自在幢佛道場一切海衆南無六佛剎微塵數世界周匝圍繞諸佛道場一切海衆南無此上過佛剎微塵數世界衆華𦦨莊嚴世界歡喜海功德名稱自在光佛道場一切海衆南無七佛剎微塵數世界周匝圍繞諸佛道場一切海衆南無此上過佛剎微塵數世界出生威力地世界廣大名稱智海幢佛道場一切海衆南無八佛剎微塵數世界周匝圍繞諸佛道場一切海衆南無此上過佛剎微塵數世界出妙音聲世界清淨月光明相無能摧伏佛道場一切海衆南無九佛剎微塵數世界周匝圍繞諸佛道場一切海衆南無此上過佛剎微塵數世界金剛幢世界一切法海最勝王佛道場一切海衆南無十佛剎微塵數世界周匝圍繞諸佛道場一切海衆南無此上過佛剎微塵數世界恆出現帝青寶光明世界無量功德法佛道場一切海衆南無十一佛剎微塵數世界周匝圍繞諸佛道場一切海衆南無此上過佛剎微塵數世界光明照耀世界超釋梵佛道場一切海衆南無十二佛剎微塵數世界周匝圍繞諸佛道場一切海衆南無此上過佛剎微塵數世界娑婆世界毗盧遮那佛道場一切海衆南無十三佛剎微塵數世界周匝圍繞諸佛道場一切海衆南無此上過佛剎微塵數世界寂靜離塵光世界遍法界勝音佛道場一切海衆南無十四佛剎微塵數世界周匝圍繞諸佛道場一切海衆南無此上過佛剎微塵數世界衆妙光明燈世界不可摧伏力普照幢佛道場一切海衆南無十五佛剎微塵數世界周匝圍繞諸佛道場一切海衆南無此上過佛剎微塵數世界清淨光遍照世界清淨日功德眼佛道場一切海衆南無十六佛剎微塵數世界周匝圍繞諸佛道場一切海衆南無此上過佛剎微塵數世界寶莊嚴藏世界無礙智光明遍照十方佛道場一切海衆南無十七佛剎微塵數世界周匝圍繞諸佛道場一切海衆南無此上過佛剎微塵數世界離塵世界無量方便最勝幢佛道場一切海衆南無十八佛剎微塵數世界周匝圍繞諸佛道場一切海衆南無此上過佛剎微塵數世界清淨光普照世界普照法界虗空光佛道場一切海衆南無十九佛剎微塵數世界周匝圍繞諸佛道場一切海衆南無此上過佛剎微塵數世界妙寶𦦨世界福德相光明佛道場一切海衆南無二十佛剎微塵數世界周匝圍繞諸佛道場一切海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中三類結所餘分四初結多數南無次有香水海名金剛輪莊嚴等世界中有如是等不可說佛剎微塵數廣大世界諸佛道場一切海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中二結形類經云所謂十佛剎微塵數至及圍繞此海香水河中願共諸衆生往生華藏海極樂淨土中南無十佛剎微塵數須彌山形世界中諸佛道場一切海衆南無十佛剎微塵數江河形世界諸佛道場一切海衆南無十佛剎微塵數回轉形世界諸佛道場一切海衆南無十佛剎微塵數漩流形世界諸佛道場一切海衆南無十佛剎微塵數輪輞形世界諸佛道場一切海衆南無十佛剎微塵數壇墠形世界諸佛道場一切海衆南無十佛剎微塵數樹林形世界諸佛道場一切海衆南無十佛剎微塵數樓觀形世界諸佛道場一切海衆南無十佛剎微塵數尸羅幢形世界諸佛道場一切海衆南無十佛剎微塵數普方形世界諸佛道場一切海衆南無十佛剎微塵數胎藏形世界諸佛道場一切海衆南無十佛剎微塵數蓮華形世界諸佛道場一切海衆南無十佛剎微塵數佉勒迦形世界諸佛道場一切海衆南無十佛剎微塵數種種衆生形世界諸佛道場一切海衆南無十佛剎微塵數佛相形世界諸佛道場一切海衆南無十佛剎微塵數圓光形世界諸佛道場一切海衆南無十佛剎微塵數雲形世界諸佛道場一切海衆南無十佛剎微塵數珠網形世界諸佛道場一切海衆南無十佛剎微塵數門闥形世界諸佛道場一切海衆南無十佛剎微塵數諸莊嚴具形世界諸佛道場一切海衆南無如是等不可說佛剎微塵數世界中諸佛道場一切海衆三結眷屬南無此一一世界各有十佛剎微塵數廣大世界周匝圍繞諸佛道場一切海衆南無如是等不可說世界又復佛剎微塵數世界而為眷屬諸佛道場一切海衆四彰所在南無此不可說佛剎微塵數香水海復有華光香水海及圍繞此海香水河中諸佛道場一切海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中次六十四地獄懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖衆世出世神慈悲本願放大光明照於法會證盟護念哀愍攝受我及一切衆生海自從無始直至今時業海無盡帝網重重一切地獄罪業發露懺悔經律異相云六十四地獄者一曰腳踏先踏殺人今為獄鬼所踏經二百歲罪報懺悔二曰刀山先殺衆生今受罪二百歲罪報懺悔三曰審諦生時瞋心罵人以為鳥獸五百歲中鐵杵舂口罪畢受生人頭鳥身口常言罪罪報懺悔四曰抱刀劒生時自犯淫戒又犯持戒人罪報懺悔五曰沸沙先以熱灰覆衆生上罪報懺悔六曰沸井井水常沸先以惡心用不淨物置井中罪畢百歲為井中蝦蟇罪報懺悔七曰竈窗獄卒以人倒納竈窗中此女生時以顧影衣曳他男子罪報懺悔八曰啞鬼獄卒常燒鐵篦烙其舌生時父母及師喚之不應經二百歲後生為啞人罪報懺悔九曰熱灰廣七百里滿中熱灰此人生時起淫欲心就貞女宿終不果遂受罪二百歲後生患瘡及恐怖罪報懺悔十曰沸屎廣三萬里滿中屎尿驅人入中昔賜人好食嗔言如食不淨受罪五百歲後復為猪罪報懺悔十一曰䏺臭縱廣二千五百里滿中膿血此人生時以不善心入聖人室失氣泄穢受罪二百四十歲後生貧賤人中身體常臭罪報懺悔十二曰不淨縱廣千里滿中涕唾生時以慢心不淨手捻香供養大聖後生人中常慢罪報懺悔十三曰不淨六百里膿生時以鼠屎狗食不淨投淨食中受罪二百歲出生作狗罪報懺悔十四曰常暗生時以不善心障佛光明受罪七百歲罪報懺悔十五曰縱廣四萬里恆被斫射打剔推𥑐此人生時作五逆業受罪動經劫數若展轉諸獄故亦有劫數也一萬歲罪報懺悔十六曰相殺婦殺夫夫殺婦母殺兒兒殺母其人昔時殺他人父母并殺衆生父母及兒後生人中父母子孫皆悉早死罪報懺悔十七曰斫身恆為獄鬼所斫先斫衆生故後生喜遭縣官罪報懺悔十八曰火車此人由燒殺衆生後生被燒罪報懺悔十九曰不識法滿中癡人生時聞揵捶聲慢心而臥後生邊地罪報懺悔二十曰鐵𨫼生時熬蝦蟹故後生短壽罪報懺悔二十一曰餓鬼身長四十里腹如萬斛篅頸長十里恆苦飢渴口氣常臭見食化成火炭飲成膿血由食齊食不持齊後八百世常作羅剎罪報懺悔二十二曰剛炭生時盜心取他物手捧剛炭後生貧賤為人所使罪報懺悔二十三曰鑊湯生時惡心以熱湯澆地蟲罪報懺悔二十四曰鐵床生時淫他婦人逼犯持戒女人男抱銅柱女臥鐵床罪報懺悔二十五曰鐵丸由炮煮雞鴨子後生常苦迷荒罪報懺悔二十六曰貢高高坐地獄生時食他信施自恃有德起心貢高罪報懺悔二十七曰黑耳獄鬼以刀節節支解生時淫犯比丘後生下賤女人之中五百歲作黃門身罪報懺悔二十八曰寒冰生時擲衆生致寒凍處後生貧窮常無衣服罪報懺悔二十九曰石窟滿中烟火生時惡心熏殺衆生罪報懺悔三十曰拳叉獄鬼叉之以嗔心㨝殺蟣蝨罪報懺悔三十一曰磕山以磕殺蟣蝨後生短壽罪報懺悔三十二曰熱湯澆身披著好衣誘他婦女罪畢為鳥獸罪報懺悔三十三曰餓鬼身長三十里咽下有癯決膿食之或見好食衆鬼競奪不得食之由得他好食不先上座食後生貧窮罪報懺悔三十四曰餓鬼身長十里或五里身毛剛利由慳不施食實有言無後生貧窮多無飲食罪報懺悔三十五曰惡狗多諸惡狗牙利如劒獄鬼嗾狗競共嚙之生時喚狗嚙殺衆生後得為人喜被狗嚙罪報懺悔三十六曰鐵杙驅人履之生時含毒看父母師長後生毒蛇中罪報懺悔三十七曰剝皮鬼恆利刀剝其身皮生時惡心剝人衣被及剝衆生皮後生人中常為人所剝奪罪報懺悔三十八曰倒懸獄卒悉取人倒懸生時倒懸衆生罪報懺悔三十九曰畜生獄鬼鎔銅灌其口生時具債抵而不還後五百歲中為人牛馬奴婢喜得鞭打罪報懺悔四十曰耕身獄鬼以鐵犁耕身生時耕地傷生惡心稱快罪報懺悔四十一曰鏃眼獄鬼常以鐵鏃鏃其眼生時惡心惡眼看其父母後生人中眼常逋睛罪報懺悔四十二曰刀兵獄鬼斫射此人生時嗔心相殺後生人中喜得斫射罪報懺悔四十三曰割㓨獄鬼生割其肉此人生時惡心割人肉罪畢為人喜得割㓨罪報懺悔四十四曰鐵磨獄鬼以鐵磨磨人此人生時以惡心磨殺諸蟲罪報懺悔四十五曰㩚弄滿中鐵磨獄鬼驅人入磨磨之罪報懺悔四十六曰㩚弄此人生時見衆生入㩚弄中生惡心我誓不救後生人中身體黃熟罪報懺悔四十七曰石臼獄卒驅入臼中搗之此人生時惡心搗殺衆生罪畢為螺蚌罪報懺悔四十八曰憍慢人頭蛇身此人生時臥地誦經罪報懺悔四十九曰水地獄水停住不流此人生時抑人水中沒溺而死罪報懺悔五十曰𢡼獄鬼以石壓人頭此人生時慢心使父母師長倚令其兒出言不恭敬罪報懺悔五十一曰鐵棒獄鬼常使其身棒鐵此人生時以惡心殺蟣蝨罪報懺悔五十二曰恐怖常為牛頭阿旁所怖此人生時常恐人故罪報懺悔五十三曰鐵杙水底布鐵杙獄鬼驅人入水中㓨身流血生時嫉妒布杙傷人罪報懺悔五十四曰飲鎔銅生時慢心學父母師長語後常謇吃罪報懺悔五十五曰鐵鏃獄鬼以鐵鏃鏃其眼此人生時惡心生㓨衆生瞳子罪畢為盲人罪報懺悔五十六曰鐵叉獄鬼以鐵叉叉人此人生時惡心叉魚及餘衆生罪報懺悔五十七曰蛆蟲唼食人身此人生時嫉妒傷人及六畜罪畢為人身患惡瘡罪報懺悔五十八曰刀解手獄鬼以利刀解其兩手此人生時以慢心用不淨手捉經罪報懺悔五十九曰啼哭獄鬼常來恐怖令其啼哭此人生時常憂錢財以營淫欲後生為人恆苦少財罪報懺悔六十曰鐵鈎獄鬼常以鐵鈎鈎其身體此人生時鈎殺衆生罪報懺悔六十一曰鎔銅獄鬼以洋銅灌其口此人生時惡心妄語兩舌惡罵綺語罪畢為人口氣常臭罪報懺悔六十二曰鎔銅獄鬼以洋銅灌手此人生時心不敬道以不淨手捉沙門衣罪報懺悔六十三曰射身獄鬼以箭射之此人生時惡心射殺衆生罪報懺悔六十四曰無擇梁言生終凡有五王者一曰隨王二曰效王三曰田王四曰自然王五曰衆生王皆發信心大乘誓順度地獄衆生諸地獄罪畢者來入此中斷其昔行作罪多少捨地獄身受中陰形如三歲小兒更隨業行從父母受生如是等罪報懺悔我等為無明所覆不識地獄業報今遇道場乃能覺知歸命毗盧遮那如來及一切賢聖海衆燒香散華地獄罪報發露懺悔不敢覆藏由此因緣我及法界衆生海一切地獄罪報願皆清淨次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三遍百劫積集罪一念悉蕩除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白衆等聽說經中無常偈壯色不停猶如奔馬人命無常過踰山水今日雖存明亦難保云何縱心今住惡法云何恃怙而生驕慢猶如惡鬼伺求人過四大惡鬼亦復如是猶如朽宅垂崩之室我身亦爾云何起惡
