body:
  text: 唐蘭山雲巖慈恩寺護法國師一行沙門慧覺依經録宋蒼山載光寺沙門普瑞補注明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閲天台習教觀沙門正止治定第九晌一切恭敬敬禮無盡三寶是諸衆等人各胡跪嚴持香華如法供養願此供海雲遍滿十方界種種色瓔珞種種色寶冠種種色妙鬘種種色衣服種種色法衣種種色嚴具種種色寶華種種色妙香種種色塗香種種色末香種種色樓閣種種色寶蓋種種色幢幡種種色音樂彼聲美妙歌詠佛法乃至種種資具悉遍一切衆生處充滿一切佛剎道場普遍供養一切諸佛以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海衆受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉發囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次不空摩尼印呪唵啞摩遏布麻禰巴能麻末唧呤怛達遏怛眉浪雞矴薩慢怛不囉薩囉吽梵音讚佛諸佛廣大音法界靡不聞菩薩能了知善入音聲海劫海演妙音其音等無別智周三世者入彼音聲智衆生所有音及佛自在聲獲得音聲智一切皆能了直言讚佛如來色形諸相等一切世間莫能測億那由劫共思量色相威德轉無邊如來非以相為體但是無相寂滅法身相威儀悉具足世間隨樂皆得見佛法微妙難可量一切言説莫能及非是和合非不合體性寂滅無諸相佛身無生超戲論非是蘊聚差別法得自在力決定見所行無畏離言道南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十回向菩薩十地菩薩等覺菩薩遍法界剎海微塵數菩薩一切海衆南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海衆南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛南無十身無礙毗盧遮那如來道場一切海衆南無大方廣佛華嚴經普賢三昧品法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中普賢三昧品第三初普賢三昧分經云爾時普賢菩薩至毗盧遮那如來藏身三昧願共諸衆生往生華藏海極樂淨土中二諸佛共加分經云爾時一一普賢菩薩至為十方佛之所摩頂願共諸衆生往生華藏海極樂淨土中三教主起定分經云爾時普賢菩薩至一一塵中悉亦如是願共諸衆生往生華藏海極樂淨土中四現相莊嚴分經云爾時十方一切世界海至十方摩尼王雲願共諸衆生往生華藏海極樂淨土中五毛光讚德分經云普雨如是十種至佛光雲中讚功德願共諸衆生往生華藏海極樂淨土中六大衆讚請分經云爾時一切菩薩衆至一切諸佛皆隨喜願共諸衆生往生華藏海極樂淨土中南無如來面前坐蓮華藏師子之座依佛神力入毗盧遮那如來藏身三昧普賢菩薩摩訶薩南無如是盡法界虗空界十方三世微細無礙廣大光明佛眼所見佛力能至佛身所現一切剎土中一切普賢菩薩摩訶薩南無如是等不可説佛剎微塵數華藏世界海佛剎微塵數一一剎中有世界海微塵數諸佛一一佛前有世界海微塵數一切普賢菩薩摩訶薩至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛南無十身無礙毗盧遮那如來道場一切海衆南無大方廣佛華嚴經中世界成就品法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中世界成就品第四初神力遍觀分經云爾時普賢菩薩至無能毀壞不可思議願共諸衆生往生華藏海極樂淨土中二許説分齊分經云如是等一切法我當承佛神力及一切如來威神力故具足宣説願共諸衆生往生華藏海極樂淨土中三説所成益分經云為令衆生入佛智慧海至安住普賢願海中故願共諸衆生往生華藏海極樂淨土中四讚勝誡聽分經云是時普賢菩薩至是佛所行應諦聽願共諸衆生往生華藏海極樂淨土中五正陳本義分又十經云爾時普賢菩薩至諸佛已説現説當説願共諸衆生往生華藏海極樂淨土中一起具因緣經云諸佛子略説以十種因緣至此是毗盧所嚴淨願共諸衆生往生華藏海極樂淨土中二所依住染淨融也經云爾時普賢菩薩至廣大業力之所持願共諸衆生往生華藏海極樂淨土中三分別形狀染淨俱提經云爾時普賢菩薩至毗盧遮那法如是願共諸衆生往生華藏海極樂淨土中四體性差別經云爾時普賢菩薩至願力所莊嚴一切皆殊妙願共諸衆生往生華藏海極樂淨土中五寶等莊嚴經云爾時普賢菩薩至一切處中皆顯現願共諸衆生往生華藏海極樂淨土中六無有垢穢惟依淨也經云爾時普賢菩薩至國土無邊悉清淨願共諸衆生往生華藏海極樂淨土中南無一毛孔中有難思剎等微塵數種種不同一一塵中與衆説法毗盧遮那道場一切海衆南無一微塵中有大小剎種種差別如微塵數平恆高低各各不同周遍處説法毗盧遮那道場一切海衆南無一切剎土所有微塵一一塵中皆悉能入為諸衆生起大神變毗盧遮那道場一切海衆南無佛光照耀摩尼光體彼中悉現各起神力諸佛道場一切海衆南無三世所有如來神通現諸剎海一一事中諸佛道場一切海衆南無一切事中等諸佛數遍滿世間為調伏故起大神變無量諸佛道場一切海衆南無淨光為體依光明住光雲莊飾悉共遊戲一切菩薩海衆南無不可説佛剎微塵數等華藏剎海遍滿一切菩薩海衆至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中七佛出差別經云爾時普賢菩薩至一切國土皆周遍願共諸衆生往生華藏海極樂淨土中八劫住長短彼因住時分經云爾時普賢菩薩至以一方便皆清淨願共諸衆生往生華藏海極樂淨土中九隨業轉變經云爾時普賢菩薩至是時諸剎海一切普清淨願共諸衆生往生華藏海極樂淨土中十無差別經云爾時普賢菩薩至以願力故遍世間願共諸衆生往生華藏海極樂淨土中南無諸佛法身不可思議無色無形亦無影像為諸衆生現衆多相隨心所樂皆悉令見現大小身一切諸佛南無或為衆生現於短壽或無量劫現住長壽法身常遍十方隨時出現世界一切諸佛南無若或十方不可思議有諸剎海悉能嚴淨或唯能嚴淨一剎土彼一一示現悉皆無餘一切諸佛南無隨衆生心種種難思示現乘法或復宣説一乘法輪一中示現無量方便一切諸佛南無或亦自然成等正覺微少衆生令住佛道或有唯一念之間悉能開悟無數迷衆一切諸佛南無一切世界皆悉應現種種方便化度群生身毛孔中出現化雲無量無邊一切諸佛南無或有語言皆悉周遍隨其意樂演説妙法不可思議諸大劫中調伏無量衆生海一切諸佛南無或有無量莊嚴剎土清淨衆會安隱趺坐如雲悉聚彼中安居十方剎海無不周遍一切諸佛南無諸佛方便不可思議隨衆生心悉現其前遍住種種莊嚴剎土一切剎土悉皆周遍一切諸佛南無十方剎海或剎土中住塵數劫或於一劫或無數劫以大願力種種不同一切諸佛南無現不思議神通力即時遍淨一切剎一切諸佛南無莊嚴剎海皆悉具足心意清淨一切殊勝出現世間一切諸佛南無莊嚴剎海一切皆滅衆生共器世界成染入於涅槃一切諸佛南無清淨剎海一一塵中如微塵數如雲悉聚普賢位中一切菩薩摩訶薩南無見劫差別莊嚴不異不往十方又無量意九地位中一切菩薩摩訶薩南無依剎海心住劫常淨悉起大心無量衆生初地位中一切菩薩摩訶薩南無劫中出生隨彼意樂見於淨染初地之前未斷障故一切信解菩薩摩訶薩南無有清淨心修諸福德剎海染淨悉由心造凡夫位中一切人天南無如是等華藏剎海中毗盧遮那功德王下道場衆會光明名號音聲法輪一不動故無異普遍塵剎海內塵佛境諸佛道場一切海衆至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中次三塗八難懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖衆世出世神慈悲本願放大光明照於法會證明護念哀愍攝受願我及一切衆生海自從無始直至今時業海無盡帝網重重違犯法律一切罪業發露懺悔辨意長者子所問經云佛告辨意復有五事行死入地獄億劫乃出何者為五一者不信有佛法衆而行誹謗輕毀聖道二者破壞佛寺尊廟三者四輩轉相謗毀不信殃罪無敬順意四者反逆無有上下君臣父子不相順從五者當來有欲為道者已得為道不順師教而自貢高輕慢謗師是為五事死入地獄展轉地獄無有出期罪報懺悔復有五事行墮餓鬼中一者慳貪不欲布施二者盜竊不孝二親三者愚癡無有慈心四者積聚財物不肯衣食五者不給父母兄弟妻子奴婢是為五事墮餓鬼中罪報懺悔復有五事作畜生行墮畜生中一者犯戒私竊偷盜二者負債抵而不償三者殺生以身償之四者不喜聽受經法五者常以因緣艱難齋戒施貪以俗為緣是為五事生畜生中罪報懺悔六趣輪回經云作業皆自心為因馳六趣由三毒怖畏販賣諸物命養己殺於他當墮等活獄彼壽百千歲加刀杖捶打死已更復生受如是苦報罪報懺悔於父母朋屬而生於損壞起妄語欺誑當墮黑繩獄黑線絣其身如世間解木鋸發焰熾然受如是苦報罪報懺悔以火燒山川林木及原野燒害諸有情當墮炎熱獄火焰遍燒然苦呌聲不絶兩目無有明受如是苦報罪報懺悔謂法説非法無根而誹謗令他生熱惱墮極炎熱獄是諸罪衆生為大火逼切燒然不暫停受如是苦報罪報懺悔於豬羊狐兔及餘生類等煞害彼無邊當墮衆合獄生彼地獄已備受諸楚毒拷掠滅還生受如是苦報罪報懺悔起惡身語意讒搆相離間如是罪衆生當墮號呌獄復熾猛火焰燒然無休息常發大惡聲受如是苦報罪報懺悔若於佛法僧及諸貧乏者盜竊彼財物墮大號呌獄為火所燒炙受最極熱惱出大猛惡聲受如是苦報罪報懺悔於父母師長及有德賢者起增上殺害定墮無間獄炎熾大火聚洞然徹骨髓長時受極苦決定無暫樂罪報懺悔起冤敵鬬諍戈戟相殘害死墮銅爪獄其狀極鋒利互相而擘裂或變為刀杖競斫刺其身受如是苦報罪報懺悔強暴侵他邑後墮鐵刺獄刺長十六指削肉而穿骨復有大鐵犬焰牙甚可怖噉頂至其踵受如是苦報罪報懺悔若陰謀害他墮彼劒葉林猘狗及雕鷲奔逐競分食罪報懺悔若劫奪他財當受其極苦常吞熱鐵丸復灌以銅汁罪報懺悔無辜害衆生當墮鐵鷹獄利爪而悖擊常時受苦惱罪報懺悔若人好傷殺水族諸物命後墮鎔銅河為業火燒煮罪報懺悔若自貪成事而掩斥他善墮彼鐵磨獄悲號無救度罪報懺悔若人不饒益當受多種形兩山夾其身逼切復加楔罪報懺悔若人説非法破壞於橋梁鋒刃以為路驅彼而來往罪報懺悔以甲傷蚤虱墮二羺頭山相擊死還生展轉而受苦罪報懺悔依止出離道而不護禁戒墮煻煨獄中肢體皆消爛罪報懺悔矯現諸威儀苟求邪活命死墮糞獄中為蛆蟲咂食罪報懺悔見五穀中蟲不擇而舂䑔墮鐵碓獄中常為彼舂搗罪報懺悔見他苦生喜諂曲多疑惑常懷思惡心作琰魔羅卒罪報懺悔諸苦果種子少略而分別清淨身語意畢竟常遠離罪報懺悔若人不樂施復盜衆飲食墮在癭鬼中常噉諸糞穢罪報懺悔若有障人施於己物生吝墮針口鬼中腹大常飢渴罪報懺悔無嗣慳財物不捨不受用墮匱乏鬼中得他亭殘棄罪報懺悔希望他施慧自少施生悔墮下劣鬼中常食於涎唾罪報懺悔樂聞他過失加惡語宣傳墮焰口鬼中長受諸苦惱罪報懺悔好起諸鬬諍無少慈愍心墮極醜鬼中食蜎蠕蟲類罪報懺悔恐挾取他財得已或少施墮極醜鬼中他怖獲微祀罪報懺悔若人多宴樂廣殺諸物命自食復與他後墮羅剎鬼罪報懺悔於供養香華或嗅或私取由起少貪心後作尋香鬼罪報懺悔若人相崇奉於己有所求怒色希彼財後作猛惡鬼罪報懺悔若人於他娶常樂作媒伐後懷惡相離死作部多鬼罪報懺悔若人樂飲酒過量復顛酗或持勸他人後作藥叉鬼罪報懺悔於父母師長所欲相違背後生藥叉宮勇健多卒暴罪報懺悔彼慳貪過失常生餓鬼中苦樂隨自因是故勿復造罪報懺悔又阿含經云世尊告諸比丘凡夫之人不聞不知説法時節比丘當知有八不聞知節人不得修行一者若如來出現在時廣演教法得至涅槃如來之所然此衆生在地獄中不聞不覩罪報懺悔二者若復如來出現世時廣演教法得至涅槃然此衆生在畜生中不聞不覩罪報懺悔三者復次如來出現世時廣演教法得至涅槃然此衆生在餓鬼中不聞不覩罪報懺悔四者復次如來出現世時廣演教法得至涅槃然此衆生在長壽天上不聞不覩罪報懺悔五者復次如來出現世時廣演教法得至涅槃然此衆生在邊地上誹謗賢聖造諸邪業罪報懺悔六者復次如來出現世時廣演教法得至涅槃然此衆生生於中國不具六根亦復不別善惡之法罪報懺悔七者若復如來出現在時廣演教法得至涅槃然此衆生在於中國雖復六根完具無所缺漏然彼衆生心識邪見無所慧解無施亦無受者亦無善惡之報無今世後世亦無父母亦無沙門婆羅門等成就得阿羅漢者自身作證而自遊樂罪報懺悔八者復次如來不出現世亦復不説法便至涅槃者又此衆生生在中國六根完具堪任受法聰明高才聞法作解修行正見便有物有施有受者有善惡之報有今世後世亦有沙門婆羅門等修正見取證得阿羅漢者不聞不覩罪報懺悔我等為無明所覆不識三途八難罪因今遇道場乃能覺知歸命毗盧遮那如來及一切賢聖海衆燒香散華三途八難罪因發露懺悔不敢覆藏由此因緣我及法界衆生海一切業報願皆清淨次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三遍百劫積集罪一念悉蕩除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白衆等聽説經中無常偈始憶容顏華柳色誰知鬢髮亂線垂欲識閻王催命使白髮來報遣君知無常殺鬼難求及立追即去不容遲眼見人人磨滅盡自身更得幾多時
