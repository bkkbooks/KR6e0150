抱炭出熱沸屎河驅令入中中有鐵觜毒蟲從鼻中入腳底出從足下入口中出竪劍道中驅令馳走足下破碎如厨膾肉利刀劍矟飛入身中譬如霜樹落葉隨風亂墜罪人手足耳鼻肢節皆被斫剝割截在地流血成池二大惡狗一名賖摩二名賖婆羅鐵口猛毅破碎人筋骨力踰虎豹猛如師子有大刺林驅逼罪人強令上樹罪人上時刺便下向下時刺便上向大身毒蛇蝮蝎惡蟲競來囓之大鳥長觜破頭噉腦入鹹河中隨流上下出則蹈熱鐵地行鐵刺上或坐鐵弋弋從下入以鉗開口灌以洋銅吞熱鐵丸入口口焦入咽咽爛入腹腹然五藏皆焦直過墮地但見惡色恆聞臭氣常觸粗澀遭諸苦痛迷悶委頓或狂逸唐突或藏竄投擲或顛仆墮落此人宿行多造大惡五逆重罪斷諸善根法言非法非法言法實言非實非實言實破因破果憎嫉善人以是罪故入此地獄受罪最劇罪報懺悔如是等種種八大地獄復有十六小地獄為眷屬八寒氷八炎火其中罪毒不可見聞八炎火地獄者一名炭坑二名沸屎三名燒林四名劒林五名刀道六名鐵刺林七名鹹河八名銅橛是為八八寒氷地獄者一名頞浮陀二名尼羅浮陀三名呵羅羅寒戰顫聲也四名呵婆婆亦患寒聲五名喉喉亦患惡聲六名漚波羅此地獄形譬似青蓮華也七名波頭摩紅蓮華罪人中一種受苦八名摩訶波頭摩是為八若破清淨戒出家法令白衣輕賤佛道或推衆生著火坑中或衆生命未盡傾於火上炙之如是等種種因緣墮炭坑地獄中大火炎炭至膝燒罪人身罪報懺悔若沙門婆羅門福田食以不淨手觸或先噉或以不淨物著中或以熱沸屎灌他身破淨命以邪命自活如是等種種因緣墮沸屎地獄中沸屎深廣如大海水中有細蟲以鐵為觜破罪人頭噉腦破骨食髓罪報懺悔若焚燒草木傷害諸蟲或燒林大獵為害彌廣如是等種種因緣墮燒林地獄中草木火然以燒罪人罪報懺悔若執持刀劒鬬爭傷殺若斫樹壓人以報宿怨若人以忠信誠告而密相中陷如是等種種因緣墮劒林地獄中此地獄罪人入中風吹劒葉割截手足耳鼻皆令墮落是時林中有雕鷲惡狗來食其肉罪報懺悔若以利刀刺人若橛若槍傷人若斷截道路撥撤橋梁破正法道示以非法道如是等種種因緣墮刀道地獄中刀道地獄中於絶壁狹道中竪利刀令罪人從上而過罪報懺悔若犯邪淫侵他婦女貪愛樂觸如是等種種因緣墮鐵刺林地獄中刺樹高一由旬上有大毒蛇化作美女身喚此罪人上來共汝作樂獄卒驅之令上刺皆向下貫刺罪人身被刺害入骨徹髓既至樹上化女還復蛇身破頭入腹處處穿穴皆悉破爛忽復還活身體平復化女復在樹下喚之獄卒以箭仰射呼之令下刺復仰刺既得到地化女身復作毒蛇破罪人身罪報懺悔如是久久從熱鐵刺林出遙見河水清涼快樂走往趣之入中變成熱沸鹹水罪人在中須臾之頃皮肉離散骨立水中獄卒羅剎以叉鉤出持著岸上此人宿行因緣傷殺水性魚鱉之屬或時推人及諸衆生令沒水中或投之沸湯或投之氷水如是等種種惡業因緣故受此罪罪報懺悔若在銅橛地獄獄卒羅剎問諸罪人汝何處來答曰我苦悶不知來處但患飢渴若言渴是時獄卒即驅逐罪人令坐熱銅橛上以鐵鉗開口灌以洋銅若言飢坐之銅橛吞以鐵丸入口口焦入咽咽爛入腹腹然五藏爛壞直過墮地此人宿行因緣劫盜他財以自供口諸出家人或時詐病多求酥油石蜜或無戒無禪無有智慧而多受人施或惡口傷人如是等種種宿業因緣墮銅橛地獄罪報懺悔若人墮頞浮陀地獄中其處積氷毒風來吹令諸罪人皮毛裂落筋肉斷絶骨破髓出即復完堅受罪如初此人宿業因緣寒月剝人或劫盜凍人口口薪火或作惡龍瞋毒忿恚放大雹雨氷凍害人或輕賤謗毀若佛及佛弟子持戒之人或口四業作衆重罪如是等種種因緣墮頞浮陀地獄中尼羅浮陀亦如是頞浮陀少時有間暫得休息尼羅浮陀無間無休息時呵婆婆呵羅羅睺睺此三地獄寒風噤顫口不能開因其呼聲而以名獄漚波羅獄中凍氷浹泄有似青蓮華波頭摩狀如此間好蓮華摩訶波頭摩是中拘迦離住處有智之人聞是驚言咄以此無明恚愛法故乃受此苦出而復入無窮無已罪報懺悔我等為無明所覆不識三界罪因今遇道場乃能覺知歸命毗盧遮那如來及一切賢聖海衆燒香散華一切業報發露懺悔不敢覆藏由此因緣我及法界衆生海三界業報願皆清淨次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三遍百劫積集罪一念悉蕩除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白衆等聽説經中無常偈富貴皆無常合會必有離人命如電光強力悉應死無常壞寶山死魔除盛滿勝法常堅固不放逸應修
