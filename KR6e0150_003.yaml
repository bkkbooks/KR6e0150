body:
  text: 唐蘭山雲巖慈恩寺護法國師行沙門慧覺依經録宋蒼山載光寺沙門普瑞補注明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閲天台習教觀沙門正止治定第三晌次法界菩提道場中異生海會衆一切恭敬敬禮無盡三寶是諸衆等人各胡跪嚴持香華如法供養願此供海雲遍滿十方界阿僧祗清淨寶座敷衆實衣阿僧祗寶帳寶網垂布阿僧祇寶蓋一切妙寶㸦相映徹阿僧祇寶雲普雨衆寶阿僧祗寶華周遍清淨阿僧祇衆寶所成欄楯軒檻清淨莊嚴阿僧祇寶鈴常演諸佛微妙音聲周流法界阿僧祇寶蓮華種種寶色開敷榮耀阿僧祇寶樹周匝行列無量妙寶以為華果阿僧祇寶宮殿無量菩薩止住其中阿僧祇寶樓閣廣博崇麗延袤遠近阿僧祇寶却敵大寶所成莊嚴妙好阿僧祇寶門闥妙寶瓔珞周匝垂布阿僧祇寶窗牖不思議寶清淨莊嚴阿僧祇寶多羅樹形如半月衆寶集成如是一切悉以衆寶而為嚴飾離垢清淨不可思議無非如來善根所起具足無數寶藏莊嚴以如是等諸供養具常為供養帝網重重諸佛菩薩賢聖海衆受此香華雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次供養總持捺麻囉得捺二合得囉二合也引也捺麼末重遏斡矴末日囉二合薩囉不囉二合麻㗚怛二合禰怛達遏怛也啞㗚曷二合矴薩滅屹三二合莫捺重引也怛涅達唵末唧囉二合末唧囉麻曷引末唧囉二合麻曷引矴桚末唧呤麻曷引眉㗚也二合末唧囉二合麻曷磨溺重即舌腭怛末唧哩二合磨曷磨溺慢伸當巴珊葛囉麻捺也末唧哩二合薩㗚末二合葛㗚麻二合啞斡囉捺舌腭眉商𭊁捺末唧囉二合莎引曷引梵音讚佛如來甚深智普入於法界能隨三世轉與世為明導諸佛同法身無依無差別隨諸衆生意今見佛色形具足一切智遍知一切法一切國土中一切無不見直言讚佛如來清淨妙法身一切三界無倫匹以出世間言語道其性非有非無故雖無所依無不住雖無不至無不去如空中畫夢所見當依佛體如是觀如於此會見佛座一切塵中悉如是佛身無去亦無來所有功德皆明現菩薩住於母胎中十種最中微細現慈心住天及初生乃至成道入涅槃廣大寂靜三摩地不生不滅無來去嚴淨國土示衆生此樹華神之解脫或現童男童女形天龍及以阿修羅乃至摩睺羅伽等隨其所樂悉令見衆生形相各不同行業音聲亦無量如是一切皆能現海印三昧威神力真如平等無相身離垢光明淨法身慧智寂靜無量身普應十方而演法如來非以相為體但是無相寂滅法身相威儀悉具足世間隨樂皆得見如來一一毛孔中一切剎塵諸佛坐菩薩衆會共圍繞演説普賢之勝行佛以本願現神通一切十方無不照如佛往昔修治行光明網中皆演説或為日月遊空中或作河池井泉水又或變作為地界又亦能作風及火汝應觀佛一毛孔一切衆生悉在中彼亦不來亦不去此普見王之所了佛身普遍諸大會充滿法界無窮窮寂滅無性不可取為救世間而出現南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十回向菩薩十地菩薩等覺菩薩遍法界剎海微塵數菩薩一切海衆南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海衆南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中初色界諸天會經云爾時如來道場海衆至名稱光天悟斯法願共諸衆生往生華藏海極樂淨土中次法界菩提道場內大自在天王衆南無得法界虗空界寂靜方便力解脫門妙𦦨海大自在天王南無得普觀一切法悉自在解脫門自在名稱光天王南無得知一切法不生不滅不來不去無功用行解脫門清淨功德眼天王南無得現見一切法真實相智慧海解脫門可愛樂大慧天王南無得與衆生無邊安樂大方便定解脫門不動光自在天王南無得令觀寂靜法滅諸癡暗怖解脫門妙莊嚴眼天王南無得善入無邊境界不起一切諸有思惟業解脫門善思惟光明天王南無得普往十方説法而不動無所依解脫門可愛樂大智天王南無得入佛寂靜境界普現光明解脫門普音莊嚴幢天王南無得住自所悟處而以無邊廣大境界為所緣解脫門名稱光善精進天王南無如是等而為上首其數無量一切大自在天王十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次可愛樂法光明幢至清淨光天能演説願共諸衆生往生華藏海極樂淨土中次法界菩提道場中廣果天王衆南無得普觀一切衆生根為説法斷疑解脫門可愛樂法光明幢天王南無得隨憶念令見佛解脫門淨莊嚴海天王南無得法性平等無所依莊嚴身解脫門最勝慧光明天王南無得了知一切世間法一念中安立不思議莊嚴海解脫門自在智慧幢天王南無得於一毛孔現不思議佛剎無障礙解脫門樂寂靜天王南無得入普門觀察法界解脫門普智眼天王南無得為一切衆生種種出現無邊劫常現前解脫門樂旋慧天王南無得觀一切世間境界入不思議法解脫門善種慧光明天王南無得示一切衆生出要法解脫門無垢寂靜光天王南無得觀察一切應化衆生令入佛法解脫門廣大清淨光天王南無如是等而為上首其數無量廣果一切天王十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次清淨慧名稱天王至此妙音天所入門願共諸衆生往生華藏海極樂淨土中次法界菩提道場中遍淨天王衆南無得了達一切衆生解脫道方便解脫門清淨慧名稱天王南無得隨一切諸天衆所樂如光影普示現解脫門最勝見天王南無得普嚴淨一切佛境界大方便解脫門寂靜德天王南無得隨諸衆生永流轉生死海解脫門須彌音天王南無得憶念如來調伏衆生行解脫門淨念眼天王南無得普門陀羅尼海所流出解脫門可愛樂普照天王南無得能令衆生值佛生信藏解脫門世間自在主天王南無得能令一切衆生聞法信喜而出離解脫門光𦦨自在天王南無得入一切菩薩調伏行如虗空無邊無盡解脫門樂思惟法變化天王南無得觀衆生無量煩惱普悲智解脫門變化幢天王南無得放光現佛三輪攝化解脫門星宿音妙莊嚴天王南無如是等而為上首其數無量一切遍淨天王十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次可愛樂光明天王至最勝光聞大歡喜願共諸衆生往生華藏海極樂淨土中次法界菩提道場中光音天王衆南無得恆受寂靜樂而能降現消滅世間苦解脫門可愛樂光明天王南無得大悲心相應海一切衆生喜樂藏解脫門清淨妙光天王南無得一念中普現無邊劫一切衆生福德力解脫門自在音天王南無得普使成住壞一切世間皆悉如虗空清淨解脫門最勝念智天王南無得愛樂信受一切聖人法解脫門可愛樂淨妙音天王南無得能經劫住演説一切地義及方便解脫門善思惟音天王南無得一切菩薩從兜率天宮沒下生時大供養方便解脫門演莊嚴音天王南無得觀察無盡神通智慧海解脫門甚深光音天王南無得一切佛功德海滿足出現世間方便力解脫門廣大名稱天王南無得如來往昔誓願力發生深信愛樂藏解脫門最勝淨光天王南無如是等而為上首其數無量一切光音天王十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次尸棄梵王至此海音王之解脫願共諸衆生往生華藏海極樂淨土中次法界菩提道場中大梵天王衆南無得普住十方道場中説法而所行清淨無染著解脫門尸棄梵王南無得使一切衆生入禪三昧住解脫門慧光梵王南無得普入一切不思議法解脫門善思慧光明梵王南無得入諸佛一切音聲海解脫門普雲音梵王南無得能憶念菩薩教化一切衆生方便解脫門觀世言音自在梵王南無得現一切世間業報相各差別解脫門寂靜光明眼梵王南無得隨一切衆生品類差別皆現前調伏解脫門普光明梵王南無得住一切法清淨相寂滅行境界解脫門變化音梵王南無得於一切有無所著無邊際無依止常勤出現解脫門光耀眼梵王南無得常思惟觀察無盡法解脫門悅意海音梵王南無如是等而為上首不可數一切大梵天王十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次自在天王至此妙光天之所悟願共諸衆生往生華藏海極樂淨土中次法界菩薩道場中他化自在天王衆初欲界諸天會南無得現前成熟無量衆生自在藏解脫門自在天王南無得觀察一切衆生樂令入聖境界樂解脫門善目主天王南無得隨諸衆生種種欲解令起行解脫門妙寶幢冠天王南無得普攝為一切衆生所説義解脫門勇猛慧天王南無得憶念如來廣大慈增進自所行解脫門妙音句天王南無得示現大悲門摧滅一切憍慢幢解脫門妙光幢天王南無得調伏一切世間嗔害心解脫門寂靜境天王南無得十方無邊佛隨憶念悉來赴解脫門妙輪莊嚴幢天王南無得隨衆生心念普現成正覺解脫門華光慧天王南無得普入一切世間大威力自在法解脫門因陀羅妙光天王南無如是等而為上首無數他化自在一切天王十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次善化天王至此普見王之所了願共諸衆生往生華藏海極樂淨土中次法界菩提道場中化樂天王衆南無得開示一切業變化力解脫門善化天王南無得捨離一切攀緣解脫門寂靜音光明天王南無得普滅一切衆生癡暗心令智慧圓滿解脫門變化力光明天王南無得示現無邊悅意聲解脫門莊嚴主天王南無得了知一切佛無盡福德相解脫門念光天王南無得普知過去一切劫成壞次第解脫門最上雲音天王南無得開悟一切衆生智解脫門勝光天王南無得舒光疾滿十方虗空界解脫門妙髻天王南無得一切所作無能壞精進力解脫門喜慧天王南無得知一切衆生業所受報解脫門華光髻天王南無得示現不思議衆生形類差別解脫門普見十方天王南無如是等而為上首其數無量一切化樂天王十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次知足天王至妙莊嚴天斯善了願共諸衆生往生華藏海極樂淨土中次法界菩提道場中兜率陀天王衆南無得一切佛出興世圓滿教輪解脫門知足天王南無得盡虗空界清淨光明身解脫門喜樂海髻天王南無得消滅世間苦淨願海解脫門最勝功德幢天王南無得普現