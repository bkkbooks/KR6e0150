body:
  text: 唐蘭山雲巖慈恩寺護法國師一行沙門慧覺依經録宋蒼山載光寺沙門普瑞補注明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閲天台習教觀沙門正止治定第二十九晌次十住位中後五善知識會一切恭敬敬禮無盡三寶是諸衆等人各胡跪嚴持香華如法供養願此供海雲遍滿十方界施種種上妙幢幡衆寶為竿寶繒為幢種種雜綵以為其幡寶網垂覆光色遍滿寶鐸微搖音接相和奇特妙寶形如半月閻浮檀金光踰皎日悉置幢上隨諸世界業果所現種種妙物以為嚴飾如是無數千萬億那由他諸妙幢幡接影連輝遞相間發光明嚴潔周遍大地充滿十方虗空法界一切諸剎以如是等諸供具常作供養帝網重重諸佛菩薩賢聖海衆受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次不空摩尼印呪唵啞麼遏布麻禰巴能麻末𠷌呤怛達遏怛眉浪雞矴薩慢怛不囉薩囉吽梵音讚佛如來大智慧普淨諸世間世間既盡已開示諸佛法設有人欲見衆生數等佛靡不應其心而實無來處以為佛境界專念而不息此人得見佛其數與心等直言讚佛如來應正等覺以心自在力無起無轉而轉法輪知一切法恆無起故乃至如來一切轉法處普入一切衆生一切法一切業一切報中而無所住一切衆生種種語言皆悉不離如來法輪言音實相即法輪故如來應正等覺有三昧名究竟無礙無畏入此三昧已於成正覺一一身一一口各出一切衆生數等言音一一音中具足衆音各各差別而轉法輪令一切衆生皆生歡喜能如是知轉法輪者當知此人則為隨順一切佛法不如是知則非隨順南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住𦦨魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十回向菩薩十地菩薩等覺菩薩遍法界剎海微塵數菩薩一切海衆南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海衆南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中第六海幢比丘普莊嚴清淨門解脫法門經云爾時善財童子至清淨光明辭退而行願共諸衆生往生華藏海極樂淨土中南無東近閻浮提南畔摩利伽羅國得普行般若境界清淨光明又得普莊嚴清淨門海幢比丘南無海幢比丘從其足下所出無數百千億長者居士婆羅門一切衆南無從海幢比丘兩膝所出無數百千億剎帝利婆羅門一切衆南無從海幢比丘腰間所出等衆生數無量仙人一切衆南無從海幢比丘兩脅所出不思議龍及不思議龍女一切衆南無從海幢比丘𮌎前卍字吉祥中所出無量百千億阿修羅王一切衆南無從海幢比丘背上所出無數百千億聲聞獨覺一切衆南無從海幢比丘兩肩所出無數百千億一切諸夜叉羅剎王衆南無從海幢比丘腹中所出無數百千億緊那羅王各有無數緊那羅女前後圍繞又出無數億百千乾闥婆王各有無數乾闥婆女前後圍繞一切衆南無從海幢比丘面門所出無數百千億一切轉輪聖王一切衆南無從海幢比丘兩目所出無數百千億日輪光明一切衆南無從海幢比丘眉間白毫中所出無量百千億帝釋一切衆南無從海幢比丘額上所出無數百千億梵天王一切衆南無從海幢比丘頭上所出無量佛剎微塵數諸菩薩一切衆南無從海幢比丘頂上所出無量百千億如來身一切衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中第七休捨優婆夷離憂安隱幢解脫法門經云爾時善財童子至作是念已辭退而行願共諸衆生往生華藏海極樂淨土中次休捨優婆夷聞法修梵行處佛南無十方一切諸佛南無燃燈佛南無離垢佛南無妙幢佛南無勝須彌佛南無蓮華德藏佛南無毗盧遮那佛南無普眼佛南無梵壽佛南無金剛佛南無婆樓那天佛次休捨優婆夷南無海潮住處普莊嚴園林中得安隱幢解脫門休捨優婆夷十方盡歸命滅罪增淨信願生華藏海極樂淨土中第八毗目瞿沙仙人無勝幢解脫法門經云爾時善財童子至殷勤瞻仰辭退南行願共諸衆生往生華藏海極樂淨土中次毗目瞿沙令善財所見諸佛南無善財所見諸佛境界道場一切海衆次毗目瞿沙仙人南無南方海潮那羅境中得菩薩無勝幢解脫門毗目瞿沙仙人十方盡歸命滅罪增淨信願生華藏海極樂淨土中第九勝熱婆羅門無盡輪解脫法門經云爾時善財童子至繞無數匝辭退而去願共諸衆生往生華藏海極樂淨土中南無南方住伊沙那聚落得無盡輪解脫勝熱婆羅門南無善財童子勝緣勸導住虗空中十千初禪色界一切梵天衆南無善財童子勝緣勸導住虗空中十千惡魔十千自在天王十千化樂天王十千兜率陀天王十千三十三天王天子天女一切眷屬南無善財童子勝緣勸導住虗空中一切十千龍王十千夜叉王十千乾闥婆王十千阿修羅王十千迦樓羅王十千緊那羅王及無量龍女等南無善財童子勝緣勸導住虗空中無量一切欲界諸天十方盡歸命滅罪增淨信願生華藏海極樂淨土中第十慈行童女得般若波羅蜜普莊嚴解脫法門經云爾時善財童子至戀慕瞻仰辭退而行願共諸衆生往生華藏海極樂淨土中次慈行宮中一一莊嚴中一切佛南無毗盧遮那藏莊嚴殿中一一壁中法界內一切如來南無毗盧遮那藏莊嚴殿中一一柱中法界內一切如來南無毗盧遮那藏莊嚴殿中一一鏡中法界內一切如來南無毗盧遮那藏莊嚴殿中一一相中法界內一切如來南無毗盧遮那藏莊嚴殿中一一形中法界內一切如來南無毗盧遮那藏莊嚴殿中一一摩尼寶中法界內一切如來南無毗盧遮那藏莊嚴殿中一一莊嚴具中法界內一切如來南無毗盧遮那藏莊嚴殿中一一金鈴中法界內一切如來南無毗盧遮那藏莊嚴殿中一一寶樹中法界內一切如來南無毗盧遮那藏莊嚴殿中一一寶形像中法界內一切如來南無毗盧遮那藏莊嚴殿中一一寶瓔珞中法界內一切如來次慈行童女得法門處佛南無慈行童女參三十六恆河沙諸佛次慈行童女南無南方師子奮迅城中得般若波羅蜜能遍莊嚴解脫門慈行童女南無圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩十方盡歸命滅罪增淨信願生華藏海極樂淨土中次十不善業懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖衆世出世神慈悲本願放大光明照於法會證盟護念哀愍攝受願我及一切衆生海自從無始直至今時業海無盡帝網重重十不善業發露懺悔夫十不善業者外道正教權小頓漸遍圓悉皆顯說今依圓教說十善者亦攝其餘經云菩薩性自遠離一切殺生不畜刀杖不懷怨恨有慚有愧仁恕具足於一切衆生有命之者常生利益慈念之心是菩薩尚不惡心惱諸衆生何況於他起衆生想故以重意而行殺害不悟此法今皆懺悔性不偷盜菩薩於自資財常知止足於他慈恕不欲侵損若物屬他起他物想終不於此而生盜心乃至草葉不與不取何況其餘資生之具不悟此法今皆懺悔性不邪淫菩薩於自妻知足不求他妻於他妻妾他所護女親族媒定及為法所護尚不生貪染之心何況從事況於非道不悟此法今皆懺悔性不妄語菩薩常作實語真語時語乃至夢中亦不忍作覆藏之語無心欲作何況故犯不悟此法今皆懺悔性不兩舌菩薩於諸衆生無離間心無惱害心不將此語為破彼故而向彼說不將彼語為破此故而向此說未破者不令破已破者不增長不喜離間不樂離間不作離間語不說離間語若實若不實不悟此法今皆懺悔性不惡口所謂毒害語粗獷語苦他語令他嗔恨語現前語不現前語鄙惡語庸賤語不可樂聞語聞者不悅語嗔忿語如火燒心語怨結語熱惱語不可愛語不可樂語能壞自身他身語如是等語皆悉捨離常作潤澤語柔軟語悅意語可樂聞語聞者喜悅語善入人心語風雅典則語多人愛樂語多人悅樂語身心踊躍語不悟此法今皆懺悔性不綺語菩薩常樂思審語時語實語義語法語順道理語巧調伏語隨時籌量決定語是菩薩乃至戲笑尚恆思審何況故出散亂之言不悟此法今皆懺悔性不貪欲菩薩於他財物他所資用不生貪心不願不求不悟此法今皆懺悔性離嗔恚菩薩於一切衆生恆起慈心利益心哀愍心歡喜心和潤心攝受心永捨嗔恨怨害熱惱常思順行仁慈祐益不悟此法今皆懺悔又離邪見菩薩住於正道不行占卜不取惡戒心見正直無誑無諂於佛法僧起決定信不悟此法今皆懺悔佛子菩薩摩訶薩如是護持十善業道常無間斷復作是念一切衆生墮惡趣者莫不皆以十不善業是故我當自修正行亦勸於他令修正行何以故若自不能修行正行令他修者無有是處佛子此菩薩摩訶薩復作是念十不善業道是地獄畜生餓鬼受生因十善業道是人天乃至有頂處受生因又此上品十善業道以智慧修習心狹劣故怖三界故闕大悲故從他聞聲而解了故成聲聞乘又此上品十善業道修治清淨不從他教自覺悟故大悲方便不具足故悟解甚深因緣法故成獨覺乘又此上品十善業道修治清淨心廣無量故具足悲愍故方便所攝故發生大願故不捨衆生故希求諸佛大智故淨治菩薩諸地故淨修一切諸度故成菩薩廣大行又此上上十善業道一切種清淨故乃至證十力四無畏故一切佛法皆得成就是故我今等行十善應令一切具足清淨如是方便菩薩當學佛子此菩薩摩訶薩又作是念十不善業道上者地獄因中者畜生因下者餓鬼因於中殺生之罪能令衆生墮於地獄畜生餓鬼若生人中得二種果報一者短命二者多病罪報懺悔偷盜之罪亦令衆生墮三惡道若生人中得二種果報一者貧窮二者共財不得自在罪報懺悔邪淫之罪亦令衆生墮三惡道若生人中得二種果報一者妻不貞良二者不得隨意眷屬罪報懺悔妄語之罪亦令衆生墮三惡道若生人中得二種果報一者多被誹謗二者為他所誑罪報懺悔兩舌之罪亦令衆生墮三惡道若生人中得二種果報一者眷屬乖離二者親族弊惡罪報懺悔惡口之罪亦令衆生墮三惡道若生人中得二種果報一者常聞惡聲二者言多諍訟罪報懺悔綺語之罪亦令衆生墮三惡道若生人中得二種果報一者言無人受二者語不明了罪報懺悔貪欲之罪亦令衆生墮三惡道若生人中得二種果報一者心不知足二者多欲無厭罪報懺悔嗔恚之罪亦令衆生墮三惡道若生人中得二種果報一者常被他人求其長短二者恆被他人之所惱害罪報懺悔邪見之罪亦令衆生墮三惡道若生人中得二種果報一者生邪見家二者其心諂曲罪報懺悔佛子十不善業道能生此等無量無邊衆大苦聚是故菩薩作如是念我當遠離十不善道以十善道為法園苑愛樂安住自住其中亦勸他人令住其中又作是念一切衆生分別彼我互相破壞鬬諍嗔恨熾然不息罪報懺悔一切衆生貪取無厭惟求財利邪命自活罪報懺悔一切衆生常隨三毒種種煩惱因之熾然不解志求出要方便罪報懺悔一切衆生為愚癡重暗妄見厚膜之所覆故入陰翳稠林失智慧光明行曠野險道起諸惡見罪報懺悔一切衆生在於生死險道之中將墮地獄餓鬼畜生入惡見網中為愚癡稠林所迷隨逐邪道行顛倒行譬如盲人無有導師非出要道謂為出要入魔境界惡賊所攝隨順魔心遠離佛意罪報懺悔一切衆生為大瀑河波浪所沒入欲流有流無明流見流生死洄澓愛河漂轉湍馳奔激不暇觀察為欲覺恚覺害覺隨逐不捨身見羅剎於中執取將其永入愛欲稠林於所貪愛深生染著住我慢原阜安六處聚落無善救者無能度者罪報懺悔一切衆生處世牢獄多諸苦惱常懷愛憎自生憂怖貪欲重械之所繫縛無明稠林以為覆障於三界內莫能自出罪報懺悔一切衆生執著於我於諸蘊窟宅不求出離依六處空聚起四顛倒行為四大毒蛇之所侵惱五蘊怨賊之所殺害受無量苦罪報懺悔一切衆生其心狎劣不行最上一切智道雖欲出離但樂聲聞辟支佛乘罪報懺悔我等為無明所覆不識十惡業道四類所異不解淺深極細五法不能分別今遇道場方能覺知歸命毗盧遮那如來及一切賢聖海衆燒香散華十不善業發露懺悔不敢覆藏由此因緣我及法界衆生海十不善業一切罪障悉願清淨次懺悔滅罪印呪唵薩㗚末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三遍百劫積集罪一念盡蕩除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪嗔癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白衆等聽說經中無常偈常求諸欲境不行於善事云何保形命不見死來侵命根氣欲盡肢節悉分離衆苦與死俱此時徒歎恨兩目俱翻上死力隨業受心思悉應驚互相不能救將至閻羅所隨業而受報勝因生善道惡業墮泥犁
