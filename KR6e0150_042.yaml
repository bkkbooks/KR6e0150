body:
  text: 唐蘭山雲巖慈恩寺護法國師行沙門慧覺依經録宋蒼山載光寺沙門普瑞補注明欽忠義忠盡四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閲天台習教觀沙門正止治定第四十二晌別啓慈光攝生阿彌陀佛會初當學禮敬諸佛願我十方諸衆生恆常親近於諸佛承事供養勿令絶聽受正法常修學次應學禮敬法藏願我十方諸衆生於法親近常受持讀誦思惟如法修及與他人而演説次當學禮敬賢聖願令十方諸衆生恆常親近賢聖僧供養承事無疲厭令菩提心永不退次當學念佛發願以虔誠心念彌陀如是稱名至十念惟願慈悲護念我我及一切諸衆生次當學懺悔回向宿業重罪速消滅離諸障染增淨信所求善願令圓滿見彌陀面生淨土次奉施寶錯呪寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次虗空藏印呪唵誐誐曩三婆嚩巴桚囉斛矴三巴重囉三巴囉吽復結虗空藏印呪後印流出無量供衣服飲食樓閣等瑜伽廣説實難窮縱使觀行力輕微呪印加持威神力攝受供物成真實一一如同極樂剎現有供養願佛法僧體常遍亦此香華同法性遍滿一切諸佛剎皆悉芬馥作佛事運心供養應念十方諸供養恆常遍滿無不有香華瓔珞幢幡蓋諸供養具樂衆音飲食衣服明燈燭臥具翳藥宮殿等所有供具皆思念共諸如來而供養隨喜供養又願諸剎供養者我今歡喜皆隨喜若或未修供養者開示引導令修作發願供養願我普遍諸剎土一切佛法僧寶處種種莊嚴供養具一切衆生供奉持一切諸佛之法身色身形像并舍利浮圖塔廟佛事等此等皆悉而供養願法座及説法所法界賢聖僧衆處我及一切諸有情普供同作廣大供修行供養修行如是供養已漸得六種波羅蜜慈悲喜捨四無量皆悉成就應憶念離相供養一切諸法本寂靜無生無滅等一味離念清淨畢竟圓如是觀念深悟思梵音讚佛如來一毛孔放不思議光普照諸衆生煩惱悉令滅如來一毛孔出生無盡華遍周法界內除滅衆生苦佛演一妙音隨類悉令解悉雨大法雨令發菩提心直言讚佛夫阿彌陀佛者以實相而為體用般若而為心金容蕩蕩報身住於淨方妙相巍巍應化隨機所現衆聖圍繞如皎月處於羣星相好端嚴似青蓮敷於碧沼毫光散彩頞珠朗於五山紺目澄清眼秀同如四海大慈大悲分身三十六萬同名同號變相九千五百一日放十二光接引念佛衆生四十八願不捨大悲聖者尋聲救苦於娑婆勢至菩薩慈心誘接於羣品惟願彌陀海會聖衆身住華臺心存佛境善哉聖德超言思矣南無十方三世盡虗空界微塵剎土中法身色身形像舍利浮圖塔廟一切佛事又於法藏及講法處一切菩薩賢聖海衆三遍南無西方極樂世界三十六萬億一十一萬九千五百四十八願慈光攝生阿彌陀佛觀音勢至清淨大海衆十遍或二十一遍至心懺悔惟願十方諸慈尊我及一切諸有情願作證明護念我我今懺悔復不造無量劫中所作罪十惡五逆犯四重毀謗三寶一闡提速願消滅得清涼復應思惟如是罪但從顛倒虗妄起無有決定而可得本來空寂常清淨願我及與諸衆生速疾普共得開道速達本心無錯謬永絶罪根盡無餘附慈覺懺悔文某甲等普及四恩三有法界衆生法身壽命本智光明與阿彌陀佛同一體性而無量劫來不了自心起惑造業或不孝父母不順師長殘忍無慈殺生偷盜不淨邪淫妄言綺語兩舌惡口及貪嗔癡十惡熾然無罪不造隨順邪師不信三寶或破五戒八戒十戒二十五戒二百五十戒五百戒十重四十八輕三千威儀八萬細行具足闡提撥無因果誹謗大乘方等經典破人善事無慈悲心不肯勸進同梵行者乃至殺父害母殺和尚阿闍梨出佛身血破羯磨轉法輪僧殺阿羅漢破塔壞寺殘毀經相驅役僧徒或用霸道侵損現前十方三寶財物不淨説法污梵行人如是普於三寶聖衆師長父母法界衆生造種種罪或自作教他作或見作隨喜重重無盡遍周法界充塞虗空今對阿彌陀佛皆悉懺悔惟願阿彌陀佛威神力故如湯消氷應念化成無上智覺又復阿彌陀佛四十八願憐愍有情放淨光明攝取不捨所居極樂衆寶莊嚴菩薩往生永不退轉修行無間直至菩提本師釋迦牟尼及十方諸佛殷勤勸讚一念乃至十念一日乃至七日稱名繫念決定往生我等愚迷不信不順或時聞已心則輕笑見念佛人惡心毀謗設有信者無決定心若存若亡或進或退業緣深重世務牽纏身在道場心緣世諦口談極樂意戀娑婆於念佛時心多散亂三種淨業片善無成十六觀心一時不徹臨命終時或遭橫死墻崩屋倒樹折嵓摧水火漂焚蟲傷獸齧刀兵遽至毒藥暴傷卒病臨身不遑念佛或纏綿重病苦逼身心宛轉號呼難安正念或無善友助發淨因由是種種罪業因緣臨命終時不得見佛不得往生淨土還復流轉娑婆五濁惡世三塗八難隨業受生五痛五燒為最極苦未來生死無有盡期或墮胎生金鎖之難五百歲中不得見佛此皆從昔以來不信阿彌陀佛不信往生淨土身口意業輕慢毀謗以是因緣雖復發心多諸障難我今稽首阿彌陀佛惟願天眼見我天耳聞我他心見我大慈大悲哀愍攝受聽我懺悔令我普及四恩三有法界衆生罪障業障煩惱障所知障不信佛言障懶墮修行障三塗長夜障五濁惡世障邊地疑惑障不聞三寶障凡是往生一毫之障悉願消除一切清淨正信現前不疑不退決定往生極樂世界速成正覺轉大法輪圓滿廣大行願至心勸請願令十方諸菩薩一切未成正覺者願得速成等正覺利益一切諸衆生所有以成正覺者願常住持於世間常轉廣大正法輪求請莫入於涅槃至心隨喜願我及與諸衆生見他勝事起嫉妒心慢不善所熏習我今畢竟而棄捨三世一切剎土中所有修學諸功德及與一切成就者我今皆悉盡隨喜至心回向願我所修諸功德資益一切諸衆生悉共回向於佛智速得至於涅槃城我此普賢殊勝行無邊勝福皆回向普願沉溺諸衆生速往無量光佛剎至心發願願弟子普及四恩三有法界衆生從今已去住第一義諦修佛淨業正因孝養父母奉侍師長慈心不殺修十善業受持三歸具足衆戒不犯威儀發菩提心深信因果讀誦大乘勸淨行者念佛念法念僧念戒念施念第一義天以至誠心深心回向發願心稱佛名號讚佛名號讚佛光明觀佛依正十六妙境念佛本起四十八願籌量三輩深入五門隨順三種菩提門信受十方諸佛教或以散心定心惟願阿彌陀佛法力宜加神通顯益令我等凝神覺路暗蹈大方進止威儀不離見佛如執明鏡自見面像及於夢中常見彼國衆妙樂事安慰我心令生增進哀愍覆護法種增長承佛威神遠離魔事又復無量劫來業惑塵勞皆為梵行善根功德同入大因積集諸緣盡用回向臨命終時無諸障難七日已前預知時至身無痛苦心不顛倒身心安樂如入禪定遇善知識教存十念阿彌陀佛與諸聖衆現在其前放大光明授手迎接自見其身乘金剛臺隨從佛後如彈指頃往生彼國已見佛色身衆相具足見諸菩薩色相具足光明寶林演説妙法聞已即悟無生法忍身真金色等無差別三十二相六通自在具大辨才演一切智那羅延身壽命無量供養如意妙服自然不聞惡名不著身見諸上善人俱會一處住正定聚永不退還究竟至於一生補處受用清淨大乘法樂晝夜六時供養阿彌陀佛每日清旦奉事十方如來聞法授記得陀羅尼化身自在周遍十方無佛國中成等正覺極重苦處遊戲神通隨衆生心應所知量對現色相晝夜説法無有休息於念念中令不可説不可説衆生發菩提心於念念中令不可説不可説衆生住普賢行福德資糧悉得圓滿同成無上正等菩提各各莊嚴淨土各各攝化衆生如阿彌陀佛等無有異惟願阿彌陀佛慈悲證盟惟願求生淨土中無諸疾病常安樂所懺罪業盡消滅所發誓願皆圓滿常發求生極樂願所修求生極樂行乃至一華諸行願我及衆生皆圓滿願生九品蓮臺者常修十六妙觀行乃至三種淨業行我及衆生願圓滿所發四十八種願所修二百十億行乃至十念諸行願我及衆生皆圓滿願我臨欲命終時盡除一切諸障礙面見彼佛阿彌陀即得往生安樂利我既往生彼國已現前成就此大願一切圓滿盡無餘利樂一切衆生界彼佛衆會咸清淨我時於勝蓮華生親覩如來無量光現前授我菩提記蒙彼如來授記已化身無數百俱胝智力廣大遍十方普利一切衆生界乃至虗空世界盡衆生及業煩惱盡如是一切無盡時惟願究竟恆無盡願共諸衆生往生華藏海極樂淨土中初西域流傳華嚴諸師夫龍樹菩薩者本是妙雲相佛示迹初地位中是南印土梵之種也家豪富貴幼年聰利超越無倫生一切智解四韋陀天文地理星歷占記諸般幻術無不了解五國名稱嗅香知藥悟欲苦本速發誓願九十日中五印土所有經文悉皆記之開説義理辨如流水自謂一切智人住水晶宮大龍樹菩薩覺知彼故以神力召至於海開七寶藏庫示方廣經見此大不思議經有其三品上本經者有十三千大千世界極微塵數偈一四天下極微塵數品其中本經者有四十九萬八千八百偈一千二百品下本經者有十萬偈三十九品龍樹誦之流傳世間得下本已皎潔慧日照於第一義天運楫慈舟遊於真如性海契三十二之法纂集諸經造大不思議論具十萬偈廣傳西域集大乘無相空之教造十地論五百之偈大莊嚴佛道論大悲方便論各五十頌無畏論十萬偈摩訶衍釋論十卷大智度論百卷其名一切智人我今衆等禮讚功德所獲善根回向一切衆生海願皆永離纏蓋速悟菩提南無依大方廣佛華嚴經造大不思議論一切智者龍樹大師菩薩南無依大方廣佛華嚴經造十地論六相圓融千部論主天親菩薩次東土傳譯華嚴經諸師南無晉朝北印土佛陀跋陀羅覺賢三藏法師南無唐朝中印土地婆訶羅日照三藏法師南無證聖于闐實叉難陀喜學三藏法師次東土正傳華嚴祖師南無大方廣佛華嚴經中第三祖造法界觀帝心法順法師南無大方廣佛華嚴經中第四祖造十玄門雲華智儼法師南無大方廣佛華嚴經中第五祖造探玄記賢首法藏法師南無大方廣佛華嚴經中第六祖造大疏鈔清涼澄觀法師南無大方廣佛華嚴經中清涼門下得如來知見者三十八大師等千餘法師南無大方廣佛華嚴經中第七祖造華嚴綸貫注觀文圭峯宗密禪師南無大方廣佛華嚴經中造觀注記者廣智大師次大夏國弘揚華嚴諸師南無大方廣佛華嚴經中講經律論重譯諸經正趣淨戒鮮卑真義國師南無大方廣佛華嚴經中傳譯經者救脫三藏魯布智雲國師南無大方廣佛華嚴經中令觀門增盛者真國妙覺寂照帝師南無大方廣佛華嚴經中流傳印造大疏鈔者新圓真證帝師南無大方廣佛華嚴經中開演疏鈔久遠流傳臥利華嚴國師南無大方廣佛華嚴經中傳譯開演自在𠵴咩海印國師南無大方廣佛華嚴經中開演流傳智辨無礙頗尊者覺國師南無大方廣佛華嚴經中西域東土依大方廣佛華嚴經十種法行勸讚隨喜一切法師南無大方廣佛華嚴經中蘭山雲巖慈恩寺流通懺法護國一行慧覺法師次八萬四千惑業懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖衆世出世神慈悲本願放大光明照於法會證明護念衰憫攝受願我及一切衆生海自從無始直至今時業海無盡帝網重重一切惑業發露懺悔夫性相諸宗中有八萬四千法門八萬四千功德八萬四千煩惱八萬四千十惡業今末濁時至人人造不善業各各作惡無悔由此怨魔外道破滅正法其八萬四千煩惱有二種釋一者衆生根本煩惱一貪二瞋三慢四無明五疑六身見七邊見八邪見九見取十戒禁取然一惑力復各有十即為一百應分九品但上品重故開為三品中下輕故各為一品合為五百於自五塵總起五百於他五塵總起五百各本一千又有自他五塵一一各別起五百為五千別迷苦諦五千別迷集諦五千別迷滅諦五千別迷道諦五千如是別迷四諦為二萬并本一千為二萬一千又依貪行多者二萬一千依瞋行多者二萬一千依癡行多者二萬一千依等分多者二萬一千總成八萬四千二者以十惡為境漸漸相成一一各成十為一百迷自他五塵成一千於十諦法門迷者其四諦三諦二諦一諦是也若迷故説為諦等十諦惑迷十善即成一萬今迷十諦空有不同分為二萬或云迷十善二諦分為二萬及本一千如餘經説如是等法界帝網惑海業海重重無盡若欲發露懺悔當識逆順十心天台摩訶止觀云若欲懺悔二世重障當識順流十心明知過失當運逆流十心以為對治此二十心通為諸懺之本順流十心者一自從無始闍識昏迷煩惱所醉妄計人我計人我故起於身見身見故妄想顛倒顛倒故起貪嗔癡貪嗔癡故廣造諸業業則流轉生死二者內具煩惱外值惡友扇動邪法勸惑我心倍加隆盛三者內外惡緣既具能內滅善心外滅善事又於他善都無隨喜四者縱恣三業無惡不為五者事雖不廣惡心遍布六者惡心相續晝夜不斷七者覆諱過失不欲人知八者魯扈抵突不畏惡道九者無慙無愧十者撥無因果作一闡提是為十種順生死流昏倒造惡廁蟲樂廁不覺不知積集重纍不可稱計四重五逆極至闡提生死浩然而無際畔今欲懺悔應當逆此罪流用十種心翻除惡法一者先正信因果決定孱然業種雖久久不敗亡終無自作他人受果精識善惡不生疑惑是為深信翻破一闡提心二者自愧尅責鄙極罪人無羞無恥習畜生法棄捨白淨第一莊嚴咄哉無鈎造斯重罪天見我屏罪是故慚天人知我顯罪是故愧人以此翻破無慙無愧心三者怖畏惡道人命無常一息不返千載長往幽途綿邈無有資糧苦海悠深船筏安寄賢聖呵棄無所恃怙年事稍去風刀不奢豈可晏然坐待酸痛譬如野干失耳尾牙詐眠望脫忽聞斷頭心大驚怖遭生老病尚不為急死事弗奢那得不怖怖心起時如履湯火五塵六欲不暇貪染如阿輸柯王聞旃陀羅朝朝振鈴一日已盡六日當死雖有五欲無一念愛行者怖畏苦到懺悔不惜身命如彼野干決絶無所思念如彼怖王以此翻破不畏惡道心四者當發露莫覆瑕疵賊毒惡草急須除之根露條枯源乾流竭若覆藏罪是不良人迦葉頭陀令大衆中發露方等令向一人發露其餘行法但以實心向佛像改革如陰隱有癰覆諱不治則死以此翻破覆藏罪心也五斷相續心者若決果斷奠畢故不造新乃是懺悔懺已更作者如王法初犯得原更作則重初入道場罪則易滅更作難除已能吐之云何更噉以此翻破常念惡事心六者發菩提心昔自安危人遍惱一切境今廣起兼濟遍虗空界利益於他用此翻破遍一切處起惡心也七修功補過者昔三業作罪不計晝夜今善身口意策勵不休非移山嶽安填江海以此翻破縱恣三業心八守護正法者昔自滅善亦滅他善不自隨喜亦不喜他今守護諸善方便增廣不令斷絶辟如全城之勳勝鬘云守護正法攝受正法最為第一以此翻破無隨喜心九念十方佛者昔親狎惡友信受其言今念十方佛念無礙慈作不請友念無礙智作大導師翻破順惡友心十觀罪性空者了達貪欲嗔癡之心皆是寂靜門何以故貪嗔若起在何處住知此貪瞋住於妄念妄念住於顛倒顛倒住於身見身見住於我見我見則無住處十方諦求我不可得我心自空罪福無主深達罪福相遍照於十方令此空慧與心相應譬如日出時朝露一時失一切諸心皆是寂靜門示寂靜故以此翻破無明昏暗是為十種懺悔順涅槃道逆生死流能滅四重五逆之過若不解此十心全不識是非云何懺悔設入道場徒為苦行終無大益涅槃云若言勤修苦行是大涅槃近因緣者無有是處即此意也是名懺悔事中重罪也次懺見罪者以見惑故順生死流如前所説向運十心附事為懺懺鈍使罪今扶理懺見懺利使罪然見心猛威起重煩惱應傍用事助如服下藥須加巴豆令黈瀉盡底是故還約十法以明懺見一翻破不信者即點身見心令識無明苦集如頭籃弗得非想定世人崇之如佛不識苦集報盡還墮須跋陀羅得非想定雖無麁想有細煩惱長爪利智而受不受高著外道尚未出見非是涅槃況淺者尚不逮籃弗而言是真道豈非大僻是人愛著觀空智慧是事不知名為無明而起違從依見造行見行依色即是名色名色即是苦等迷苦起於愛有有生未來生死流轉相續豈是寂滅若謂生死盡者乃是慢語呼無明見心為道非道為道非因計因名為戒取豈非因盜呼未來三途苦報為涅槃此是見取非果計果是為果盜身邊邪見其事可知如此見心乃是苦集非滅道也尚非三藏道滅豈是摩訶衍道滅若能如是即知世間因果復識出世因果故大品云般若能示世間相所謂示是道非道是為深識見心苦集也又深者非但知無明苦集亦識三藏因果亦識因緣生法即空四諦因果又復深者亦知因緣即假無量四諦因果又復深者亦知因緣即中無作四諦因果於一見心具識一切因果故大經云於一念心悉能稱量無量生死是名不可思議故名深信破不信也二生重慙愧者不見我心中三諦之理名慙愧且約理觀論人天者慙乾慧性地之人愧四果淨天三十心人十地義天五品六根清淨之人四十二位天例如作意得報名為人自然果報名為天二種天人亦復如是方便道名為人真理顯名為天見心造罪覆三諦理不逮三種人天是故慙愧翻破無慙愧心也三怖畏者知見心造罪此過深重大論云諸佛説空義為離諸見故若復見有空諸佛所不化我今由見而起大罪此間劫盡他方獄生此間劫成還來此處如是展轉無量無邊若説果報所受之身當吐熱血死故知見罪大重既非無漏不出生死煩惱潤業墮落何疑一命不追永無出日為是義故生大怖畏翻破不畏惡道心也四發露者從來諸見而生愛著覆此三諦不能決定生信今知見過失發却三疑無所隱諱顯其諦性是為發露翻破覆藏罪心也五斷相續心者三諦之觀勿令有間以八正道治三惑心斷而不習此翻破相續惡心也六發菩提心者即是緣三諦理皆如虗空空則無邊愍傷一切普令度脫昔迷此起惑有無邊故罪亦無邊今菩提心遍於法界起無作善亦遍法界翻破昔遍空無作惡也奏師子琴餘弦斷絶即此義也七修功補過者三諦道品即是菩薩寶炬陀羅尼是行道法趣涅槃門如此道品念念相續即是修功補過昔執於見謂為涅槃於見不動不修道品設令動有入無如屈步蟲雖於見動亦不能修道品今知有無是見不執為實是名見動而不修道品若破柝諸見行於道品是名見動而修道品又體見即空即假即中既言即者於見不動而修三種道品是為修功補於縱見之過也八守護正法者昔護見不令他破方便申通今護三諦諸空不令見破若有留滯善巧申弘亡身存法猶如父母守讚其子此翻破毀善事也九念十方佛者昔服見毒常無厭足如渴思飲又遇惡師如加以鹹水以苦捨苦我慢矜高諂心不實於千萬億劫不聞佛名字今念三諦不來不去即是佛無生法即是佛常為諦理所護此翻破狎惡友心十觀罪性空者此三種惑本來寂靜而我不了妄謂是非如熱病人見諸龍鬼今觀見如幻如化來無所從去無足迹亦復不至東西南北一切罪福亦復如是一空一切空空即罪性罪性即空此翻破顛倒心也運此十懺時深觀三諦又加事法以殷重心不惜身命名第二健兒是名事理兩懺我等為無明所覆不識惑業罪因今遇道場方始覺知歸命毗盧遮那如來及一切賢聖海衆燒香散華一切惑業發露懺悔不敢覆藏由此因緣我及法界衆生海帝網重重一切惑業海願皆清淨次懺悔滅罪印呪唵薩㗚末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三遍百劫積集罪一念盡蕩除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪嗔癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛至心發願十地經云佛子菩薩發如是大願所謂生廣大清淨決定了解以一切供養之具恭敬供養一切諸佛令無有餘又願受一切佛法輪願攝一切佛菩提願護一切諸佛教願持一切諸佛法又願一切世界佛興于世從兜率天宮歿入胎初生出家成道説法示現涅槃皆悉往詣親近供養為衆上首受行正法於一切處一切時而轉又願一切菩薩行廣大無量不壞不雜攝諸波羅蜜淨治諸地總相別相同相異相成相壞相所有菩薩行皆如實説教化一切令其受行心得增長又願一切衆生界有色無色有想無想非有想非無想卵生胎生溼生化生三界所繫入於六趣一切生處名色所攝如是等類我皆教化令入佛法令永斷一切世間處令安住一切智道又願一切世間廣大無量細亂想倒住正住若入若行若去如帝網差別十方無量種種不同智皆明了現前知見又願一切國土入一國土一國土入一切國土無量佛土普皆清淨光明衆具以為莊嚴離一切煩惱成就清涼道無量智慧衆生充滿其中普入大願諸佛境界隨諸衆生心而為示現皆令歡喜又願與一切菩薩同一志行無有怨嫉集諸善根一切菩薩平等一緣常共集會不相捨離隨意能現種種佛心住其自心能知一切如來境界威力智慧得不退轉如意神通遊行一切世界現形一切衆會普入一切生住成就不思議大乘修菩薩行又願成不退轉行菩提行身語意業悉不唐損若暫見者則必定入法暫聞音聲則得真實智慧才生淨信則永斷煩惱得如是大藥王樹身得如意寶身修行一切菩薩行又願於一切世界成阿耨多羅三藐三菩提不離一毛端處於一切毛端處皆悉示現初生出家詣道場成正覺轉法輪入涅槃得佛境界大智慧力於念念中隨一切衆生心示現成佛念得寂滅以一三菩提知一切法界即涅槃相以一音説法令一切衆生心皆歡喜示入大涅槃而不斷菩薩行示大智慧地安立一切法以法神通智通神足通幻通自在變化充滿一切法界以此十門為首滿足百萬阿僧祇大願佛子此大願以十盡句而得成就何等為十所為衆生界盡世界盡虗空界盡法界盡涅槃界盡佛出現界盡如來智慧界盡心所緣界盡佛智所入境界盡世間轉法轉智轉界盡若衆生界盡我願乃盡若世界乃至世間轉法轉智轉界盡我願乃盡而衆生界不可盡乃至世間轉法轉智轉界不可盡故我此大願善根無有窮盡願我臨欲命終時盡除一切諸障礙面見彼佛阿彌陀即得往生安樂剎發願已至心歸命禮本尊毗盧遮那佛白衆等聽説經中無常偈輪回三界中猶如汲井輪又如蠶作繭繭成自纏縛無上諸世尊圓覺聲聞衆尚捨無常身何況諸凡夫父母及妻子兄弟并眷屬目觀生死急云何不愁歎是故勸諸人諦聽真實法共捨無常處常行不死門應誦補闕百字呪偈惟願法界七處會哀愍憶念衆生海主伴道場佛會處雖作懺悔之法事我等所作不堪量若或錯失或顛倒不辦不具或餘剩恐成雜亂之善根道場佛會慈悲力又百字呪真諦力所懺罪海願清淨所作法行令圓滿次誦求忍納願偈我等凡愚福力微未得正念意濁亂種種不具供養劣忘失雜亂不稱理願承三寶同體慈攝受善根願令成緣性圓融稱法界普賢行願願圓滿啓白聖賢仰白十身遍照佛華藏世界諸如來娑婆本師釋迦尊普賢文殊諸上首剎海聖衆并徒衆華藏會上諸上人釋梵諸天衆類神獲得他心道眼者並願不捨慈悲力證明我等二衆人為修行願總持門某時至心同禮懺所生功德總用莊嚴法界剎海衆生當願天仙不墜悟著樂而非常國土清平識真乘而是勝羣僚常居祿位皆欣圓頓教門人民永保安寧咸修覺照之道師僧父母福慶汪洋信施檀那萬行圓滿三途俱時離苦八難並悉消除鑊湯變為清涼池鐵牀變作蓮華座息悲痛之響同念佛之音人人有返本之心各各悉還源之照常發今願當願俱不退心觀行令成同證華嚴海會為上良緣清淨法身毗盧遮那佛圓滿報身盧舍那佛千百億化身釋迦牟尼佛十二上願藥師琉璃光佛四十八願阿彌陀佛大聖普賢菩薩摩訶薩大聖文殊菩薩摩訶薩大聖觀世音菩薩摩訶薩大聖地藏菩薩摩訶薩大聖遍法界菩薩摩訶薩摩訶般若波羅蜜大方廣佛華嚴經呪捺麻緊薩慢引怛莫𭊁重也難啞不囉二合帝曷怛折引難禰唵雞禰雞禰怛達引遏當𠹌末二合重斡山舌腭引矴不囉二合帝嗚怛麻怛摩怛麻怛達引遏當𠹌末二合斡吽癹怛莎引曷引毗盧遮那灌頂光呪唵啞麼遏重妹重𠺘桚捺麼曷引摩𠹌囉二合引麻禰舌腭巴𠹌麻二合𪢚辣不囉二合斡㗚怛二合也吽處世界如虗空如蓮華不著水心清淨超於彼稽首禮無上尊旋繞念誦南無法界十方佛南無法界十方法南無法界十方僧南無毗盧遮那佛南無釋迦牟尼佛南無大方廣佛華嚴經南無普賢菩薩南無文殊師利菩薩南無法會大菩薩南無功德林菩薩南無金剛幢菩薩南無金剛藏菩薩南無文殊等五十五聖者南無善財菩薩南無法界剎海微塵數菩薩一切海衆自歸依佛當願衆生體解大道發無上心自歸依法當願衆生深入經藏智慧如海自歸依僧當願衆生統理大衆一切無礙和南聖衆欽忠義忠藎四川左布政雲南麗陽佛弟子木增同麗江府知府授參政男木懿應襲孫木靕暨諸子孫太學生木喬木參生員木宿木柚木橒木㮱木極悟樂等各捐淨捧延僧命役敬奉大方廣佛華嚴經三昧懺儀一部共四十二卷六十一册直達南直隸蘇州府嘗熟懸隱湖南村篤素居士毛鳳苞汲古閣中鳩良工雕造起于崇禎庚辰孟夏終于辛巳春凡一載功成今置此版於浙江嘉興府楞嚴寺藏經閣祈流通諸四衆歷劫熏修見聞此法永持不捨所願一乘頓教遍布人寰三有羣生俱明性海者耳齎經僧係雞足山悉檀禪寺比丘道源玄契等
