body:
  text: 唐蘭山雲巖慈恩寺護法國師一行沙門慧覺依經錄宋蒼山載光寺沙門普瑞補註明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閱天台習教觀沙門正止治定第十八晌次佛名號品中娑婆之外十界佛會一切恭敬敬禮無盡三寶是諸眾等人各胡跪嚴持香華如法供養願此供海雲徧滿十方界一切香莊嚴一切鬘莊嚴一切末香莊嚴一切寶莊嚴一切旛莊嚴一切寶繒綵莊嚴一切欄楯莊嚴如是等以莊嚴具常作供養帝網重重諸佛菩薩一切海眾受此供養雲以為光明臺過於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次供養總持捺麼囉得捺二合得囉二合也引也捺麼末重遏斡矴末日囉二合薩囉不囉二合麻㗚怛二合禰怛達遏怛也啞㗚曷二合矴薩滅屹三二合莫捺重引也怛涅達唵末𠷌囉二合末𠷌囉麻曷引末𠷌囉二合麻曷引矴桚末𠷌呤麻曷引眉㗚也二合末𠷌囉二合麻曷磨溺重即舌腭怛末𠷌哩二合磨曷磨溺慢伸當巴珊葛囉麻捺也末𠷌哩二合薩㗚末二合葛㗚麻二合啞斡囉捺舌腭眉商𭊁捺末𠷌囉二合莎引曷引梵音讚佛如來勝無比甚深不可說出過語言道清淨如虗空汝觀人師子自在神通力已離於分別而令分別見導師為開演甚深微妙法以是因緣故現此無比身直言讚佛如來應正等覺大智慧海有四種大智慧寶具足無量威德光明此智寶光觸諸菩薩乃至令得如來大智何等為四所謂滅一切散善波浪大智慧寶除一切法愛大智慧寶慧光普炤大智慧寶與如來平等無邊功德大智慧寶諸菩薩修集一切助道法時起無量散善波浪一切世間天人阿修羅所不能壞如來以滅一切散善波浪大智慧寶光明觸彼諸菩薩令捨一切散善波浪持心一境住於三昧又以除一切法愛大智慧寶光明觸彼菩薩令捨離三昧味著起廣大神通又以慧光普照大智慧寶光明觸彼菩薩令捨所起廣大神通住大明功用行又以與如來平等無邊無功用大智慧寶光明觸彼菩薩令捨所起大明無功用行乃至得如來平等地息一切功用令無有餘若無如來此四智寶大光明觸乃至有一菩薩得如來地無有是處是為如來心第五相南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十迴向菩薩十地菩薩等覺菩薩徧法界剎海微塵數菩薩一切海眾南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海眾南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云諸佛子此娑婆世界至令諸眾生各別知見願共諸眾生往生華藏海極樂淨土中次娑婆世界東方密訓世界內諸佛南無平等如來南無殊勝如來南無安慰如來南無開曉意如來南無聞慧如來南無真實語如來南無得自在如來南無最勝身如來南無大勇猛如來南無無等智如來南無如是等百億萬種種名號令諸眾生各別知見十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云諸佛子此娑婆世界南至令諸眾生各別知見願共諸眾生往生華藏海極樂淨土中次南方豐溢世界內諸佛南無本性如來南無勤意如來南無無上尊如來南無大智炬如來南無無所依如來南無光明藏如來南無智慧藏如來南無福德藏如來南無天中天如來南無大自在如來南無如是等百億萬種種名號令諸眾生各別知見十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云諸佛子此娑婆世界西至令諸眾生各別知見願共諸眾生往生華藏海極樂淨土中次西方離垢世界內諸佛南無意成如來南無知道如來南無安住本如來南無能解縛如來南無通達義如來南無樂分別如來南無最勝見如來南無調伏行如來南無眾苦行如來南無具足力如來南無如是等百億萬種種名號令諸眾生各別知見十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云諸佛子此娑婆世界北至令諸眾生各別知見願共諸眾生往生華藏海極樂淨土中次北方豐樂世界內諸佛南無薝蔔華色如來南無日藏如來南無善住如來南無現神通如來南無性超邁如來南無慧日如來南無無礙如來南無如月現如來南無迅疾風如來南無清淨身如來南無如是等百億萬種種名號令諸眾生各別知見十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云諸佛子此娑婆世界東北方至各別知見願共諸眾生往生華藏海極樂淨土中次東北方攝取世界內諸佛南無永離苦如來南無普解脫如來南無大伏藏如來南無解脫智如來南無過去藏如來南無寶光明如來南無離世間如來南無無礙地如來南無淨信藏如來南無心不動如來南無如是等百億萬種種名號令諸眾生各別知見十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云諸佛子此娑婆世界東南方至各別知見願共諸眾生往生華藏海極樂淨土中次東南方饒益世界內諸佛南無現光明如來南無盡智如來南無美音如來南無勝根如來南無莊嚴益如來南無精進根如來南無到分別彼岸如來南無勝定如來南無簡言辭如來南無智慧海如來南無如是等百億萬種種名號令諸眾生各別知見十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云諸佛子此娑婆世界西南方至各別知見願共諸眾生往生華藏海極樂淨土中次西南方尠少世界內諸佛南無牟尼主如來南無具眾寶如來南無世解脫如來南無徧知根如來南無勝言辭如來南無明了見如來南無根自在如來南無大仙師如來南無開導業如來南無金剛師子如來南無如是等百億萬種種名號令諸眾生各別知見十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云諸佛子此娑婆世界西北方至各別知見願共諸眾生往生華藏海極樂淨土中次西北方歡喜世界內諸佛南無妙華聚如來南無旃檀葢如來南無蓮華藏如來南無超越諸法如來南無法寶如來南無復出生如來南無淨妙葢如來南無廣大眼如來南無有善法如來南無專念法如來南無網藏如來南無如是等百億萬種種名號令諸眾生各別知見十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云諸佛子此娑婆世界次下方至各別知見願共諸眾生往生華藏海極樂淨土中次下方關𨷲世界內諸佛南無發起𦦨如來南無調伏毒如來南無帝釋弓如來南無無常所如來南無覺悟本如來南無斷增長如來南無大速疾如來南無常樂施如來南無分別道如來南無摧伏幢如來南無如是等百億萬種種名號令諸眾生各別知見十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云諸佛子此娑婆世界次上方至各別知見願共諸眾生往生華藏海極樂淨土中次上方振音世界內諸佛南無勇猛幢如來南無無量寶如來南無樂大施如來南無天光如來南無吉興如來南無超境界如來南無一切主如來南無不退輪如來南無離眾惡如來南無一切智如來南無如是等百億萬種種名號令諸眾生各別知見十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云諸佛子如娑婆世界如是東方至而為說法願共諸眾生往生華藏海極樂淨土中次類通一切盡十方佛南無如娑婆世界如是東方百千億無數無量無邊無等不可數不可稱不可思不可量不可說盡法界虗空界諸世界中如來名號種種不同南西北方四維上下亦復如是一切如來至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛南無十身無礙毗盧遮那如來道場一切海眾南無大方廣佛華嚴經四聖諦品法門南無此娑婆世界中說四百億十千名四聖諦一切法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中四聖諦品第八經云爾時文殊師利菩薩至心之所樂令其調伏願共諸眾生往生華藏海極樂淨土中南無如此娑婆世界東南西北四維上下百千億無數無量無邊無等不可數不可稱不可思不可量不可說盡法界虗空界所有世界中四諦一切法門南無如是等不可說佛剎極微塵數世界中百萬億種四聖諦一切法門至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中次在家懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖眾世出門神慈悲本願放大光明炤於法會證盟護念哀愍攝受願我及一切眾生海自從無始直至今時一切在家諸業發露懺悔寶積經云所謂家者名殺善根名不捨過害助善業是故名家云何名在一切結使在中住故故名為在又復住於不善覺故住不調伏住無慚愧愚小凡夫住不善行諸惡過咎是故名家又復在家一切苦惱悉在中現害先善根故名在家又復家者在是中住無惡不造在是中住則於父母沙門婆羅門不好敬順是名為家又復家者長愛枝條憂悲苦惱悉在中生招集殺縛呵打嗔罵惡言出生是故名家未作善根掉動不造已作善根悉令散滅智者所呵謂諸佛聲聞若住是中墮於惡道若住是中墮貪嗔癡是故名家若住是中妨廢戒聚定聚慧聚解脫聚解脫知見聚是故名家若住是中父母妻息姉妹親友眷屬知識貪愛所攝常思念財貪欲無滿如海吞流終不滿足若在家住如火焚薪思處無定如風不住在家消身猶如服毒一切眾苦皆悉來歸是故應捨如離怨家若住在家聖法作障多起諍緣常相違逆住在家中善惡緣雜多諸事務在家無常不得久住是不停法在家極苦求守護故多諸憂慮謂怨親所在家無我倒計我所在家誑惑無有實事現似如實在家離別多人住處在家如幻多容集聚無實眾生在家如夢興衰代故在家如露速破落故家如蜜滴須臾味故家如刺網貪著色聲香味觸故家如針口蟲不善覺食故家如毒蛇互相侵故家多希望心躑躅故在家多怖王賊水火所劫奪故家多論議多過患故罪報懺悔在家多塵汙出家多妙好在家具縛出家無縛在家多垢出家捨離在家惡攝出家善攝在家沒於愛欲淤泥出家遠離愛欲淤泥在家凡俱出家智俱在家邪命出家淨命在家多垢出家無垢在家衰滅出家無滅在家處憂出家懽喜在家則是眾惡梯隥出家則是離隥在家繫縛出家解脫在家畏俱出家無畏在家謫罸出家無罰在家多患出家無患在家熱惱出家無熱在家多求苦出家無求樂在家掉動出家無動在家貧苦出家無苦在家怯弱出家無怯在家下賤出家尊貴在家熾然出家寂靜在家利他出家自利在家之