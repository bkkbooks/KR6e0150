body:
  text: 唐蘭山雲巖慈恩寺護法國師行沙門慧覺依經錄宋蒼山載光寺沙門普瑞補註明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閱天台習教觀沙門正止治定第二十六晌第九法界逝多林會依人證入成德分一切恭敬敬禮無盡三寶是諸眾等人各胡跪嚴持香華如法供養願此供海雲徧滿十方界雨百萬億天華雲雨百萬億天香雲雨百萬億天末香雲雨百萬億天拘蘇摩華雲雨百萬億天波頭摩華雲雨百萬億天優鉢羅華雲雨百萬億天拘物頭華雲雨百萬億天芬陀利華雲雨百萬億天曼陀羅華雲雨百萬億一切天華雲雨百萬億天衣雲雨百萬億天幢雲雨百萬億摩尼寶雲雨百萬億天幢雲雨百萬億天冠雲雨百萬億天莊嚴具雲雨百萬億天寶鬘雲雨百萬億天寶纓絡雲雨百萬億天旃檀香雲雨百萬億天沉水香雲百萬億悅意音讚嘆供養百萬億廣大音讚歎承事百萬億甚深音讚歎修行百萬億眾妙音歎佛業果百萬億微細音歎如實理百萬億無障礙真實音歎佛本行百萬億清淨音讚歎過去供養諸佛百萬億法門音讚歎佛最勝無畏百萬億無量音讚諸菩薩功德無盡百萬億菩薩地音讚歎開示一切菩薩地相應行百萬億無斷絕音歎佛功德無有斷絕百萬億隨順音讚歎稱揚見佛之行百萬億甚深法音讚歎一切無礙智相應理百萬億廣大音其音充滿一切佛剎百萬億無礙清淨音隨其心樂悉令歡喜百萬億不住三界音令其聞者深入法性百萬億歡喜音令其聞者心無障礙深信恭敬百萬億佛境界音隨所出聲悉能開示一切法義百萬億陀羅尼音善宣一切法句差別決了如來秘密之藏以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海眾受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令幹吽次不空摩尼印呪唵啞麼遏布麻禰巴能麻末𠷌呤怛達遏怛眉浪雞矴薩慢怛不囉薩囉吽梵音讚佛如來一一身現佛等眾生一切微塵剎普現神通力佛隨眾生心普現於其前眾生所見者皆是佛神力光明無有邊說法亦無量佛子隨其智能入能觀察直言讚佛如來應正等覺心意識俱不可得但應以智無量故知如來心如來智慧是一切世間出世間智所依而如來智無所依恒出一切世間出世間種種智慧而如來智無有增減譬如大海其水潛流四天下地及八十億諸小洲中有穿鑿者無不得水而彼大海不作分別我出於水佛智海水亦復如是流入一切眾生心中若諸眾生觀察境界修智法門則得智慧清淨智慧清淨明了而如來智平等無二無有分別但隨眾生心行異故所得智慧各各不同南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十迴向菩薩十地菩薩等覺菩薩徧法界剎海微塵數菩薩一切海眾南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軋範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海眾南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛南無十身無礙毗盧遮那如來道場一切海眾南無大方廣佛華嚴經中入法界品法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中入法界品第三十九初本會中第一序分經云爾時世尊在室羅筏國至生如來家求一切智願共諸眾生往生華藏海極樂淨土中次法界逝多林十住菩薩會南無以十法句開發法界輔翼師主普賢菩薩南無為顯法界求智證理輔翼師主文殊菩薩南無光𦦨幢菩薩南無須彌幢菩薩南無寶幢菩薩南無無礙幢菩薩南無華幢菩薩南無離垢幢菩薩南無日幢菩薩南無妙幢菩薩南無離塵幢菩薩南無普光幢菩薩南無地威力菩薩南無寶威力菩薩南無大威力菩薩南無金剛智威力菩薩南無離塵垢威力菩薩南無正法日威力菩薩南無功德山威力菩薩南無智光影威力菩薩南無普吉祥威力菩薩南無地藏菩薩南無虗空藏菩薩南無蓮華藏菩薩南無寶藏菩薩南無日藏菩薩南無淨德藏菩薩南無法印藏菩薩南無光明藏菩薩南無藏菩薩南無蓮華德藏菩薩南無善眼菩薩南無淨眼菩薩南無離垢眼菩薩南無無礙眼菩薩南無普見眼菩薩南無普觀眼菩薩南無青蓮華眼菩薩南無金剛眼菩薩南無寶眼菩薩南無虗空眼菩薩南無喜眼菩薩南無普眼菩薩十方盡歸命滅罪增淨信願生華藏海極樂淨土中次法界逝多林十住百人會南無天冠菩薩南無普照法界智慧冠菩薩南無道場冠菩薩南無普照十方冠菩薩南無一切佛藏冠菩薩南無超出一切世間冠菩薩南無普照冠菩薩南無不可壞冠菩薩南無持一切如來師子座冠菩薩南無普照