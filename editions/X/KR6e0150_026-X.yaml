諸菩薩至大神變莊嚴雲願共諸眾生往生華藏海極樂淨土中南無如是不可說佛剎微塵數菩薩蒙佛法光心大歡喜化現身雲遍滿十方法界一切新舊海眾十方盡歸命滅罪增淨信願生華藏海極樂淨土中九文殊述德分經云爾時文殊師利菩薩至莫不於此林中見願共諸眾生往生華藏海極樂淨土中南無如是文殊師利菩薩廣大智海依正契理輔翼主伴法界逝多林文殊菩薩十方盡歸命滅罪增淨信願生華藏海極樂淨土中十大用無涯分經云爾時彼諸菩薩至亦不離此逝多林如來之所願共諸眾生往生華藏海極樂淨土中南無如是等不可說佛剎微塵數菩薩能逝多林毗盧遮那如來佛剎微塵數菩薩化現一切身雲十方盡歸命滅罪增淨信願生華藏海極樂淨土中次十二因緣懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖眾世出世神慈悲本願放大光明炤於法會證明護念哀憫攝受願我及一切眾生海自從無始直至今時業海無盡帝網重重不解十二因緣惑業罪報發露懺悔夫十二因緣者二乘三乘及別教一乘悉皆現說今依別圓二教周遍含容十二緣起者經云世間受生皆繇著我若離此著則無生處復作是念凡夫無智執著於我常求有無不正思惟起於妄行行於邪道罪行福行不動行積集增長於諸行中植心種子有漏有取復起後有生及老死所謂業為田識為種無明闇覆愛水為潤我慢溉灌見網增長生名色芽名色增長生五根諸根相對生觸觸對生受受後希求生愛愛增長生取取增長生有有生已於諸趣中起五蘊身名生生已衰變為老終歿為死於老死時生諸熱惱因熱惱故憂愁悲歎眾苦皆集此因緣故集無有集者任運而滅亦無滅者不識緣起今皆懺悔一有支相續觀佛子此菩薩摩訶薩復作是念於第一義諦不了故名無明所作業果是行依止初心是識與識共生四取蘊為名色名色增長為六處根境識三事和合是觸觸共生有受於受染著是愛愛增長是取取所起有漏業後為有從業起蘊為生蘊熟為老蘊壞為死死時離別愚迷貪戀心胸煩悶為愁涕泗咨嗟為歎在五根為苦在意地為憂憂苦轉多為惱如是但有苦樹增長無我無我所無作無受者復作是念若有作者則有作事若無作者亦無所作第一義中俱不可得不識緣起今皆懺悔二攝歸一心觀此菩薩摩訶薩復作是念三界所有性是一心如來於此分別演說十二有支皆依一心如是而立何以故隨事貪欲與心共生心是識事是行於行迷惑是無明與無明及心共生是名色名色增長是六處六處三分合為觸觸共生是受受無厭足是愛愛攝不捨是取彼諸有支生是有有所起名生生熟為老老壞為死不識緣起今皆懺悔三自業差別觀佛子此中無明有二種業一令眾生迷於所緣二與行作生起因行亦有二種業一能生未來報二與識作生起因識亦有二種業一令諸有相續二與名色作生起因名色亦有二種業一互相助成二與六處作生起因六處亦有二種業一各取自境界二與觸作生起因觸亦有二種業一能觸所緣二與受作生起因受亦有二種業一能領受愛憎等事二與愛作生起因愛亦有二種業一染著可愛事二與取作生起因取亦有二種業一令諸煩惱相續二與有作生起因有亦有二種業一能令於餘趣中生二與生作生起因生亦有二種業一能起諸蘊二與老作生起因老亦有二種業一令諸根變異二與死作生起因死亦有二種業一能壞諸行二不覺知故相續不絕不識緣起今皆懺悔四不相捨離觀佛子此中無明緣行乃至生緣老死者由無明乃至生為緣令行乃至老死不斷助成故無明滅則行滅乃至生滅則老死滅者由無明乃至生不為緣令諸行乃至老死斷滅不助成故不識緣起今皆懺悔五三道不斷觀佛子此中無明愛取不斷是煩惱道行有不斷是業道餘分不斷是苦道前後際分別滅三道斷如是三道離我我所但有生滅猶如束蘆不識緣起今皆懺悔六過去現在未來觀復次無明緣行者是觀過去識乃至受是觀現在愛乃至有是觀未來於是以後展轉相續無明滅行滅者是觀待斷不識緣起今皆懺悔七三苦聚集觀復次十二有支名為三苦此中無明行乃至六處是行苦觸受是苦苦餘是壞苦無明滅行滅者是三苦斷不識緣起今皆懺悔八因緣生滅觀復次無明緣行者無明因緣能生諸行無明滅行滅者以無無明諸行亦無餘亦如是不識緣起今皆懺悔九生滅繫縛觀又無明緣行者是生繫縛無明滅行滅者是滅繫縛餘亦如是不識緣起今皆懺悔十無所有盡觀又無明緣行者是隨順無所有觀無明滅行滅者是隨順盡滅觀餘亦如是如是十種逆順觀觀諸緣起不識緣起今皆懺悔我等為無明所覆不識十二緣起輪轉不能觀修今遇道場方始覺知歸命毗盧遮那如來及一切賢聖海眾燒香散華不能觀修緣起一切業報發露懺悔不敢覆藏由此因緣我及法界眾生海不悟十二緣起一切罪業悉願清淨次懺悔滅罪印呪唵薩㗚末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三徧百劫積集罪一念盡盪除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪嗔癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白眾等聽說經中無常偈外事裝彩咸歸壞內外衰變亦同然惟有勝法不滅亡諸有智人應善察勝法即是身中性迷性茫茫受生死修行欲絕死生根佛令先且除貪愛
