又十八䥫丸地獄十八石簽地獄十八飲銅地獄罪報懺悔又由無量業一一有別小地獄乃至有八萬四千地獄悉有不可說不可聽不可喻苦無能說者無能聽者若有能說者彼人吐熱血而死罪報懺悔第二所居畜生如畜生之中身有差別或有眾生其身小者如析一毛以為百分如一分許有於如是不可思議微細之身復有眾生身如窻中遊塵復有眾生身如十千由旬復有眾生壽命如一時頃復有眾生壽命如七時頃復有眾生壽命一劫乃至百劫千萬億劫以惡業故在彼中生不樂善法不種善根無有法行亦無智慧無慚無愧無慈悲心常受苦惱生大怖畏各各互生相害之心遠離一切諸善之法常行不善無明黑暗險惡道中造地獄業起瞋忿心不樂福德是報熟時惡道中受下身下心生如是處常受種種飢渴寒熱捶打乘騎負重困乏領穿脊破蚊䖟毒蟲競相唼食如是苦惱無量無邊罪報懺悔又畜生中居處居海居水居地居火居空蛇類蝦類魚類馬類象類三十六億類一一有無量苦罪報懺悔第三所居餓鬼生處餓鬼之中身有差別或有餓鬼身長一尺或有餓鬼身量如人或有身如千踰繕那或復有鬼身如雪山彼諸餓鬼裸形無衣披髮自纏黑瘦羸瘠唯皮褁骨肉血都無身體麤澀猶如枯樹恒苦飢渴思念飲食常不能得口內火然𦦨出於外心常嗔忿無有慈悲熱悶慞惶求涼不得又為飢渴之所逼切飲銷銅汁食燒鐵丸及諸熱惡臰爛膿血熱屎熱尿熱熱漿及諸熱風或復熱雨一切草木江海河池樹葉華果所食之物求覓甚難恒不能得設復得之或經千年或百千年如是壽命常受苦惱行住坐臥黑暗無明罪報懺悔夫餓鬼位中三類九類十類三十六類十類孤魂恒沙餓鬼有無量苦罪報懺悔第四人間所居之處有智之人次觀人中一切皆有種種諸苦所謂生苦老苦病苦死苦愛別離苦怨憎會苦求不得苦五盛陰苦飢苦渴苦貪苦瞋苦嫉妒等苦妄言綺語兩舌等苦惡口罵詈誹謗等苦寒苦熱苦惡風惡雨疫蝗等苦毒惡禽獸傷害等苦惡世惡王牢獄等苦貧窮下賤短命等苦既念此苦更生重苦緣苦生苦還造苦因於未來身復受苦報如是展轉無量無邊受諸辛苦無有窮盡罪報懺悔又大集經云此四天下有八十天居處六十龍居處四阿修羅居處四迦樓羅居處五十二緊那羅居處四十六摩睺羅迦居處八鳩槃茶居處三十富單那居處三十毗舍闍居處又有八萬四千城內六千四百種類人處總而集之是十類人如是一切罪報懺悔第五所居欲天生處有智之人觀初欲界有於六天是中眾生常樂欲事欲愛所纏所受果報差別不等生於苦受或復果報勝劣不同或上或下其下果報見上果報恥愧羞慚常生受苦或於過去修福來者今得生此果報將終福德欲盡如是念時則生苦受或復種種有所為作勤勞辛苦故生苦受或所愛人翫弄之物分張離散故生苦受一切福德果報畢盡見好處所心生愛樂既不得往生大苦受又知業行速墮惡道畜生餓鬼及地獄中以如是故倍大苦受如是種種無邊諸苦罪報懺悔第六有漏色界天中不生愛樂心者智慧之人觀彼色界十六住處一切諸天修於世禪得生於彼因既有為是有漏法苦未盡故不得寂滅心意快樂及於種種其餘勝樂是故苦受又未到于樂彼岸故是故在此苦流轉中不知出道以是義故三惡趣中未得解脫是故苦受罪報懺悔第七又觀彼無漏色界眾生如是修習無漏禪故得住彼天以未具足滿八正道是故苦受為八正道欲滿足故精勤方便是故苦受一切無學三摩提地心未得故生於苦受彼辟支佛諸陀羅尼未自在得故生苦受於諸如來三世境者未自在得故生苦受一切眾生境界皆苦如是眾生於色界中若欲雙頭入般涅槃如上所說種種諸苦具足受之罪報懺悔第八觀無色天不生樂想智慧之人觀無色界四種天處以能修習有漏三昧故得生彼一切漏中未得解脫是故生苦一切學地及無學地未得自在是故生苦不得聽聞諸佛正法是故生苦一切愛欲未畢竟斷於流轉中不得自在是故生苦彼處壽終不得勝趣生於邪見如是大苦一切三惡煩惱業道未能永斷如是生苦一切三惡道中未得度脫如是生苦罪報懺悔我等為無明所覆不識三界五趣罪因今遇道場方能覺知歸命毗盧遮那如來及一切賢聖海眾燒香散華業報重罪發露懺悔不敢覆藏由此因緣我及法界眾生海業報重罪願皆清淨次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷捺末日羅也莎曷應誦三徧百劫積集罪一念悉盪除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白眾等聽說經中無常偈人生一世內妄想萬年期黃昏氣撮心半夜命已盡眷屬皆捨去財物任他將但持自善根險道充糧食
