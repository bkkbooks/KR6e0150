body:
  text: 唐蘭山雲巖慈恩寺護法國師一行沙門慧覺依經錄宋蒼山載光寺沙門普瑞補註明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閱天台習教觀沙門正止治定第十三晌次右旋十海中後五海會一切恭敬敬禮無盡三寶是諸眾等人各胡跪嚴持香華如法供養願此供海雲徧滿十方界悉能惠施一切器物所謂黃金器盛滿雜寶白銀器盛眾妙寶琉璃器盛種種寶頗梨器盛滿無量寶莊嚴具車渠器盛赤真珠瑪瑙器盛滿珊瑚摩尼寶珠白玉器盛眾美食旃檀器盛天衣服金剛器盛眾妙香華無量無數種種寶器盛無量無數種種寶以如是等諸寶器具種種供物常作供養帝網重重諸佛菩薩賢聖海眾受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次供養總持捺麼囉得捺二合得囉二合也引也捺麼末重遏斡矴末日囉二合薩囉不囉二合麻㗚怛二合禰怛達遏怛也啞㗚曷二合矴薩滅屹三二合莫捺重引也怛涅達唵末𠷌囉二合末𠷌囉麻曷引末𠷌囉二合麻曷引矴桚末𠷌呤麻曷引眉㗚也二合末𠷌囉二合麻曷磨溺重即舌腭怛末𠷌哩二合磨曷磨溺慢伸當巴珊葛囉麻捺也末𠷌哩二合薩㗚末二合葛㗚麻二合啞斡囉捺舌腭眉商𭊁捺末𠷌囉二合莎引曷引梵音讚佛世間如是身諸佛身亦然了知其自性是則說名佛如來普知見明了一切法佛法及菩提二俱不可得導師無來去亦復無所住遠離諸顛倒是名等正覺直言讚佛如來眉間有大人相名徧法界光明雲摩尼寶華以為莊嚴放大光明具眾寶色猶如日月洞徹清淨其光普照十方國土顯現一切佛身復出妙音宣唱法海乃至如來左足指端有大人相名現一切佛體變化雲不思議佛光照月𦦨普香摩尼寶𦦨輪以為莊嚴放眾寶色清淨光明充滿一切諸世界海於中示現一切諸佛及諸菩薩演說一切諸佛法海毗盧遮那如來有如是等十華藏世界海微塵數大人相一一身分眾寶妙相以為莊嚴南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十迴向菩薩十地菩薩等覺菩薩徧法界剎海微塵數菩薩一切海眾南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海眾南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中第六蓮華因陀羅網香水海經云諸佛子此金剛輪至佛號徧照世間最勝音願共諸眾生往生華藏海極樂淨土中初能持剎種南無次有不可說佛剎微塵數世界有蓮華因陀羅網香水海普現十方影世界種中諸佛道場一切海眾十方盡歸命滅罪增淨信願生華藏海極樂淨土中次所持世界南無此中最下方眾生海寶光明世界不思議功德徧照月佛道場一切海眾南無佛剎微塵數世界周匝圍繞諸佛道場一切海眾南無此上過佛剎微塵數世界妙香輪世界無量力幢佛道場一切海眾南無此上過佛剎微塵數世界妙光輪世界法界光音覺悟慧佛道場一切海眾南無此上過佛剎微塵數世界吼聲摩尼幢世界蓮華光恒垂妙臂佛道場一切海眾南無此上過佛剎微塵數世界極堅固輪世界不退轉功德海光明佛道場一切海眾南無此上過佛剎微塵數世界眾行光莊嚴世界一切智普勝尊佛道場一切海眾南無此上過佛剎微塵數世界師子座徧照世界師子光無量力覺慧佛道場一切海眾南無此上過佛剎微塵數世界寶𦦨莊嚴世界一切法清淨智佛道場一切海眾南無此上過佛剎微塵數世界無量燈世界無憂相佛道場一切海眾南無此上過佛剎微塵數世界常聞佛音世界自然勝威光佛道場一切海眾南無此上過佛剎微塵數世界清淨變化世界金蓮華光明佛道場一切海眾南無此上過佛剎微塵數世界普入十方世界觀法界頻申慧佛道場一切海眾南無此上過佛剎微塵數世界熾然𦦨世界光𦦨樹緊那羅王佛道場一切海眾南無此上過佛剎微塵數世界香光徧照世界香燈善化王佛道場一切海眾南無此上過佛剎微塵數世界無量華聚輪世界普現佛功德佛道場一切海眾南無此上過佛剎微塵數世界眾妙普清淨世界一切法平等神通王佛道場一切海眾南無此上過佛剎微塵數世界金光海世界十方自在大變化佛道場一切海眾南無此上過佛剎微塵數世界真珠華藏世界法界寶光明不可思議慧佛道場一切海眾南無此上過佛剎微塵數世界帝釋須彌師子座世界勝力光佛道場一切海眾南無此上過佛剎微塵數世界無邊寶普照世界徧照世間最勝音佛道場一切海