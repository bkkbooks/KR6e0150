body:
  text: 唐蘭山雲巖慈恩寺護法國師一行沙門慧覺依經錄宋蒼山載光寺沙門普瑞補註明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閱天台習教觀沙門正止治定第三十晌次十行位中十善知識會一切恭敬敬禮無盡三寶是諸眾等人各胡跪嚴持香華如法供養願此供海雲徧滿十方界百萬億金網百萬億華帳百萬億寶帳百萬億鬘帳百萬億香帳張施其上華鬘垂下香氣普熏百萬億花葢百萬億鬘葢百萬億寶葢諸天執持四面行列百萬億寶衣以敷其上百萬億樓閣綺煥莊嚴百萬億摩尼網百萬億寶網彌覆其上百萬億寶瓔珞網四面垂下百萬億莊嚴具網百萬億葢網百萬億衣網百萬億寶帳寶以彌其上百萬億寶蓮華網開敷光榮百萬億寶香網其香美好稱悅眾心百萬億寶鈴帳其鈴微動出和雅音百萬億旃檀寶帳香氣普熏百萬億寶華帳其花敷榮百萬億眾妙色衣帳世所希有百萬億菩薩帳百萬億雜色帳百萬億真金帳百萬億琉璃帳百萬億種種寶帳悉張其上百萬億一切寶帳百萬億摩尼寶以為莊嚴百萬億妙寶華周匝瑩飾百萬億頻婆羅帳殊妙間錯百萬億香鬘四面垂下百萬億天堅固香其香普熏百萬億天莊嚴具瓔珞百萬億寶華瓔珞百萬億勝藏寶瓔珞百萬億摩尼寶瓔珞百萬億海摩尼寶瓔珞莊嚴座身百萬億妙寶繒綵以為垂帶百萬億因陀羅金剛寶百萬億自在摩尼寶百萬億妙色真金衣以為間飾以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海眾受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯呪寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉發囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次大慧施印呪唵捺麻緊薩㗚末二合怛達引遏怛啞斡浪雞矴三末重囉三末重囉吽梵音讚佛佛身常顯現法界悉充滿恒演廣大音普震十方國隨佛眾生心為興大法雲種種方便門示悟而調伏一切世界中見佛坐道場大眾所圍繞照耀十方國直言讚佛如來深境界其量等虗空一切眾生入而實無所入如來深境界所有勝妙因億劫常宣說亦復不能盡隨其心智慧誘進咸令益如是度眾生諸佛之境界世間諸國土一切皆隨入智身無有色非彼所能見諸佛智自在三世無所礙如是慧境界平等如虗空法界眾生界究竟無差別一知悉了知此是如來境一切世界中所有諸音聲佛智皆隨了一無有分別非識所能識亦非心境界其性本清淨開示諸羣生非業非煩惱無物無住處無照無所行平等行世間一切眾生心普在三世中如來於一念一切悉明達南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住𦦨魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十迴向菩薩十地菩薩等覺菩薩徧法界剎海微塵數菩薩一切海眾南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海眾南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中第一善見比丘隨順燈解脫法門經云爾時善財童子至殷勤瞻仰退辭而去願共諸眾生往生華藏海極樂淨土中次善見比丘修行處佛南無三十八恒河沙一切諸佛次善見比丘南無南方三眼國得菩薩隨順燈解脫法門無量天龍八部諸神前後圍繞善見比丘十方盡歸命滅罪增淨信願生華藏海極樂淨土中第二自在主工巧神智光明解脫法門經云爾時善財童子至殷勤瞻仰辭退而去願共諸眾生往生華藏海極樂淨土中南無南方名聞國河渚中得一切工巧大神通光明解脫門十千童子悉共圍繞自在主童子十方盡歸命滅罪增淨信願生華藏海極樂淨土中第三具足優婆夷無盡福德藏解脫法門經云爾時善財童子至瞻仰無厭辭退而去願共諸眾生往生華藏海極樂淨土中南無南方海住城中得菩薩無盡福德藏解脫法門十千童女周匝圍繞具足優婆夷十方盡歸命滅罪增淨信願生華藏海極樂淨土中第四明智居士隨意出生福德藏解脫法門經云爾時善財童子至殷勤瞻仰辭退而去願共諸眾生往生華藏海極樂淨土中南無南方大興城中得隨意出生福德藏解脫門十千眷屬前後圍繞明智居士十方盡歸命滅罪增淨信願生華藏海極樂淨土中第五寶髻長者無量福德寶藏解脫法門經云爾時善財童子至殷勤瞻仰辭退而去願共諸眾生往生華藏海極樂淨土中次寶髻長者得法處佛南無圓滿莊嚴世界無邊光明法界普莊嚴王佛次寶髻長者南無南方師子宮城內得菩薩無量福德寶藏解脫門寶髻長者南無寶髻八楞寶帳第五層上宣說諸法五地菩薩一切海眾南無寶髻八楞寶帳第六層上集妙莊嚴道場中顯示般若一切菩薩海眾南無寶髻八楞寶帳第七層上得如響忍一切菩薩海眾南無寶髻八楞寶帳第八層上得通不退無量菩薩一切海眾南無寶髻八楞寶帳第九層上一生補處一切菩薩海眾南無寶髻八楞寶帳第十層上淨佛國土轉正法輪一切如來十方盡歸命滅罪增淨信願生華藏海極樂淨土中第六普眼長者令一切眾生普見諸佛歡喜解脫法門經云爾時善財童子至殷勤瞻仰辭退而去願共諸眾生往生華藏海極樂淨土中南無南方藤根國普門城中得令諸眾生普見諸佛歡喜解脫門普眼長者十方盡歸命滅罪增淨信願生華藏海極樂淨土中第七無厭足王如幻解脫法門經云爾時善財童子至繞無數帀辭退而去願共諸眾生往生華藏海極樂淨土中南無南方多羅幢城內得如幻解脫門十億侍女十千大臣十萬猛卒前後圍繞無厭足王南無善財童子參無厭足王化種種惡相令起疑空中天人眾十方盡歸命滅罪增淨信願生華藏海極樂淨土中第八大光王大慈為首隨順世間三昧解脫法門經云爾時善財童子至殷勤瞻仰辭退而去願共諸眾生往生華藏海極樂淨土中次大光王修行處佛南無如是所問無量百千億諸佛次大光王南無南方妙光城中得諸菩薩大悲為首能隨順世間三昧法門大光王十方盡歸命滅罪增淨信願生華藏海極樂淨土中第九不動優婆夷難摧伏智慧藏解脫法門經云爾時善財童子至殷勤瞻仰辭退而去願共諸眾生往生華藏海極樂淨土中次不動優婆夷發心處佛南無離垢劫中脩臂佛道場一切海眾次不動優婆夷南無南方安住王宮內得菩薩難摧伏智慧藏等解脫門不動優婆夷南無虗空中與善財童子勝緣勸諭恒常隨逐令警覺者自業行神菩薩宮天南無如是等不可說佛剎微塵數世界中攝生神如來使天十方盡歸命滅罪增淨信願生華藏海極樂淨土中第十徧行外道普觀世間解脫法門經云爾時善財童子至殷勤瞻仰辭退而去願共諸眾生往生華藏海極樂淨土中南無南方無量都薩羅城內得菩薩安住普觀世間解脫門十千梵眾前後圍繞徧行外道南無為上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩十方盡歸命滅罪增淨信願生華藏海極樂淨土中次毀滅佛法懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖眾世出世神慈悲本願放大光明照于法會證明護念哀愍攝受我等比丘比丘尼式叉摩那沙彌沙彌尼等昔修微善今得人身釋迦如來末法之中出家學道不能光顯佛日自利利他禪定智慧亦不曾習虗受信施無戒無德自高自慢解脫戒律多有犯觸如是罪業發露懺悔蓮華面經云佛告阿難我今當說未來之時有諸破戒比丘身著袈裟遊行城邑往來聚落住親戚家彼非比丘又非白衣畜養婦妾產育男女復有比丘住婬女家復有比丘婬比丘尼復有比丘貯蓄金銀造作生業以自活命復有比丘通致使驛以自活命復有比丘專行醫藥以自活命復有比丘圍棋六博以自活命復有比丘為他卜筮以自活命復有比丘為他呪彼死屍令起遣煞怨家以自活命復有比丘為他誦呪驅遣鬼神多取財物以自活命復有比丘專行殺生以自活命復有比丘住僧伽藍私自費用佛法僧物以自活命復有比丘內實犯戒外示護持受人信施復有比丘雖不破戒而懷慳惜衣服飲食及以鄙恡眾僧之物不與客僧復有比丘雖不破戒恡惜眾僧房舍床座不與客僧復有比丘雖不破戒為諸檀越供養禮拜多得財利其心不欲令餘比丘受人信施惟欲自受復有比丘實非羅漢而常詐稱得羅漢果欲令人知我是羅漢復有比丘多受檀越四事供養內無實德惟增貪心但為活命不為修道復有比丘興利商賈以自養活復有比丘專行偷盜以自養活復有比丘畜養象馬駝驢牛羊乃至買賣以自養活復有比丘販賣奴婢以自養活復有比丘屠殺牛羊以自養活復有比丘受募入陣征戰討伐多殺眾人以求勳賞復有比丘穿窬墻壁盜他財物以自活命復有比丘專行劫奪攻破城邑及與聚落以自活命復有比丘毀壞佛塔取其寶物以自活命如是無量地獄因緣捨命之後皆墮地獄今皆懺悔阿難譬如師子命絕身死若空若地若水若陸所有眾生不敢食彼師子身肉惟師子身自生諸蟲還自食噉師子之肉阿難我之佛法非餘能壞是我法中諸惡比丘猶如毒刺破我三阿僧祗劫積行勤苦所集佛法阿難譬如有人入於大海至寶渚中多取寶物置於船上欲渡大海於中沉沒佛之正法如彼寶船當來破戒諸惡比丘多樂造作種種惡業滅我佛法沉沒不現阿難如來涅槃不久之間正法當亂正法亂已復有種種諸惡比丘出現於世不信如來得證無漏寂滅涅槃況復信有世間餘人得阿羅漢入涅槃者阿難如來所有正法名味句義所謂修多羅祇夜迦曷羅伽他優陀那尼陀那阿波陀那伊帝鼻利多伽闍多迦裴畜略阿浮陀達摩優波提舍十二部經為惡比丘之所毀滅彼諸人等樂作文章綺飾言詞多有如是諸惡比丘破我佛法爾時阿難白佛言世尊當來之時如是破戒諸惡比丘而出生耶佛言如是如是諸惡比丘出現於世雖披法服剃除鬚髮破我佛法今皆懺悔佛藏經云舍利弗我今語汝若人一日殺百千萬億眾生一日偷盜百千萬億種金銀寶物邪淫者晝夜不息妄語者常欺誑人口業不淨無一實語兩舌者常破和合亦助破者惡口者口常惡逆乃至不說柔輭一語綺語者無有根本人聞此事以餘無量語言忤亂貪嫉者於他物生非無心瞋恚者無有因緣橫起瞋恚懷恨滿心邪見者樂行非道舍利弗於意云何若人百歲成就如是十不善罪破戒比丘一日一夜受他供養罪多於彼今皆懺悔又藥師經云觸犯所學三歸依或毀犯五戒八戒十戒菩薩四百戒十重四十八輕四根本四十六種微𫺛比丘二百五十戒比丘尼五百戒三千威儀八萬細行曼殊室利若諸有情雖於如來受諸學處而破尸羅有雖不破尸羅而破軌則有於尸羅軌則雖得不壞而毀正見有雖不毀正見而棄多聞於佛所說契經深義不能解了有雖多聞而增上慢由增上慢覆蔽心故自是非他嫌謗正法為魔伴黨如是愚人自行邪見復令無量俱胝有情墮大險坑此諸有情應於地獄旁生鬼趣之中流轉無窮今皆懺悔又法滅盡經云如來三月當般涅槃與諸比丘及諸菩薩無央數眾來詣佛所稽首于地眷屬圍繞渴仰聞法世尊寂靜默無所說光明不現賢者阿難作禮白佛言世尊前後說法威光獨顯今大眾會光更不現何故如此必有緣故願聞其意佛默不應如是至三佛告阿難吾涅槃後法欲滅時五逆濁世魔道興盛魔作沙門壞亂吾道著俗衣裳樂好袈裟五色之服飲酒噉肉殺生貪味無有慈心更相憎嫉時有菩薩辟支羅漢精進修德一切敬待人所宗尚教化平等憐貧念老救育窮厄恒以經像令人奉事作諸功德志性思善不侵害人損身濟物不自惜己忍辱仁和設有是人眾魔比丘咸共嫉之誹謗揚惡擯黜驅遣不令得住自共於後不修道德寺廟空荒無復修理轉就毀壞但貪財物積聚不散不作福德販賣奴婢耕田種植焚燒山林傷害眾生無有慈心奴為比丘婢為比丘尼無有道德淫沃濁亂男女不別令道薄淡皆由斯輩或避縣官依倚吾道求作沙門不修戒律月半月盡雖名誦戒厭倦懈怠不欲聽聞抄略前後不肯盡說經不誦習設有讀者不識字句為彊言是不咨明者貢高求名虗顯雅步以為榮冀望人供養眾魔比丘命終之後精神當墮無擇地獄五逆罪中餓鬼畜生靡不經歷恒河沙劫罪竟乃出生在邊國無三寶處法欲滅時女人精進恒作福德男子懈慢不用法語眼見沙門如視糞土無有信心法將殄沒當爾之時諸天泣淚水旱不調五穀不熟疫氣流行死亡者眾人民勤苦縣官尅罰不順道理皆思樂亂惡人轉多如海中沙善者甚少若一若二劫欲盡處日月轉促人命轉短四十頭白男子淫泆精盡夭命或壽六十男子壽短女人壽長七十九十或至百歲大水忽起卒至無期世人不信故為有常眾生雜類無有豪賤沒溺流飄魚鼈食噉時有菩薩辟支羅漢眾魔驅逐不與眾會三乘入山福德之地恬泊自守以為欣快壽命延長諸王衛護月光出世得相遭值共興吾道五十二歲首楞嚴經般舟三昧先化滅去十二部經尋後化滅聖王去後沙門袈裟自然變白吾法滅時譬如油燈臨欲滅時光明更盛正法滅時亦如燈滅自此之後難可數說今皆懺悔我等為無明所覆違背法律不識罪因今遇道場方能覺悟歸命毗盧遮那如來及一切賢聖海眾燒香散華違背法律發露懺悔不敢覆藏由此因緣我及法界眾生海違背法律一切重罪悉願清淨次懺悔滅罪印呪唵薩㗚末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三徧百劫積集罪一念盡盪除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪嗔癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白眾等聽說經中無常偈常求諸欲境不行於善事云何保形命不覺死來侵命根氣欲盡肢節悉分離眾苦與死俱此等徒歎恨歎恨一生事不解早修真惟躭名與利廣作諸惡業諸業之所作過於工畫師業畫師極巧能生種種形種種諸彩色現觀猶可知心業布眾形其數不可計臨終方始悔已往復不追勸諸徒眾等後車須改轍
