body:
  text: 唐蘭山雲巖慈恩寺護法國師行沙門慧覺依經錄宋蒼山載光寺沙門普瑞補註明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閱天台習教觀沙門正止治定第四十一晌次本末無礙會一切恭敬敬禮無盡三寶是諸眾等人各胡跪嚴持香華如法供養願此供海雲徧滿十方界阿僧祇寶眾生盡能攝持無上法寶阿僧祇寶身具足無量功德妙寶阿僧祇寶口常演一切妙法寶音阿僧祇寶心具清淨意大願智寶阿僧祇寶念斷諸愚惑究竟堅固一切智阿僧祇寶明誦持一切諸佛法寶阿僧祇寶慧決了一切諸佛法藏阿僧祇寶智得大圓滿一切智寶阿僧祇寶眼鑒十方寶無所障礙阿僧祇寶耳聽聞無量盡界法聲清淨無礙阿僧祇寶鼻常齅隨順清淨寶香阿僧祇寶舌能說無量諸語言法阿僧祇寶足徧遊十方而無礙阿僧祇寶意常勤修於普賢行願阿僧祇寶音淨妙音聲徧十方界阿僧祇寶身業一切所作以智為首阿僧祇寶語業常說修行無礙智寶阿僧祇寶意業得無障礙廣大智寶究竟圓滿乃至如是香莊嚴華莊嚴鬘莊嚴塗香莊嚴燒香莊嚴末香莊嚴衣莊嚴葢莊嚴幢莊嚴幡莊嚴摩尼寶莊嚴次第乃至過此百倍悉寶莊嚴以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海眾受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯呪寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次結廣大不空摩尼印呪結即同前唵啞麼遏布麻禰巴能麻末𠷌呤怛達遏怛眉浪雞矴薩慢怛不囉薩囉吽梵音讚佛佛身無有生而能示出生法性如虗空諸佛於中住此會諸聖賢入佛難思地一一皆能現一切佛神力智身能遍入一切剎微塵見身在彼中普見於諸佛直言讚佛三世一切諸如來皆悉從於信心生以具廣大清淨眼能見一切諸佛海汝應觀佛無垢身妙相莊嚴悉清淨徧坐道場眾會中示現神道無不徧毗盧遮那善逝尊道樹降魔成正覺隨於一切眾生心轉大法輪徧法界佛證甚深真法性妙體寂靜無差別色身清淨具莊嚴普示眾生無有盡佛身廣大不思議周徧法界常不盡平等普現於十方一切剎土無不見南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住𦦨魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十迴向菩薩十地菩薩等覺菩薩徧法界剎海微塵數菩薩一切海眾南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海眾南無大願摜甲求生淨土末濁憂國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中初佛之勝德難思分三一誡聽許說經云爾時普賢菩薩摩訶薩至未曾分別起想念願共諸眾生往生華藏海極樂淨土中二渴仰欲聞經云爾時諸菩薩聞此說已至作是念已深生渴仰願共諸眾生往生華藏海極樂淨土中三廣說德相分二初重誡許說經云爾時普賢菩薩至一滴之相即說頌言後廣顯佛德難思此下二十種無盡功德初彼所知中一向無障轉功德佛智廣大同虗空至念念示現無邊事二有無二相真如最清淨能入功德隨眾生心種種行至而佛本來無動念三無功用佛事不休息功德或有處處見佛坐至心不淨故不聞者四即於法身中所依意樂作事無差別功德或見清淨大菩薩至於中覺悟成菩提眾和彼佛菩薩處十方盡歸命滅罪增淨信願生華藏海極樂淨土中或見蓮華勝妙剎至皆悉勤修普賢行眾和彼佛菩薩處十方盡歸命滅罪增淨信願生華藏海極樂淨土中或有見佛無量壽至充滿十方諸世界眾和彼佛菩薩處十方盡歸命滅罪增淨信願生華藏海極樂淨土中或有見此三千界至及如香象諸菩薩眾和彼佛菩薩處十方盡歸命滅罪增淨信願生華藏海極樂淨土中或見月覺大名稱至普徧十方清淨剎眾和彼佛菩薩處十方盡歸命滅罪增淨信願生華藏海極樂淨土中或見日藏世所尊至充滿十方而說法眾和彼佛菩薩處十方盡歸命滅罪增淨信願生華藏海極樂淨土中或見金剛大焰佛至說法除滅眾生翳眾和彼佛菩薩處十方盡歸命滅罪增淨信願生華藏海極樂淨土中一一毛端不可說至種種說法度眾生眾和彼佛菩薩處十方盡歸命滅罪增淨信願生華藏海極樂淨土中或有觀見一毛孔至清淨佛子皆充滿眾和彼佛菩薩處十力盡歸命滅罪增淨信願生華藏海極樂淨土中或有見一微塵內至不可說劫修諸行眾和彼佛菩薩處十方盡歸命滅罪增淨信願生華藏海極樂淨土中或有見一毛端處至毗盧遮那轉法輪眾和彼佛菩薩處十方盡歸命滅罪增淨信願生華藏海極樂淨土中或見世界不清淨至我說少分汝當聽五修一切障對治功德或見釋迦成佛道至隨眾生心皆示現六降伏一切外道功德或見究竟波羅蜜至猶如幻師現眾像七生在世間不為世法所礙功德或見兜率始降神至隨眾生心皆示現八安立正法功德如來住於無上道至普照世界除煩惱九授記功德具足清淨功德智至隨所應化示佛道十示現受用變化身功德究竟虗空十方界至現斯苦行摧異道十一斷一切疑功德或持彼戒為世師至方便皆令住佛道十二令入種種行功德或現上服以嚴身至然後捨去無知者十三當來世生妙智功德如來無礙智所見至種種教化令成就十四隨其勝解示現功德譬如幻師善幻術至靡不於中現其像十五無量所依調伏有情加行功德譬如淨日放千光至普使滅除三毒火十六平等法身波羅蜜多成滿功德如來清淨妙法身至當於佛體如是觀十七隨其勝解示現差別佛土功德三界有無一切法至無有依空而住者十八三種佛身六住無分限功德大海摩尼無量色至隨應而現無所住十九究竟功德等三種功德虗空真如及實際至可以顯示於如來後結德無盡剎塵心念可數知至慎勿於此懷疑念願共諸眾生往生華藏海極樂淨土中至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛南無十身無礙毗盧遮那如來道場一切海南無大方廣佛華嚴經中普賢行願品法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中入不思議解脫境界普賢行願品經云爾時普賢菩薩至十者普皆迴向第一禮敬諸佛經云善財白言大聖至身語意業無有疲厭禮敬已至心歸命禮本尊毗盧遮那佛第二稱讚如來復次善男子言稱讚如來者至身語意業無有疲厭讚歎已至心歸命禮本尊毗盧遮那佛第三廣修供養復次善男子言廣修供養者至身語意業無有疲厭供養已至心歸命禮本尊毗盧遮那佛第四懺悔業障復次善男子言懺除業障者至身語意業無有疲厭懺悔已至心歸命禮本尊毗盧遮那佛第五隨喜功德復次男子言隨喜功德者至身語意業無有疲厭隨喜已至心歸命禮本尊毗盧遮那佛第六請轉法輪復次善男子言請轉法輪者至身語意業無有疲厭請轉已至心歸命禮本尊毗盧遮那佛第七請佛住世復次善男子言請佛住世者至身語意業無有疲厭勸請已至心歸命禮本尊毗盧遮那佛第八常隨佛學復次善男子言常隨佛學者至身語意業無有疲厭隨學已至心歸命禮本尊毗盧遮那佛第九恒順眾生復次善男子言恒順眾生者至身語意業無有疲厭恒順已至心歸命禮本尊毗盧遮那佛第十普皆迴向復次善男子言普皆迴向者至身語意業無有疲厭迴向已至心歸命禮本尊毗盧遮那佛經云善男子是為菩薩至皆大歡喜信受奉行願共諸眾生往生華藏海極樂淨土中至心發願惟願我等修習普賢十重無盡行願功德故速能除滅五無間業所有世間身心等病種種苦惱乃至佛剎極微塵數一切惡業皆得消除一切魔軍夜叉羅剎若鳩盤茶若毗舍闍若布多等飲血噉肉諸惡鬼神皆悉遠離或時發心親近守護是故若人誦此願者行於世間無有障礙如空中月出於雲翳諸佛菩薩之所稱讚一切人天皆應禮敬一切眾生悉應供養此善男子若得人身圓滿普現所有功德不久當如普賢菩薩速得成就微妙色身具三十二大丈夫相若生人天所在之處常居勝族悉能破壞一切惡趣悉能遠離一切惡友悉能制伏一切外道悉能解脫一切煩惱如師子王摧伏群獸堪受一切眾生供養又復是人臨命終時最後剎那一切諸根悉皆散壞一切親屬悉皆捨離一切威勢悉皆退失輔相大臣宮城內外象馬車乘珍寶伏藏如是一切無復相隨惟此願王不相捨離於一切時引導其前一剎那中即得往生極樂世界到已即見阿彌陀佛文殊師利菩薩普賢菩薩觀自在菩薩彌勒菩薩等此諸菩薩色相端嚴功德具足所共圍遶其人自在生蓮華中𫎇佛授記得受記已經於無數百千萬億那由他劫普於十方不可說不可說世界以智慧力隨眾生心而為利益不久當坐菩提道場降伏魔軍成等正覺轉妙法輪能令佛剎極微塵數世界眾生發菩提心隨其根性教化成熟乃至盡於未來劫海廣能利益一切眾生如是虗空界盡眾生界盡眾生業盡眾生煩惱盡我此發願無有窮盡念念相續無有間斷身語意業無有疲厭發願已至心歸命禮本尊毗盧遮那佛次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三徧百劫積集所一念悉盪除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白眾等聽說經中無常偈生者皆歸死容顏盡變衰強力病所侵無能免斯者假使妙高山劫盡皆壞散大海深無底亦復皆枯竭大地及日月時至皆歸盡未曾有一法不被無常吞上從非想處下至轉輪王七寶鎮隨身千子常圍遶如其壽命盡須臾不暫停還漂生死海隨緣受眾苦啟白賢聖仰白十身徧照佛華藏世界諸如來娑婆本師釋迦尊普賢文殊諸上首剎海聖眾并徒眾華藏會上諸上人釋梵諸天眾類神獲得他心道眼者竝願不捨慈悲力證得我等二眾人為修行願總持門某時至心同禮懺所生功德總用莊嚴法界剎海眾生當願天仙不墜悟著樂而非常國土清平識真乘而是勝群僚常居祿位皆欣圓頓教門人民永保安寧咸修覺照之道師僧父母福慶汪洋信施檀那萬行圓滿三途俱時離苦八難竝悉消除鑊湯變為清涼池鐵牀變作蓮華座息悲痛之響同念佛之音人人有返本之心各各悉還源之照常發今願當願俱不退心觀行令成同證華嚴海會為上良緣清淨法身毗盧遮那佛圓滿報身盧舍那佛千百億化身釋迦牟尼佛十二上願藥師琉璃光佛四十八願阿彌陀佛大聖普賢菩薩摩訶薩大聖文殊菩薩摩訶薩大聖觀世音菩薩摩訶薩大聖地藏菩薩摩訶薩大聖徧法界菩薩摩訶薩摩訶般若波羅蜜大方廣佛華嚴經呪捺麻緊薩慢引怛莫𭊁重也難啞不囉二合帝曷怛折引難禰唵雞禰雞禰怛達引遏當𠹌末二合重斡山舌腭引矴不囉二合帝嗚怛麻怛摩怛麻怛達引遏當𠹌末二合斡吽癹怛莎引曷引毗盧遮那灌頂光呪唵啞麼遏重妹重𠺘桚捺麼曷引摩𠹌囉二合引麻禰舌腭巴𠹌麻二合𪢚辢不囉二合斡㗚怛二合也吽處世界如虗空似蓮華不著水心清淨超於彼稽首禮無上尊旋遶念誦南無法界十方佛南無法界十方法南無法界十方僧南無毗盧遮那佛南無釋迦牟尼佛南無大方廣佛華嚴經南無普賢菩薩南無文殊師利菩薩南無法會大菩薩南無功德林菩薩南無金剛幢菩薩南無金剛藏菩薩南無文殊等五十五聖者南無善財菩薩南無法界剎海微塵數菩薩眾自歸依佛當願眾生體解大道發無上心自皈依法當願眾生深入經藏智慧如海自皈依僧當願眾生統理大眾一切無礙和南聖眾
