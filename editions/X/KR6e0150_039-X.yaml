body:
  text: 唐蘭山雲巖慈恩寺護法國師行沙門慧覺依經錄宋蒼山載光寺沙門普瑞補註明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閱天台習教觀沙門正止治定第三十九晌次等覺會中智照無二文殊菩薩會一切恭敬敬禮無盡三寶是諸眾等人各胡跪嚴持香華如法供養願此供海雲徧滿十方界無等香香王毗頭薩利多香香王此香形相猶如水滴無越勝香香王種種覺悟香香王阿盧吒斡底香香王其香赤色猶如赫日從樹中出是汁香也身心隨樂出香香王隨時堅細旃檀香香王現境像堅固旃檀香香王梵語烏洛迦薩羅香堅黑沉水香香王諸根不動香香王一一香中出無量香徧至十方一切法界一切諸佛眾會道場中變為種種妙香宮殿香垣墻香重閣香欄檻香却敵香帳門香戶牗香半月香羅網香形像香圓光香莊嚴具香光明香雲雨香幢香帳香幡香葢香十方一切法界中周徧莊嚴處處充滿而為供養以此供養善根迴向三處一永離一切貧窮困苦二常見諸佛菩薩三恒聞諸佛正法以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海眾受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯呪寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次不空摩尼印呪唵啞麼遏布麻禰巴能麻末𠷌呤怛達遏怛眉浪雞矴薩慢怛不囉薩囉吽梵音讚佛佛身等剎塵普雨於法雨無生無差別現一切世間三世一切剎所有眾導師種種名號殊為說皆令見過未及現在一切諸如來所轉妙法輪此會皆得聞直言讚佛如來始坐道場時一切大地皆搖動十方世界悉蒙光六趣眾生咸離苦佛現無量種種身轉於清淨妙法輪乃至三世一切劫求其邊際不可得寶座高廣最無等徧滿十方無量界以種種妙相莊嚴佛住彼土難思議或於無量諸世界示現出家成佛道乃至最後般涅槃分布其身起塔廟如是種種無邊行導師演說佛所在世尊所有大功德誓願修行悉令盡以彼善根迴向時住於如是方便法如是修習菩提行其心畢竟無厭怠南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎士中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎士中十信菩薩十住菩薩十行菩薩十迴向菩薩十地菩薩等覺菩薩徧法界剎海微塵數菩薩一切海眾南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海眾南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中第四會智照二相解脫法門經云爾時善財童子至受行其教無有違逆願共諸眾生往生華藏海極樂淨土中南無普門國中蘇摩那城一百一十由旬外文殊師利菩薩摩訶薩南無智滿究竟三千世界微塵數諸善知識一切海眾南無圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩十方盡歸命滅罪增淨信願生華藏海極樂淨土中次不報四恩懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖眾世出世神慈悲本願放大光明炤於法會證盟護念哀愍攝受願我及一切眾生海自從無始直至今時無明葢覆不知恩德不能報恩一切罪障發露懺悔心地觀經云爾時佛告五百長者言善男子世間之恩有其四種一父母恩二眾生恩三國王恩四三寶恩如是四恩一切眾生平等荷負善男子父母恩者父有慈恩母有悲恩母悲恩者若我住世於一劫中說不能盡我今為汝宣說少分假使有人為福德故恭敬供養一百淨行大婆羅門一百五通諸大神仙一百善友安置七寶上妙堂內以百千種上妙珍饍垂諸瓔珞眾寶衣服旃檀沈香立諸房舍百寶莊嚴牀臥敷具療治眾病百種湯藥一心供養滿百千劫不如一念住孝順心以微少物色養悲母隨所供侍比前功德百千萬分不可較量世間悲母念子無比思及未形始自受胎經於十月行住坐臥受諸苦惱非口所宣雖得欲樂飲食衣服而不生愛憂念之心恒無休息但自思惟將欲生產漸受諸苦晝夜愁惱若產難時如百千刃競來屠割遂致無常若無苦惱諸親眷屬喜樂無盡猶如貧女得如意珠其子發聲如聞音樂以母胸臆而為寢處左右膝上常為遊履於胸臆中出甘露泉長養之恩彌於普天憐愍之恩廣大無比世間所高莫過山岳悲母之恩逾於須彌世間之重大地為先悲母之恩亦過於彼若有男女背恩不順令其父母生怨念心母發惡言子即隨墮或在地獄餓鬼畜生世間之疾莫過猛風怨念之徵復速於彼一切如來金剛天等及五通仙不能救護若善男子善女人依悲母教承順無違諸天護念福樂無盡如是男女即名尊貴天人種類或是菩薩為度眾生現為男女饒益父母若善男子善女人為報母恩經於一劫每日三時割自身肉以養父母而未能報一日之恩所以者何一切男女處於胎中口吮乳根飲噉母血及出胎已幼稚之前所飲母乳百八十斛母得上味皆與其子珍妙衣服亦復如是愚癡鄙陋情愛無二昔有女人遠遊他國抱所生子渡殑伽河其水瀑漲力不能前愛念不捨母子俱沒以是慈心善根力故即得上生色究竟天作大梵王以是因緣母有十德一名大地於母胎中為所依故二名能生經歷眾苦而能生故三名能正恒以母手理五根故四名養育隨四時宜能長養故五名智者能以方便生智慧故六名莊嚴以妙瓔珞而嚴飾故七名安隱以母懷抱為止息故八名教授善巧方便導引子故九名教誡以善言辭離眾惡故十名與業能以家業付囑子故善男子於諸世間何者最富何者最貧悲母在堂名之為富悲母不在名之為貧悲母在時名為日中悲母死時名為日沒悲母在時名為月明悲母亡時名為暗夜是故汝等勤加修習孝養父母若人供佛福等無異應當如是報父母恩又經云承侍父母之福與承侍一生補處菩薩福德齊等若人承侍五百羅漢不如承侍生身父母由是父母恩重故佛擔父棺三千震動知父母恩重故佛滅雖三重氎褁母來復起問訊此皆為不孝眾生而示跡矣是以我等自多劫來或父母處棄於孝行禮儀殺害打罵呵責說過三業錯失六根違禮造罪無量今皆懺悔次眾生恩者即無始來一切眾生輪轉五道經百千劫於多生中互為父母以互為父母故一切男子即是慈父一切女人即是悲母昔生生中有大悲故猶如現在父母之恩等無差別如是昔恩猶未能報或因妄業生諸違順以執著故反為其怨何以故無明覆障宿住智明不了前生曾為父母所可報恩互為饒益無饒益者名為不孝以是因緣諸眾生類於一切時亦有大恩實為難報如是之事名眾生恩行願經云盡法界虗空界十方剎海所有眾生種種差別所謂卵生胎生溼生化生或有依於地水火風而生住者或有依空及諸草木而生住者種種生類種種色身種種形狀種種相貌種種壽量種種族類種種名號種種心性種種知見種種欲樂種種意行種種威儀種種衣服種種飲食處於種種村營聚落城邑宮殿乃至一切天龍八部人非人等無足二足四足多足有色無色有想無想非有想非無想如是等類我皆於彼隨順而轉種種承事種種供養如敬父母如奉師長及阿羅漢乃至如來等無有異於諸病苦為作良醫於失道者示其正路於暗夜中為作光明於貧窮者令得伏藏菩薩如是平等饒益一切眾生何以故菩薩若能隨順眾生則為隨順供養諸佛若於眾生尊重承事則為尊重承事如來若令眾生生歡喜者則令一切如來歡喜何以故諸佛如來以大悲心而為體故因於眾生而起大悲因於大悲生菩提心因菩提心成等正覺譬如曠野沙磧之中有大樹王若根得水枝葉華果悉皆繁茂生死曠野菩提樹王亦復如是一切眾生而為樹根諸佛菩薩而為華果以大悲水饒益眾生則能成就諸佛菩薩智慧華果何以故若諸菩薩以大悲水饒益眾生則能成就阿耨多羅三藐三菩提故是故菩提屬於眾生若無眾生一切菩薩終不能成無上正覺善男子汝於此義應如是解以於眾生心平等故則能成就圓滿大悲以大悲心隨眾生故則能成就供養如來一切眾生願令眾生常得安樂無諸病苦若行惡法皆悉不成所修善業皆悉成就關閉一切諸惡趣門開示人天涅槃正路若諸眾生因其積集諸惡業故所感一切極重苦果我皆代受令彼眾生悉得解脫又首楞嚴經云一切眾生從無始來種種顛倒業種自然如惡叉聚諸修行人不能得成無上菩提乃至別成聲聞緣覺及成外道諸天魔王及魔眷屬皆由不知二種根本錯亂修習猶如煑沙欲成嘉饌縱經塵劫終不能得云何二種阿難一者無始生死根本則汝今者與諸眾生用攀緣心為自性者二者無始菩提涅槃元清淨體則汝今者識精元明能生諸緣緣所遺者由諸眾生遺此本明雖終日行而不自覺枉入諸趣若和合者同於變化終始相成生滅相續生死死生生生死死如旋火輪未有休息彼一切眾生者今我及汝處有大恩故因何不報是故我等自從無始無明障覆於諸眾生不知報恩今皆懺悔國王恩者福德最勝雖生人間得自在故三十三天諸天子等恒與其力常護持故於其國界山河大地盡大海際屬於國王一人福德勝過一切眾生福故是大聖王以正法化能使眾生悉皆安樂譬如世間一切堂殿柱為根本人民豐樂王為根本依王有故亦如梵王能生萬物聖王能生治國之法利眾生故如日天子能炤世間聖王亦能觀察天下人安樂故王失正治人無所依若以正化八大恐怖不入其國所謂他國侵逼自界叛逆惡鬼疾病國土譏饉非時風雨過時風雨日月薄蝕星宿變怪人王正化利益人民如是八難不能侵故譬如長者唯有一子愛念無比憐愍饒益常與安樂晝夜不捨國大聖王亦復如是等示羣生如同一子擁護之心晝夜無捨如是人王令修十善名福德主若不令修名非福主所以者何若王國內一人修善其所得福皆為七分造善之人得其五分於彼國王常獲二分善因王修同福利故造十惡業亦復如是同其事故一切國內田地園林所生之物皆為七分亦復如是若有人王成就正見如法化世名為天王以天善法化世間故諸天善人及護世王常來加護守王宮故雖處人間修行天業賞罰之心無徧黨故一切聖王法皆如是如是聖主名正法王以是因緣成就十德一名能炤以智慧眼炤世間故二名莊嚴以大福智莊嚴國故三名與樂以大安樂與人民故四名伏怨一切怨敵自然伏故五名離怖能却八難離恐怖故六名任賢集諸賢人評國事故七名法本萬姓安住依國王故八名持世以天王法持世間故九名業主善惡諸業屬國王故十名人主一切人民王為主故一切國土以先世福成就如是十種勝德大梵天王及忉利天常助人王受勝妙樂諸羅剎王及諸神等雖不現身潛來衛護王及眷屬王見人民造諸不善不能制止諸天神等悉皆遠離若見修善歡喜讚歎盡皆唱言我之聖王龍天喜悅澍甘露雨五穀成熟人民豐樂若不親近諸惡人等普利世間咸從正化如意寶珠必現王國於王鄰國咸來歸伏人與非人無不稱歎若有惡人於國王內而生逆心於須臾頃如是之人福自衰滅命終當墮地獄之中經歷畜生備受諸苦所以者何由於聖王不知恩故起諸惡逆得如是報若有人民能行善心敬重人王尊重如佛是人現世安隱豐樂所有願求無不稱心所以者何一切國王於過去時曾授如來清淨禁戒常為人王安隱快樂以是因緣違順果報皆如谷響聖主恩德廣大如是又普賢行願經云諸天龍王三年不降雨饑饉來時一國庶民盡死若一時無國王者互相殺戮由是我等從無始劫來無明覆故不知國王恩造種種違逆之罪今皆懺悔次三寶恩者名不思議利樂眾生無有休息是諸佛身真善無漏無數大劫修因所證三有業報永盡無餘功德寶山巍巍無比一切有情所不能知福德甚深猶如大海智慧無礙等於虗空神通變化充滿世間光明徧炤十方三世一切眾生煩惱業障都不覺知沈淪苦海生死無窮三寶出世作大船師能截愛流超昇彼岸諸有智者悉能瞻仰善男子等唯一佛寶具三種身一自性身二受用身三變化身第一佛身有大斷德二空所顯一切諸佛悉皆平等第二佛身有大智德真常無漏一切諸佛悉皆同意第三佛身有大恩德定通變現一切諸佛悉皆同事善男子其自性身無始無終離一切相絕諸戲論周圓無際凝然常住其受用身有二種相一自受用二他受用自受用身三僧祗劫所修萬行利益安樂諸眾生已十地滿心運身直往色究竟天出過三界淨妙國土坐無數量大寶蓮華而不可說海會菩薩前後圍繞以無垢繒繫於頂上供養恭敬尊重讚歎如是名為後報利益爾時菩薩入金剛定斷除一切微細所知諸煩惱障證得阿耨多羅三藐三菩提如是妙果名現利益是真報身有始無終壽欲劫數無有限量初成正覺窮未來際諸根相好徧周法界四智圓滿是真報身受用法樂一大圓鏡智轉異熟識得此智慧如大圓鏡現諸色像如是如來鏡智之中能現眾生諸善惡業以是因緣此智名為大圓鏡智依大悲故恒緣眾生依大智故常如法性雙觀真俗無有間斷常能執持無漏根身一切功德為所依止二平等性智轉我見識得此智慧是以能證自佗平等無二我性如是名為平等性智三妙觀察智轉分別識得此智慧能觀諸法自相共相於眾會前說諸妙法能令眾生得不退轉以是名為妙觀察智四成所作智轉五種識得此智慧能現一切種種化身令諸眾生成熟善業以是因緣名為成所作智如是四智而為上首具足八萬四千智門如是一切諸功德法名為如來自受用身諸善男子二者如來他受用身具足八萬四千相好居真淨土說一乘法令諸菩薩受用大乘微妙法樂一切如來為化十地諸菩薩眾現於十種他受用身第一佛身坐百葉蓮華為初地菩薩說百法明門菩薩悟已起大神通變化滿於百佛世界利益安樂無數眾生第二佛身坐千葉蓮華為二地菩薩說千法明門菩薩悟已起大神通變化滿於千佛世界利益安樂無量眾生第三佛身坐萬葉蓮華為三地菩薩說萬法明門菩薩悟已起大神通變化滿於萬佛國土利益安樂無數眾生如是如來漸漸增長乃至十地他受用身坐不可說妙寶蓮華為十地菩薩說不可說諸法明門菩薩悟已起大神通變化滿於不可說佛微妙國土利益安樂不可宣說不可宣說無量無邊種類眾生如是大小諸化佛身各各具足三十二相八十種好為諸資糧及四善根諸菩薩等二乘凡夫隨宜為說三乘妙法為諸菩薩說應六波羅蜜令得阿耨多羅三藐三菩提究竟佛慧為求辟支佛者說應十二因緣法為求聲聞者說應四諦法度生老病死究竟涅槃為餘眾生說人天教令得人天安樂妙果諸如來等大小化佛皆悉名為佛變化身善男子如是二種應化身佛雖現滅度而此佛身相續常住諸善男子如一佛實有如是等無量無邊不可思議利樂眾生廣大恩德以是因緣名為如來應正徧知明行圓滿善逝世間解無上士調御丈夫天人師佛世尊善男子一佛寶中具足六種微妙功德一者無上大功德田二者無上有大恩德三者無足二足及以多足眾生中尊四者極難值遇如優曇華五者獨一出現三千大千世界六者世出世間功德滿一切義依具如是等六種功德常能利樂一切眾生是名佛寶不思議恩善男子於法寶中有其四種一者教法二者理法三者行法四者果法一切無漏能破無明煩惱業障聲名句文名為教法有無諸法名為理法戒定慧行名為行法無為妙果名為果法如是四種名為法寶引導眾生出生死海到於彼岸善男子諸佛所師即是法寶所以者何三世諸佛依法修行斷一切障得成菩提盡未來際利益眾生以是因緣三世如來常能供養諸波羅蜜微妙法寶何況三界一切眾生未得解脫而不能敬微妙法寶善男子我昔曾為求法人王入大火坑而求正法永斷生死得大菩提是故法寶能破一切生死牢獄猶如金剛能壞萬物法寶能炤癡闇眾生如日天子能照世界法寶能救貧乏眾生如摩尼珠雨眾寶故法寶能與眾生喜樂猶如天鼓樂諸天故法寶能為諸天寶階聽聞正法得生天故法寶能為堅牢大船渡生死海到彼岸故法寶猶如轉輪聖王能除三毒煩惱賊故法寶能為珍妙衣服覆葢無慚諸眾生故法寶猶如金剛甲冑能破四魔證菩提故法寶猶如智慧利劍割斷生死離繫縛故法寶正是三乘寶車運載眾生出火宅故法寶猶如一切明燈能炤三塗黑闇處故法寶猶如弓箭矛矟能鎮國界摧怨敵故法寶猶如險路導師善誘眾生達寶所故善男子三世如來所說妙法有如是等難思議事是名法寶不思議恩善男子世出世間有三種僧一菩薩僧二聲聞僧三凡夫僧文殊師利及彌勒等是菩薩僧如舍利弗目揵連等是聲聞僧若有成就別解脫戒真善凡夫乃至具足一切正見能廣為他演說開示眾聖道法利樂一切名凡夫僧雖未能得無漏戒定及慧解脫而供養者獲無量福如是三種名真福田僧復有一類名福田僧於佛舍利及佛形像并諸法僧聖所制戒深生敬信自無邪見令他亦然能宣正法讚歎一乘深信因果嘗發善願隨其過犯悔除業障當知是人信三寶力勝諸外道百千萬倍亦勝四種轉輪聖王何況餘類一切眾生如金華雖然萎悴猶勝一切諸雜類華正見比丘亦復如是勝餘眾生百千萬倍雖毀禁戒不壞正見以是因緣名福田僧若善男子善女人等供養如是福田僧者所得福德無有窮盡供養前三真實僧寶所獲功德正等無異如是四類聖凡僧寶利樂有情恒無暫捨是名僧寶不思議恩爾時五百長者白佛言世尊我等不知以何義故說佛法僧得名為寶願佛解說顯示眾會佛言譬如世間第一珍寶具足十義莊嚴國土饒益有情佛法僧寶亦復如是一者堅牢如摩尼寶無人能破佛法僧寶亦復如是外道天魔不能破故二者無垢世間勝寶清淨光潔不雜塵穢佛法僧寶亦復如是悉能遠離煩惱塵垢三者與樂如天德缾能與安樂佛法僧寶亦復如是能與眾生世出世樂四者難遇如吉祥寶希有難得佛法僧寶亦復如是業障有情億劫難遇五者能破如如意寶能破貧窮佛法僧寶亦復如是能破世間諸貧苦故六者威德如轉輪王所有輪寶能伏諸怨佛法僧寶亦復如是具六神通降伏四魔七者滿願如摩尼珠隨心所求能雨眾寶佛法僧寶亦復如是能滿眾生所修善願八者莊嚴如世珍寶莊嚴王宮佛法僧寶亦復如是莊嚴法王菩提寶宮九者最妙如天妙寶最為微妙佛法僧寶亦復如是超諸世間最勝妙寶十者不變譬如真金入火不變佛法僧寶亦復如是世間八風不能傾動佛法僧寶具足無量神通變化利樂有情蹔無休息以是義故諸佛法僧說名為寶由是我等從無數劫來無明覆蔽輕慢三寶不能尊重讚歎承事供養所造罪業無量無邊說不能盡今皆懺悔善男子我為汝等略說四種世出世間有恩之處汝等當知修菩薩行應報如是四種之恩爾時五百長者白佛言世尊如是四恩甚為難報當修何行而報是恩佛告諸長者言善男子為求菩提有其三種十波羅蜜一者十種布施波羅蜜多二者十種親近波羅蜜多三者十種真實波羅蜜多若有善男子善女人發阿耨多羅三藐三菩提心能以七寶滿於三千大千世界布施無量貧窮眾生如是布施但名布施波羅蜜多不名真實波羅蜜多若有善男子善女人發大悲心為求無上正等菩提以自妻子施與他人心無悋惜身肉手足頭目髓腦乃至身命施來求者如是布施但名親近波羅蜜多未名真實波羅蜜多若善男子善女人發起無上大菩提心住無所得勸諸眾生同發此心以真實法一四句偈施一眾生使向無上正等菩提是名真實波羅蜜多前二布施未名報恩若善男子善女人能修如是第三真實波羅蜜多乃名真實能報四恩所以者何前二布施有所得心第三施者無所得心以真法施一切有情令發無上大菩提心是人當得證菩提時廣度眾生無有窮盡紹三寶種使不斷絕以是因緣名為報恩又有四恩父母國王二種之恩如同前說上師善知識恩者經中以二百大喻讚不能盡涅槃經云阿難言善知識是入法半分因緣佛言莫作是說善知識者是全因緣從初發心乃至成佛皆由善知識也金剛頂經云三世諸佛之福與阿闍黎師一毛孔福同等無異又師佛等同者金剛尖本續云上師與佛而同等是故應依於上師威德王本續云上師同等諸正覺又上師勝於佛者金剛尖本續云若比千佛上師勝應依於上師又上師者是第四寶又云上師是佛上師是法上師亦即是僧寶密集本續云供養中勝供上師金剛尖本續又云諸佛正法大眾三殊勝上師是第四寶諸經論及本續劑門中廣讚上師善知識之恩不能具引今惡濁世白法隱沒鬬諍時至若不恭敬上師更有何依怙由是我等從多劫來未逢上師及善知識或遇逢時不能以三業尊重承事供養讚歎又乃呵毀謗說過非造種種罪業說不能盡今皆懺悔次施主恩者不可思議夫若無外護無修行緣施主不助實難進道我佛慈悲深厚故雖入滅度留禮與後弟子受用其所留福者皆施主處有今我等遇末法時無戒無德少能修習禪定智慧受用信心施主衣服飲食臥具醫藥宮殿房室乘騎莊嚴七寶財物種種資具或不應受而妄受之或應受用過分受之或受已後而乃枉費造如是等種種罪障無量無邊今皆懺悔我等為無明所覆不知罪因不報四恩今遇道場方能覺知歸命毗盧遮那如來及一切賢聖海眾燒香散華一切業報發露懺悔不敢覆藏由此因緣我及法界眾生海不能報答四恩一切業報願皆清淨次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三徧百劫積集罪一念悉盪除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白眾等聽說經中無常偈生老病死纏縛眾生如似霜雹壞諸苑林諸勝妙色由此皆變猶如山火四方俱起野獸墮中憂愁驚怖處生死中亦復如是
