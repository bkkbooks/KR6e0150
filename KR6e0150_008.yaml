body:
  text: 唐蘭山雲巖慈恩寺護法國師一行沙門慧覺依經録宋蒼山載光寺沙門普瑞補注明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閲天台習教觀沙門正止治定第八晌次如來現相品法門衆海同請分一切恭敬敬禮無盡三寶是諸衆等人各胡跪嚴持香華如法供養願此供海雲遍滿十方界願以無數香蓋無數香幢無數香幡無數香雲無數香像無數香光無數香𦦨無數香網無數香座無數香經行地無數香所住處無數香世界無數香山無數香海無數香河無數香樹無數香衣服無數香蓮華無數香宮殿無量無邊無比不可數不可稱不可思不可量不可說不可說華雲鬘雲塗香雲末香雲衣雲寶雲鐙光明雲莊嚴具雲如是摩尼寶蓋摩尼寶幢摩尼寶幡摩尼寶帳摩尼寶網摩尼寶像摩尼寶光摩尼寶𦦨摩尼寶雲摩尼寶座摩尼寶經行地摩尼寶所住處摩尼寶剎摩尼寶山摩尼寶海摩尼寶河摩尼寶樹摩尼寶衣服摩尼寶蓮華摩尼寶宮殿皆不可說不可說如是一一諸境界中各有無數欄楯無數宮殿無數樓閣無數門闥無數半月無數却敵無數窗牗無數清淨寶無數莊嚴具以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海衆作大供養受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次不空摩尼印呪唵啞麼遏布麻禰巴能麻末𠷌呤怛達遏怛眉浪雞矴薩慢怛不囉薩囉吽梵音讚佛世尊入涅槃彼土莊嚴滅衆生無法器世界成雜染若有佛興世一切悉珍好隨其心清淨莊嚴皆具足諸佛神通力示現不思議是時諸剎海一切普清淨直言讚佛佛身充滿於法界普現一切衆生前隨緣赴感靡不周而恆處此菩提座如來一一毛孔中一切剎塵諸佛坐菩薩衆會共圍繞演說普賢之勝行如來安處菩提座一毛示現多剎海一一毛現悉亦然如是普周於法界一一剎中悉安坐一切剎土皆周遍十方菩薩如雲集莫不咸來詣道場一切剎土微塵數功德光明菩薩海普在如來衆會中乃至法界咸充遍法界微塵諸剎土一切衆生皆出現如是分身智境界普賢行中能建立一切諸佛衆會中勝智菩薩僉然坐各各聽法生歡喜處處修行無量劫已入普賢廣大願各各出生衆佛法毗盧遮那法海中修行剋證如來地普賢菩薩所開覺一切如來同讚喜已獲諸佛大神通法界周流無不遍一切剎土微塵數常現身雲悉充滿普為衆生放大光各雨法雨稱其心南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十回向菩薩十地菩薩等覺菩薩遍法界剎海微塵數菩薩一切海衆南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海衆南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中南無十方無礙毗盧遮那如來道場一切海衆南無大方廣佛華嚴經中如來現相品法門如來現相品第二經云爾時諸菩薩至此道場中願宣說願共諸衆生往生華藏海極樂淨土中次放光普攝經云爾時世尊知諸菩薩至汝可往觀聞所說願共諸衆生往生華藏海極樂淨土中經云爾時十方世界海至於其座上結如趺坐願共諸衆生往生華藏海極樂淨土中南無法水覺虗空無邊王佛南無觀察勝法蓮華幢菩薩摩訶薩南無如是等不可說佛剎微塵數世界海諸菩薩一切海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云此華藏世界海南至於其座上結加趺坐願共諸衆生往生華藏海極樂淨土中南無普智光明德須彌王佛南無普照法海慧菩薩摩訶薩南無如是等不可說佛剎微塵數世界海諸菩薩一切海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云此華藏世界海西至於其座上結加趺坐願共諸衆生往生華藏海極樂淨土中南無香𦦨功德寶莊嚴佛南無月光香𦦨普莊嚴菩薩摩訶薩南無如是等不可說佛剎微塵數世界海諸菩薩一切海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云此華藏世界海北至於其座上結加趺坐願共諸衆生往生華藏海極樂淨土中南無普智幢音王佛南無師子奮迅光明菩薩摩訶薩南無如是等不可說佛剎微塵數世界海諸菩薩一切海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云此華藏世界海東北方至於其座上結加趺坐願共諸衆生往生華藏海極樂淨土中南無一切法無畏燈佛南無最勝光明燈無盡功德藏菩薩摩訶薩南無如是等不可說佛剎微塵數世界海諸菩薩一切海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云此華藏世界海東南方至於其座上結加趺坐願共諸衆生往生華藏海極樂淨土中南無普喜深信王佛南無慧燈普明菩薩摩訶薩南無如是等不可說佛剎微塵數世界海諸菩薩一切海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云此華藏世界海西南方至於其座上結加趺坐願共諸衆生往生華藏海極樂淨土中南無普智光明音佛南無普華光焰髻菩薩摩訶薩南無如是等不可說佛剎微塵數世界海諸菩薩一切海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云此華藏世界海西北方至於其座上結加趺坐願共諸衆生往生華藏海極樂淨土中南無無量功德海光明佛南無無盡光摩尼王菩薩摩訶薩南無如是等不可說佛剎微塵數世界海諸菩薩一切海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云此華藏世界海下方至於其座上結加趺坐願共諸衆生往生華藏海極樂淨土中南無法界光明佛南無法界光𦦨慧菩薩摩訶薩南無如是等不可說佛剎微塵數世界海諸菩薩一切海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云此華藏世界海上方至於其座上結加趺坐願共諸衆生往生華藏海極樂淨土中南無無礙功德光明王佛南無無礙力精進慧菩薩摩訶薩南無如是等不可說佛剎微塵數世界海諸菩薩一切海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云如是等十億佛剎至於其座上結加趺坐願共諸衆生往生華藏海極樂淨土中南無如是等不可說華藏世界中復有十億佛剎極微塵數諸菩薩一一菩薩有剎海微塵數諸菩薩衆彼諸菩薩身毛孔中一一各現十世界海微塵數光一一光中有十世界海微塵數一切菩薩海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中次歎現自在用經云如是坐已其諸菩薩至廣大願海生如來家願共諸衆生往生華藏海極樂淨土中次光聲自述爾時諸菩薩光明中至諸光明中大音吼願共諸衆生往生華藏海極樂淨土中次現瑞相表說法經云爾時世尊欲令一切至三昧解脫神通變化願共諸衆生往生華藏海極樂淨土中次如來眉間菩薩海會衆南無法界覺場如來毫中名一切法勝音衆等剎海微塵數菩薩一切海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云即於衆中承佛威神至諸道場中悉亦如是願共諸衆生往生華藏海極樂淨土中南無觀察一切勝法蓮華光慧王菩薩摩訶薩南無法喜慧光明菩薩摩訶薩南無香焰光普明慧菩薩摩訶薩南無師子奮迅慧光明菩薩摩訶薩南無法海慧功德藏菩薩摩訶薩南無慧燈普明菩薩摩訶薩南無華焰髻普明智菩薩摩訶薩南無威德慧無盡光菩薩摩訶薩南無法界普明慧菩薩摩訶薩南無精進力無礙慧菩薩摩訶薩南無如是等佛剎微塵數世界中復有十億剎海微塵數諸菩薩衆而來集會一切剎海一一四天下諸道場中皆亦如是一切菩薩至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中次意根三毒罪懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖衆世出世神慈悲本願放大光明照於法會證盟護念哀愍攝受願我及一切衆生海自從無始直至今時業海無盡帝網重重諸貪嗔癡一切罪業發露懺悔除業障經云貪有三種上中下品上品貪者若身若心極其分位而生染著無離貪心由染著故於一切處不生慚愧何者是為無慚謂獨止一處作是思惟而起尋求諸所欲事稱讚欲境自現有德是為無慚何者是為無愧由彼貪欲因緣於父母等前違背狠房及生惱害於尊師之前亦無恥辱自現有德是為無愧以是因緣命終之後墮惡趣中此名上品貪中品貪者謂若親近諸欲境時自初至末雖復暫有所成旋起離貪之心即生變悔此名中品貪下品貪者謂若親近諸欲境時或身相觸或共語言或瞻視間旋起即滅此名下品貪總要而言一切濟念受用資具有所欲者皆名下品不悟此法今皆懺悔嗔有三種上中下品上品嗔者隨於所起諸嗔境中生極嗔恚而復㬥惡便造五無間罪或隨造一無間罪或謗正法凡如是等總聚五無間罪算分數分喻分乃至烏波尼煞曇分皆不能及由此因緣身壞命終墮大地獄若或暫得生於人間身相黑色其目赤惡性多㬥惡此因緣故還生地獄此名上品嗔中品嗔者隨於諸嗔境中若暫起已或微分造不善罪業即速變悔旋時對治而令止息此名中品嗔下品嗔者謂於親愛和合境中隨以嗔緣輒生輕謗雖復暫起於剎那中即生變悔旋起對治而令息滅此名下品嗔不悟此法今皆懺悔癡有三種上中下品上品癡者諸一切處若行若止悉無善作亦無憂戚不生變悔此名上品癡中品癡者若起少分不善之業雖有所成即速變悔於同梵行人所懺謝其罪不現己德此名中品癡下品癡者謂於如來所制戒中不越性罪違犯初篇戒學之罪此名下品癡不悟此法今皆懺悔我等為無明所覆不識貪嗔癡等罪因今遇道場乃能覺知歸命毗盧遮那如來及一切賢聖海衆燒香散華貪嗔癡罪發露懺悔不敢覆藏由此因緣我及法界衆生海意業重罪悉皆清淨次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三遍百劫積集罪一念悉蕩除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白衆等聽說經中無常偈一切法皆空高者亦當墜和合必有離有命皆歸死三界諸衆生現在及未來生者必有死無有法常者譬如日出沒一切人皆見一切生亦然死法當現前
