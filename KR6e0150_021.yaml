body:
  text: 唐蘭山雲巖慈恩寺護法國師一行沙門慧覺依經録宋蒼山載光寺沙門普瑞補注明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閲天台習教觀沙門正止治定第二十一晌第四夜摩天宮會修因契果生解分一切恭敬敬禮無盡三寶是諸衆等人各胡跪嚴持香華如法供養願此供海雲遍滿十方界百萬億香𦦨光明映徹百萬億蓮華藏開敷鮮榮百萬億寶網百萬億華網百萬億香網彌覆其上百萬億天寶衣百萬億天青色衣百萬億天黃色衣百萬億天赤色衣百萬億天奇妙色衣百萬億天種種寶奇妙色衣百萬億種種香熏色衣百萬億一切寶所成衣百萬億鮮白衣悉善敷布見者歡喜以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海衆受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次不空摩尼印呪唵啞麼遏帝麻禰巴能麻末𠷌呤怛達遏怛眉浪雞矴薩慢怛不囉薩囉吽梵音讚佛如來大智慧希有無等倫一切諸世間思惟莫能及了知一切法自性無所有如是解法性則見盧舍那如來廣大身究竟於法界不離於此座而遍一切處直言讚佛譬如淨月在虗空能蔽衆星示虧盈一切水中能影現諸有觀瞻悉對前如來淨月亦復然能蔽餘乘示修短普現天人淨心水一切皆謂對其前譬如梵王住自宮普現三千諸梵處一切人天咸得見實不分身向於彼諸佛現身亦如是一切十方無不遍其身無數不可稱亦不分身不分別南無大方廣佛華嚴經華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方生世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十回向菩薩十地菩薩等覺菩薩遍法界剎海微塵數菩薩一切海衆南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海衆南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛南無十身無礙毗盧遮那如來道場一切海衆南無大方廣佛華嚴經中升夜摩天宮品法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中升夜摩天宮品第十九經云爾時如來威神力故至十方世界悉亦如是願共諸衆生往生華藏海極樂淨土中次法界十如來南無名稱如來南無寶王如來南無喜目如來南無然燈如來南無饒益如來南無善覺如來南無勝天如來南無無去如來南無無勝如來南無苦行如來至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛南無十身無礙毗盧遮那如來道場一切海衆南無大方廣佛華嚴經中夜摩天宮偈讚品法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中夜摩天宮中偈讚品第二十經云爾時佛神力故至所有名號悉等無別願共諸衆生往生華藏海極樂淨土中次放光偈讚分經云爾時世尊從兩足上至謂說如是法願共諸衆生往生華藏海極樂淨土中次法界夜摩天宮十林菩薩本界佛南無東方十萬佛剎微塵數諸國土外親慧世界常住眼佛功德林菩薩佛剎微塵數道場一切海衆南無南方十萬佛剎微塵數諸國土外幢慧世界無勝眼佛慧林菩薩佛剎微塵數道場一切海衆南無西方十萬佛剎微塵數諸國土外寶慧世界無住眼佛勝林菩薩佛剎微塵數道場一切海衆南無北方十萬佛剎微塵數諸國土外勝慧世界不動眼佛無畏林菩薩佛剎微塵數道場一切海衆南無東北方十萬佛剎微塵數諸國土外燈慧世界天眼佛慚愧林菩薩佛剎微塵數道場一切海衆南無東南方十萬佛剎微塵數諸國土外金剛慧世界解脫眼佛精進林菩薩佛剎微塵數道場一切海衆南無西南方十萬佛剎微塵數諸國土外安樂慧世界審諦眼佛力林菩薩佛剎微塵數道場一切海衆南無西北方十萬佛剎微塵數諸國土外日慧世界明相眼佛行林菩薩佛剎微塵數道場一切海衆南無下方十萬佛剎微塵數諸國土外淨慧世界最上眼佛覺林菩薩佛剎微塵數道場一切海衆南無上方十萬佛剎微塵數諸國土外梵慧世界紺青眼佛智林菩薩佛剎微塵數道場一切海衆至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛南無十身無礙毗盧遮那如來道場一切海衆南無大方廣佛華嚴經中十行品法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中十行品第二十一經云爾時功德林菩薩至此三昧力法如是故願共諸衆生往生華藏海極樂淨土中南無如是等無量無邊無盡無等不可說佛剎微塵數同名一切功德林佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云爾時諸佛各伸右手至第十真實行願共諸衆生往生華藏海極樂淨土中次該攝果海十行法門南無為法界第一行菩薩歡喜行法門南無為法界第二行菩薩饒益行法門南無為法界第三行菩薩無違逆行法門南無為法界第四行菩薩無屈撓行法門南無為法界第五行菩薩離癡亂行法門南無為法界第六行菩薩善現行法門南無為法界第七行菩薩無著行法門南無為法界第八行菩薩難得行法門南無為法界第九行菩薩善法行法門南無為法界第十行菩薩真實行法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中十行品之餘經云爾時佛神力故十方各有至讚歎稱揚得究竟願共諸衆生往生華藏海極樂淨土中次法界夜摩證法佛南無十方各十萬佛剎微塵數國土外十萬佛剎微塵數功德幢世界一切普功德佛次證法菩薩南無如是等不可說不可稱不可量十萬佛剎微塵數功德幢世界十方遍滿功德林菩薩一切海衆次瑞相分中諸天海衆南無如是等不可說佛剎微塵數一切雷音聲無量諸天一切海衆次法界夜摩十行菩薩南無十方三世盡虗空界微塵剎土中歡喜行菩薩摩訶薩南無十方三世盡虗空界微塵剎土中饒益行菩薩摩訶薩南無十方三世盡虗空界微塵剎土中無違逆行菩薩摩訶薩南無十方三世盡虗空界微塵剎土中無屈撓行菩薩摩訶薩南無十方三世盡虗空界微塵剎土中離癡亂行菩薩摩訶薩南無十方三世盡虗空界微塵剎土中善現行菩薩摩訶薩南無十方三世盡虗空界微塵剎土中無著行菩薩摩訶薩南無十方三世盡虗空界微塵剎土中難得行菩薩摩訶薩南無十方三世盡虗空界微塵剎土中善法行菩薩摩訶薩南無十方三世盡虗空界微塵剎土中真實行菩薩摩訶薩至心歸命禮大方廣佛華嚴經中華藏世界海本尊毗盧遮那佛南無十身無礙毗盧遮那如來道場一切海衆南無大方廣佛華嚴經中十無盡藏品法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中十無盡藏品第二十二經云爾時功德林菩薩至悉得究竟無盡大藏願共諸衆生往生華藏海極樂淨土中至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛次不敬師罪懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖衆世出世神慈悲本願放大光明照於法會證盟護念哀愍攝受願我及一切衆生海自從無始直至今時無明蓋覆不知恩德不能報恩一切罪障發露懺悔寶積經云爾時佛告諸菩薩善男子汝曾往昔於拘留孫如來法中出家為道自恃多聞修持淨戒常懷憍慢傲逸之心又行頭陀少欲知足於時功德復生執著爾時有二說法比丘多諸親友名聞利養汝於是人以慳嫉心妄言誹謗行淫欲事是時法師親友眷屬由汝離間說其種過皆令疑惑不生信受彼諸衆生於是法師無隨順心斷諸善根是故汝等由斯惡業已於六十百千歲中生阿鼻地獄餘業未盡復於四十百千歲中生等活地獄餘業未盡復於二十百千歲中生黑繩地獄餘業未盡復於一十百千歲中生燒熱地獄從彼歿已還得為人五百世中生盲無目以殘業故在在所生常多懞鈍忘失正念障覆善根福德微少形容醜缺人不喜見誹謗輕賤戲弄欺嫌常在邊地貧窮下劣喪失財寶資生艱難不為衆人尊重敬愛從此歿已於後末世五百歲中法欲滅時還於邊地下劣家生匱乏饑凍為人誹謗忘失正念不修善法設欲修行多諸留難雖暫發起智慧光明以業障故尋復還沒汝等從五百歲後是諸業障爾乃消滅於後得生阿彌陀佛極樂世界是時彼佛當為汝等授阿耨多羅三藐三菩提記爾時諸菩薩等聞佛所說舉身毛竪深生憂悔便自𢪛淚前白佛言世尊我今發露悔其過咎我等常於菩薩乘人輕慢嫉恚及餘業障今於佛前如罪懺悔又正恭敬經云若比丘應於阿闍黎所作敬重心及正恭敬彼讀誦受持經者在阿闍黎前不得露齒不得瞻足不得動足不得疊足不得踔足不得弄足不得高座處坐師不借問亦不得語不得違師語不得一向瞻相師面住在師前三肘而立師聽坐即坐坐已於師所起慈悲心彼誦經者應先誦熟熟者誦已從師受經任意多少隨諸法門中若有疑者先應咨請聽問以不師若聽可然後當問彼受經已右膝著地兩手接禮師足若地處惡者隨所有道却退而行當至平處若地處先平彼應禮師足然後當行行至十肘復更作禮然後隨道而行彼應作如是念阿闍黎當逐我後我不能遠離阿闍黎彼應知時日三時到阿闍黎所若不到者應如法治若到而不見阿闍黎者彼應若草若木若杖若土塊若石令作記識若阿闍黎在房宴坐者彼應旋房禮敬然後當行若有所作不問師亦不得作除大小便不得向師作粗獷惡語不得重循師語隨師所坐之處若繩牀若木牀皆不得坐彼牀若壞即應治之彼應晨朝時往知時往不得非時往彼往已應問阿闍黎當何所須及何所作為入聚落不若言入阿闍黎所有衣被應洗手自衣拭手兩手捉師衣已著淨處先與師淨水洗手然後授衣與師於後安多會拂麈與之或覆身衣或雨衣或所須餘衣資用之者彼應如是敬之不得阿闍黎前涕唾若寺內若寺東西不得左右反抄衣不得纏頭隨師所居有經行處掃灑令淨日三時拂扇三時洗浴三時咨問取水為師乞食若師有所作者彼應用力作之若食竟應從師索鉢洗之若與先洗師鉢然後自洗己鉢師若不與不得重索何以故阿難未來有如是比丘作是念言如來正等覺鉢無有洗者彼學我故自欲洗之如來聽如是等人夏取清涼冬取溫暖隨所須者皆應得取不得師前嚼楊枝不得說師若好若惡若遙見師應起迎接阿難若從讀誦咨請一四句偈是名阿闍黎是故彼應恭敬阿闍黎阿難若不如是恭敬阿闍黎者以不敬故住不正行說師過惡者彼不說我以為世尊何以故阿難彼人不重佛不敬法不在僧數何以故阿難如是癡人不得名為住正行中罪報懺悔阿難若住正行者我為彼人說佛法耳爾時尊者阿難涕泣流淚作如是言世尊未來世中若有衆生能住能行如是等行甚為希有世尊我能行住如是等行世尊若有比丘不能恭敬和尚阿闍黎及說過者彼人得何等報佛告阿難若有比丘不敬和尚阿闍黎及說過者我說彼人愚癡凡夫何以故阿難不得說阿闍黎實惡何況說虗是中阿難若不恭敬和尚阿闍黎者有辟支地獄名之為滅彼人命終生彼地獄彼人生已即有四頭身上火然如熱鐵丸是中有諸蟲名為鐵狗常所食噉彼人舌根是處命終生畜生中作虎狼野干衆生見者皆唱言是虎狼野干有所見者無能喜樂以本口過故常食糞穢受報已盡復生人中常在邊地無佛法處雖生人中具足衆惡遠離功德身形色力不類人狀稟受身形不似父母不為父母之所憐愛常被惡謗遠離諸佛生生愚癡暗鈍無智速墮地獄何以故以不恭敬教授施法濟拔難者故阿難如是等人數得苦法罪報懺悔阿難假使讀誦受持一四句偈及以經卷書寫供養隨彼文字等劫若頂若肩若背荷負彼師及一切樂具而供養之阿難如是供養已猶不能報阿闍黎恩佛告阿難未來世中有如是等諸惡比丘得是經已而不恭敬阿闍黎和尚者以無行故說阿闍黎和尚過我今當記如是比丘愚癡人等墮諸地獄受大苦惱阿難我今告汝及以正敕如來已說善惡道行隨彼衆生所行善惡得報如是罪報懺悔又謗佛經云當於爾時彼長者子說彼比丘毀破淨戒彼惡業報九十千年墮大地獄於五百世雖生人中受黃門身生夷人中生邪見家於六百世中生盲無舌七百世中雖復出家求陀羅尼而不能得何以故以彼往世惡業障故善男子汝應善知如是法門我今已說既得聞已若見法師實破戒者不得生嗔尚不應說何況耳聞而得說耶善男子若有挑拔一切衆生眼目罪聚若以嗔心看法師者所有惡業過彼罪聚若斷一切諸衆生命所有罪聚若於法師生於惡心經回面頃所得罪聚彼前罪聚於此罪聚一百分中不等其一於千分中亦不等一於百千分阿僧祇分若歌羅分若數分中不等其一於譬喻分乃至優波尼沙陀分中不等其一何以故若謗法師即是謗佛罪報懺悔善男子若有希望供養佛者彼人則應供養法師若有希望供給佛者彼人則應供給法師若有希望禮拜佛者彼人則應禮拜法師何以故以從菩薩生一切智以從菩薩生諸佛故又瑜伽大教王偈云若人驀踏於師影彼人壞塔罪無異所作所求皆不成諸佛賢聖皆不許勿令毀謗阿闍黎乃至夢中亦不得若有愚癡謗闍黎常被諸魔來驚怖如是惡業愚癡人智者宜應常遠離所說地獄阿鼻等墮於地獄無出期謗阿闍黎獲此果是故至心求菩提供養承事阿闍黎恭敬尊重常孝順能施難思最上果弟子應當行孝順報阿闍黎令歡喜師若歡喜法得成此外世間無有尊我等為無明所覆不識謗師罪因今遇道場方始覺知歸命毗盧遮那如來及一切聖賢海衆燒香散華不敬師罪發露懺悔不敢覆藏由此因緣我及法界衆生海不敬師罪願皆清淨次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三遍百劫積集罪一念悉蕩除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白衆等聽說經中無常偈凡聖本同常住性凡夫執相逐無常六道三途逼迫身世世生生老病死此老病死皆共嫌形儀醜惡極可厭少年容貌暫時在不久咸悉見枯羸假使壽命滿百歲終歸不免無常逼老病死苦常隨逐恆與衆生作無利應當親近善知識念念勤修常住因捨無常色護常色受想行識亦如是
