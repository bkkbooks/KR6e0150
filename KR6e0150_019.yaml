body:
  text: 唐蘭山雲巖慈恩寺護法國師一行沙門慧覺依經錄宋蒼山載光寺沙門普瑞補註明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閱天台習教觀沙門正止治定第十九晌一切恭敬敬禮無盡三寶是諸眾等人各胡跪嚴持香華如法供養願此供海雲徧滿十方界阿僧祇寶以為其地阿僧祗宮殿阿僧祇門闥阿僧祇牕牗阿僧祇階陛阿僧祇欄楯阿僧祇道路皆七寶成阿僧祇幡阿僧祇蓋周回間列阿僧祇眾寶瓔珞阿僧祇真珠瓔珞阿僧祇赤真珠瓔珞阿僧祇師子珠瓔珞處處垂下阿僧祇半月阿僧祇繒帶阿僧祗寶網以為嚴飾阿僧祇寶鐸風動成音散阿僧祇天諸雜華懸阿僧祇天寶鬘帶嚴阿僧祇眾寶香爐雨阿僧祇細末香金屑懸阿僧祇寶鏡燃阿僧祇寶燈以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海眾受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉發囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次結廣大不空摩尼印呪結印同前唵啞麼遏布麻禰巴能麻末𠷌呤怛達遏怛眉浪雞矴薩慢怛不囉薩囉吽梵音讚佛佛身不可取無生無起作應物普現前平等如虗空一毛現變化一切佛同說經於無量劫彼有無邊際毗盧遮那佛願力周沙界十方國土中恒轉無上輪直言讚佛譬如真如不生滅無有方所普能現大饒益者行如是出過三世不可量法界非界非非界非是有量非無量大功德者行亦然非量無量無身故如鳥飛行二千歲前後虗空等無別眾劫演說如來行已說未說不可量金翅在空觀大海闢水搏取龍男女十力能拔善根人令出有海除眾惑譬如日月遊虗空炤令一切不分別世間周行於法界教化眾生無動念南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十迴向菩薩十地菩薩等覺菩薩徧法界剎海微塵數菩薩一切海眾南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海眾南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛南無十身無礙毗盧遮那如來道場一切海眾南無大方廣佛華嚴經中光明覺品法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中光明覺品第九經云爾時世尊從兩足輪下至佛徧虗空亦如是願共諸眾生往生華藏海極樂淨土中次法界主伴諸佛南無十身無礙毗盧遮那如來道場一切海眾南無此三千大千世界百億閻浮提中見佛世尊坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞南無過此世界十方十佛國土皆有百億閻浮提其中皆有如來坐蓮華藏師子之座十佛剎微塵數菩薩所共圍繞南無過十世界十方百世界中皆有百億閻浮提悉見如來坐蓮華藏師子之座十佛剎微塵數一切菩薩所共圍繞南無過百世界十方千世界中百億閻浮提中如來坐蓮華藏師子之座十佛剎微塵數一切菩薩所共圍繞南無過千世界十方千世界中百億閻浮提中如來坐蓮華藏師子之座十佛剎微塵數一切菩薩所共圍繞南無過十千世界十方百千世界中百億閻浮提中如來坐蓮華藏師子之座十佛剎微塵數一切菩薩所共圍繞南無過百千世界十方百萬世界中百億閻浮提中如來坐蓮華藏師子之座十佛剎微塵數一切菩薩所共圍繞南無過百萬世界十方各一億世界中百億閻浮提中如來坐蓮華藏師子之座十佛剎微塵數一切菩薩所共圍繞南無過一億世界十方十億世界中百億閻浮提中如來坐蓮華藏師子之座十佛剎微塵數一切菩薩所共圍繞南無過十億世界十方百億世界千億世界百千億世界那由他億世界百那由他億世界千那由他億世界百千那由他億世界中皆有閻浮提中如來坐蓮華藏師子之座十佛剎微塵數一切菩薩所共圍繞南無如是等無數無量無盡無邊無等不可數不可稱不可思不可量不可說不可說盡法界虗空界所有世界皆有百億閻浮提中如來坐蓮華藏師子之座十佛剎微塵數一切菩薩所共圍繞十方盡歸命滅罪增淨信願生華藏海極樂淨土中次法界普光十首菩薩本界佛南無東方十佛剎微塵數世界外金色世界不動智佛文殊師利菩薩十佛剎微塵數道場一切海眾南無南方十佛剎微塵數世界外妙色世界無礙智佛覺首菩薩十佛剎微塵數道場一切海眾南無西方十佛剎微塵數世界外蓮華色世界解脫智佛財首菩薩十佛剎微塵數道場一切海眾南無北方十佛剎微塵數世界外薝蔔華色世界威儀智佛寶首菩薩十佛剎微塵數道場一切海眾南無東北方十佛剎微塵數世界外優鉢羅華色世界明相智佛功德首菩薩十佛剎微塵數道場一切海眾南無東南方十佛剎微塵數世界外金色世界究竟智佛目首菩薩十佛剎微塵數道場一切海眾南無西南方十佛剎微塵數世界外寶色世界最勝智佛精進首菩薩十佛剎微塵數道場一切海眾南無西北方十佛剎微塵數世界外金剛色世界自在智佛法首菩薩十佛剎微塵數道場一切海眾南無下方十佛剎微塵數世界外頗梨色世界梵智佛智首菩薩十佛剎微塵數道場一切海眾南無上方十佛剎微塵數世界外平等色世界觀察智佛賢首菩薩十佛剎微塵數道場一切海眾南無過此世界十方十佛剎土中不動智佛等十方十首菩薩一一各十佛剎微塵數道場一切海眾南無過十世界十方百世界中不動智等十佛十首菩薩一一各十佛剎微塵數道場一切海眾南無過百世界十方千世界中不動智等十佛十首菩薩一一各十佛剎微塵數道場一切海眾南無過千世界十方十千世界中不動智等十佛十首菩薩一一各十佛剎微塵數道場一切海眾南無過十千世界十方百千世界中不動智等十佛十首菩薩一一各十佛剎微塵數道場一切海眾南無過百千世界十方百萬世界中不動智等十佛十首菩薩一一各十佛剎微塵數道場一切海眾南無過百萬世界十方一億世界中不動智等十佛十首菩薩一一各十佛剎微塵數道場一切海眾南無過一億世界十方十億世界中不動智等十佛十首菩薩一一各十佛剎微塵數道場一切海眾南無過十億世界十方百億世界千億世界那由他億世界百那由他億世界千那由他億世界百千那由他億世界中不動智等十佛十首菩薩一一各十佛剎微塵數道場一切海眾南無如是等無數無量無盡無邊無等不可說不可稱不可思不可量不可說不可說盡法界虗空界所有世界中不動智等十佛十首菩薩一一各十佛剎微塵數道場一切海眾十方盡歸命滅罪增淨信願生華藏海極樂淨土中次法界普光證法佛南無十方三世盡虗空界微塵剎土中一切諸佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中次十信圓融果海法門南無為法界定心菩薩緣起深義普攝諸法緣起甚深法門南無為法界念心菩薩眾生迷此故須教誡甚深法門南無為法界戒心菩薩教誡順化有善惡業果甚深法門南無為法界護心菩薩欲知此業說法相應說法甚深法門南無為法界願心菩薩說法成善唯佛福田甚深法門南無為法界進心菩薩說順田故要持聖法正法甚深法門南無為法界不退心菩薩彼之正法者在勤行處正行甚深法門南無為法界慧心菩薩彼行正道又用助道功德甚深法門南無為法界迴向心菩薩有助定王處方同趣一道甚深法門南無為法界智心菩薩證智果位中甚深定佛境甚深法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中次法界普光十信菩薩南無十方三世盡虗空界微塵剎土中信心菩薩一切海眾南無十方三世盡虗空界微塵剎土中進心菩薩一切海眾南無十方三世盡虗空界微塵剎土中念心菩薩一切海眾南無十方三世盡虗空界微塵剎土中慧心菩薩一切海眾南無十方三世盡虗空界微塵剎土中定心菩薩一切海眾南無十方三世盡虗空界微塵剎土中戒心菩薩一切海眾南無十方三世盡虗空界微塵剎土中迴向心菩薩一切海眾南無十方三世盡虗空界微塵剎土中護心菩薩一切海眾南無十方三世盡虗空界微塵剎土中不退心菩薩一切海眾南無十方三世盡虗空界微塵剎土中智心菩薩一切海眾至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛南無十身無礙毗盧遮那如來道場一切海眾南無大方廣佛華嚴經中菩薩問明品法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中菩薩問明品第十經云爾時文殊師利菩薩至四維上下亦復如是願共諸眾生往生華藏海極樂淨土中南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無十身無礙毗盧遮那如來道場一切海眾南無大方廣佛華嚴經中淨行品法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中淨行品第十一經云爾時智首菩薩至以一切聲聞緣覺所不能動願共諸眾生往生華藏海極樂淨土中南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無十身無礙毗盧遮那如來道場一切海眾南無大方廣佛華經中賢首品法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中賢首品第十二經云爾時文殊師利菩薩至我等一切悉皆隨喜願共諸眾生往生華藏海極樂淨土中至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中次謗法懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖眾世出世神慈悲本願放大光明炤於法會證盟護念哀愍攝受願我及一切眾生海自從無始直至今時一切謗法罪業發露懺悔大法炬經云爾時放光如來告諸菩薩言摩那婆若有眾生於佛世尊甚深密智最上勝智最微妙智乃至一句生毀謗者是人當受無量惡報若復有人發如是言此非佛語非如來教轉增誹謗復於如是諸佛法中既無信心自誹謗已更令無量無邊眾生於佛如是大慧門中乃至一句誹謗不信多作障礙乃至不聽他人讀誦聽受因口業故造種種惡必定當受無量惡報摩那婆寧令是人一切不聞不令彼聞起重謗摩那婆寧使是人以諸瓦石填塞其口滿一百年不令得造如是謗業言此法門非如來說摩那婆如是癡人住邪慢心誹謗經典與餘眾生為大障礙摩那婆彼諸惡人非但愚癡作如是說復住慳嫉謗毀是經我今云何令諸眾生於是法中莫能成就摩那婆寧使是人噉食牛糞過於無量百千億歲不令是人為飲食故誹謗是法摩那婆寧使是人臥於菅針棘刺之上過千億歲不令是人為牀敷故謗毀是法摩那婆寧使是人裸露形體過千億歲不令是人為衣服故謗毀是法摩那婆彼諸惡人誹謗佛法現在惡業我已說之汝先問我未來世中得何果報者摩那婆是謗法人所受果報我不應說所以者何我若說是果報過者或能更令無量無邊諸眾生等聞是事已復增誹謗罪報懺悔爾時旃檀那菩薩從座而起整持威儀褊袒右膊右膝著地合掌恭敬白放光如來言世尊我於今者在世尊前為如是等諸惡眾生誠心悔過以彼謗法諸惡眾生於此陀羅尼門乃至一句生誹謗心若已誹謗及欲誹謗破壞呵毀乃至與一眾生於一句中而作障礙故世尊我今為彼諸惡眾生乃至無量無邊諸世界中亦多如是諸惡眾生受行顛倒誹謗正法我為彼故今於佛前誠心懺悔世尊為彼眾生無救護故無眼目故無智慧故具惡口故我今為彼至誠悔過世尊若復有人在世尊前如是悔者彼為是中得何善根獲何功德爾時放光如來告旃檀那菩薩言善哉善哉摩那婆汝能如是方便熏心請問如來若善男子為彼破法諸惡眾生誠心悔過當得無量大功德聚摩那婆是功德聚難可稱量今以譬喻少分開演令是眾生發歡喜心摩那婆如此東方所有世界其中眾生一切盡為摩訶施主如是南西北方四維上下周徧十方所有眾生一切悉為摩訶施主經於無量無邊不可說不可稱諸大劫數常行布施所謂金銀眾寶衣服飲食湯藥房舍種種眾具還以無量無邊眾生皆集一處為受施者摩那婆於意云何是福聚可為大否旃檀那言世尊是福德聚真實寬大何以故世尊若有一人於無量劫行施功德尚不得徧何況無量眾生經無數劫行檀福聚而可測量其分限也佛言如是如是摩那婆彼等無量眾生無量劫數無量行施無量福聚雖不可知然猶不如善男子善女人於前一切謗法眾中但為一人誠心懺悔所生善根所獲功德無量無邊不可稱比況為無量眾生誠心懺悔也復次摩那婆置此世界所有謗法惡眾生等假使十方無量無邊諸世界中所有誹謗正法眾生摩那婆如是十方世界謗法眾中但為一人至心悔過所得福聚及所生善根尚不可限何況普為十方眾生誠心悔也如是福聚善根住持攝受增長諸功德聚不可計算不可稱量不可思議如是功德誰能信者唯有不退菩薩摩訶薩少能信耳時旃檀那復白佛言彼善男子如是行時欲求何等佛言旃檀那彼善男子為菩提故荷是重擔愍彼眾生至心懺悔緣此善根復能莊嚴諸佛國土終得如是自在受用罪報懺悔又謗法者智度論云略有二種一者於方廣佛經言非佛說二者不稱真理大涅槃經云有四種重罪一誹謗方廣經二犯四重戒三造五逆罪四誹謗聖人若有觸犯時墮阿鼻地獄大般若經云謗法罪徧歷十方阿鼻地獄復來此界劫盡更生受苦無窮如經廣說法華經中亦廣說謗法罪報一切有情中或自毀謗或教他謗或讚謗法或隨喜謗法皆為重罪我等為無明所覆不識謗法罪因今遇道場方能覺知歸命毗盧遮那如來及一切賢聖海眾燒香散華一切謗法罪業發露懺悔不敢覆藏由此因緣我及法界眾生海謗法罪報願皆消滅次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三徧百劫積集罪一念悉盪除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白眾等聽說經中無常偈諸王得自在勢力無等雙一切皆遷變壽命亦如是眾苦輪無際流轉無休息三界皆無常諸有悉無樂有道本性相一切皆空無
