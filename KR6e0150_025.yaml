body:
  text: 唐蘭山雲巖慈恩寺護法國師行沙門慧覺依經録宋蒼山載光寺沙門普瑞補注明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閲天台習教觀沙門正止治定第二十五晌第八三會普光明殿託法進修成行分一切恭敬敬禮無盡三寶是諸衆等人各胡跪嚴持香華如法供養願此供海雲遍滿十方界衣帳鬘帳華帳香帳枝帳摩尼帳真金帳莊嚴具帳音樂帳象王神變帳馬王神變帳又寶鈴網寶蓋網寶身網海藏真珠網紺琉璃摩尼網月光摩尼網重重形相衆香網寶冠網寶瓔絡網𦦨光摩尼寶光明月藏摩尼寶光明幢摩尼寶光明香𦦨摩尼寶光明勝藏摩尼寶光明蓮華藏摩尼寶光明𦦨幢摩尼寶光明大鐙摩尼寶光明普照十方摩尼寶光明香摩尼寶光明百萬黑旃檀香出妙音聲百萬出過諸天曼陀羅華而以散之以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海衆受此香華雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次大慧施呪印唵捺麻緊薩㗚末二合怛達引遏怛啞斡浪雞矴三末重囉三末重囉吽梵音讚佛如來妙色身恆演大智音辨才無障礙開佛菩提門曉悟諸衆生無量不思議令入智慧門授以菩提記如來出世間為世大福田普導諸含識令其集福行直言讚佛一切如來諸佛所世間譬喻無能及為令衆生得悟解非喻為喻而顯示如來微密甚深法百千萬億難可聞精進智慧調伏者及得聞此祕奧義若聞此法生欣慶彼曾供養無量佛為佛加持所攝受人天讚歎常供養此為超世第一財此能救度諸群品此能出生清淨道汝等當持莫放逸見聞供養諸如來所得功德不可量於有為中終不盡要滅煩惱離衆苦譬如吞服少金剛終竟不消要當出供養十力諸功德滅惑必至金剛智如乾草積等須彌投芥子火悉燒盡供養諸佛少功德必斷煩惱至涅槃雪山有藥名善見必斷煩惱至涅槃若有見聞於十力得勝功德到佛智南無大方廣佛華嚴經華嚴世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十回向菩薩十地菩薩等覺菩薩遍法界剎海微塵數菩薩一切海衆南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海衆南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛南無十身無礙毗盧遮那如來道場一切海衆南無大方廣佛華嚴經中離世間品法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中離世間品第三十八經云爾時世尊在摩竭提國至入於無礙清淨法界願共諸衆生往生華藏海極樂淨土中次法界普賢為主菩薩海衆南無普賢菩薩南無普眼菩薩南無普化菩薩南無普慧菩薩南無普見菩薩南無普光菩薩南無普觀菩薩南無普照菩薩南無普幢菩薩南無普覺菩薩南無如是等十不可說百千億那由他佛剎微塵數菩薩一切海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云爾時普賢菩薩至智慧神力菩薩自在願共諸衆生往生華藏海極樂淨土中離世間品之餘經云佛子菩薩摩訶薩至則得如來無上大師子吼願共諸衆生往生華藏海極樂淨土中離世間品之餘經云佛子菩薩摩訶薩至觀十義故示般涅槃願共諸衆生往生華藏海極樂淨土中次六位因行法門南無依解成行二百行門十信圓融無礙妙行法門南無依解成行二百行門十住圓融無礙妙行法門南無依解成行二百行門十行圓融無礙妙行法門南無依解成行二百九十行門十回向圓融無礙妙行法門南無依解成行五百行門十地圓融無礙妙行法門南無依解成行五百行門等覺圓融無礙妙行法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云佛子此法門名至應發金剛心學此功德行願共諸衆生往生華藏海極樂淨土中次證法佛南無大方廣佛華嚴經中諸大菩薩來集會普光明殿中證法一切諸佛次法界六位海衆南無十方三世盡虗空界微塵剎土中十信菩薩一切海衆南無十方三世盡虗空界微塵剎土中十住菩薩一切海衆南無十方三世盡虗空界微塵剎土中十行菩薩一切海衆南無十方三世盡虗空界微塵剎土中十回向菩薩一切海衆南無十方三世盡虗空界微塵剎土中十地菩薩一切海衆南無十方三世盡虗空界微塵剎土中等覺菩薩一切海衆南無十方三世盡虗空界微塵剎土中妙覺菩薩一切海衆至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中次貪愛惑業懺海惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖衆世出世神慈悲本願放大光明照於法會證盟護念哀愍攝受願我及一切衆生海自從無始直至今時業海無盡帝網重重一切貪愛惑業發露懺海普賢行願經云凡夫心沒諸憂惱猶遭重病之所纏因妻侫媚所歡娛妄謂除憂最勝樂邪見衆生興是念女人能為世間因生成長育福莊嚴天地變化無能勝勤勞世業惟由女勸夫普作諸善事能令男子隨意轉此女無染別人心智人所說諸煩惱一切過業由女生況取卑族以為妻世間極惡無過此女人弊執為其性如地堅住匪能移但隨富樂榮貴遷貧賤衰羸咸棄捨五通仙人大威德退失神通因女人隨意自在騎頸行玉女能令寂靜轉琰魔鬼王及猛風亦如地下沃焦海炎火黑蛇刀毒藥女人為害過於此敬心給足諸財寶質直承事意無違智慧方便或剛柔無有能知女心者見人啼笑皆過彼種人幻惑誘其心貌恭嬌媚於男夫心藏狠戾無知者極虗誑語示真實極真實言皆虗妄恆如毒獸害衆生咄哉丈夫寧共處常時敬事益驕慢暫遇違緣惡轉增若出若處一切時凌突於夫無愧恥如火焚薪恆不足如海吞流無滿時琰魔不厭殺衆生女人欲男心亦爾女人不觀於種族老少貴賤與妍一切男子悉馳求無厭恣欲情如是女人志欲無厭足曾無少分繫夫心猶如野牛自在行恆思漸食於新草少年盛色心流轉富貴從夫繫屬人豐盈玉饌瓔珞衣常願貧窮隨自意種種供事咸充足塗香沐浴妙莊嚴未嘗慚愧丈夫恩縱意邪思心不絶或染欲語憐愍語舌上猶如甘露生心中猛惡興毒害是故女言難定信女人能間夫宗族匪令雍穆暫同居父母兄弟甚怨讎一切姻親皆捨離外現美容懷諂媚一切愆違滿腹中不應觀視一須臾況久甘其粗惡語女人恆於一切處防諸過患及猜嫌一行有虧衆所輕傷風敗俗人咸棄女人童幼及中年乃至老時過百歲內外種族皆榮貴動止恆須人所防處女居家隨父母笄年適事又從夫夫亡從子護嫌疑由是常名不自在出家捨欲修寂靜心思女境非聖賢猶金香染垢衣離善常為智人笑如囚得出思還入如狂遇瘥願重生癩病已除念病時捨女思女過於是如澄淨水蛟龍止亦如金窟猛獸居雖修戒定念女人智者觀之亦如是智者寧吞於熱鐵不觀女色亂其心戒定慧品遍成怨寂靜資緣皆棄捨女人不觀於勝族吉祥福貴智名聞惟求染欲無異心云何慧者所親近有住諸禪及威勢能教勇力與王仙或時女色染其心退失調伏諸功德鬬諍象馬諸軍陳亡軀濟海集珍財勝族乞丐為僕隸行非正法皆由女女人喜怒情難見染心邪計量無涯世間名稱諸智人無有能知女心者五通仙人及天主能知大海水多少終身計算莫能知一一女人差別意諂言惑耳甘如蜜心如利劒害於人辭意巧妙奪人心懷惡興謀肆諸毒女人妙飾或無飾行住坐臥悉猜嫌邪視愚智諸女人見畫像女亦增惡愚童樂攀毒樹枝癡亂欲住毒蛇窟狂人執持於熱鐵親近女色過如是染著女色心昏醉違意忿毒害於身怖彼女人喜怨時智者云何親近住女人惡法滿其心如何深水蛟龍止不觀勇力色種族恣欲從心無是非女心不定如疾風亦如迅速浮雲電百歲供承資所欲曾無少念丈夫恩不敬有德輕無德憎貧樂富徇貪求美言敬養增慢高資財闕乏無心顧蚖蛇枯磧狼毒華共住戴持傷一世暫近女色過於彼永害未來功德身女人讒巧恆是非離間六親及朋友覆藏己過揚他失一切過患由女人女心不定如猿狖恆思少過忘多恩愚夫敬事若師尊如奴奉主情無足女性如河滋泛溢漂諸勝法壞多身如流湍激兩岸崩女人害善過於是女人欲網甚堅密顧視徐行無愧容笑語歡諍元異心羅諸富貴如昏醉女人染愛由妄起如樹無根欲盡燈色衰愛息一須臾所有恩情咸滅盡女人愛欲須臾頃染心邪語信難依或時寶重過珍珠或生厭棄如芻草象王自在拔樹力色如浮空大白雲由為女象醉其心一切隨人所調伏菩薩為法攝女人雖恆教授心遠離若時大過而親近如鳥折翼不能飛女人志趣恆卑下如河流處岸崩摧所住能令善法衰毀宗滅族皆因此女人能張愛欲網羅捕一切諸愚夫世間染欲諸衆生如魚吞鈎為所食智者觀知本不淨九竅常流晝夜時如是厭離女人身云何於此生貪著女身虗幻如浮泡老病死苦所依處積集不淨過山嶽云何於此生貪著一切憂惱及恐怖皆從女色之所生若能觀察無貪著解脫無憂無恐懼是故智者不觀女或時觀察以慈心想如母女及姊妹隨應為說無貪法能了女人身內外種種不淨之所生如何境動思欲火焚燒纍劫諸善根又日子王所問經云淫欲臭穢根不淨過後常增業苦深聰慧法師呵欲染當生父母亦無益譬如廣大不淨坑滿盛糞壤多臭穢亦似冢間䏺脹尸淫欲之人亦如是復以蠅蟲咂瘡腫驢馬奔眠糞穢中猪狗食啖臭魚等耽愛女人亦如是破壞善名兼德行恆行毀禁俱無慚不生天道墮阿鼻是故法師呵愛欲如人誤飲惡毒藥迷亂猖狂遍體疼不覺無常毒所中耽欲之人亦如是樂著美味便珍饌愛聽歌音戀色聲家事不思多忘失惟作輪回業苦因貪著淫欲常稱讚不了愚迷糞袋身晝夜恆行下劣行薄福沈淪於惡趣讚美淫欲行非行多饒瞋恚長愚癡如履巔巍大嶮崖不覺須臾致失命既別人世閻浮界死墮無邊業海中五峰圍繞鐵山間日月燈光全不見如風狂亂無知解往返縱橫失路岐如是經生常住此一切世間無所重種種善業亦不生設有男女無孝敬棄背尊親行五逆和合妻女倍殷勤張羅罪網無思慮墮落貪癡欲樂中父母遠離無返覆罔思養育報艱辛放逸耽淫著戲弄互相煩惱倍增多破壞修行疑種種不逢賢聖作良因樂行邪行受極苦不顧刑罰恥辱侵鬬諍抄欺致傷殺隳張財賄離善友不生天道兼人趣死入阿鼻地獄中鐵林青色攢鋒刃猛𦦨煻煨烈火城劒樹刀山遍地中洋銅熱鐵為漿饌如斯大苦因淫欲隱沒菩提智慧根汝向女人生恐怖勿令親近起攀緣人天善道若相應不久菩提自獲得我等為無明所覆不識貪愛罪因今遇道場方始覺知歸命毗盧遮那如來及一切賢聖海衆燒香散華貪愛惑業一切罪報發露懺悔不敢覆藏由此因緣我及法界衆生海貪愛惑業願得清淨次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三遍百劫積集罪一念悉蕩除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪嗔癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白衆等聽說經中無常偈三界煩惱猶如猛火不離迷惑常被所燒猶如飛雲忽然散滅聚而復散如集戲場念念不住如空霹𮦷生滅疾速如瀑流水因無明愛輪回五道無有休息猶如陶輪一切人命為死所壞如金翅鳥食噉諸龍
