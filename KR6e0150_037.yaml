body:
  text: 唐蘭山雲嚴慈恩寺護法國師行沙門慧覺依經錄宋蒼山載光寺沙門普瑞補註明欽忠義忠盡四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閱天台習教觀沙門正止治定第三十七晌次等覺位中摩耶之子後百佛及十知識會一切恭敬敬禮無盡三寶是諸眾等人各胡跪嚴持香華如法供養願此供海雲徧滿十方界或施飲食及諸上味或施車乘或施衣服或施華鬘雜香塗香牀座房舍及所住處上妙燈燭病緣湯藥寶器車乘調良象馬以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海眾受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次供養總持捺麼囉得捺二合得囉二合也引也捺麼末重遏斡供末日囉二合薩囉不囉二合麻㗚怛二合禰怛達遏怛也啞㗚曷二合矴薩滅屹三二合莫捺重引也怛涅達唵末𠷌囉二合末𠷌囉麻曷引末𠷌囉二合麻曷引矴桚末𠷌呤麻曷引眉㗚也二合末𠷌囉二合麻曷磨溺重即舌腭怛末𠷌哩二合磨曷磨溺慢伸當巴珊葛囉麻捺也末𠷌哩二合薩㗚末二合葛㗚麻二合啞斡囉捺二腭眉商𭊁捺末𠷌囉二合莎引曷引梵音讚佛如來無所住普住一切剎一切土皆住一切處咸見佛隨眾生心普見一切身成道轉法輪及以般涅槃一切法皆如諸佛境亦然乃至無一法如中無生滅直言讚佛釋迦無上尊具一切功德見者心清淨迴向大智慧如來大慈悲出現於世間普為諸羣生轉無上法輪如來無數劫勤苦為眾生云何諸世間能報大師恩寧於無量劫受諸惡道苦終不捨如來而求於出離寧代諸眾生備受一切苦終不捨於佛而求得安樂寧在諸惡趣恒得聞佛名不願生善道暫時不聞佛寧生諸地獄一一無數劫終不遠離佛而求出惡趣何故願久住一切諸惡道以得見如來增長智慧故若得見於佛除滅一切苦能入諸如來大智之境界若得見於佛捨離一切障長養無盡福成就菩提道如來能永斷一切眾生疑隨其心所樂普皆令滿足南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎士中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十𢌞向菩薩十地菩薩等覺菩薩徧法界剎海微塵數菩薩一切海眾南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海眾南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中南無深自在佛南無大地王佛南無莊嚴王佛南無解脫佛南無妙音佛南無殊勝佛南無自在佛南無無上醫王佛南無功德月佛南無無礙光佛南無功德聚佛南無月現佛南無日天佛南無出諸有佛南無勇猛名稱佛南無光明門佛南無娑羅王佛南無最勝佛南無藥王佛南無寶勝佛南無金剛慧佛南無無能勝佛南無無能映蔽佛南無眾會王佛南無大名稱佛南無敏持佛南無無量光佛南無大願光佛南無法自在不虗佛南無不退地佛南無淨天佛南無善天佛南無堅固苦行佛南無一切善友佛南無解脫音佛南無遊戲王佛南無滅邪曲佛南無薝蔔淨光佛南無具眾德佛南無最勝月佛南無執明炬佛南無殊妙身佛南無不可說佛南無最清淨佛南無友安眾生佛南無無量光佛南無無畏音佛南無水天德佛南無不動慧光佛南無華勝佛南無月𦦨佛南無不退慧佛南無離愛佛南無無著慧佛南無集功德蘊佛南無滅惡趣佛南無普散華佛南無師子吼佛南無第一義佛南無無礙見佛南無破他軍佛南無不著相佛南無離分別海佛南無端嚴海佛南無須彌山佛南無無著智佛南無無邊座佛南無清淨住佛南無隨師行佛南無最上施佛南無常月佛南無饒益王佛南無不動聚佛南無普攝受佛南無饒益慧佛南無持壽佛南無無滅佛南無具足名稱佛南無大威力佛南無種種色相佛南無無相慧佛南無不動天佛南無妙德難思佛南無滿月佛南無解脫月佛南無無上王佛南無希有身佛南無梵供養佛南無不瞬佛南無順先古佛南無最上業佛南無順法智佛南無無勝天佛南無不思議功德光佛南無隨法行佛南無無量賢佛南無普隨自在佛南無最尊天佛南無樓至佛南無淨光劫須彌德世界離垢幢佛南無於此道場復曾供養十那由他諸佛次摩耶夫人南無此道場得菩薩大願智幻解脫門諸眷屬圍繞摩耶夫人十方盡歸命滅罪增淨信願生華藏海極樂淨土中第一天主光天女無礙念清淨莊嚴解脫法門經云爾時善財童子至繞無數帀辭退而去願共諸眾生往生華藏海極樂淨土中次天主光女所供養佛南無青蓮華劫中殑伽沙數一切諸佛南無善地劫中十恒河沙數一切諸佛南無妙德劫中一佛世界微塵數一切諸佛南無無所得劫中八十四億百千那由他一切諸佛南無善光劫中閻浮提微塵數一切諸佛南無無量光劫中二十恒河沙數一切諸佛南無最勝德劫中一恒河沙數一切諸佛南無善悲劫中八十恒河沙數一切諸佛南無勝遊劫中六十恒河沙數一切諸佛南無又妙月劫中七十恒河沙數一切諸佛次天主光天女南無如此世界三十三天中得菩薩無礙念清淨莊嚴解脫門第一幻智念力善友天主光天女十方盡歸命滅罪增淨信願生華藏海極樂淨土中第二教示幻智者徧友童子及第三善知眾藝童子等解脫法門經云爾時善財童子至繞無數帀戀仰辭去願共諸眾生往生華藏海極樂淨土中南無迦毗羅城第二教示幻智知識為師徧友童子南無如是等此道場中得菩薩善知眾藝能知字母知識悉知眾行童子十方盡歸命滅罪增淨信願生華藏海極樂淨土中第四賢勝優婆夷無依處道場解脫法門經云爾時善財童子至戀慕瞻仰辭退南行願共諸眾生往生華藏海極樂淨土中南無此摩揭提國婆呾那城中得菩薩無依處道場解脫門既自開解復為人說第四幻智無依善友賢勝優婆夷十方盡歸命滅罪增淨信願生華藏海極樂淨土中第五堅固解脫長者無著念清淨莊嚴解脫法門經云爾時善財童子至繞無數帀辭退而行願共諸眾生往生華藏海極樂淨土中南無南方沃田城中得無著念清淨莊嚴解脫門第五幻智無著念善友堅固解脫長者十方盡歸命滅罪增淨信願生華藏海極樂淨土中第六妙月長者淨智光明解脫法門經云爾時善財童子至繞無數帀戀仰辭去願共諸眾生往生華藏海極樂淨土中南無此菩提場城中得自在光明解脫法門第六幻智智光善友妙月長者十方盡歸命滅罪增淨信願生華藏海極樂淨土中第七無勝軍無盡相見無量佛解脫法門經云爾時善財童子至繞無數帀戀仰辭去願共諸眾生往生華藏海極樂淨土中南無此南方有出生城中正得菩薩見無量佛無盡相解脫門第七幻智無盡相善友無勝軍長者十方盡歸命滅罪增淨信願生華藏海極樂淨土中第八最寂靜婆羅門誠願語解脫法門經云爾時善財童子至繞無數帀戀仰而去願共諸眾生往生華藏海極樂淨土中南無此南方法聚落中得菩薩不退轉解脫門第八幻智誠願語善友最寂靜婆羅門十方盡歸命滅罪增淨信願生華藏海極樂淨土中第九德生童子及第十有德童女等幻住解脫法門經云爾時善財童子至殷勤瞻仰辭退而去願共諸眾生往生華藏海極樂淨土中南無南方妙意華門城中得菩薩之幻住解脫第九幻智歸幻門善友德生童子南無南方妙意華門城中得菩薩幻住解脫第十幻智歸幻門善友有德童女南無圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩十方盡歸命滅罪增淨信願生華藏海極樂淨土中次理事二種懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖眾世出世神慈悲本願放大光明炤於法會證盟護念哀愍攝受願我及一切眾生海自從無始直至今時業海無盡帝網重重不解理事之懺門有情造罪而受苦發露懺悔本生心地觀經云於諸眾生起大悲應受如來三聚戒若欲如法受戒者應當懺罪令消滅起罪之因有十緣身三口四及意三生死無始罪無窮煩惱大海深無底業障峻極如須彌造業由因二種起所謂現行及種子藏識持緣一切種如影隨形不離身一切時中障聖道近障人天妙樂果遠障無上大菩提在家能招煩惱因出家亦破清淨戒若能如法懺悔者所有煩惱悉皆除猶如劫火壞世間燒盡須彌并巨海懺悔能燒煩惱薪懺悔能往生天路懺悔能得四禪樂懺悔雨寶摩尼珠懺悔能延金剛壽懺悔能入常樂宮懺悔能出三界獄懺悔能開菩提華懺悔見佛大圓鏡懺悔能至於寶所若能如法懺悔者當依二種觀門修一者觀事滅罪門二者觀理滅罪門觀事滅罪有其三上中下根為三品若有上根求淨戒發大情進心無退悲淚泣血常精懇哀感徧身皆血現繫念十方三寶所并餘六道諸眾生長跪合掌心不亂發露洗心求懺悔惟願十方三世佛以大慈悲哀愍我我處輪迴無所依生死長夜常不覺我在凡夫具諸縛狂心顛倒徧攀緣我處三界火宅中妄染六塵無救護我生貧窮下賤家不得自在常受苦我生邪見父母家造罪依於惡眷屬惟願諸佛大慈尊哀愍護念如一子一懺不復造諸罪三世如來當證盟如是勇猛懺悔者名為上品求淨戒若有中根求戒者一心勇猛懺諸罪涕淚交橫不覺知徧身流汗哀求佛發露無始生死業願大悲水洗塵勞滌除業障淨六根施我菩薩三聚戒我願堅持不退轉精修度脫苦眾生自未得度先度他盡未來際常無斷如是精勤勇猛者不惜身命求菩提能感三寶靈異相是名中品大懺悔若有下根求淨戒發起無上菩提心涕淚悲泣身毛竪於我造罪深慚愧對於十方三寶所及以六道眾生前至誠發露無始來所有惱亂諸眾生起於無礙大悲心不惜身命懺三業已作之罪皆發露未作之惡更不造如是三品懺諸罪皆名第一清淨戒以慚愧水洗塵勞身心俱為清淨器諸善男子汝當知已說淨觀諸懺悔於其理事無差別但以根緣應不同若於修習觀正理遠離一切諸散亂著新淨衣加趺坐攝心正念離諸緣常觀諸佛妙法身體性如空不可得一切諸罪性皆如顛倒因緣妄心起如是罪相本來空三世之中無所得非內非外非中間性相如如俱不動真如妙理絕名言惟有聖智能通達非有非無非有無非不有無離名相周徧法界無生滅諸佛本來同一體惟願諸佛垂加護能滅一切顛倒心願我早悟真性源速證如來無上道若有淨信善男子日夜能觀妙理空一切罪障自消除是名最上持淨戒若人觀知實相空能滅一切諸重障猶如大風吹猛火能燒無量諸草木諸善男子真實觀名為諸佛祕要門若欲為他廣分別無智人中勿宣說一切凡愚眾生類聞必生疑心不信若有智者生信解念念觀察悟真如十方諸佛皆現前菩提妙果自然證善男子等我滅後未來世中淨信者於二觀門常懺悔當受菩薩三聚戒次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三徧百劫積集罪一念悉盪除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白眾等聽說經中無常偈此身念念變樂念念無常著欲諸人天無眼故不見從愛至深處恒常受行樂若死生來至不能到樂處不知生死者生見不生怖彼後欲死時於此業方悔
