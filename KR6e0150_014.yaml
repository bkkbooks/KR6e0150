淨信願生華藏海極樂淨土中次飲酒懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖衆世出世神慈悲本願放大光明照於法會證明護念哀愍攝受願我及一切衆生海自從無始直至今時業海無盡帝網重重一切飲酒罪業發露懺悔智度論云不飲酒者酒有三種一者穀酒二者果酒三者藥草酒果酒者葡萄阿梨咤樹果如是等種種名為果酒藥草酒者種種藥草和合米麴甘蔗汁中能變成酒同蹄畜乳酒一切乳熱者可中作酒略說若乾若溼若清若濁如是等能令人心動放逸是名為酒一切不應飲是名不飲酒問曰酒能破冷益身令心歡喜何以故不飲答曰益身甚少所損甚多是故不應飲譬如美飲其中雜毒是何等毒如佛語難提迦優婆塞酒有三十五失何等三十五失一者現世財物虗竭何以故人飲酒醉心無節限用費無度故二者衆疾之門三者鬬諍之本四者裸露無恥五者醜名惡聲人所不敬六者覆沒智慧七者應所得物而不得已所得物而散失八者伏匿之事盡向人說九者種種事業廢不成辦十者醉為愁本何以故醉中多失醒已慚愧憂愁十一者身力轉少十二者身色損壞十三者不知敬父十四者不知敬母十五者不敬沙門十六者不敬婆羅門十七者不敬伯叔及尊長何以故醉悶恍惚無所別故十八者不尊敬佛十九者不敬法二十者不敬僧二十一者朋黨惡人二十二者疏遠賢善二十三者作破戒人二十四者無慚無愧二十五者不守六情二十六者縱己放逸二十七者人所憎惡不喜見之二十八者貴重親屬及諸知識所共擯弃二十九者行不善法三十者弃捨善法三十一者明人智士所不信用何以故酒放逸故三十二者遠離涅槃三十三者種狂癡業因緣三十四者身壞命終墮惡道泥犁中三十五者若得為人所生之處常當狂騃如是等種種過失是故不飲如偈中說酒失覺知相身色濁而惡智心動而亂慚愧已被劫失念增瞋心失歡毀宗族如是雖名飲實為飲死毒不應瞋而瞋不應笑而笑不應哭而哭不應打而打不應語而語與狂人無異奪諸善功德知愧者不飲妙法念處經云佛告比丘若復有人欲求遠離焚燒冤害不飲諸酒修施戒業苾芻應知酒失最上破壞善法酒失最上能壞聰慧酒失最上能壞安樂酒失最上遠離善友酒失最上能生諸病酒失最上破壞解脫酒失最上冤家得便酒失最上財物散壞酒失最上增長非法酒失最上遠離珍寶酒失最上亂說是非酒失最上散亂轉增酒失最上能生貪忿酒失最上無明增長酒失最上忠實變詐酒失最上顯露隱密酒失最上煩惱轉增酒失最上成就地獄酒失最上焚燒善根酒失最上毀壞三寶酒失最上惡名流布酒失最上醉變膿血酒失最上香變臭穢酒失最上增長三毒比丘應知酒能毀壞色無色業酒能焚燒四果聖業酒能增長㬥惡之業酒能不信真實因果酒能增長煩惱諸苦酒能發起口四過非及怖畏事酒能數起貢高欺詐酒能毀謗善友知識酒能恆處衆苦憂惱酒能增長一切諸非酒墮有情黑暗之處酒墮有情餓鬼傍生酒能遠離聰明智慧酒能遠離諸天神仙酒能毀壞轉佛法輪酒能增長淫欲熾盛酒能破壞清淨梵行酒能增長我慢放逸酒似於風破壞世間酒能壞亂長者之行酒能忘失忍辱之心酒能迷亂世間聰慧酒能毀謗解脫之法酒能遠離諸佛淨界爾時世尊告比丘言酒有如是種種過非應當遠離比丘應知飲酒之人但貪美味不慮苦果由此為因墮於地獄受種種苦從地獄出若生人中愚昧貧乏不信因果毀謗正法輕慢賢善煩惱增多淫欲熾盛遠離解脫暴惡纏縛纖毫之善而不修習極惡之因恆時親近如是展轉輪回諸趣無解脫時乃至偈云衆生飲酒癡迷醉愛味誰知癡索牽墜墮無常惡趣中是故勿飲無明酒輪回因觸生癡見非法皆從貪愛生一切塵勞業海生是名如來大智說如知飲酒壞名色善惡無分譬目盲乃至身倒不覺知可喻木石人恥笑食酒無常多過失三十五失作乖違智者染著為大暗是故遠離於飲酒罪報懺悔夫酒者不惟彼法相三乘法性一乘中皆不許飲酒若據禪宗永明禪師勸云近嗟末法不明佛意誑說禪宗惟學虗頭全無實行步步行有口口說空自不責己業力所牽復教人撥無因果說飲酒食肉不礙菩提行盜行淫無妨般若生遭王法死墮阿鼻地獄業盡復入畜生餓鬼百千萬劫無有出期除非一念回光立即翻邪為正若不自懺自悔自度自修諸聖出來無救汝處各誡自心勉旃此過又古德云口誦禪歌心無契悟一世不能斷諸妄想雖了本心若不止業有何利益也圓通帝師自勸云嗟呼我輩逐利貪名重身輕法道力若蘋萍逐水世情如漆墨和膠縱慮昏昏焉論晝夜追陪人事不計時年濫稱道人無慚無愧是以龍牙慨歎云臨窗不覺寸陰移火急修行早是遲白日追陪人事過園林那得道成時言及於此追憶先曹便覺無地安身深思深思勿嫌苦口又依此觀修儀者清凉大師云造解成觀即事即行無違教理之規暗蹈忘心之域圭峰大師云剋志運心等彼太虗避非推念亦至毫端寂照帝師云縱使了悟本心佛所說軌則之中如蚊淚蟣腳許亦不應犯又依密教內前三本續中亦不許飲酒是衆失之根本由斯誡慎而不飲第四本續中雖說受用五藥五肉飲酒彼亦要藉攝受金剛空行本續中若離三種觀佛時具記句者飲酒則彼亦成毒彼之魔難多發生乃至墮金剛地獄三種觀佛者煮時造時淋時三時應作觀佛禪定臨喫時觀酒之色香味令增長色香味三天母已方可應飲如覓㗚瓦巴大師雖則飲酒吐出其乳又為助禪定力則於大象囊中飲一皮囊亦則無妨若非助定力如水滴許亦不應飲以此觀之於放逸中虗浪妄飲豈可得也諸僧俗等應誡慎之罪報懺悔我等為無明所覆不識飲酒罪因今遇道場方能覺知歸命毗盧遮那如來及一切賢聖海衆燒香散華飲酒罪業發露懺悔不敢覆藏由此因緣我及法界衆生海飲酒種種過失罪業悉願清淨次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三遍百劫積集罪一念悉蕩除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白衆等聽說經中無常偈若行於放逸復染著境界彼以愚癡故常受於苦惱一切命皆失一切樂皆盡一切愛別離汝死時欲至死為第一惡到曠野大道更無如法歸故應隨順法
