body:
  text: 唐蘭山雲巖慈恩寺護法國師一行沙門慧覺依經録宋蒼山載光寺沙門普瑞補注明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閲天台習教觀沙門正止治定第十四晌次百海所主百海衆初五十海佛會一切恭敬敬禮無盡三寶是諸衆等人各胡跪嚴持香華如法供養願此供海雲遍滿十方界百萬金剛以絞絡百萬華帳百萬香帳百萬寶帳彌覆其上華蓋鬘蓋香蓋寶蓋各各百萬周回布列百萬光明而為照耀百萬夜摩天王恭敬頂禮百萬梵王踊躍歡喜百萬菩薩稱揚讚歎百萬天樂各奏百萬種法音相續不斷百萬種華雲百萬種鬘雲百萬種莊嚴具雲百萬種衣雲周匝彌覆百萬摩尼雲光明照耀以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海衆受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次虗空藏印呪唵啞麼遏布麻禰巴能麻末𠷌呤怛達遏怛眉浪雞矴薩慢怛不囉薩囉吽梵音讚佛色身非是佛音聲亦復然亦不離色身見佛神通力少智不能知諸佛實境界久修清淨業於此乃能了正覺如來處去亦無所從清淨妙色身神通故顯現直言讚佛欲知諸佛心先觀佛智慧佛智無依處如空無所依衆生種種樂及諸方便智皆依佛智慧佛智無所依聲聞與獨覺及諸佛解脫皆依於法界法界無增減佛智亦如是出生一切智無增亦無減無生亦無盡如水潛流地求之無不得無念亦無盡功力遍十方佛智亦如是普在衆生心若有勤修行疾得智光明南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十回向菩薩十地菩薩等覺菩薩遍法界剎海微塵數菩薩一切海衆南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海衆南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中第一變化微妙身香水海等十海經云爾時普賢菩薩至以世界海清淨劫音聲為體願共諸衆生往生華藏海極樂淨土中初能持剎種南無彼離垢𦦨藏香水海東次變化微妙身香水海善布差別方世界種中諸佛道場一切海衆南無金剛眼幢香水海莊嚴法界橋世界種中諸佛道場一切海衆南無種種蓮華妙莊嚴香水海恆出十方變化世界種中諸佛道場一切海衆南無無間寶王輪香水海寶蓮華莖密雲世界種中諸佛道場一切海衆南無妙香𦦨普莊嚴香水海毗盧遮那變化行世界種中諸佛道場一切海衆南無寶末閻浮幢香水海諸佛護念境界世界種中諸佛道場一切海衆南無一切色熾然光香水海最勝光遍照世界種中諸佛道場一切海衆南無一切莊嚴具境界香水海寶𦦨燈世界種中諸佛道場一切海衆南無如是等不可說佛剎微塵數香水海諸剎種中諸佛道場一切海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中南無其最近輪圍山玻璃地大香水海常放光明世界種中諸佛道場一切海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云此中最下方有世界至佛號覺分華願共諸衆生往生華藏海極樂淨土中次所持世界南無此最中下方可愛樂淨光幢世界最勝三昧精進慧佛道場一切海衆南無佛剎微塵數世界周匝圍繞諸佛道場一切海衆南無此上過十佛剎微塵數世界與金剛幢世界齊等香莊嚴幢世界無障礙法界燈佛道場一切海衆南無此上過三佛剎微塵數世界與娑婆世界齊等放光藏世界遍法界無障礙慧明佛道場一切海衆南無此上過七佛剎微塵數世界至此世界種最上方最勝身香世界覺分華佛道場一切海衆南無如是等不可說佛剎微塵數世界中諸佛道場一切海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中第二具足妙光香水海等十海經云諸佛子彼無盡光明輪至摧伏魔音為體願共諸衆生往生華藏海極樂淨土中初能持剎種南無彼無盡光明輪香水海外次具足妙光香水海遍無垢世界種中諸佛道場一切海衆南無次光耀蓋香水海無邊普莊嚴世界種中諸佛道場一切海衆南無次妙寶莊嚴香水海香摩尼軌度形世界種中諸佛道場一切海衆南無次出佛音聲香水海善建立莊嚴世界種中諸佛道場一切海衆南無次香幢須彌藏香水海光明遍滿世界種中諸佛道場一切海衆南無次旃檀妙光明香水海華𦦨輪世界種中諸佛道場一切海衆南無次風力持香水海寶𦦨雲幢世界種中諸佛道場一切海衆南無次帝釋身莊嚴香水海真珠藏世界種中諸佛道場一切海衆南無次平坦嚴淨香水海毗琉