body:
  text: 唐蘭山雲巖慈恩寺護法國師一行沙門慧覺依經録宋蒼山載光寺沙門普瑞補注明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閲天台習教觀沙門正止治定第二十二晌第五兜率天宮會修因契果生解分一切恭敬敬禮無盡三寶是諸衆等人各胡跪嚴持香華如法供養願此供海雲遍滿十方界阿僧祇寶光明雲一一光明現一切光復有阿僧祇寶光明清淨智光照了諸法復有阿僧祇無礙寶光明一一光明周遍法界阿僧祇寶所一切諸寶悉皆具足阿僧祇寶藏開示一切正法寶藏阿僧祇寶幢如來幢相逈然高出阿僧祇寶賢大智賢像具足清淨阿僧祇寶園生諸三昧快樂以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海衆受此供養雲以為光明臺過於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次供養總持捺麼囉得捺二合得囉二合也引也捺麼末重遏斡矴末日囉二合薩囉不囉二合麻㗚怛二合怛達遏怛也啞㗚曷二合矴薩滅屹三二合莫捺重引也怛涅達唵末唧囉二合末唧囉麻曷引末唧囉二合麻曷引矴桚末唧呤麻曷引眉㗚也二合末唧囉二合麻曷磨溺重即舌腭怛末唧哩二合磨曷磨溺慢伸當巴珊葛囉麻捺也末唧哩二合囉薩㗚末二合葛㗚麻二合啞斡囉捺舌腭眉商𭊁捺末唧二合莎引曷引梵音讚佛佛身及光明色相不思議衆生信樂者隨應悉令見於一佛身上化為無量佛雷音遍衆剎演法深如海一一毛孔中光網遍十方演佛妙音聲調伏難調者直言讚佛普於十方無等尊未曾一念起慢心隨其所修功德業亦復恭敬生尊重一切世間兜率中自然覺悟人師子功德廣大淨無等如其體相悉能見或現降生處母胎無量自在大神變成佛説法示滅度普遍世間無暫已人中師子初生時一切勝智悉承奉諸天帝釋梵王等靡不恭敬而瞻侍十方一切無有餘無量無邊法界中無始無末無遐邇示現如來自在力人中尊導現生已遊行諸方各七步欲以妙法悟羣生是故如來普觀察見諸衆生沉欲海盲暗愚癡之所覆人中自在現微笑念當救彼三有苦大師子吼出妙音我為世間第一尊應然明淨智慧燈滅彼生死愚癡暗人師子王出世時普放無量大光明令諸惡道皆休息永滅世間衆苦難或時示現住王宮或現捨家修學道為欲饒益衆生故示其如是自在力南無大方廣佛華嚴經華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十回向菩薩十地菩薩等覺菩薩遍法界剎海微塵數菩薩一切海衆南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海衆南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛南無十身無礙毗盧遮那如來道場一切海衆南無大方廣佛華嚴經中升兜率天宮品法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中升兜率天宮品第二十三經云爾時佛神力故至念法無斷總持不忘願共諸衆生往生華藏海極樂淨土中次兜率天宮作供養者一百七部衆南無才見此座倍更增長一切智心百萬億初發心菩薩南無心淨歡喜百萬億治地菩薩南無悟解清淨百萬億修行菩薩南無住勝意樂百萬億生貴菩薩南無起大乘行百萬億方便具足菩薩南無勤修一切菩薩道百萬億正心住菩薩南無淨修一切菩薩地百萬億不退菩薩南無得一切菩薩三昧光明百萬億童真菩薩南無入不思議諸佛境界百萬億法王子菩薩南無能現無量如來十力百萬億灌頂菩薩南無得自在神通百萬億菩薩南無生清淨解百萬億菩薩南無心生愛樂百萬億菩薩南無深信不壞百萬億菩薩南無勢力廣大百萬億菩薩南無名稱增長百萬億菩薩南無演説法義令智決定百萬億菩薩南無正念不亂百萬億菩薩南無生決定志百萬億菩薩南無得聞持力持一切佛法百萬億菩薩南無出生無量廣大覺解百萬億菩薩南無安住信根百萬億菩薩南無得檀波羅蜜能一切施百萬億菩薩南無得尸波羅蜜具持衆戒百萬億菩薩南無得忍波羅蜜心不妄動悉能忍受一切佛法百萬億菩薩南無得精進波羅蜜能行無量出離精進百萬億菩薩南無得禪定波羅蜜具足無量禪定光明百萬億菩薩南無得般若波羅蜜智慧光明能普照曜百萬億菩薩南無成就大願悉皆清淨百萬億菩薩南無得智慧燈明照法門百萬億菩薩南無為十方諸佛光所照百萬億菩薩南無周遍十方演離癡法百萬億菩薩南無普入一切諸佛剎土百萬億菩薩南無法身隨到一切佛國百萬億菩薩南無得佛音聲能廣開悟百萬億菩薩南無得出生一切智方便百萬億菩薩南無得成就一切法門百萬億菩薩南無成就法智猶如寶幢能普顯示一切佛法百萬億菩薩南無能悉示現如來境界百萬億菩薩南無恭敬禮拜百萬億諸天王南無諦觀無厭百萬億龍王南無頂上合掌百萬億夜叉王南無起淨信心百萬億乾闥婆王南無斷憍慢意百萬億阿修羅王南無口銜繒帶百萬億迦樓羅王南無歡喜踴躍百萬億緊那羅王南無歡喜瞻仰百萬億摩睺羅伽王南無稽首作禮百萬億世王南無瞻仰不瞬百萬億忉利天王南無歡喜讚嘆百萬億夜摩天王南無布身作禮百萬億兜率天王南無頭頂禮敬百萬億化樂天王南無恭敬合掌百萬億他化天王南無一心觀察百萬億梵天王南無恭敬供養百萬億摩醯首羅天王南無發聲讚歎百萬億菩薩南無專心供養百萬億天女南無踊躍歡喜百萬億同願天南無妙聲稱讚百萬億往昔同住天南無布身敬禮百萬億梵身天南無合掌於頂百萬億梵輔天南無圍繞侍衛百萬億梵衆天南無讚歎稱揚無量功德百萬億大梵天南無五體投地百萬億光天南無宣揚讚歎佛世難值百萬億少光天南無遙向佛禮百萬億無量光天南無讚歎如來甚難得見百萬億光音天南無與宮殿俱而來詣此百萬億淨天南無以清淨心稽首作禮百萬億少淨天南無願欲見佛投身而下百萬億無量淨天南無恭敬尊重親近供養百萬億遍淨天南無念昔善根百萬億廣天南無於如來所生希有想百萬億少廣天南無決定尊重生諸善業百萬億無量廣天南無曲躬恭敬百萬億廣果天南無信根堅固恭敬禮拜百萬億無煩天南無合掌念佛情無厭足百萬億無熱天南無頭面作禮百萬億善見天南無念供養佛心無懈歇百萬億善現天南無恭敬頂禮百萬億阿迦尼吒天南無皆大歡喜發聲讚歎百萬億種種天南無各善思惟而為莊嚴百萬億諸天南無護持佛座莊嚴不絶百萬億菩薩天南無雨一切華百萬億華手菩薩南無雨一切香百萬億香手菩薩南無雨一切鬘百萬億鬘手菩薩南無雨一切末香百萬億末香手菩薩南無雨一切塗香百萬億塗香手菩薩南無雨一切衣百萬億衣手菩薩南無雨一切蓋百萬億蓋手菩薩南無雨一切幢百萬億幢手菩薩南無雨一切幡百萬億幡手菩薩南無雨一切寶百萬億寶手菩薩南無雨一切莊嚴具百萬億莊嚴手菩薩南無從天宮出至於座所百萬億諸天子南無以淨信心并宮殿俱百萬億諸天子南無以身持座百萬億生貴天子南無舉身持座百萬億灌頂天子南無恭敬思惟百萬億思惟菩薩南無發清淨心百萬億生貴菩薩南無諸根悅樂百萬億菩薩南無深心清淨百萬億菩薩南無信解清淨百萬億菩薩南無諸業清淨百萬億菩薩南無受生自在百萬億菩薩南無成就於地百萬億菩薩南無法光照曜百萬億菩薩南無善能教化一切衆生百萬億菩薩十方盡歸命滅罪增淨言願生華藏海極樂淨土中經云爾時兜率陀天王至兜率陀天悉亦如是願共諸衆生往生華藏海極樂淨土中次法界十如來南無無礙月如來南無廣智如來南無普眼如來南無珊瑚如來南無論師子如來南無日照如來南無無邊光如來南無法幢如來南無智燈如來南無功德光如來至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛南無十身無礙毗盧遮那如來道場一切海衆南無大方廣佛華嚴經中率兜天宮偈讚品法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中兜率宮中偈讚品第二十四經云爾時佛神力故至自在大光明普示於世間願共諸衆生往生華藏海極樂淨土中次十幢菩薩本界佛南無東方萬佛剎微塵數剎土外妙寶世界無盡幢佛金剛幢菩薩萬佛剎微塵數道場一切海衆南無南方萬佛剎微塵數剎土外妙樂世界風幢佛堅固幢菩薩萬佛剎微塵數道場一切海衆南無西方萬佛剎微塵數剎土外妙銀世界解脫幢佛勇猛幢菩薩萬佛剎微塵數道場一切海衆南無北方萬佛剎微塵數剎土外妙金世界威儀幢佛光明幢菩薩萬佛剎微塵數道場一切海衆南無東南方萬佛剎微塵數剎土外妙摩尼世界明相幢佛智幢菩薩萬佛剎微塵數道場一切海衆南無西南方萬佛剎微塵數剎土外妙金剛世界常幢佛寶幢菩薩萬佛剎微塵數道場一切海衆南無西北方萬佛剎微塵數剎土外妙波頭摩世界最勝幢佛精進幢菩薩萬佛剎微塵數道場一切海衆南無東北方萬佛剎微塵數剎土外妙優鉢羅世界自在幢佛離垢幢菩薩萬佛剎微塵數道場一切海衆南無下方萬佛剎微塵數剎土外妙栴檀世界梵幢佛星宿幢菩薩萬佛剎微塵數道場一切海衆南無上方萬佛剎微塵數剎土外妙香世界觀察幢佛法幢菩薩萬佛剎微塵數道場一切海衆至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無十身無礙毗盧遮那如來道場一切海衆南無大方廣佛華嚴經中十回向品法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中十回向品第二十五經云爾時金剛幢菩薩至入此三昧善根力故願共諸衆生往生華藏海極樂淨土中次護助佛南無如是等十方各過無量無盡無等佛剎微塵數同名金剛幢一切諸佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云爾時諸佛各以右手至普賢菩薩行願器故願共諸衆生往生華藏海極樂淨土中十回向品之餘經云佛子菩薩摩訶薩至普令衆生究竟皆得願共諸衆生往生華藏海極樂淨土中十回向品之餘經云佛子菩薩摩訶薩至令於實法正思惟願共諸衆生往生華藏海極樂淨土中十回向品之餘經云佛子云何為菩薩至皆得清淨到於彼岸願共諸衆生往生華藏海極樂淨土中次該攝果海十回向法門南無為法界第一回向菩薩救護一切衆生離衆生相回向法門南無為法界第二回向菩薩不壞回向法門南無為法界第三回向菩薩等一切諸佛回向法門南無為法界第四回向菩薩至一切處回向法門南無為法界第五回向菩薩無盡功德藏回向法門南無為法界第六回向菩薩入一切平等善根回向法門南無為法界第七回向菩薩等隨順一切衆生回向法門南無為法界第八回向菩薩真如相回向法門南無為法界第九回向菩薩無縛無著解脫回向法門南無為法界第十回向菩薩入法界無量回向法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云爾時佛神力故至兜率天宮悉亦如是願共諸衆生往生華藏海極樂淨土中次瑞相分中一切諸天南無阿僧祇諸天身無量百千億不可説天妙法音不可思議天讚佛音阿僧祇天歡喜音咸稱善哉諸天一切海衆南無無量阿僧祇百千億那由他諸天恭敬禮拜無數天子常念諸佛希求如來無量功德心不捨離無數天子作衆伎樂歌咏讚歎供養如來一切諸天海衆南無如是等不可説不可説十方三世盡虗空遍法界一切佛剎現無量阿僧祇諸佛境界如來化身出過諸天一切諸天海衆十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云爾時復以佛神力故至所住行願無能量願共諸衆生往生華藏海極樂淨土中次法界兜率證法佛南無十方過十億佛剎微塵數世界外有百萬佛剎微塵數金剛光世界中金剛幢一切諸佛次證法菩薩南無十方十億佛剎微塵數世界外有百萬佛剎微塵數金剛光世界中百萬佛剎微塵數金剛幢菩薩一切海衆次法界兜率天宮十回向菩薩南無十方三世盡虗空界微塵剎土中住救護衆生離衆生相回向位菩薩一切海衆南無十方三世盡虗空界微塵剎土中住不壞回向位菩薩一切海衆南無十方三世盡虗空界微塵剎土中住等一切諸佛回向位菩薩一切海衆南無十方三世盡虗空界微塵剎土中住至一切處回向位菩薩一切海衆南無十方三世盡虗空界微塵剎土中住無盡功德藏回向位菩薩一切海衆南無十方三世盡虗空界微塵剎土中住隨順一切善根堅固回向位菩薩一切海衆南無十方三世盡虗空界微塵剎土中住隨順平等一切衆生回向位菩薩一切海衆南無十方三世盡虗空界微塵剎土中住真如相回向位菩薩一切海衆南無十方三世盡虗空界微塵剎土中住無縛無著解脫回向位菩薩一切海衆南無十方三世盡虗空界微塵剎土中於入無量法界回向位菩薩一切海衆至心歸命禮大方廣佛華嚴經中華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中次法界橫死孤魂罪報懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖衆出世出神慈悲本願放大光明照於法會證明護念哀憫攝受願我及一切衆生海自從無始直至今時業海無盡帝網重重天地虗曠三界四府苦中極苦無救無依非所見聞有橫死孤魂罪報發露懺悔彼中橫死者大涅槃經云死有三種一破戒死二放逸死三命盡死有九種橫死經云佛告比丘有九輩九因緣命未盡便橫死一者為不應飯而飯二者為不量飯三者為不習飯四者為不出生五者為生熱六者為不持五戒七者為近惡知識八者入里不時不如法行九者為避罪報不避因死罪報懺悔又藥師經云爾時阿難問救脫菩薩言善男子云何已盡之命而可增益救脫菩薩言大德汝豈不聞如來説有九橫死耶是故勸造續命幡燈修諸福德以修福故盡其壽命不經苦患阿難問言九橫云何救脫菩薩言若諸有情得病雖輕然無醫藥及看病者設復遇醫授以非藥實不應死而便橫死又信世間邪魔外道妖𭒯之師妄説禍福便生恐動心不自正卜問覓禍殺種種衆生解奏神明呼諸魍魎請乞福祐欲冀延年終不能得愚癡迷惑信邪倒見遂令橫死入於地獄無有出期是名初橫二者橫被王法之所誅戮三者畋獵嬉戲耽淫嗜酒放逸無度橫為非人奪其精氣四者橫為火焚五者橫為水溺六者橫為種種惡獸所噉七者橫墮山崖八者橫為毒藥魘禱呪詛起尸鬼等之所中害九者飢渴所困不得飲食而便橫死是為如來略説橫死有此九種其餘復有無量諸橫難可具説罪報懺悔又瑜伽師地論云死有三種謂壽盡故福盡故不避不平等故當知亦是時非時死或由善心或不善心或無記心云何壽盡故死猶如有一隨感壽量滿盡故死此名時死云何福盡故死猶如有一資具闕故死云何不避不平等故死如世尊説九因九緣未盡壽量而死何等為九謂食無度量食時不宜不消復食生而不吐熟而持之不近醫藥不知於己若損若益非時非量行非梵行此名非時死云何善心死人命將終自憶先時所習善法或因他人提撕乃能憶念由此因緣爾時信等善法現行於心是為善心死云何為無記心死如人曾習善法臨終不能憶又無他人提撕令憶是為無記心死云何不善心死如人命將終自憶先時串習惡法或復由他人引起憶念彼於爾時貪嗔癡諸不善法現行於心乃至粗細等想現行於前是為不善心死又善心死時安樂而死惡心死時諸苦逼迫於身苦惱而死又善心死者不見亂色相不善心死者見亂色相無記心死者昏懵不惺雖非苦惱死亦非安樂死罪報懺悔又法界面然鬼王所統薜荔多部百億河沙餓鬼非我見聞有名無名塵沙種族人間依於草木附彼城隍銜冤魂識品物精靈自殘自盡無依無托遺骸暴骨乏祭餒魂魑魅魍魎又有三財九品一切幽魂罪報懺悔諸佛子等為無明所覆不識罪因今遇道場方能覺知歸命毗盧遮那如來及一切賢聖海衆燒香散花橫死孤魂所受罪業發露懺悔不敢覆藏由此因緣法界衆生海橫死孤魂一切罪報悉願清淨次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三遍百劫積集罪一念悉蕩除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白衆等聽説經中無常偈上至非非想下至轉輪王七寶鎮隨身千子常圍繞如其壽命盡須臾不暫停還漂生死海隨緣受衆苦
