body:
  text: 唐蘭山雲巖慈恩寺護法國師一行沙門慧覺依經錄宋蒼山載光寺沙門普瑞補註明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閱天台習教觀沙門正止治定第二十四晌第七再會普光明殿修因契果生解分一切恭敬敬禮無盡三寶是諸眾等人各胡跪嚴持香華如法供養願此供海雲徧滿十方界百萬億種種華雲種種鬘雲種種香雲種種末香雲種種葢雲種種衣雲種種莊嚴具香雲種種珍寶雲種種燒香雲種種雜彩雲又百萬億寶悉底迦能除眾惡百萬億金藏金縷織成百萬億寶葢眾寶為竿執持行列百萬億一切寶莊嚴具金網間錯莊嚴百萬億光明寶放種種光周徧炤耀百萬億日藏輪百萬億月藏輪竝無量色寶之所集成以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海眾受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次不空摩尼印呪唵啞麼遏布𭈵麻禰巴能麻末𠷌呤怛達遏怛眉浪雞矴薩慢怛不囉薩囉吽梵音讚佛一切諸如來皆有無盡相示現雖無量色相終不盡如影現眾剎一切如來所於彼一切中悉現神通事普賢諸行願修治已明潔能於一切剎普現佛神變直言讚佛如有醫王善方術若有見者病皆愈命雖已盡藥塗身令其作務悉如初最勝醫王亦如是具足方便一切智以昔妙行現佛身眾生見者煩惱滅譬如海中有寶王普出無量諸光明眾生觸者同其色若有見者眼清淨最勝寶王亦如是觸其光者悉同色若有得見五眼開破諸塵闇住佛地譬如如意摩尼寶隨有所求皆滿足少福眾生不能見非是寶王有分別善逝寶王亦如是悉滿所求諸欲樂無信眾生不見佛非是善逝心棄捨南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十迴向菩薩十地菩薩等覺菩薩徧法界剎海微塵數菩薩一切海眾南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海眾南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛南無十身無礙毗盧遮那如來道場一切海眾南無大方廣佛華嚴經中十定品法門十方盡皈命滅罪增淨信願生華藏海極樂淨土中十定品第二十七經云爾時世尊至第九法界自在大三昧善巧智願共諸眾生往生華藏海極樂淨土中十定品之餘經云佛子云何為菩薩至普賢行十大三昧輪願共諸眾生往生華藏海極樂淨土中次普賢為主菩薩海眾南無普賢菩薩南無如來性起妙德菩薩南無寶手菩薩南無心王菩薩南無青蓮華菩薩南無蓮華藏菩薩南無金剛慧菩薩南無無等慧菩薩南無義語慧菩薩南無最勝慧菩薩南無常捨慧菩薩南無那伽慧菩薩南無成就慧菩薩南無調順慧菩薩南無大力慧菩薩南無難思慧菩薩南無無礙慧菩薩南無增上慧菩薩南無普供慧菩薩南無如理慧菩薩南無善巧慧菩薩南無法自在慧菩薩南無法慧菩薩南無寂靜慧菩薩南無虗空慧菩薩南無一相慧菩薩南無善慧菩薩南無如幻慧菩薩南無廣大慧菩薩南無勢力慧菩薩南無世間慧菩薩南無佛地慧菩薩南無真實慧菩薩南無尊勝慧菩薩南無智光慧菩薩南無無邊慧菩薩南無念莊嚴菩薩南無達空際菩薩南無性莊嚴菩薩南無甚深境菩薩南無善解處非處菩薩南無大光明菩薩南無常光明菩薩南無了佛種菩薩南無心王菩薩南無一行菩薩南無常現神通菩薩南無智慧芽菩薩南無功德處菩薩南無法燈菩薩南無照世菩薩南無持世菩薩南無最安隱菩薩南無最上菩薩南無無上菩薩南無無比菩薩南無超倫菩薩南無無礙行菩薩南無光明燄菩薩南無月光菩薩南無一塵菩薩南無堅固行菩薩南無霔法雨菩薩南無最勝幢菩薩南無普莊嚴菩薩南無智眼菩薩南無法眼菩薩南無慧雲菩薩南無總持王菩薩南無無住願菩薩南無智藏菩薩南無心王菩薩南無內覺慧菩薩南無住佛智菩薩南無陀羅尼勇健力菩薩南無持地力菩薩南無妙月菩薩南無須彌頂菩薩南無寶頂菩薩南無普元照菩薩南無威德王菩薩南無智慧輪菩薩南無大威德菩薩南無大龍相菩薩南無質直行菩薩南無不退轉菩薩南無持法幢菩薩南無無忘失菩薩南無攝諸趣菩薩南無不思議決定慧菩薩南無遊戲無邊智菩薩南無無盡妙法藏菩薩南無智日菩薩南無法日菩薩南無智藏菩薩南無智澤菩薩南無普見菩薩南無不空見菩薩南無金剛踊菩薩南無金剛智菩薩南無金剛燄菩薩南無金剛慧菩薩南無普眼菩薩南無佛日菩薩南無持佛金剛秘密義菩薩南無普眼境