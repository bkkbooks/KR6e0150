body:
  text: 唐蘭山雲巖慈恩寺護法國師一行沙門慧覺依經録宋蒼山載光寺沙門普瑞補注明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閲天台習教觀沙門正止治定第五晌次法界菩提道中場主晝神等雜類諸神會一切恭敬敬禮無盡三寶是諸衆等人各胡跪嚴持香華如法供養願此供海雲遍滿十方界願阿僧祇華鬘阿僧祇衣服阿僧祇塗香阿僧祇末香阿僧祇寶蓋阿僧祇幢幡阿僧祇音樂歌舞等充滿以此布施願令阿僧祇世界寶以用布施阿僧祇世界寶象充滿七支具足性極調順上立金幢金網彌覆種種妙寶而為莊嚴以用布施願令阿僧祇世界寶馬充滿如龍馬王種種衆寶莊嚴之具而嚴飾之持用布施願令阿僧祇世界妓女充滿悉能敷奏種種妙音持用布施願令阿僧祇世界男女充滿持用布施願令阿僧祇世界己身充滿發菩提心而用布施願令阿僧祇世界己頭充滿起不放逸心而用布施願令阿僧祗世界己眼充滿而用布施願令阿僧祇世界己身肉血以骨髓充滿其中心無顧戀持用布施願令阿僧祗世界自在王位克滿其中持用布施願令阿僧祇世界奴僕作使充滿其中持用布施以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海衆受此供養雲以為光明臺過於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷呤斡吽次大慧施呪唵捺麻緊薩㗚末二合怛達引遏怛啞斡浪雞矴三末重囉三末重囉吽救面然鬼王經云若比丘比丘尼優婆塞優婆夷若欲供養一切三寶應當具辦香華飲食誦此陀羅尼呪以用布施若於飲食及香華等上誦此呪二十一遍於三寶處供養者此善男子善女人等得諸天勝妙之身又成就具足最上供養又如諸佛國土尊重讚歎三寶諸佛憶念稱名諸天擁護餘無量餓鬼并婆羅門及諸天仙處供養飲食等功德彼經中廣説梵音讚佛淨修諸佛力如應入此門我目甚清淨普見十方剎亦見其中佛菩提樹下坐相好莊嚴身無量衆團繞普念諸如來而亦不分別了知無量剎諸根及欲樂直言讚佛譬如大寶山饒益諸含識佛山亦如是普益於世間譬如大海水澄淨無垢濁見佛亦如是能除諸渴愛譬如須彌山出於大海中世間燈亦爾從於法海出如海具衆寶求者皆滿足無師智亦然見者悉開悟如來甚深智無量無有數是故神通力示現難思議譬如工幻師示現種種事佛智亦如是現諸自在力譬如如意寶能滿一切欲最勝亦復然滿諸清淨願譬如明淨寶普照一切物佛智亦如是普照群生身譬如八面寶等鑒於諸方無礙燈亦然普照於法界譬如水清珠能清諸濁水見佛亦復然諸根悉清淨南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十回向菩薩十地菩薩等覺菩薩遍法界剎海微塵數菩薩一切海衆南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海衆南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次示現宮殿主晝神至如是解脫華瓔得願共諸衆生往生華藏海極樂淨土中次法界菩提道場中主晝神衆南無得普入一切世間解脫門示現宮殿主晝神南無得普觀察一切衆生皆利益令歡喜滿足解脫門發起慧香主晝神南無得能放無邊可愛樂法光明解脫門樂勝莊嚴主晝神南無得開發無邊衆生清淨信解心解脫門華香妙光主晝神南無得積集莊嚴普光明力解脫門普集妙藥主晝神南無得普開悟一切苦樂衆生皆令得法樂解脫門樂作喜目主晝神南無得十方法界差別身解脫門觀方普現主晝神南無得救護一切衆生令安樂解脫門大悲威力主晝神南無得普生喜足功德力解脫門善根光照主晝神南無得聲稱普聞衆生見者皆獲益解脫門妙華瓔珞主晝神南無如是等而為上首其數無量一切主晝神十方盡歸命滅罪生淨信願生華藏海極樂淨土中經云復次普德淨光主夜神至此現福神之所入願共諸衆生往生華藏海極樂淨土中次法界菩提道場中主夜神衆南無得寂靜禪定樂大勇健解脫門普德淨光主夜神南無得廣大清淨可愛樂功德相解脫門喜眼觀世主夜神南無得普現世間調伏衆生解脫門護世精氣主夜神南無得積集廣大歡喜心解脫門寂靜海音主夜神南無得甚深自在悅意言音解脫門普現吉祥主夜神南無得光明滿足廣大歡喜藏解脫門普發樹華主夜神南無得開悟衆生令成熟善根解脫門平等護育主夜神南無得救護衆生無邊慈解脫門遊戲快樂主夜神南無得普現莊嚴大悲門解脫門諸根常喜主夜神南無得普使一切衆生所樂滿足解脫門示現淨福主夜神南無如是等而為上首其數無量一切主夜神十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次遍住一切主方神至此遍遊神之解脫願共諸衆生往生華藏海極樂淨土中次法界菩提道場中主方神衆南無得普救護力解脫門遍住一切主方神南無得成辦化一切衆生神通業解脫門普現光明主方神南無得破一切暗障生喜樂大光明解脫門光行莊嚴主方神南無得普現一切處不唐勞解脫門周行不礙主方神南無得示現等一切衆生數名號發生功德解脫門永斷迷惑主方神南無得恆發妙音令聽者皆歡喜解脫門遍遊淨空主方神南無得如龍普雨令衆生歡喜解脫門雲幢大音主方神南無得示現一切衆生業無差別自在力解脫門髻目無亂主方神南無得觀察一切趣生中種種業解脫門普觀世業主方神南無得所作事皆究竟生一切衆生歡喜解脫門周遍遊覽主方神南無如是等而為上首其數無量一切主方神十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次淨光普照主空神至普現能觀察願共諸衆生往生華藏海極樂淨土中次法界菩提道場中主空神衆南無得普知諸趣一切衆生心解脫門淨光普照主空神南無得普入法界解脫門普遊深廣主空神南無得了達無邊境界身相解脫門生吉祥風主空神南無得能除一切衆生業惑障解脫門離障安住主空神南無得普觀察思惟廣大行海解脫門廣步妙髻主空神南無得大悲光普救護一切衆生厄難解脫門無礙光𦦨主空神南無得普入一切無所著福德力解脫門無礙勝力主空神南無得能令一切衆生心離諸蓋清淨解脫門離垢光明主空神南無得普見十方智光明解脫門深遠妙音主空神南無得不動本處而普現世間解脫門光遍十方主空神南無如是等而為上首其數無量一切主空神十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次無礙光明主風神至此普照神之所見願共諸衆生往生華藏海極樂淨土中次法界菩提道場中主風神衆南無得普入佛法及一切世間解脫門無礙光明主風神南無得無量國土佛出現咸廣大供養解脫門普現勇業主風神南無得以香風普滅一切衆生病解脫門飄擊雲幢主風神南無得普生一切衆生善根令摧滅重障山解脫門淨光莊嚴主風神南無得能破無邊惡魔衆解脫門力能竭水主風神南無得永滅一切衆生怖解脫門大聲遍吼主風神南無得入一切諸法實相辨才海解脫門樹杪埀髻主風神南無得調伏一切衆生方便藏解脫門普行無礙主風神南無得入寂靜禪定門滅極重愚癡暗解脫門種種宮殿主風神南無得隨順一切衆生行無礙力解脫門大光普照主風神南無如是等而為上首其數無量一切主風神十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次普光𦦨藏主火神至此震音神之所了願共諸衆生往生華藏海極樂淨土中次法界菩提道場中主火神衆南無得悉除一切世間暗解脫門普光𦦨藏主火神南無得能息一切衆生諸惑漂流熱惱苦解脫門普集光幢主火神南無得無動福力大悲藏解脫門大光遍照主火神南無得觀如來神通力示現無邊際解脫門衆妙宮殿主火神南無得光明照耀無邊虗空界解脫門無盡光髻主火神南無得種種福莊嚴寂靜光解脫門種種𦦨眼主火神南無得能滅一切世間諸趣熾然苦解脫門十方宮殿如須彌山主火神南無得自在開悟一切世間解脫門威光自在主火神南無得永破一切愚癡執著見解脫門光照十方主火神南無得成就一切願力大震吼解脫門雷音電光主火神南無如是等而為上首其數無量一切主火神十方盡歸命滅罪增淨信願生華藏海極樂淨土中次偷盜罪懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖衆世出世神慈悲本願放大光明照於法會證盟護念哀愍攝受願我及一切衆生海自從無始直至今時業海無盡帝網重重一切偷盜罪業發露懺悔夫偷盜者智度論云知他物生盜心取物去離本處物屬我是名盜若不作是名不盜其餘方便計較乃至手捉未離地者是名助盜法財物有二種有屬他有不漏他取屬他物是為盜罪屬他物亦有二種一者聚落中二者空地此二處物盜心取得盜罪若物在空地當撿挍知是物近誰國是物應當有屬不應取如毗尼中説種種不盜是名不盜相問曰不盜有何等利答曰人命有二種一者內二者外若奪財物是為奪外命何以故命依飲食衣被等故活若劫若奪是名奪外命以是事故有智之人不應劫奪復次當自思惟劫奪得物以自供養雖身充足會亦當死死入地獄家室親屬雖共受樂獨自受罪亦不能救已得此觀應當不盜復次是不與取有二種一者偷二者劫此二共名不與取於不與取中盜為最重何以故一切人以財自活而或穿踰盜取是最不淨何以故無力勝人畏死盜取故劫奪之中盜為重罪問曰劫奪之人今世有人讚美其健於此劫奪何以放捨答曰不與而偷盜是不善相劫奪之中雖有差降俱為不善譬如美食雜毒惡食雜毒美惡雖殊雜毒不異亦如明暗蹈火晝夜雖異燒足一也今世愚人不識罪福三世果報無仁慈心見人能以力相侵強奪他財讚以為強諸佛賢聖慈愍一切了達三世殃禍不朽所以不稱譽是故知劫盜之罪俱為不善善人行者之所不為如佛説不與取有十罪何等為十一者物主常嗔二者重疑重罪人疑三者非時行不籌量四者朋黨惡人遠離賢善五者破善相六者得罪於官七者財物沒入八者種貧窮業因緣九者死入地獄十者若出為人勤苦求財五家所共若王若賊若火若水若不愛子用乃至藏埋亦失罪報懺悔我等為無明所覆不識偷盜罪因今遇道場方乃覺知歸命毗盧遮那如來及一切賢聖海衆燒香散華偷盜罪業發露懺悔不敢覆藏由此因緣我及法界衆生海偷盜重罪願皆清淨次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷𭊁末曰囉也莎曷應誦三遍百劫積集罪一念悉蕩除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白衆等聽説經中無常偈欲洄澓所轉中後常苦惱云何愚癡人於欲生愛樂如妙色華毒如觸猛火𦦨欲樂亦如是後受大苦惱如火益衆薪其𦦨不可滅自他俱能燒欲樂亦如是
