body:
  text: 唐蘭山雲巖慈恩寺護法國師一行沙門慧覺依經録宋蒼山載光寺沙門普瑞補注明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閲天台習教觀沙門正止治定第二十晌第三忉利天宮會修因契果生解分一切恭敬敬禮無盡三寶是諸衆等人各胡跪嚴持香華如法供養願此供海雲遍滿十方界不思議香雲不思議華雲不思議鬘雲不思議寶蓋雲不思議寶幢雲不思議寶幡雲不思議妙寶莊嚴具雲不思議大摩尼寶雲不思議寶瓔珞雲以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海衆受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次大慧施印呪唵捺麻緊薩㗚末二合怛達引遏怛啞斡浪雞矴三末重囉三末重囉吽梵音讚佛一身能示現種種無量事無心無境界普應一切衆一音中具演一切諸言音衆生語言法隨類皆能作其心常寂滅清淨如虗空而普莊嚴剎示現一切衆直言讚佛譬如虗空遍十方若色非色有非有三世衆生身國土如是普現無邊際諸佛真身亦如是一切法界無不遍不可得見不可取為化衆生而現形譬如虗空不可取普使衆生造重業不念我今何所作云何我作為誰作諸佛身業亦如是普使衆生修善法如來未曾有分別我今於彼種種作南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十回向菩薩十地菩薩等覺菩薩遍法界剎海微塵數菩薩一切海衆南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海衆南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛南無十身無礙毗盧遮那如來道場一切海衆南無大方廣佛華嚴經中升須彌山頂品法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中升須彌山頂品第十三經云爾時如來威神力故至十方世界悉亦如是次法界十如來南無迦葉如來南無拘那含牟尼如來南無迦羅鳩䭾如來南無毗舍浮如來南無尸棄如來南無毗婆尸如來南無弗沙如來南無提舍如來南無波頭摩如來南無然燈如來至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛南無十身無礙毗盧遮那如來道場一切海衆南無大方廣佛華嚴經中須彌山頂偈讚品法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中須彌頂上偈讚品第十四經云爾時佛神力故至無數億劫中說亦不能盡願共諸衆生往生華藏海極樂淨土中次法界須彌十慧菩薩本界佛南無東方百佛剎微塵數國土外因陀羅華世界殊特月佛法慧菩薩佛剎微塵數道場一切海衆南無南方百佛剎微塵數國土外波頭摩華世界無盡月佛一切慧菩薩佛剎微塵數道場一切海衆南無西方百佛剎微塵數國土外寶華世界不動月佛勝慧菩薩佛剎微虗數道場一切海衆南無北方百佛剎微塵數國土外優鉢羅華世界風月佛功德慧菩薩佛剎微塵數道場一切海衆南無東北方百佛剎微塵數國土外金剛華世界水月佛精進慧菩薩佛剎微塵數道場一切海衆南無東南方百佛剎微塵數國土外妙香華世界解脫月佛善慧菩薩佛剎微塵數道場一切海衆南無西南方百佛剎微塵數國土外悅意華世界無上月佛智慧菩薩佛剎微塵數道場一切海衆南無西北方百佛剎微塵數國土外阿盧那華世界星宿月佛真實慧菩薩佛剎微塵數道場一切海衆南無下方百佛剎微塵數國土外那羅陀華世界清淨月佛無上慧菩薩佛剎微塵數道場一切海衆南無上方百佛剎微塵數國土外虗空華世界明了月佛堅固慧菩薩佛剎微塵數道場一切海衆至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛南無十身無礙毗盧遮那如來道場一切海衆南無大方廣佛華嚴經中十住品法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中十住品第十五經云爾時法慧菩薩至此三昧力法如是故願共諸衆生往生華藏海極樂淨土中次加持佛南無如是等不可說不可說極微塵數佛剎微塵數剎同名法慧一切諸佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中次因該果海十住法門經云是時諸佛各伸右手至一切世界悉亦如是願共諸衆生往生華藏海極樂淨土中南無初發心住法門南無治地住法門南無修行住法門南無生貴住法門南無具足方便住法門南無正心住法門南無不退住法門南無童真住法門南無法王子住法門南無灌頂住法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中次證法菩薩本界佛經云又以佛神力故十方各過至何況所餘諸妙行願共諸衆生往生華藏海極樂淨土中南無如是等十方不可說不可說不可量佛剎微塵數法雲世界中十佛剎微塵數妙法一切如來次證法菩薩南無如是等十方不可說不可說不可量佛剎微塵數法雲世界中十佛剎微塵數法慧菩薩一切海衆至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中南無十身無礙毗盧遮那如來道場一切海衆南無大方廣佛華嚴經中梵行品法門南無正念天子白法慧菩薩梵行品法門至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中梵行品第十六經云爾時正念天子至成就慧身不由他悟願共諸衆生往生華藏海極樂淨土中南無十身無礙毗盧遮那如來道場一切海衆南無大方廣佛華嚴經中初發心功德品法門至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中初發心功德品第十七經云爾時天帝釋白法慧菩薩至宜應速發菩提心願共諸衆生往生華藏海極樂淨土中次證法諸佛南無如是等十方不可說不可說世界佛剎微塵數同名法慧一切諸佛次證法菩薩南無十方百千億那由他無數無量無邊無等不可數不可稱不可量不可說盡法界虗空界諸世界中亦說此法教化衆生法慧菩薩一切海衆南無如是等世界諸佛道場一切海衆至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛南無十身無礙毗盧遮那如來道場一切海衆南無大方廣佛華嚴經中明法品法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中明法品第十八經云爾時精進慧菩薩至如來歡喜大衆奉行願共諸衆生往生華藏海極樂淨土中次法界須彌十住菩薩南無十方三世盡虗空界微塵剎土中發心住菩薩一切海衆南無十方三世盡虗空界微塵剎土中治地住菩薩一切海衆南無十方三世盡虗空界微塵剎土中修行住菩薩一切海衆南無十方三世盡虗空界微塵剎土中生貴住菩薩一切海衆南無十方三世盡虗空界微塵剎土中具足方便住菩薩一切海衆南無十方三世盡虗空界微塵剎土中正心住菩薩一切海衆南無十方三世盡虗空界微塵剎土中不退住菩薩一切海衆南無十方三世盡虗空界微塵剎土中童真住菩薩一切海衆南無十方三世盡虗空界微塵剎土中法王子住菩薩一切海衆南無十方三世盡虗空界微塵剎土中灌頂住菩薩一切海衆至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中次十重垢染懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖衆世出世神慈悲本願放大光明照於法會證盟護念哀愍攝受願我及一切衆生海自從無始直至今時十重垢染一切罪業發露懺悔夫以本性所懺罪者從本至末不出十重迷源者根本無明迷背真界起於三細六粗九相染惱返本者業止故無苦乃至證得一心遊於不二果海馬鳴論云謂不如實知真如法一故不覺心起而有其念念無自相不離本覺猶如迷人依方故迷若離於方則無有迷衆生亦爾依覺故迷若離覺性則無不覺以有不覺妄想心故能知名義為說真覺若離不覺之心則無真覺自相可說復次依不覺故生三種相與彼不覺相應不離云何為三一者無明業相以依不覺故心動說名為業覺則不動動則有苦果不離因故二者能見相以依動故能見不動則無見三者境界相以依能見故境界妄現離見則無境界以有境界緣故復生六種相云何為六一者智相依於境界心起分別愛與不愛故二者相續相依於智故生其苦樂覺心起念相續不斷故三者執取相依於相續緣念境界住持苦樂心起著故四者計名字相依於妄執分別假名言相故五者起業相依於名字尋名取著造種種業故六者業繫苦相以依業受報不自在故當知無明能生一切染法以一切染法皆是不覺相故復次生滅因緣者所謂衆生依心意意識轉故此義云何以依阿賴耶識說有無明不覺而起能見能現能取境界起念相續故說為意此意復有五種名云何為五一者名為業識謂無明力不覺心動故二者名為轉識依於動心能見相故三者名為現識所謂能現一切境界猶如明鏡現於色像現識亦爾隨其五塵對至即現無有前後以一切時任運而起常在前故四者名為智識謂分別染淨法故五者名為相續識以念相應不斷故住持過去無量世等善惡之業令不失故復能成熟現在未來苦樂等報無差違故能令現在已經之事忽然而念未來之事不覺妄慮是故三界虗僞唯心所作離心則無六塵境界此義云何以一切法皆從心起妄念而生一切分別即分別自心心不見心無相可得當知世間一切境界皆依衆生無明妄心而得住持是故一切法如鏡中像無體可得唯心虗妄以心生則種種法生心滅則種種法滅故我等為無明所覆不悟根本枝末十種染惱分別變易二苦本具今遇道場方始覺知歸命毗盧遮那如來及一切賢聖海衆燒香散華十重染惱發露懺悔不敢覆藏由此因緣我及法界衆生海本末十重染惱一切罪業悉願清淨次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三遍百劫積集罪一念悉蕩除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白衆等聽說經中無常偈一切衆生類死法常現前設以諸方便不能遮此法久受無量樂必定還退沒是故諸人天不應縱貪欲
