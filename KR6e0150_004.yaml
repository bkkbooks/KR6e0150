body:
  text: 唐蘭山雲巖慈恩寺護法國師一行沙門慧覺依經録宋蒼山載光寺沙門普瑞補注明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閲天台習教觀沙門正止治定第四晌第四四天王等八部會一切恭敬敬禮無盡三寶是諸衆等人各胡跪嚴持香華如法供養願此供海雲遍滿十方界一切寶莊嚴殿自然而有妙好莊嚴出過諸天莊嚴之上一切寶網周匝彌覆普雨一切上妙寶雲普雨一切莊嚴具雲普雨一切寶衣雲普雨一切旃檀香雲普雨一切堅固香雲普雨一切寶莊嚴蓋雲普雨不可思議華聚雲普出不可思議妓樂音聲以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海衆受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次結廣大不空摩尼印呪結印同前唵啞麼遏布麻禰巴能麻末唧呤怛達遏怛眉浪雞矴薩慢怛不囉薩囉吽梵音讚佛正覺不可量法界虗空等深廣無涯底言語道悉絶如來善通達一切處行道法界衆國土所往皆無礙若人能信受一切智無礙修習菩薩行其心不可量直言讚佛如來應正等覺成正覺時於一切義無所觀察於法平等無所疑惑無二無相無行無止無量無際遠離二邊住於中道出過一切文字言説知一切衆生心念所行根性欲樂煩惱染習舉要言之於一念中悉知三世一切諸法普現一切衆生心念根性欲樂而無所現是故説名諸佛菩提如來應正等覺成正覺時得一切衆生量等身語意業得一切法一切剎一切三世一切佛一切語言量等身語意業如來成正覺時於其身中普現一切衆生成正覺乃至普現一切衆生入涅槃皆同一性所謂無性無生無滅無我無非我性乃至亦復無有成正覺性南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住焰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十回向菩薩十地菩薩等覺菩薩遍法界剎海微塵數菩薩一切海衆南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海衆南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次持國乾闥婆王至此樂莊嚴之解脫願共諸衆生往生華藏海極樂淨土中次法界菩提道場內乾闥婆王衆南無得自在方便攝一切衆生解脫門持國乾闥婆王南無得普見一切功德莊嚴解脫門樹光乾闥婆王南無得永斷一切衆生憂苦出生歡喜藏解脫門淨目乾闥婆王南無得永斷一切衆生邪見惑解脫門華冠乾闥婆王南無得如雲廣布普蔭澤一切衆生解脫門喜步普音乾闥婆王南無得現廣大妙好身令一切獲安樂解脫門樂搖動美目乾闥婆王南無得普散十方一切大名稱寶解脫門妙音師子幢乾闥婆王南無得現一切大歡喜光明清淨身解脫門普放寶光明乾闥婆王南無得普滋榮一切樹令見者歡喜解脫門金剛樹華幢乾闥婆王南無得善入一切佛境界與衆生安樂解脫門普現莊嚴乾闥婆王南無如是等而為上首其數無量一切乾闥婆王十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次增長鳩槃茶王至此廣面王心所了願共諸衆生往生華藏海極樂淨土中次法界菩提道場內鳩槃茶王衆南無得滅一切怨害力解脫門增長鳩槃茶王南無得修習無邊行門海解脫門龍主鳩槃茶王南無得知一切衆生心所樂解脫門莊嚴幢鳩槃茶王南無得普成就清淨大光明所作業解脫門饒益行鳩槃茶王南無得開示一切衆生安隱無畏道解脫門可怖畏鳩槃茶王南無得消竭一切衆生愛欲海解脫門妙莊嚴鳩槃茶王南無得普現諸趣光明雲解脫門高峰慧鳩槃茶王南無得普放光明滅如山重障解脫門勇健臂鳩槃茶王南無得開示不退轉大悲藏解脫門無邊淨華眼鳩槃茶王南無得普現諸趣流轉身解脫門廣大面鳩槃茶王南無如是等而為上首其數無量一切鳩槃茶王十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次毗樓博叉龍王至無熱大龍能悟此願共諸衆生往生華藏海極樂淨土中次法界菩提道場內龍王衆南無得消滅一切諸龍趣熾然苦解脫門毗樓博叉龍王南無得一念中轉自龍形示現無邊衆生身解脫門娑竭羅龍王南無得於一切諸有趣中以清淨音説佛無邊名號海解脫門雲音幢龍王南無得普現無邊佛世界建立差別解脫門焰口龍王南無得一切衆生嗔癡蓋纏如來慈愍令除滅解脫門𦦨眼龍王南無得開示一切衆生大喜樂福德海解脫門雲幢龍王南無得以清淨救護音滅除一切怖畏解脫門德叉迦龍王南無得示現一切佛色身及住劫次第解脫門無邊步龍王南無得出生一切衆生大愛樂歡喜海解脫門清淨色速疾龍王南無得示現一切平等悅意無礙音解脫門普行大音龍王南無得以大悲普覆雲滅一切世間苦解脫門無熱惱龍王南無如是等而為上首其數無量一切龍王十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次毗沙門夜叉王至此高幢王所了知願共諸衆生往生華藏海極樂淨土中次法界菩提道場內夜叉王衆南無得以無邊方便救護惡衆生解脫門毗沙門夜叉王南無得普觀察衆生方便救護解脫門自在音夜叉王南無得能資益一切甚羸惡衆生解脫門嚴持器仗夜叉王南無得稱揚一切聖功德海解脫門大智慧夜叉王南無得普觀察一切衆生大悲智解脫門𦦨眼主夜叉王南無得種種方便利益安樂一切衆生解脫門金剛眼夜叉王南無得普入一切諸法義解脫門勇健臂夜叉王南無得守護一切衆生令住於道無空過者解脫門勇敵故大軍夜叉王南無得增長一切衆生福德聚令恆受快樂解脫門富財夜叉王南無得隨順憶念出生佛力智光明解脫門力壞高山夜叉王南無如是等而為上首其數無量一切夜叉王十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次善慧摩睺羅伽王至此妙光明能善入願共諸衆生往生華藏海極樂淨土中次法界菩提道場內摩睺羅伽王衆南無得以一切神通方便令衆生集功德解脫門善慧摩睺羅伽王南無得使一切衆生除煩惱得清涼悅樂解脫門淨威音摩睺羅伽王南無得普使一切善不善思覺衆生入清淨法解脫門勝慧莊嚴髻摩睺羅伽王南無得了達一切無所著福德自在平等相解脫門妙目主摩睺羅伽王南無得開示一切衆生令離黑暗怖畏道解脫門鐙幢摩睺羅伽王南無得了知一切佛功德生歡喜解脫門最勝光明幢摩睺羅伽王南無得勇猛力為一切衆生救護主解脫門師子臆摩睺羅伽王南無得令一切衆生隨憶念生無邊喜樂解脫門衆妙莊嚴音摩睺羅伽王南無得於一切所緣決定不動到彼岸滿足解脫門須彌臆摩睺羅伽王南無得為一切不平等衆生開示平等道解脫門可愛樂光明摩睺羅伽王南無如是等而為上首其數無量一切摩睺羅伽王十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次善慧光明天緊那羅至此威猛主能觀察願共諸衆生往生華藏海極樂淨土中次法界菩提道場內緊那羅王衆南無得普生一切喜樂業解脫門善慧光明天緊那羅王南無得能生無上法喜令一切受安樂解脫門妙華幢緊那羅王南無得一切功德滿足廣大清淨信解藏解脫門種種莊嚴緊那羅王南無得恆出一切悅意聲令聞者離憂怖解脫門悅意吼聲竪那羅王南無得大悲安立一切衆生令覺悟所緣解脫門寶樹光明緊那羅王南無得示現一切妙色身解脫門普樂見緊那羅王南無得了知一切殊勝莊嚴果所從生業解脫門最勝光莊嚴緊那羅王南無得善觀察一切世間業所生報解脫門微妙華幢緊那羅王南無得恆起一切利益衆生事解脫門動地力緊那羅王南無得善知一切緊那羅心巧攝御解脫門威猛主緊那羅王南無如是等而為上首其數無量一切緊那羅王十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次大速疾力迦樓羅王至龍音解脫能如是願共諸衆生往生華藏海極樂淨土中次法界菩提道場內迦樓羅王衆南無得無著無礙眼普觀察衆生界解脫門大速疾力迦樓羅王南無得普安住法界教化衆生解脫門不可壞寶髻迦樓羅王南無得普成就波羅蜜精進力解脫門清淨速疾迦樓羅王南無得勇猛力入如來境界解脫門不退心莊嚴迦樓羅王南無得入佛行廣大智慧海解脫門大海處攝持力迦樓羅王南無得成就無邊衆生差別智解脫門堅法淨光迦樓羅王南無得莊嚴佛法城解脫門妙嚴冠髻迦樓羅王南無得成就不可壞平等力解脫門普捷示現迦樓羅王南無得了知一切衆生身而為現形解脫門普觀海迦樓羅王南無得普入一切衆生歿生行智解脫門龍音大目精迦樓羅王南無如是等而為上首其數無量一切迦樓羅王十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云復次羅睺阿修羅王至此妙音王所稱讚願共諸衆生往生華藏海極樂淨土中次法界菩提道場內阿修羅王衆南無得現為大會尊勝主解脫門羅睺阿修羅王南無得示現無量劫解脫門毗摩質多羅阿修羅王南無得消滅一切衆生苦令清淨解脫門巧幻術阿修羅王南無得修一切苦行自莊嚴解脫門大眷屬阿修羅王南無得震動十方無邊境界解脫門婆稚阿修羅王南無得種種方便安立一切衆生解脫門遍照阿修羅王南無得普集不可壞善根淨諸染著解脫門堅固行妙莊嚴阿修羅王南無得大悲力無疑惑主解脫門廣大因慧阿修羅王南無得普令見佛承事供養修諸善根解脫門現勝德阿修羅王南無得普入一切趣決定平等行解脫門善音阿修羅王南無如是等而為上首其數無量一切阿修羅王十方盡歸命滅罪增淨信願生華藏海極樂淨土中次殺生罪懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖衆世出世神慈悲本願放大光明照于法會證盟護念哀憫攝受願我及一切衆生海自從無始直至今時業海無盡帝網重重一切殺生罪業發露懺悔夫殺生罪者智度論云若實是衆生知是衆生發心欲殺而奪其命生身業有作色是名殺生罪其餘繫閇音閉鞭打等是助殺法復次殺他得殺罪非自殺身心知衆生而殺是殺罪不如夜中見人謂為杌樹而殺者故殺生得殺罪非不故也快心殺生得殺罪非狂癡命根斷是殺罪非作瘡身業是殺罪非但口教敕口教是殺罪非但心生惡如是等名殺罪相復次殺生之人今世後世受種種身心苦痛不殺之人無此衆難是為大利復次行者思惟我自惜命愛身彼亦如是與我何異以是之故不應殺生復次若殺生者為善人所呵怨家所嫉負他命故常有怖畏為彼所憎死時心悔當墮地獄若畜生中若出為人常當短命復次殺為罪中之重何以故人有死急不惜重寶但以活命為先譬如賈客入海採寶垂出大海其般卒壞珍寶失盡而自喜慶舉手而言幾失大寶衆人怪言汝失財物裸形得脫云何喜言幾失大寶答言一切寶中人命第一人為命故求財不為財故求命以是故佛説十不善道中殺最在初五戒中亦最在初若人種種修諸福德而無不殺生戒則無所益何以故雖在富貴處生勢力豪強而無壽命誰受此樂以是故知諸餘罪中殺罪最重諸功德中不殺第一世間中惜命為第一何以知之一切世人甘受刑罰刑殘拷掠以護壽命復次三世十方中尊佛為第一如佛語難提迦優婆塞殺生有十種罪一者心常壞毒世世不絶二者衆生憎惡眼不喜見三者常懷惡念思惟惡事四者衆生畏之如見蛇虎五是睡時心怖覺亦不安六者常有惡夢七者命終之後狂怖惡死八者種短命業因緣九者身壞命終墮泥犁中十者若出為人常當短命復次行者心念一切有命乃至毗蟲皆自惜身云何以衣服飲食自為身故而殺衆生我等為無明所覆不識殺生罪因今遇道場乃能覺知歸命毗盧遮那如來及一切賢聖海衆燒香散華殺生罪業發露懺悔不敢覆藏由此因緣我及法界衆生海殺生重罪願皆清淨次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三遍百劫積集罪一念悉蕩除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白衆等聽説經中無常偈見他病死相而不自覺知衰相到來時乃至自苦惱放逸自濁心常樂於境界不覺死隨逐常不捨貪欲愛樂遊戲人樂行於放逸死軍將欲至破滅如毒害努力勤觀察無令煩惱生煩惱設起時不令造惡業
