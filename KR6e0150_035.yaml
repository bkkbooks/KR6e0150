body:
  text: 唐蘭山雲巖慈恩寺護法國師行沙門慧覺依經録宋蒼山載光寺沙門普瑞補注明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閲天台習教觀沙門正止治定第三十五晌次十地位中後四善知識會一切恭敬敬禮無盡三寶是諸衆等人各胡跪嚴持香華如法供養願此供海雲遍滿十方界或復施與堅固香車衆寶為輪莊嚴巨麗寶帳覆上寶網垂下種種寶衣敷布其中清淨好香流芬外徹其香美妙稱悅人心無量諸天翊從而行載以重寶隨時給施或復施與光明寶車種種諸寶妙色映徹衆妙寶網羅覆其上雜寶瓔珞周匝垂下散以末香內外芬潔以如是等衆妙寶車常作供養帝網重重諸佛菩薩賢聖海衆受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次大慧施呪唵捺麻緊薩㗚末二合怛達引遏怛啞斡浪雞矴三末重囉三末重囉吽梵音讚佛譬如一切法衆緣故生處見佛亦復然必假衆善業譬如隨意珠能滿衆生心諸佛法如是悉滿一切願無量國土中導師興於世隨其願力故普應於十方直言讚佛如來頂上有三十二寶莊嚴大人相其中有大人相名光照一切十方普於無量大光明網一切妙寶以為莊嚴寶鬘周遍柔軟密緻一一咸放摩尼寶光充滿一切無邊世界悉現佛身色相圓滿是為一引乃至次有大人相名普照一切法界莊嚴雲最處於中漸次隆起閻浮檀金因陀羅網以為莊嚴放淨光雲充滿法界念念常現一切世界諸佛菩薩道場衆會是為三十二佛子如來頂上有如是三十二種大人相以為嚴好南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住𦦨魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十回向菩薩十地菩薩等覺菩薩遍法界剎海微塵數菩薩一切海衆南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海衆南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛十方盡歸命滅罪增淨信願生華藏海極樂淨土中第七開敷一切樹華主夜神知菩薩出生廣大喜光明解脫法門經云爾時善財童子至殷勤瞻仰辭退而去願共諸衆生往生華藏海極樂淨土中次開敷一切樹華主夜神發心處佛南無普光明真金摩尼山世界海中有世界微塵數世界種一一世界皆有如來出興於世一一如來授佛剎微塵數諸菩薩記如是道場一切海衆南無普照法界智慧山寂靜威德王如來次開敷一切樹華主夜神南無此菩提場佛會中得菩薩出生廣大喜光明解脫門開敷一切樹華主夜神十方盡歸命滅罪增淨信願生華藏海極樂淨土中第八大願精進力救護一切衆生主夜神知教化衆生令生善根解脫法門經云爾時善財童子至合掌瞻仰辭退而去願共諸衆生往生華藏海極樂淨土中次大願精進力主夜神發心處佛初善光劫寶光世界中諸佛南無法輪音虗空燈王如來南無五百一切如來南無大悲如來南無饒益世間如來南無大悲師子如來南無救護衆生如來南無醫王如來南無拘留孫等賢劫千佛及百萬阿僧祗一切諸大菩薩南無無量精進力名稱功德慧如來南無法空王如來南無天王藏如來南無大地威力山如來南無法輪光音聲王如來南無虗空智王如來南無無能壞幢如來南無一切法雷音王如來南無普現化演法音如來南無如是等一萬如來次日光劫中諸佛南無妙相山如來南無圓滿肩如來南無離垢童子如來南無勇猛持如來南無須彌相如來南無離垢臂如來南無師子遊步如來南無寶髻如來南無最上法稱如來南無光明冠如來南無如是等六十億如來南無如是等無量諸佛道場一切海衆次大願精進力主夜神南無此道場中得教化衆生令生善根解脫門道場海衆前後圍繞大願精進力救護一切衆生主夜神南無大願精進力救護一切衆生主夜神隨機攝化依教成行離障契理二十四身南無如是等不可説不可説隨衆生變化無邊際動靜無二九十八種乃至百身遍滿十方一切色身十方盡歸命滅罪增淨信願生華藏海極樂淨土中第九妙德圓滿主夜神知遍一切處示現受生自在解脫法門經云爾時善財童子至殷勤瞻仰辭退而去願共諸衆生往生華藏海極樂淨土中次妙德圓滿主夜神得法處佛南無普寶世界悅樂劫中出興八十那由他一切諸佛南無自在功德幢佛次妙德圓滿主夜神南無此閻浮提嵐毗尼園得菩薩於無量劫中遍一切處示現受生自在解脫門妙德圓滿主夜神十方盡歸命滅罪增淨信願生華藏海極樂淨土中第十釋瞿波女得觀察一切菩薩三昧海解脫法門經云爾時善財童子至繞無數匝辭退而去願共諸衆生往生華藏海極樂淨土中次釋瞿波女得法處佛初勝行劫中無畏世界中諸佛南無法雲光明道場勝日身佛南無釋迦牟尼佛南無現一切世主身道場寶華佛次勝日身佛滅後所出諸佛南無清淨身佛南無一切智月光明身佛南無閻浮檀金光明王佛南無諸相莊嚴身佛南無妙月光佛南無智觀幢佛南無大智光佛南無金剛那羅延精進佛南無智力無能勝佛南無普安詳智佛南無離垢勝智雲佛南無師子智光明佛南無光明髻佛南無功德光明幢佛南無智日幢佛南無寶蓮華開敷身佛南無福德嚴淨光佛南無智𦦨雲佛南無普照月佛南無莊嚴蓋妙音聲佛南無師子勇猛智光明佛南無法界月佛南無現虗空影像開悟衆生心佛南無恆嗅寂滅香佛南無普震寂靜音佛南無甘露山佛南無法海音佛南無堅固網佛南無佛影髻佛南無月光毫佛南無辨才口佛南無覺華智佛南無寶𦦨山佛南無功德星佛南無寶月幢佛南無三昧身佛南無寶光王佛南無普智行佛南無𦦨海燈佛南無離垢法音王佛南無無比德名稱幢佛南無修臂佛南無本願清淨月佛南無照義燈佛南無深遠音佛南無毗盧遮那勝藏王佛南無諸乘幢佛南無法海妙蓮華佛南無如是等六十億百千那由他一切諸佛南無如是等無量諸佛道場一切海衆次釋瞿波女南無此迦毗羅城中得成就觀察一切菩薩三昧海解脫八萬四千婇女圍繞釋瞿波女次寂意德神善財菩薩南無菩薩集會普現法界光明法堂內善財童子眷屬迎讚者一萬主宮殿神圍繞寂意德神南無圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩十方盡歸命滅罪增淨信願生華藏海極樂淨土中次衆生受中有身業懺悔惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖衆世出世神慈悲本願放大光明照於法會證盟護念哀愍攝受願我及一切衆生海自從無始直至今時受中有身帝網重重無盡滿虗空界佛眼所見凡夫不知今皆懺悔不動本續云若修上品十善者直往淨土中而化生若造上品五無間罪等者決墮阿鼻地獄如是二種人不受中有身也成唯識論云極善及惡現在蘊滅速起後身如插其鎗便至於地此中若惡業多者即安養文云現命終時若風大先散時如鋸解其體若火大先去時似沸湯煎身此由惡業之所招也若地水二大先散者自然安樂而無苦惱此是善因之所感也若善惡間雜者即不動本續中所説四大相入等及諸祕密本續中亦説臨終四大相入之義此造善惡雜業人者受三種中有身與先本有身增四十六倍聰利三者云何一黑影魂識業報生死中有身者聞彼劫火黑風暴惡聲時多現怕怖驚懼之相其彼中有命未終之間即受此報又凡見蟣蝨人畜等行欲之時於彼便起愛樂受生之心多樂於死不樂其生罪報懺悔二間雜灰色神識種子如夢境中有身者未起生有之間於彼續生中無間斷第八識內凡所熏習善惡種子發起如夢境想念今現身睡眠之時雖與甘美飲食而不自知臨滅之時地水火風次第相入又風火入識識入顯現顯現入於入於細細入於極細彼顯現等次第滅已如睡眠時熏力境等如夢死亡已後有之中有識起亦復如是猶如醉人無所覺知一向昏迷而住罪報懺悔三白色神識有之中有身者非同前二中有昏昧而住意識聰利也偈曰有之中有衆生者諸根聚集無障礙山石墻壁悉穿透剎那速能至萬里業之神通具威力七中有身淨眼見如是受中有身罪報懺悔其一地獄中有身者形相醜惡如燒焦杌樹二餓鬼中有身者如煙色三畜生中有身者如水色四人及五淨居天中有身者端嚴如金色六色界中有身者容色如白銀七非天等中有身者如青空色此等中有衆生或於二手二足或四足多足或四手二足或無足依先世所造之業隨所應生處滅時中有身亦與各自彼本有之身中有身相似也罪報懺悔若天之中有身者以頭向上生去人及非人畜生餓鬼四中有身者橫行而生地獄中有身者頭趣向下生去由此業故改變七種中有身者悉空中經行以天眼見自生處罪報懺悔前受業報人生滅中有身者此時境已滅發起後時境相等之中有故與彼亡者作勝善根則多獲福德不受業報如日出破暗諸苦悉無如現在時多受樂也變彼不定自性重惡業中有身輕善業中有身由前福威力故第一七日時彼生滅中有身命終生時引夢境有之中有身起意身乃至生佛國若本有身死亡已後第一七日中前三日時覺知自本有身已死又半日依然住時若修福善人者無怖畏心若造惡者生大怖畏若見坑坎或地縫石窟中間等惶怖樂受生之中有身也又吉祥上樂本續云棄於國土及宮殿起別妻妾男女想了知神識而分離惶怖忽至須彌頂三返悲哭出惡聲彼時生惡害者現若有其身依然現若無身時覺本身往昔何在去何處穿山透壁過大水剎那時中遊空界又真性集説何在惟此亡過滅歿時三更第三時分中彼滅歿事能覺知往昔因緣定如是罪報懺悔又第一七日後三日半滅時造惡業者現三怖四畏等相三怖者即三惡趣也四畏者大海波濤聲日月天響聲起大劫火聲大風發起聲等此聲出時起於怖畏受如是報自後親屬等若修善作福猶如嬰兒自亦修福若親屬等造罪於苦加苦更亦起怖受大苦報罪報懺悔若實修善似舉明燈照彼虗偽惡習業障無明黑暗悉摧壞也集福修善懺悔等第一七日中緊切追薦則後七七日中易得度脫也若第一七日中若不緊切追薦後七七日中難救拔也所以者何上品修善人及人道欲界天色界天中有身之壽命者第三七日內決受生去彼時分別善惡道時現自性中有身位不定也前七日中有身悉是自體化故所以有情亦不定正覺亦不定猶如虗空不解則輪回有情悟心則清淨正覺故位不定也中品修善者人及非天等受中有身壽命者五七日中而受生去若作不善者墮三惡趣其中有身壽命七七四十九日中七番死時受報偈曰生滅夢境有之身此三種之中有者次第一七日中住第一七日業報身坎窟石罅去受報第二七日下種子熏種現惡境生怖第三七日現意身現於三怖四畏等人天前三七日畢三種中有集和合業報種子起二身以現意身壽終生非天中有亦如是從第三七日為始至中第四五七日各自住畢集生去地獄三中有亦同始從第五之七日如前住集壽終生非天惡趣二中有彼之二七日中者住聚無暇受苦報罪報懺悔又最明了悟本續中説五種身一現有身由善惡業力而起現在分現身身色和合是此身體二死有身現身命終是現尸身三中有身回惡入善退善入惡放逸力故善惡相和始從第一日半乃至第七末日之六分內七種業持故住此者第一七日中上三日半未起覺知相故不在中有之內後三日半起地獄中有之相第二七日起餓鬼中有之相第三七日起畜生中有之相第四七日現人趣中有之相第五七日現修羅中有之相第六七日現天趣中有之相第七七日中上六分者起解脫之中有身也四生有身者第七七日處是最後一分五後有身者是後受身若上品大善及重罪人者第一七日內善升惡降各自果報分明若中品善惡因果第三七日內分明若下品善惡因果四十九日上升下降分明若是下之上品一百日中分明第三下品中者一年之內分明第四下之下品者三年具畢分明彼等之間現中有相驚怖不斷住恐懼中有後其身速不起也罪報懺悔又俱舍論中有身以九門解釋同淨天眼見業通疾具根無對不可轉食香非久住倒心趣欲境溼化染香處天首上三橫地獄頭趣下言胎生卵生二之中有身者依彼業得眼遠見生處父母和合之時生顛倒心速受生去溼生之中有身者若或遇受生緣時不揀近遠皆聞香氣嗅彼香故起染著心即時受生業力別故香亦好惡而不同也化生之中有身者若受生緣會時不揀近遠見受生處而生愛染即便受生隨業善惡處分淨穢也罪報懺悔又世友尊者曰彼中有身極遲者住七日已而便受生法師救言中有身者住時不定以受生緣有遲速故若生緣未會中有恆在婆沙論中説摩達多言中有極遲住七七四十九日內決定受生也問曰若七七日內生緣和合則可爾若生緣未會彼壞耶答曰彼亦不壞若生緣未會則數死數生不斷壞也又説彼生緣多時不會者此中有身住多時也乃至緣和合時方受生也若未遇緣同類中生也又佛説灌頂冢墓因緣四方神呪經云阿難問於佛言若人已死將置山野中造作墳墓彼魂神在彼墳墓中不佛言有在有不在阿難復問云何有在有不在耶佛言在者若人在現世時不種善根不識三寶又亦不造惡於善無所受福於惡亦無所受苦又無修善者善知識故在彼墳墓中由無去處故言在也阿難又問何者不在佛言不在者若前生現在世時作大福善勤修道故生三十三天受福樂也若生人中生尊貴家自然快樂隨意受生是以言不在也若先現在世時殺生祭神不信真正邪見自養諂誑暪昧故墮餓鬼中具受衆苦遊歷地獄故言不在彼墳基也佛言又言在者若作五穀鬼魅髓骨未朽壞之間有微少魂神若骨已朽壞者彼魂即時滅無有熱氣不能作人禍福也若魂識未滅之間親屬等於近日死者不修福善又行邪妄故墮鬼神中或樹木雜物為魑魅鬼亦不受天福地獄亦不收遍觀世間遊歷聚落由無天食故惱觸於人作諸變異令人心迷若諸邪師於彼依止作神求福田事願得長壽愚癡邪見殺生求祭命終之後墮地獄餓鬼等中無有出期由此不應放逸罪報懺悔乃至釋種童子又白佛言凡夫冢基地中依止鬼神豈實答言我先所説凡夫冢基中有神魂者悉變化為五穀鬼魅若橫死無依止處者依止於彼草木林樹為魑魅鬼若無飲食往來人間作諸變異驚怖於人凡夫衆生由聞此故即時求福謂是天神罪報懺悔上來依經諸論本續劑門中所説中有身委細推窮令諸人聞莫似每日輕浮而過起厭悔心若非上品修善故其餘應習遷神要門開淨梵眼求生淨土是捷疾徑我等為無明所覆於惡趣中有業報不識罪因今遇道場方始覺知歸命毗盧遮那如來及一切賢聖海衆燒香散華受中有業發露懺悔不敢覆藏由此因緣我及法界衆生海受惡趣中有業一切衆罪悉願清淨次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三遍百劫積集罪一念悉蕩除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛白衆等聽説經中無常偈三界皆不安不應猶耽愛愛火所圍繞遍於諸世間欲燒不自在為欲癡所使如火益乾薪增長火熾然如是受樂者愛火轉增長若人脫愛網遠離於欲嗔智者度煩惱永離諸憂患
