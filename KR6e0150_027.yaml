食噉或時將與白衣使食高下心中行付眾僧以是因緣受地獄苦至今不息汝見肉橛者實非是橛是地獄人迦葉佛時是出家人寺中常住僧墻壁上浪竪諸橛非為僧事懸己衣鉢以是因緣入地獄中作大肉橛火燒受苦至今不息罪報懺悔爾時世尊復告僧護汝見駱駝者實非是駱駝是地獄人迦葉佛時是出家人寺中上座長受食分或得一人二人食分持律比丘如法教授上座之法不應如是時老比丘答律師言汝無所知聲如駱駝我於眾中身為上座呪願說法或時作唄計勞應得汝等何故恒瞋責我以是因緣入於地獄受駱駝身火燒號叫至今不息汝見馬者實非是馬是地獄人迦葉佛時作僧淨人用僧供養過分食噉或與眷屬知識白衣諸比丘等呵責語言汝不應爾其人惡口呵諸比丘汝猶如馬常食不飽我為僧作甚大勞苦功勳應得以是因緣入地獄中受於馬身火燒身體受大苦惱至今不息汝見象者非是白象是地獄人迦葉佛時是出家人為僧當厨諸檀越等將諸供養向寺施僧或食後來檀越白言大德日猶故未可打犍椎集僧施食比丘惡口答白衣言諸比丘等猶如白象食不飽也向食已竟停留後日以是因緣入於地獄受白象身火燒受苦至今不息汝見驢者實非是驢是地獄人迦葉佛時是出家人為僧當厨五德不具分僧飲食恒自長受二三人分持律比丘如法訶責此人答言我當僧厨及園果菜常營僧事甚大勞苦汝諸比丘不知我恩狀似如驢但養一身何不默然以是因緣入地獄中驢身受苦至今不息汝見羝羊實非羝羊是地獄人迦葉佛時是出家人為僧寺主當田內外事事檢校不敕弟子諸小比丘不如法打推諸律師等白言寺主何不時節鳴椎集僧比丘答言我當營僧事甚成勞苦汝諸比丘猶如羝羊噉食而住何不自打以是因緣入地獄中受羝羊形火燒痛毒受苦至今不息罪報懺悔爾時世尊復告僧護比丘汝見肉臺實非是臺是地獄人迦葉佛時是出家人當僧房敷具閉僧房門將僧戶排四方遊行眾僧於後不得敷具及諸房舍以是因緣入地獄中作大肉臺火燒受苦至今不息汝見第二大肉臺實非是臺是地獄人迦葉佛時是出家人為僧寺主選好房舍而自受用及與知識不依戒律隨次分房不平等故以是因緣入於地獄作大肉臺受苦萬端至今不息汝見肉房者非是肉房是地獄人迦葉佛時是出家人住僧房中似是己有終身不移不依戒律以次分房以是因緣作大肉房火燒受苦至今不息罪報懺悔爾時世尊復告僧護汝見肉繩牀實非是牀是地獄人迦葉佛時是出家人捉僧繩牀如自己有不依戒律以次分牀以是因緣入於地獄作肉繩牀火燒受苦至今不息汝見第二繩牀實非是牀是地獄人迦葉佛時是出家人破僧繩牀自用然火以是因緣入地獄中作肉繩牀火燒受苦至今不息汝見肉敷具者實非敷具是地獄人迦葉佛時是出家人用僧敷具如自己有以脚蹋上不依戒律以是因緣入地獄中作肉敷具火燒伸縮受苦萬端至今不息汝見肉拘執者實非拘執是地獄人迦葉佛時是出家人以僧拘執如自己有不依戒律用或破壞以是因緣入地獄中作肉拘執火燒受苦至今不息汝見肉繩牀者實非是牀是地獄人迦葉佛時是出家人恃王勢力似如聖德四輩弟子聖心讚歎時彼比丘默然受歎施好繩牀及諸好飲食作聖心受以是因緣入地獄中作肉繩牀火燒受苦至今不息汝見肉壁者實非是壁是地獄人迦葉佛時是出家人眾僧壁上竪橛破壁懸己衣鉢以是因緣入於地獄作大肉壁火燒受苦至今不息汝見肉索實非是索是地獄人迦葉佛時是出家人捉眾僧索私自己用以是因緣墮地獄中作大肉索火燒受苦至今不息汝見廁井實非廁井是地獄人迦葉佛時是出家人往比丘寺佛僧淨地大小便利不擇處所持律比丘如法呵責不受教誨糞氣臭穢熏諸眾僧以是因緣入地獄中作肉廁井火燒受苦至今不息罪報懺悔汝見高座法師實非法師是地獄人迦葉佛時是出家人不明律藏說重作輕說輕為重有根之人說作無根無根之人說道有根應懺悔者說言不懺不應懺者強說道懺以是因緣入地獄中坐高座上火燒受苦至今不息汝見第二高座實非法師是地獄人迦葉佛時是大法師邪命說法得利養處如理而說無利養時法說非法非法說法以是因緣入於地獄處鐵高座火燒受苦至今不息汝見肉犍椎號叫聲者實非犍椎是地獄人迦葉佛時是出家人以三寶物非法打椎詐作羯磨捉三寶物為己受用以是因緣入地獄中作肉犍椎火燒受苦至今不息汝見拘修羅實非祇支是地獄人迦葉佛時是出家人為僧寺主以僧厨食衒賣得物用作衣裳斷僧供養以是因緣入地獄中作肉祇支火燒受苦至今不息汝見第二拘修羅實非祇支是地獄人迦葉佛時是出家人作僧寺中分物維那以春分物轉至夏分夏分中衣服向冬中分以是因緣入地獄中作肉拘修羅火燒受苦至今不息汝見肉山非是肉山是地獄人迦葉佛時是出家人為僧典座五德不具少有威勢偷取僧物斷僧衣裳以是因緣墮地獄中作大肉山火燒受苦至今不息罪報懺悔爾時世尊復告僧護汝始初見須曼那柱實非是柱是地獄人迦葉佛時是出家人當佛剎人四輩檀越以須曼那華散供養佛華既乾已比丘掃取賣為己用以是因緣入地獄中作須曼那柱火燒受苦至今不息汝見第二須曼華柱實非是柱是地獄人迦葉佛時是出家人當供養剎四輩檀越以須曼那華油用供養佛比丘減取為己自用以是因緣墮地獄中作須曼柱火燒受苦至今不息汝見華樹實非是樹是地獄人迦葉佛時是出家人當僧果菜園有好華果為己私用或與白衣以是因緣入地獄中作大華樹火燒受苦至今不息汝見肉果樹實非果樹是地獄人迦葉佛時是出家人當僧菜果香美好果私自食噉或與白衣以是因緣入地獄中作肉果樹火燒受苦至今不息汝見肉樹實非是樹是地獄人迦葉佛時是出家人為僧當薪以眾僧薪房中自然或與知識以是因緣入地獄中作大肉樹火燒受苦至今不息罪報懺悔爾時世尊復告僧護比丘汝見第一肉柱者實非是柱是地獄人迦葉佛時是出家人寺中常住破佛剎柱為己私用以是因緣入地獄中作大肉柱火燒受苦至今不息汝見第二肉柱者實非是柱是地獄人迦葉佛時是白衣人以刀刮取像上金薄以是因緣墮地獄中作大肉柱獄卒捉斧斫身受苦猛火燒身至今不息汝見第三肉柱者實非是柱是地獄人迦葉佛時是出家人為僧當事用僧梁柱浪與白衣以是因緣入地獄中作大肉柱火燒受苦至今不息汝見四肉樹實非是樹是四罪人是地獄人迦葉佛時是出家人五德不具作大眾主為僧斷事隨愛怖瞋癡斷事不平以是因緣入地獄中作四肉樹火燒受苦至今不息汝見十四樹者實非是樹是地獄人迦葉佛時是出家人在寺常住不依戒律分諸敷具好者自取或隨瞋愛好惡差別於佛法中塵沙比丘應隨次受不平等故以是因緣此十四人墮地獄中作大肉樹火燒受苦至今不息汝見二比丘者實非比丘是地獄人迦葉佛時是出家人於大眾中鬪諍相打以是因緣入地獄中火焚身受相打苦至今不息汝見二沙彌者實非沙彌是地獄人迦葉佛時是出家沙彌共一被褥中相抱眠臥以是因緣入地獄中火燒被褥中相抱受苦至今不息罪報懺悔爾時世尊重告僧護比丘以是因緣故我今語汝在地獄中出家者眾白衣尠少所以者何出家之眾多喜犯禁戒不順毗尼互相欺凌私用僧物或分飲食不能平等是故我今更重告汝當勤持戒頂戴奉行爾時世尊復告僧護我今語汝是諸罪人於過去世出家破戒雖不精進四輩檀越見諸比丘威儀似僧恭敬僧寶四事供養猶故能令得大果報無量無邊不可思議我復語汝如前罪人先世出家犯僧物故墮大地獄後於未來世中有諸白衣取眾僧物者罪過於前說出家之人百千萬倍不可窮盡我復語汝若一比丘順於毗尼在僧伽藍如法行道依時鳴椎若施此人得福猶多說不可盡何況供養四方僧眾爾時世尊復告僧護若出家人營僧事業難持淨戒是諸比丘初出家時樂持淨戒求涅槃心四輩檀越送供養時是諸比丘應受是供堅持淨戒後不生惱爾時世尊欲重宣此義而說偈言持戒最為樂身不受諸惱睡眠得安隱寤則心歡喜爾時世尊說是偈已復告僧護有九種人常處阿鼻大地獄中何等為九一者食僧物二者佛物三者殺父四者殺母五者殺阿羅漢六者破和合僧七者破比丘淨戒八者犯淨行尼九者作一闡提是九種人恒在地獄有五種人二處受報一者地獄二者餓鬼其地獄者如汝所見是諸地獄其餓鬼者身形長大何者為五一者斷施眾僧物二者斷施僧食三者劫僧嚫物四者應得施能令不得五者法說非法非法說法此五種人受是二報餘業不盡五道中受爾時世尊欲重宣此義而說偈言行惡感地獄造善受天樂若能修空定漏盡證涅槃爾時世尊復告僧護汝於海中所見龍王受此龍身牙甲麟角其狀可畏臭穢難近以畜生道障出家法亦障修禪無八解脫果雖得長壽不能得免金翅鳥王之所食噉命終之後生兜率天天中命盡得受人身彌勒出世作大長者財富巨億為大檀越供養供給彌勒世尊及諸比丘四事具足是諸長者有五百人同時出家得羅漢果功高名遠眾所知識是諸龍王猶尚能得如是功德況我弟子如法出家坐禪誦經三業具足必證涅槃爾時世尊無問自說歸依佛者得大吉利晝夜心中不離念佛歸依法者得大吉利晝夜心中不離念法歸依僧者得大吉利晝夜心中不離念僧我等為無明所覆不識罪因今遇道場方始覺知歸命毗盧遮那如來及一切賢聖海眾燒香散華違犯法律一切業報發露懺悔不敢覆藏由此因緣我及法界眾生海一切違犯法律業報願皆清淨懺悔已至心歸命禮本尊毗盧遮那佛次懺悔滅罪印呪唵薩栗末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三遍百劫積集罪一念悉盪除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔白眾等聽說經中無常偈生者必歸死造罪諸苦逼謹慎其三業常應修福智眷屬皆捨去財物任他將但將自善根險道充資糧譬如路傍樹暫息非久停車馬及妻兒不久皆如是譬如羣宿鳥夜聚旦還飛死後別親知乖離亦如是惟有佛菩薩是真歸仗處依經我略說智者應諦思
