body:
  text: 唐蘭山雲巖慈恩寺護法國師行沙門慧覺依經錄宋蒼山載光寺沙門普瑞補註明欽忠義忠盡四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閱天台習教觀沙門正止治定第二十七晌次法界末會一切恭敬敬禮無盡三寶是諸眾等人各胡跪嚴持香華如法供養願此供海雲徧滿十方界百萬億天鈴幢百萬億金剛幢出微妙音百萬億天繒幢眾彩具足百萬億香幢垂布香網百萬億華幢雨一切華百萬億天衣幢懸布妙衣百萬億天摩尼寶幢天寶莊嚴百萬億天莊嚴具幢眾具校飾百萬億天鬘幢種種華鬘四面行布百萬億天葢幢寶鈴和鳴聞皆歡喜百萬億天蠡出妙音聲百萬億天皷出大音聲百萬億天箜篌出微妙音聲百萬億天牟尼螺出大妙音百萬億諸天雜樂同時俱奏百萬億天自在樂出妙音聲其聲普徧一切佛剎百萬億天變化樂其聲如響普應一切百萬億天皷音離於撫擊而出妙音百萬億天如意樂自然出音聲接相和百萬億天諸雜樂出妙音聲滅諸煩惱以如是等諸供養具常作供養帝網重重諸佛菩薩賢聖海眾受此供養雲以為光明臺廣於無邊界無量無盡願作佛事供養已一切恭敬次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持云唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽次供雲總持捺麼囉得捺二合得囉二合也引也捺麼末重遏斡矴末日囉二合薩囉不囉二合麻㗚怛二合禰怛達遏怛也啞㗚曷二合矴薩滅屹三二合莫捺重引也怛涅達唵末𠷌囉二合末𠷌囉麻曷引末𠷌囉二合麻曷引矴桚末𠷌呤麻曷引眉㗚也二合末𠷌囉二合麻曷磨溺重即舌腭怛末𠷌哩二合磨曷磨溺慢伸當巴珊葛囉麻捺也末𠷌哩二合薩㗚末二合葛㗚麻二合啞斡囉捺舌腭眉商𭊁㖠末𠷌囉二合莎引曷引梵音讚佛如來悉自在超世無所依具一切功德度脫於諸有無染無所著無相無依止體性不可量見者咸稱讚光明遍清淨塵累悉蠲滌不動離二邊此是如來智直言讚佛如來應正等覺音聲非有方所但隨眾生欲解緣出其信究竟不住方所亦無言說為覺悟放逸眾生出於無量妙法音聲徧法界中而令開悟無數眾生聞是音已皆生歡喜勤修善法於三乘中各求出離又於一音中出無量聲隨諸眾生心樂差別皆悉遍至悉令得解道場眾會靡不皆聞而其音聲不出眾外根未熟者不應聞故其有聞者皆作是念如來世尊獨為我說南無大方廣佛華嚴經中華藏世界海十身無礙本尊毗盧遮那佛南無大慈大悲五百誓願五濁救苦釋迦牟尼佛南無東方滿月世界十二上願五濁救苦藥師琉璃光王佛南無西方極樂世界四十八願五濁救苦阿彌陀佛南無十方三世盡虗空界微塵剎土中大方廣佛華嚴經圓滿教海南無大方廣佛華嚴經中主於行願真理普賢菩薩摩訶薩南無大方廣佛華嚴經中主於信解證智文殊師利菩薩摩訶薩南無大慈大悲五濁救苦千手千眼觀世音菩薩摩訶薩南無大願弘深五濁救苦出無佛世安慰人心常住琰魔羅界地藏王菩薩摩訶薩南無十方三世盡虗空界微塵剎土中十信菩薩十住菩薩十行菩薩十迴向菩薩十地菩薩等覺菩薩徧法界剎海微塵數菩薩一切海眾南無大方廣佛華嚴經末會中修證五相處五十五聖者南無大方廣佛華嚴經末會中圓器上根百城求法一生之內菩薩行圓為末世頓門修證軌範善財菩薩摩訶薩南無十方三世盡虗空界微塵剎土中法身色身形相舍利寶塔寺宇一切佛事又於法藏及講法處菩薩賢聖一切海眾南無大願摜甲求生淨土末濁夏國護持正法護法國師至心歸命禮大方廣佛華嚴經華藏世界海本尊毗盧遮那佛南無大方廣佛華嚴經中法界末會中第一師第一寄位修行相解脫法門十方盡歸命滅罪增淨信願生華藏海極樂淨土中次末會中文殊一人三會寄住十信位經云爾時文殊師利童子至辭退南行往於人間願共諸眾生往生華藏海極樂淨土中南無文殊師利菩薩南無無量同行菩薩南無常隨侍衛諸金剛神南無普為眾生供養諸佛諸身眾神南無久發堅誓願常隨從諸足行神南無樂聞妙法主地神南無常修大悲主水神南無智光照耀主火神南無摩尼為冠主風神南無明練十方一切儀式主方神南無專勤除滅無明黑闇主夜神南無一心匪懈闡明佛日主晝神南無莊嚴法界一切虗空主空神南無普度眾生超諸有海主海神南無常勤積集趣一切智助道善根高大如山主山神南無常勤守護一切眾生菩提心城主城神南無常勤守護一切智智無上法城諸大龍王南無常勤守護一切眾生諸夜叉王南無常令眾生增長歡喜乾闥婆王南無常勤除滅諸餓鬼苦鳩槃茶王南無恒願拔濟一切眾生出諸有海迦樓羅王南無願得成就諸如來身高出世間阿修羅王南無見佛歡喜曲躬恭敬摩睺羅伽王南無常厭生死恒樂見佛諸大天王南無尊重於佛讚歎供養諸大梵王南無如是等文殊師利與諸神王眾十方盡歸命滅罪增淨信願生華藏海極樂淨土中第一六千比丘會顯回小向大經云爾時尊者舍利弗至說法教化之所成就願共諸眾生往生華藏海極樂淨土中次十信位六千比丘眾南無海覺比丘南無善生比丘南無福光比丘南無大童子比丘南無電生比丘南無淨行比丘南無天德比丘南無君慧比丘南無梵勝比丘南無寂慧比丘南無如是等其數六千比丘眾十方盡歸命滅罪增淨信願生華藏海極樂淨土中經云爾時尊者舍利弗至願我一切悉當具得願共諸眾生往生華藏海極樂淨土中經云爾時文殊師利菩薩至具足成就一切佛法願共諸眾生往生華藏海極樂