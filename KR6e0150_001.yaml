body:
  text: 唐蘭山雲巖慈恩寺護法國師行沙門慧覺依經錄宋蒼山載光寺沙門普瑞補註明欽忠義忠藎四川布政佛弟子木增訂正雞山寂光寺沙門讀徹參閱天台習教觀沙門正止治定第一晌一切恭敬敬禮無盡三寶第一廣修供養依華嚴別圓之教此十種行願者是趣入毗盧無盡境界之妙門也諸大眾等審諦思惟此十種行願略有三門一若依總相者經云廣說如來不可思議功德已若欲成就此功德門應修十種廣大行願彼行願者今若具說六相圓融十重玄門有徧成諸行頓成諸行若依德相法體本具若依業用隨機妙現若依性起本來自具若依緣起應新觀修因果圓融互相無礙因該果海故初發心時即成正覺果徹因源故雖得佛果不捨因門俱是俱非互遣雙拂解境行有四句六句彼入是能入之門由此沒果海中故名不可思議品也二依別教行布圓融說者前十門名是行布也結歸之中有於圓融舉一具餘周徧含容一多自在廣狹無礙有體無體有力無力相入相即句數有多如華嚴大疏中此無方法者如埿撅隨牽而來不可定於一方由此禮敬一門中滅除帝網一切罪障圓滿帝網一切功德餘門亦爾清凉大師云若不能見聞此無邊無盡之境普賢行願無由得成也若不能具修應起欣求愛樂之心觀修儀者十玄門中依一門修如杜順三觀及大疏中說第三依於同教引劣機故攝於餘類由此疏中名徧攝門也今依三別門如常教說一禮敬諸佛斷除七慢九慢十慢等障獲得尊貴自在之身圓滿八萬四千相好一稱讚如來斷除口四重障獲得四無礙辯舌相徧覆具足十種圓音三廣修供養諸聖喜悅所修供養功能者福足增盛獲得攝授二種成就不修供養過失者所作不成諸不稱意四懺悔業障斷除四障十障成就世出世間一切功德獲得妙好依報正報五隨喜功德斷除不樂他榮嫉妒等障獲得不可稱量之福一切功德皆悉圓滿六請轉法輪斷除違法謗法等障獲得多聞聰慧不共功德七請佛住世斷除憎佛謗佛害佛及憎嫉菩薩善知識不樂住世之障得金剛不壞長壽之身八常隨佛學斷除違佛及諸善知識不能積集功德無志修集自他俱利等障獲得佛及菩薩無盡功德九恒順眾生斷除眾生種種性或怨或親或順或逆不能隨順佛不喜悅違佛等障獲得廣大善知識為眷屬十普皆迴向斷除狹劣不發菩提心障得十度圓滿獲十身果其發願者斷除無願及退轉障也前說功德悉皆圓滿現生極樂後遊華藏今依別教除障功德此略舉之彼一一成佛儀等如法行本續中說古師但修一種證得大手印成就淨除苦惱矣是諸眾等人各胡跪嚴持香華如法供養願此供海雲徧滿十方界阿僧祇寶阿僧祇華阿僧祇鬘阿僧祇衣阿僧祇蓋阿僧祇幢阿僧祇幡阿僧祇莊嚴具阿僧祇給侍阿僧祇塗飾地阿僧祇塗香阿僧祇末香阿僧祇和香阿僧祇燒香阿僧祇深信阿僧祇愛樂阿僧祇淨心阿僧祇尊重阿僧祇讚歎阿僧祇禮敬阿僧祇寶座阿僧祇華座阿僧祇香座阿僧祇鬘座阿僧祇旃檀座阿僧祇衣座阿僧祇金剛座阿僧祇摩尼座阿僧祇寶繒座阿僧祇寶色座阿僧祇寶經行處阿僧祗華經行處阿僧祇香經行處阿僧祇鬘經行處阿僧祇衣經行處阿僧祇寶間錯經行處阿僧祇一切寶繒綵經行處阿僧祇一切寶多羅樹經行處阿僧祇一切寶欄楯經行處阿僧祇一切寶鈴網彌覆經行處阿僧祇一切寶宮殿阿僧祇一切華宮殿阿僧祇一切香宮殿阿僧祇一切鬘宮殿阿僧祇一切旃檀宮殿阿僧祇一切堅固妙香藏宮殿阿僧祗一切金剛宮殿阿僧祇一切摩尼宮殿皆悉殊妙出過諸天阿僧祇諸雜寶樹阿僧祇種種香樹阿僧祇諸寶衣樹阿僧祇諸音樂樹阿僧祇寶莊嚴具樹阿僧祇妙音聲樹阿僧祇無厭寶樹阿僧祇寶繒綵樹阿僧祇寶璫樹阿僧祇一切華香幢幡鬘蓋所嚴飾樹如是等樹扶疎蔭映莊嚴宮殿其諸宮殿復有阿僧祇軒檻莊嚴阿僧祇牕牗莊嚴阿僧祇門闥莊嚴阿僧祇樓閣莊嚴阿僧祇半月莊嚴阿僧祇帳莊嚴阿僧祇金剛彌覆其上阿僧祇香周匝普熏阿僧祇衣敷布其地佛子菩薩以如是等諸供養具於無量無數不可說不可說劫中淨心尊重恭敬供養一切諸佛恒不退轉無有休息一一如來滅度之後所有舍利悉亦如是恭敬供養受此香華雲以成光明臺廣於無邊界無量無邊願作佛事問此文及下經中皆云香華遍滿十方界供養等者如何辨得如是多多供養具得供如上多多佛耶答准華嚴緣起章第三供養門中云菩薩凡所施設乃至一香一華一衣一蓋供養具無不稱真理等虗空界即以全法界之身遊諸佛剎稱真之物供養於佛是故菩薩不虗行於所修值諸佛恒不失時一切供具常稱理而成就何以故法施於佛稱真理故釋曰准此云一香一華等又云常稱理而成就者即知經中所列皆以稱理即一之多等也故修行者但安心觀行物物自多皆徧諸佛也故云願此香華雲徧滿十方界供養一切佛次下經說迷心中供養比觀行供養百千萬俱胝那由他迦羅算喻沙陀不及一也皆言天者是自然義表法界中法爾有如是不思議用也皆言雲者是隨緣義表由行願力故見也謂此供是色相顯然智照無性從法空無生法起能見所見逈無所依應用而來來無所從用謝而去去無所至而能含慈潤霪法雨益萬物以重重無盡有雲象焉次奉施寶錯寶珠自性廣大海七寶山等最殊勝出興如斯供養雲諸佛等處我奉獻唵薩㗚末怛達遏怛囉得捺布桚銘遏薩摩𠹌囉悉癹囉捺薩麻英吽寶錯經云有一總持名無量種呪皆能成就具大功能總持曰唵悉麻囉悉麻囉眉麻捺悉葛囉麻曷令斡吽寶錯總持云以金銀鍮石等作寶錯時於曼捺辣上至如來像於如來及菩薩勇識婆羅門仙人六趣餓鬼等處奉此寶錯故隨自所求種種宮殿種種幔帳種種象馬種種車乘種種七寶種種衣服種種飲食等悉能成辦又從無始以來一切宿債悉能償還今略集之廣如經說又迴向輪經云誦此祕密真言畢已即成隨意天大妙供養雲現一切佛前若善男子善女人一心觀佛或晝或夜誦此迴向輪故善男子善女人諸罪消滅一切煩惱漸漸微薄能獲一切種種功德若誦一徧得梵天之福夢中常得見佛命終已後得生極樂淨土廣如經說次結廣大不空摩尼印呪二手金剛合掌二頭指蹙加寶形竝竪二大指即成誦不空摩尼供養陀羅尼唵啞麼遏布麻禰巴能麻末𠷌呤怛達遏怛眉浪雞矴薩慢怛不囉薩囉吽此廣大不空摩尼供養陀羅尼纔誦三徧則成於無量壽如來集會及無邊剎土中雨無量廣大供養所謂種種塗香雲海種種花鬘雲海種種燒香雲海種種天妙飲食雲海種種天妙衣服雲海種種摩尼光明燈燭雲海種種幢幡寶帳寶蓋雲海種種天妙音樂雲海普於諸佛菩薩眾會等處成真實廣大供養由結印誦此陀羅尼供養故獲得無量福聚猶如虗空無有邊際世世常生一切如來大集會中蓮華化生得五神通分身百億能於雜染世界拔濟苦惱眾生皆令安樂即於現世受無量果報當來得生淨土此道場儀中集呪印者即是密法中末世時修行者不依密呪助護難以觀行成就也夫供養有二門一契本源自性供養二藉密法助緣供養此中亦有二種一寶錯供養二呪印供養皆依密法又前即觀念性起供養此即緣起新成供養皆含攝故成於緣性圓融供養之海向下讚歎敬禮念佛旋繞誦經并呪等無不如是眾等應知供養已至心歸命禮本尊毗盧遮那佛第二稱讚如來有二門請三寶已五體投地頂禮佛足端身威儀一心佇立面向法座燒香散華意中觀想三寶微妙功德瞻仰不捨以語誦曰一梵音讚佛如來妙色身色相不思議見者生歡喜恭敬信樂法十方國土海無量無邊佛咸於念念中各各現神通大智諸菩薩深入於法海佛力所加持能知此方便二直言讚佛讚佛功德十力大雄最無上譬如虗空無等等境界廣大不可量功德第一超世間十力功德無邊量心意思量所不及人中師子一法門眾生億劫莫能知十方國土碎為塵或有數計知其數如來一毛功德量千萬億劫無能說如人持尺量虗空復有隨行計其數虗空邊際不可得如來境界亦如是或有能於剎那項悉知三世眾生心設經眾生數等劫不可知佛一念性譬如法界徧一切不可見取為一切十方境界亦復然徧於一切非一切讚法功德欲具演說一句法阿僧祇劫無有盡而令文義各不同菩薩以此初發心光中現佛不可說佛所說法不可說法中妙偈不可說聞偈得解不可說不可說解念念中顯了真諦不可說示現未來一切佛常演說法無窮盡一一佛法不可說種種清淨不可說出妙音聲不可說轉正法輪不可說於彼一一法輪中演修多羅不可說於彼一一修多羅分別法門不可說於彼一一法門中又說諸法不可說於彼一一諸法中調伏眾生不可說或復於一毛端處不可說劫常安住如一毛端餘悉然所住劫數皆如是讚僧功德菩薩功德無有邊一切妙行皆具足假使無量無邊佛於無量劫說不盡何況世間天及人一切聲聞及緣覺能於無量無邊劫讚歎稱揚得究竟一切眾生數易知三世心量亦可知如是普賢諸佛子功德邊際無能測一毛度空可知邊眾剎微塵可數知如是大仙諸仙子所住行願無能量十方剎土碎微塵於一念中不知數毛端度空能知量億劫宣揚不能盡我等眾會於日初分禮讚功德所獲善根迴向一切眾生海願皆永離纏蓋成種智道故此經中列塵數佛已次云我當悉以甚深信解現前知見各以出過辯才天女微妙舌根出無盡音聲言詞稱讚如來功德海當知必須觀智明白方得能讚所讚皆如海深廣無盡也讚歎已至心歸命禮本尊毗盧遮那佛第三禮敬諸佛既讚歎竟應當一心正身威儀次第禮佛禮佛之法當須隨所禮之佛至心憶念此佛真身猶如虗空應物見形如水中月分明了了如對目前受我禮拜於一一佛皆如是用心以名召體而禮之不得散亂又須自知身心空寂無有禮相障緣影見法界一一佛前悉有此身頭面體敬準勒那三藏禮佛觀門優劣有七一我慢禮二唱和禮此二非儀三恭敬禮敬從心發運於身口五輪著地四無相禮深入法性離能所相五起用禮觀身與佛皆從緣起如幻如影普運身心徧禮一切六內觀禮但禮身內法身真佛不緣他佛七實相禮若內若外若凡若佛同一實相見佛可禮亦是邪見觀身實相觀佛亦然名平等禮故文殊云不生不滅故敬禮無所觀等然後四禮皆屬觀行謂第四空觀禮真諦佛入法之性故五假觀禮俗諦佛從體起用故六中觀禮第一義諦佛不計空色直見本覺真性故七則三觀一心禮三諦一境佛不取真棄假泯絕無寄故然今七禮經文既是隨相門中且當第三第五也心心恭敬故念念觀身觀佛從性隨緣如幻影故餘無相禮等是下離相攝念之義然則雖三例圓明只於身口恭敬禮時作此觀智非為身口都不禮讚但將無相等以當禮佛善須思之若以觀智便名禮佛不須身禮第三中亦應但以恭敬便為禮佛不合運於身口義例如此豈不誤焉問大乘宗以意地起犯即名破戒何妨例此心禮即成功德答彼意中作念的擬運身口行殺盜等心念成就竟無悔意故即名破戒今但的擬運身業禮口業讚等心志决定竟無猶豫縱未遂嚴淨道場作禮之間灼然已生功德若無意擬運身口元無功德如本無意擬殺等亦元無罪也然觀智既成觀境常見行住坐臥禮不間斷但觀心不退自然流注如受惡律儀之人殺等之心念念流注不必正殺正盜也受惡律儀者作屠獵劫賊等業也問第五禮中云能所皆如影像影像無心如何得禮義成答即念念恭敬之心亦如影也世間鏡之類但見色影不能見聲香味觸及心之影而此大圓鏡智等虗空界見色聲等及心心所等也作此觀時先觀己身心是無明勢分從染緣而起今以正智觀空無自性全體即是一真法界然後觀此法界不守自性常能隨緣而起遂禮拜恭敬一心歸投託諸佛及法義淨緣引起身心及佛隨此淨緣起為身心及佛如影從鏡見既我身心無性合於法界法界無所不徧故我身心隨所依法界亦無所不徧無所不禮故云徧體一切也第六中云身內真佛者如塵中有大經卷如弊布褁真金如焦模中佛像如器中鍠之聲音也此既有真假內外相對非一向泯相則亦當此隨念中也準華嚴宗復有自他融攝之禮具足四句一者一身禮多佛彼經云一一身徧禮不可說不可說佛剎微塵數佛又云菩薩應知自心念念常有佛成正覺一切眾生亦復如是念念悉有佛成正覺二者多身禮一佛經云一一佛所現不可說不可說佛剎微塵數身又云如來成正覺時於其身中普見一切眾生成正覺三者一身禮一佛四者多身禮多佛彼經云如來成正覺時入善覺智三昧見一切眾生數等身住於身中乃至一毛孔中有一切眾生數等身徧法界一切毛孔悉亦如是無有少許處空無佛身釋曰但以隨舉一身對佛隨舉一佛對身及對文說義結為四句然實身數等皆無盡也問何以修行人身如是一一同佛無盡耶答曰因緣備故彼經云我以普賢行願力故此是法力即緣也又云起深信解如對目前此是自力即因也深解即是勝解勝解者決定印持也謂以普賢法力見一切境皆是佛境以深解智力印可攝持如上佛境在心如目前也謂於境不取生滅一多等定相境即融通佛境於心依智不依識則心心是見佛之心故彼經云一切法無生一切法無滅若能如是解諸佛常現前故彼經結禮佛云虗空界盡眾生界盡眾生業盡眾生煩惱盡我禮乃盡以虗空界眾生界等不可盡故我此禮敬無有窮盡念念相續無有間斷身語意業無有疲厭供養稱讚十種行願一一如此結之即知若不以普賢觀行之力如何得念念不斷耶智者審思此文無以生滅之心取相之禮而為禮讚供養等也南無大方廣佛華嚴經中毗盧遮那眾生身十方盡歸命滅罪增淨信願生華藏海極樂淨土中南無大方廣佛華嚴經中毗盧遮那國土身偈同上南無大方廣佛華嚴經中毗盧遮那業報身偈同上南無大方廣佛華嚴經中毗盧遮那聲聞身偈同上南無大方廣佛華嚴經中毗盧遮那獨覺身偈同上南無大方廣佛華嚴經中毗盧遮那菩薩身偈同上南無大方廣佛華嚴經中毗盧遮那如來身偈同上南無大方廣佛華嚴經中毗盧遮那智身偈同上南無大方廣佛華嚴經中毗盧遮那法身偈同上南無大方廣佛華嚴經中毗盧遮那虗空身偈同上南無大方廣佛華嚴經中毗盧遮那四萬五千偈三十九品略本經十方盡歸命滅罪增淨信願生華藏海極樂淨土中南無大方廣佛華嚴經中毗盧遮那十萬偈四十八品下本經偈同上南無大方廣佛華嚴經中毗盧遮那四十九萬八千八百偈一千二百品中本經偈同上南無大方廣佛華嚴經中毗盧遮那十三千大千世界微塵數偈一四天下微塵數品上本經偈同上南無大方廣佛華嚴經中毗盧遮那海雲能持普眼經偈同上南無大方廣佛華嚴經中毗盧遮那同說經偈同上南無大方廣佛華嚴經中毗盧遮那異說經偈同上南無大方廣佛華嚴經中毗盧遮那主伴經偈同上南無大方廣佛華嚴經中毗盧遮那眷屬經偈同上南無大方廣佛華嚴經中毗盧遮那圓滿經偈同上南無大方廣佛華嚴經中毗盧遮那普賢文殊等同生一切海眾十方盡歸命滅罪增淨信願生華藏海極樂淨土中南無大方廣佛華嚴經中毗盧遮那三十九類異生一切海眾偈同上南無大方廣佛華嚴經中毗盧遮那依口光召於眉間一切海眾偈同上南無大方廣佛華嚴經中毗盧遮那及樹內眾宮殿內眾生內眾等一切海眾偈同上次為諸部眾禮敬三寶自下日初時分依此應禮為梵王帝釋三十三天福德增盛故敬禮常住三寶為四大天王龍神八部日月星宿增盛威光故敬禮常住三寶為當今皇帝聖壽無窮弘揚正法故敬禮常住三寶為皇后貴妃公主太子諸王福延萬葉深信正法故敬禮常住三寶為文武官僚天下黎民信樂佛法故敬禮常住三寶為師僧知識同會善友十方施主三塗八難願得難障解脫故敬禮常住三寶為山神地神海神江神河神樹神晝神夜神空澤神苗稼神飲食神草木神水火風神主空主藥主城主宅諸神靈等滅罪增福故敬禮常住三寶為國界安寧災危殄滅佛事興隆法輪永轉故敬禮常住三寶為琰魔羅界十八獄帝三十大王三十三王三十六王十八獄主主命主攝無毒諸鬼王等願得離苦解脫故敬禮常住三寶為地府輔王小臣主掌首領執杖公曹獄吏主淨主水主鐵主土主火主天下十類罪人願得離苦解脫故敬禮常住三寶為十類孤魂三類九類十類餓鬼三十六部大力妖魅諸餓鬼等願得離苦解脫故敬禮常住三寶為十類傍生住海住水住地住空蛇類魚類鰕類象類馬類三十六億諸畜生等得離苦解脫故敬禮常住三寶普禮真言唵薩㗚末怛達遏怛遏怛巴𭊁難葛浪彌應想普徧敬禮一切賢聖等處功德山陀羅尼呪捺麼莫𭊁也捺㗚𭊁㗚麻也捺麼珊遏也唵席寧呼魯魯席嚕屹呤巴屹令巴席𭊁呤布嚕呤薩曷大集經云若人誦此呪一徧者如禮大佛名經四萬五千四百徧又如轉大藏經六十萬五千四百徧又造罪過十佛剎土入阿鼻地獄受罪劫盡更生若誦此呪一徧此等重罪皆悉消滅不墮地獄命終已後決定往生極樂世界得見阿彌陀佛上品上生禮敬已至心歸命禮本尊毗盧遮那佛第四懺悔業障禮佛已竟於法座前正身威儀恭敬胡跪右膝著地燒香散華存想三寶畟塞虗空普賢菩薩無量莊嚴眷屬圍繞為懺悔主一一皆如對自目前一心一意生鄭重心慚愧發露懺悔無量劫來六根三業所造一切惡業斷相續心從於今時盡未來際中不更造所以者何業性雖空果報不失若有造惡不懺雖是虗妄顛倒因緣則還受虗妄果報然懺悔詞句多取大藏經論中文也弟子比丘某甲普為四恩三有及法界眾生等竝願斷除諸業障歸命懺悔次十惡業報懺悔夫欲懺悔者先知展轉生起因由無始不覺起貪瞋癡發身口意造一切業謂善惡不動等若約責心善惡俱懺以善惡業迷時皆是貪愛心所作故若就所作罪狀則惟懺悔惡業以悟後乃至成佛畢竟不捨善行故善是順于理故迷時以取相求報故成身過患悟後但離其病不除善法故不懺也惡業背理招苦一向須斷故徧懺也就懺中復有二種一若犯遮罪先須依教作法懺之遮罪者體非毒惡但以佛戒遮制不許即不合作作即成犯若犯性罪復須起行性罪者謂殺盜等十惡體性是惡佛未出世未有戒制之時作之法爾有罪墮於三塗故也言起行者一事懺二理懺事懺如方等佛名經等亦令作法兼起行也謂彼方等經令先嚴淨道場香泥塗地及室內作圓壇彩畵縣五色幡燒海岸香點酥油燈敷設高座請二十四尊像多亦無妨供餚饍盡心力新淨衣服鞋履無新洗故出入著脫令無參雜七日長齋一日三時洗浴初日供養僧隨意多少別請一明了內外律者為師受二十四戒及陀羅尼對師說罪要八日至十五日當以七日為期此不可減若能更進隨意堪任十人已還不得過此俗眾亦得須辦單縫三衣備佛法式旋遶一百二十帀却坐思惟廣如經說又彼文中令興七種心以為方便一者慚愧二者恐怖三者厭離四者發菩提心五者怨親平等六者念報佛恩七者觀罪性空興如是七種心已緣想十方諸佛賢聖擎拳合掌披陳至禱慚愧改革等若準天台止觀須達順逆十心為先識十種順生死心以為所治一妄計我人起於身見二內具煩惱外遇惡緣我心增盛三內外既具滅善心事不喜他善四縱恣三業無惡不為五事雖不廣惡心徧布六惡心相續晝夜不斷七覆諱過失不欲人知八虜扈抵突不畏惡道九無慚無愧不懼凡聖十撥無因果作一闡提從無始來若自及他無不皆爾次起逆生死心從後翻破一明信因果二慚愧剋責屏罪慚天顯罪愧人三怖畏惡道翻抵突也四不覆瑕疵翻覆藏也五斷相續心如再犯王法吐已還食也六發菩提心心等虗空翻前惡徧七修功補過翻前縱惡八守護正法翻前滅善九念十方佛翻惡緣也十觀罪性空見無我也若具此者無罪不滅若不解者設入道場徒為勞苦惟願帝網無盡佛法僧寶毗盧遮那如來普賢文殊海會聖眾世出世神慈悲本願放大光明照於法會證盟護念哀愍攝受願我及一切眾生海自從無始直至今時業海無盡帝網重重一切罪業發露懺悔舍利弗悔過經云舍利弗白佛言若有善男子善女人意欲求佛道者若前世為惡當云何懺悔佛言善哉善哉若欲求阿羅漢緣覺佛道欲知去來之事者常以平旦日中日沒人定夜半鷄鳴時澡潄整衣服叉手禮拜十方自所向處當悔過言某甲等宿命從無數劫來所犯過惡於今世所犯淫妷所犯瞋怒所犯愚癡不知佛時不知法時不知比丘僧時不知善惡時若身犯過若口犯過若心犯過若意犯過若以意害佛嫉惡經道若鬬比丘僧若殺阿羅漢若自殺父母犯身三口四意三自殺生教人殺生見人殺生代其喜身自行盜教人行盜見人行盜代其喜身自欺人教人欺人見人欺人代其喜身自兩舌教人兩舌見人兩舌代其喜身自罵詈教人罵詈見人罵詈代其喜身自妄語教人妄語見人妄語代其喜身自嫉妒教人嫉妒見人嫉妒代其喜身自貪餌教人貪餌見人貪餌代其喜身自不信教人不信見人不信代其喜身自不信作善得善作惡得惡教人作惡見人作惡代其喜身自盜佛寺中財物若盜比丘僧財物教人行盜見人行盜代其喜身自經秤小㪷短尺欺人以重秤大㪷長尺侵人教人侵人見人侵人代其喜身自作賊教人作賊見人作賊代其喜身自惡逆教人惡逆見人惡逆代其喜身所謂無始以來身生五處者在泥犁中時在禽獸中時在薜茘中時在人中時身在五道中生時所犯過惡不孝父母不順於師不敬善友不敬沙門道人不敬長老輕易父母輕易於師輕易求阿羅漢道者輕易求辟支佛道者若誹謗嫉妒見佛道言非見惡道言是見正言不正見不正言正某等諸所作過惡願從十方諸佛求哀悔過令某等今世不犯此過殃後世永不犯此過殃所以從十方諸佛求哀者何佛能洞視徹聽不敢於佛前欺誑某等有過惡不敢覆藏從今已後皆不敢復犯佛語舍利弗若有善男子善女人意不欲入泥犁禽獸薜茘中者諸所作過皆當悔過不敢覆藏受戒已後不當復作惡不欲生邊地無佛處無經處無比丘僧處無義理處無善惡處者皆當悔過不當覆藏意不欲愚癡聾盲瘖瘂不欲生屠士漁獵獄吏貧家者皆當悔過不當覆藏女人欲求男子者皆當悔過欲得須陀洹道不復入泥犁薜茘中者皆當悔過欲得斯陀含道上天作人欲得阿那含道上二四天欲得阿羅漢泥洹去者欲於世間得阿羅漢道者欲得辟支佛道者欲得知去來之事者皆當悔過不敢覆藏佛語舍利弗若有善男子善女人各當日夜三時稽首於十方現在諸佛作禮又從無始以來毀戒犯記句違越法律妄想分別愛著我人一切罪障悉願消滅雜亂濁心障礙間斷悉願清淨身心不安憂愁熱惱悉得解脫嗔恚躁動面慍不喜呵責損害悉得清淨互相惱亂鬪諍不和官事口舌諍論憂惱罪業消滅無德傳戒無才為師學寡利他不淨說法虗食信施心行染欲悉願消滅我等為無明所覆不識十惡業報罪因今遇道場乃能覺知歸命毗盧遮那如來及一切賢聖海眾燒香散華一切苦報發露懺悔不敢覆藏由此因緣我及法界眾生海一切業報願皆清淨次懺悔滅罪印呪二羽金剛縛進力屈二節禪智押二度誦懺悔密言唵薩㗚末二合巴引巴眉悉普怛𭊁曷捺末日囉也莎曷應誦三徧百劫積集罪一念頓盪除如火焚枯草滅盡無有餘我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔懺悔已至心歸命禮本尊毗盧遮那佛第五隨喜功德十方一切諸眾生二乘有學及無學一切如來與菩薩所有功德皆隨喜隨喜已至心歸命禮本尊毗盧遮那佛第六請轉法輪十方所有世間燈最初成就菩提者我今一切皆勸請轉於無上妙法輪請轉已至心歸命禮本尊毗盧遮那佛第七請佛住世諸佛若欲示涅槃我悉至誠而勸請惟願久住剎塵劫利樂一切諸眾生請住已至心歸命禮本尊毗盧遮那佛第八常隨佛學我隨一切如來學修習普賢圓滿行供養過去諸如來及與現在十方佛未來一切天人師一切意樂皆圓滿我願普隨三世學速得成就大菩提隨學已至心歸命禮本尊毗盧遮那佛第九恒順眾生所有十方一切剎廣大清淨妙莊嚴眾會圍遶諸如來悉在菩提樹王下十方所有諸眾生願離憂患常安樂獲得甚深正法利滅除煩惱盡無餘恒順已至心歸命禮本尊毗盧遮那佛第十普皆迴向所有禮讚供養佛請佛住世轉法輪隨喜懺悔諸善根迴向眾生及佛道迴向已至心歸命禮本尊毗盧遮那佛弟子比丘某等為一切眾生至心發願願我臨欲命終時盡除一切諸障礙面見彼佛阿彌陀即得往生安樂剎我既往生彼國已現前成就此大願一切圓滿盡無餘利樂一切眾生界彼佛眾會咸清淨我時於勝蓮華生親覩如來無量光現前授我菩提記蒙彼如來授記已化身無數百俱胝智力廣大徧十方普利一切眾生界乃至虗空世界盡眾生及業煩惱盡如是一切無盡時我願究竟恒無盡發願已至心歸命禮本尊毗盧遮那佛此下誦無常者然此禮懺理事廣常於六時中難於剋定今便於此第一晌具寫餘六時所用之文驗本簡看唱者先須誦熟各以本時用之無常偈者後每晌別書經論中無常偈者此即六時通用或別一任隨意念之又若有暇時則應念勸世一百頌警策無常亦得今以寅時為首具錄六時云白眾等聽說寅朝無常偈欲求寂滅樂當學沙門法衣食計身命精麤隨眾等諸眾等寅朝清淨記六念又各念無常偈此即可每上必須用之諸行無常是生滅法生滅滅已寂滅為樂如來證涅槃永斷於生死若能志心聽常得無量樂午時偈人生不精進喻若樹無根採華置日中能得幾時鮮華亦不久鮮色亦非常好人命如剎那須臾難可保是故勸眾生勤修無上道黃昏偈西方日已暮塵勞猶未除老病死時至相看不久居念念催年促猶如少水魚勸諸禮佛眾修學至無餘又各念偈是日已過命亦隨減如少水魚斯有何樂眾等當勤精通如救頭然但念無常慎勿放逸初夜偈煩惱深無底生死海無邊度苦船未立云何樂睡眠睡眠當覺悟攝心恒在禪勇猛勤精進菩提道自然中夜偈比丘汝起起何以著睡眠睡眠有何利病時豈可眠利㓨刺身時云何得睡眠汝今捨家時出離之所願當如其本願日日勤精進後夜偈神光遷流轉迄至五更初無常念念至恒與生死俱勸諸行道者修學至無餘又有一偈六時通用世間不牢固如水沫泡𦦨汝等咸應當疾生厭離心啟白賢聖仰白十身徧照佛華藏世界諸如來娑婆本師釋迦尊普賢文殊諸上首剎海聖眾并徒眾華藏會上諸上人釋梵諸天眾類神獲得他心道眼者竝願不捨慈悲力證明我等二眾人為修行願總持門某時至心同禮懺所生功德總用莊嚴法界剎海眾生當願天仙不墜悟著樂而非常國土清平識真乘而是勝群僚常居祿位皆忻圓頓教門人民永保安寧咸修覺照之道師僧父母福慶汪洋信施檀那萬行圓滿三途俱時離苦八難竝悉消除鑊湯變為清涼池鐵牀變作蓮華座息悲痛之響同念佛之音人人有返本之心各各悉還源之照常發今願當願俱不退心觀行令成同證華嚴海會為上良緣清淨法身毗盧遮那佛圓滿報身盧舍那佛千百億化身釋迦牟尼佛十二上願藥師琉璃光王佛四十八願阿彌陀佛大聖普賢菩薩摩訶薩大聖文殊菩薩摩訶薩大聖觀世音菩薩摩訶薩大聖地藏菩薩摩訶薩大聖徧法界菩薩摩訶薩摩訶般若波羅蜜大方廣佛華嚴經呪捺麻緊薩慢引怛莫𭊁重也難啞不囉二合帝曷怛折引難禰唵雞禰雞禰怛達引遏當能末二合重斡山舌腭引矴不囉二合帝嗚怛麻怛摩怛麻怛達引遏當𠹌末二合斡吽癹怛莎引曷引若誦此呪一徧如同全讀華嚴經一部所得功德齊等毗盧遮那灌頂光呪唵啞麼遏重妹重𠺘拶捺麼曷引摩𠹌囉二合引麻禰舌腭巴𠹌麻二合𪢚辣不囉二合斡㗚怛二合也吽經云若復有人十方佛剎塵數劫中造十惡五逆四重等罪由此重罪直墮阿鼻地獄中若人持誦此毗盧遮那佛呪與彼亡者或散墓上屍骸名牌等上以華米等誦二十一徧或誦百八徧拋散彼形骸上毗盧遮那本願力故放大光明照彼罪人身上一切業障悉皆消滅以光明中攝往於西方極樂國土蓮華化生十支莊嚴已竟誦解座偈處世界如虗空似蓮華不著水心清淨超於彼稽首禮無上尊旋遶念誦既懺悔發願已應當一心正身威儀右旋法座燒香散華安詳徐步憶念三寶微妙功德口中稱念南無法界十方佛南無法界十方法南無法界十方僧南無毗盧遮那佛南無釋迦牟尼佛南無大方廣佛華嚴經南無普賢菩薩南無文殊師利菩薩南無法會大菩薩南無功德林菩薩南無金剛幢菩薩南無金剛藏菩薩南無文殊等五十五聖者南無善財菩薩南無法界剎海微塵數菩薩眾此即覺了音聲性空身心如雲如影舉足下足心無所得不住行步之相幻影即空即云真法性故我此身影現十方充滿法界無不普現旋遶諸佛如是三匝乃至三七七七百匝無有定數當自斟酌行道欲竟還如前稱阿彌陀佛名號南無阿彌陀佛南無阿彌陀佛燒香正念行道終即歸依三寶一心正念口自唱言自歸依佛當願眾生體解大道發無上心自歸依法當願眾生深入經藏智慧如海自歸依僧當願眾生統理大眾一切無礙和南聖眾正坐思惟上來十門事行方便一一如文見法不得滯文迷意須令全理之事了了當情便入觀行以為久長所緣之境也攝念禁意閉目端身結跏趺坐至心諦想無邊剎海三世一切如來於一一佛菩薩前慇懃恭敬作禮圍繞又以種種供具雲海供養如是等一切聖眾廣供養已應觀自心本無生滅法爾圓成光明普照猶如虗空又深起慈念憐愍眾生不悟自心輪轉諸趣我皆化度令得開解又觀自心諸眾生心及諸佛心本無差別平等一相成大菩提心明徹清淨廣大周徧圓滿白淨成大月輪等虗空量無有邊際於彼月輪上想一金色啞字放無量光徧十方界一一光中有無量佛剎一一佛剎有無量諸佛一一諸佛菩薩圍遶成等正覺智入三世身徧十方轉大法輪救眾生苦成佛畢已諦想啞字自性無生真理一切想空依自性而住若疲倦時誦短啞字二十一徧依大方廣佛華嚴經一名三偈略劑門契真大師傳一聞名熏種劑門大方廣佛華嚴經二三觀修心劑門分三一真空絕相觀法性本空寂無取亦無見性空即是佛不可得思量二理事無礙觀若人欲了知三世一切佛應觀法界性一切惟心造三周徧含融觀一中解無量無量中解一了彼互生起當成無所畏華嚴初祖杜順大師所造三觀偈若人欲識真空理身內真如還徧外情與無情共一體處處皆同真法界秪用一念觀一境一切諸境同時會於一境中一切智一切智中諸法界一念照入於多劫一一念劫收一切時處帝網現重重一切智通無礙此一名三偈若思若誦成金剛不壞堅種也夫作此華嚴禮懺儀者若七日或二十一日皆得初入壇午時教誡齋後召請晚時放施食然燈行道誦七枝偈應轉法輪來日寅朝作七枝行大眾排立作禮寅時解齋巳日初日午日晚初夜中夜後夜六時應作乃依諸經晝三時夜三時是也又前二晌末後淨土會等依文次第應禮彼中第三晌禮如來十身畢已維那住於法座而白經及佛名等眾等聽受跪膝而禮後從第三晌至第三十九晌皆十三禮畢坐時白經及佛名禮拜儀等准前知之其餘作儀皆取圓覺道場儀也敬造華嚴道場儀文記華嚴大教乃如來根本法輪一切佛書於中流出譬之其猶天覆地擎海涵春育大抵皆修普賢之因以證遮那之果故也昔李長者之論觀國師之疏極其蘊奧發其幽隱然一行禪師之儀文切于物情中于機會可謂修行之指南也欽忠義忠藎四川左布政雲南麗陽佛弟子木增同麗江府知府授參政男木懿應襲孫木靕暨諸子孫太學生木喬木參生員木宿木櫾木橒木㮱木極悟樂等各捐淨捧延僧命役敬奉大方廣佛華嚴經三昧懺儀一部共四十二卷六十一冊直達南直隷蘇州府甞熟縣隱湖南村篤素居士毛鳳苞汲古閣中鳩良工雕造起于崇禎庚辰孟夏終于辛巳春凡一載功成今寘此版於浙江嘉興府楞嚴寺藏經閣祈流通諸四眾歷劫熏修見聞此法永持不捨所願一乘頓教徧布人寰三有羣生俱明性海者耳
